body:
  text: 陵川集巻七元郝經撰古詩和陶飲酒順適皆坦途忘幾信所之天地與化遷焉能獨違時酒中有深趣真樂良在兹痛飲忘形骸物我兩不疑每笑蘓學士漫把空盃持謝安曠逹士攜妓遊東山蒼生如我何勸我真狂言樽中酒常有縱飲當窮年此樂醉者知難為醒者傳道在盃杓中有物都無情一醉還天藏豈將飲為名嗟嗟馽羈人勞勞失此生自著徽墨纒仍因寵辱驚枯腸歸髙岡渇死竟何成武帝燒黄金玉殿紫煙飛終下輪臺詔創然徒傷悲侈心與物競詣絶無所依血氣有壯瘁困憊終還歸醉鄉萬事和悠悠無盛衰有酒當共飲獻酬莫相違好酒無惡客合席語喧喧銜盃相爾汝共釂何黨偏秋月流金樽春風頺玉山便作無懷民坐使唐虞還酒盡任去留醉眠都無言詩因酒更多真境發精英爛漫醉後言舉是醒時情百川飲長鯨千觚都一傾我亦如劉伶終當以酒鳴百年都幾何不飲安用生上春東風和百卉呈媚姿家家社甕熟相喚插花枝此時酒無算盡發胸中竒醉人卧花間陶然亡云為不飲彼何得祗自强拘羈西風黄葉落處處菊花開霜螯味滿殻持盃亦開懷正當劇飲時惟恐與時乖快意傾灧灧無復念栖栖金英既狼籍人亦醉如泥我順物安忤兀兀靡不諧悠悠反化初世路都沈迷駕言入醉鄉麴車不可迴夜醉曉來醒日出東南隅嗟嗟早行人百里巳半途我秪孰為容彼亦孰為驅飲酒有運數生平酒常餘賜田總種秫終傍淵明居屈子重違天陶公乃逹道遥遥隙中駒放盃身已老欺為畫餅欺遂使腸枯槁君看桃花顔得酒色更好榮名身後事美酒樽中寳一飲便成仙御風凌八表我愛李太白醉眼髙一時把盃問明月揮灑多文辭吾生嗜盃酒感寓實在兹常向醉中醒更飲不復疑載讀止酒詩陶公亦吾欺安得泛酒海弄月恣所之壺中别一天飲之造真境有夢渾未覺獨醉勝獨醒忘物神乃㑹放懷道即領巨壑當藏舟括囊勿脱穎為告不飲人此理天日炳好事邀我飲布席我已至散談坐生風引滿即徑醉快意無町畦縱衡不比次忘情釋重負適巳乃為貴世上多虚名樽中有真味種栁復藝菊即是陶潜宅眼中總盃杓門外無轍跡朝飲仲尼千夕醉季路百不用五斗解豈計東方白熈然識此生獨醒真可惜五年一龕燈面壁初治經仇酒恐廢學中歲卒無成晚悟盃酒樂苦節因自更軍府酒若海浩蕩波門庭十年醉如醒遂以善飲鳴陶然合天和萬古逹者情繫舟范丹墓黄流駕長風玉川與金波宜城二酒館名萬甕傾月中鯤䲔亦霑醉興與江河通醉鄉總直道世路曲如弓遍飲天下酒風味我自得南江與北嶺淄澠不能惑兩海納一樽巨量吞四塞胷次含春元澒洞和萬國熟醉即無言百世歸一黙我本醉鄉人弓旌招我仕自此樽俎疎漠然忽喪巳醒治夸了了枯槁成内恥况復拘厄途不得歸田里十年猶不字駸駸踰一紀日事雖有酒多病輙自止强飲終無歡忘力徒自恃醒眼舉作偽醉時見天真模糊渾沌初大朴還其淳山中酒初熟烈烈風味新一飲平天淵再飲一齊秦人物在眉㫸慘淡飛埃塵矻矻含瓦石哀哉為誰勤邃古有逹者秪與盃酒親陶潜豈乞食有酒即問津門首佳客至快漉頭上巾君看飲酒詩始知真醉人止酒物各有所止惟止止衆止所嗜止盃酒跌宕乾坤裏好飲即為徒更不顧妻子無酒則酤我得酒即欣喜日在醉即眠日出醉未起沈酣三十年落魄誤生理赴詔方始醒曠然便失已南來增殷憂從此酒止矣愁濃亦如酒苦海浩無涘何當大刀頭一飲醉千祀蜡日自釋氣數方構凶我獨其能和幸有樽中酒自種庭前花自詠還自酌酬適興亦多且笑勿裂眥深衷寄長歌四時記夢夢中見西郎緑玉十二峯忽到太行顚故山深長松擬古九首陶潜避世士手種門前栁作傳復自序實録傳永久髙風激余中論世期尚友何當菊花秋共漉山中酒嗟嗟墮世網願言久已負枯腸充殷憂覽鏡顔益厚㑹有還歸日再覔無何有天地相依附吾道同始終經世維皇綱一王辨華戎聖人鍾神靈樹立何豪雄六經通四時顥顥𢎞宗風王法奠有生大統垂無窮本原豈多言萬理祗一中屋漏闚天人炳烺兹一隅掌中握靈幾宇宙從巻舒日月驅吾輿乾坤廓吾廬有萬叢吾身通途安廣居私知生町畦坦夷深榛蕪擾擾趨蹶中跬步無所如十年不歸山衡麓皆榛荒風雨秋草深蕪沒讀書堂鳥道常矯首天宇青茫茫賜田在河陽經始築圃場黄流經中天太行面北邙痛飲登平嵩醉眼髙昂昂厄風墮江濵欲去還無方辱井俗死人顧影徒自傷和龍蟣蝨流瘡膚不復完節旄久零落破碎十年冠片天亦愧仰計拙祗厚顔音塵兩國絶江深掩重闗幽思揺風旌百感來無端亦有絶絃琴挂壁不復彈忍聞雲間雁祗恨鏡中鸞搥坐惜日月心死骨重寒鬼神居無鄉一念即在兹欲知得失初當謹未思時静敬守闗鑰精一辨澠淄理窮性乃盡天命不復疑君看語孟書皆是直指辭皇皇三百篇舉要無邪思奈何季末人忘慮先自欺戴盆還揠苗㝠行恣所之楚䖍方詬天豈悟祈招詩憶昔山中春谷風扇微和幽人坐孤石好鳥相和歌冷泉有清音音響一何多迴復步澗芳有時墮林花田家攜酒來奈此高興何幽庭抱枯株感槩憶壯遊結交燕趙豪徑欲窮九州岱崇登日觀赤壁弄江流醉走天山馬叢臺問沙丘中途軔吾車厯覽猶未周行止不在吾順適安敢求蓬瀛有竒藥馭風欲載採驚濤忽翻山對面桑田改鯤化鵬遽起鱗鬛乾半海天池無培風九萬亦有待且搭垂雲翼運數安得悔雜詩十二首縱衡十萬里悠悠總世塵勞生為物役往往失此身對面皆九疑惟有酒相親花開社甕熟春風滿比隣痛飲有高矚暮夜逹旦晨君看雞窠中豈有百年人種豆南山歸放目陟髙嶺雜田似蔬畦繡錯成野景日夕卧柴荆破屋風露冷牀頭有餘醁渇飲興味永月出流清輝起舞動孤影呼兒讀離騷載酌幽懷騁醉眠踏曉日獨樂静中静天命端可樂物情孰能量開軒受西風明月照我房悠然中聖人載酌夜未央哀鴻忽遺音底事昔隨陽遂令不飲人反側斷中腸三代秪周孔漢末有佛老汨真復翔偽彛性遂不保涇渭混濁清原隰易溼燥世多喪心人死病不辨早涓滴成江河豪末遽合抱六合一榛荒浪走無正道丹山九采鳯有道即游豫阿閣與岐山和鳴復髙翥一從休徳衰轉翮遽揚去髙賢亦違亂好遯有深慮冒出犯難行宵人肯爾恕㓜安遼海居龎公鹿門住翛然逺世塵豈復有憂懼展禽黜不去子文無愠喜争如卧雲窻逺棄人間事淵明偶束帶初無仕宦意酒熟遽告歸佳期恐難值散髮山月清濯足溪流駛把菊見南山物我有廢置大道初坦平奈此世路迫劫灰到重泉兵塵滿阡陌乾坤一戰場血盡骨更白何處著此身重覺天宇窄獨立萬物表秪有雲門客弋人忘冥鴻此中是安宅道人守化根静境深苞桑單衣不掩骭一食恒糟糠何心到文繡更不願膏粱真風出樊籠太和藴元陽中襟既忘幾外物奚能傷矯矯離羣倫宛在天一方尊中有竒樂一詠復一觴西北有佳人飄飄碧雲端悠悠與神俱冉冉從化遷偶來住人境結廬青山顛更不煙火食秪把晨露餐我欲從之遊路逺縈塵緣逌然歌紫芝重寄歸來篇聖作尚簡易古道皆若稽叔季私煩苛平地生巖崖生民入罟擭慘慘傷予懷孰能與蠲除變亂益盈彌神農設教益庖犧初取離靡不漏吞舟豈能强骨羇謀利困管商遂使大質虧夷則弛炎律廓廓髙天涼我作清夜遊步月上河梁蛩吟煙露根雁翔風水鄉商聲激孤衷銀漢零飛霜向不酌酒樽奈此秋興長溪風吹竹花石壁墮松子山氣清入骨雲嶠時猶倚變變静中趣超超物外理詠貧士七首簞瓢豈顔樂大聖徳歸依曠寂無過地髙朗有清暉夸毗紆金朱志意欲奮飛徼倖行險途跋㚄終安歸道義我素飽勢利爾恒饑缾空豈足恥心死良可悲虚室白無塵澹然造羲軒藜糗一鼓腹春風滿丘園久雨釡生魚上日厨無煙琅然金石聲宻宻道味研七日無是餒方聞固窮言貧乃士之常安貧乃為賢家無儋石儲漫撫無絃琴淵明果逹道遯世求希音擾擾劉寄奴戈矛日相尋豈若一樽酒對菊時自斟饑來偶乞食當時孰汝欽獨有桃源人乃見髙世心貧賤人所惡眷眷思黔婁富貴不可居歸來願言酬籃輿向田園嘯歌行道周俯仰澹無營事事即無憂農人與野叟欣然作朋儔有子復有酒生平復何求有名不可求有禄不可干干禄當事人此身即屬官豈辱八尺軀區區為一飡道義等芻豢足饜無饑寒冠葢不與賜屢空獨稱顔憂道不憂貧髙賢多閉闗不食如繫匏無家劇轉蓬尼父道彌髙少陵詩益工閉門張仲蔚知者獨劉龔求志終隠居龎公竟誰同但有樽中酒何必慮窮通田父邀我飲步月欣相從落落田子春不負劉幽州竟辭萬户侯魯連真其儔昔年過燕山飲馬易水流斯人不復見悵望生隠憂日暮一樽酒碧雲誰與酬西風薊丘前雁呌疎竹修詠二疏趙葢楊韓誅見幾當遽去宣帝亦寡恩二疏知所趣眷禮方未衰解韍即髙舉未幾太子立果然殺蕭傅嗟嗟二大夫灼見夷險路鈇鉞已在頸富貴其可顧誠者徤其决豈惟常人譽歸來事樽俎鄉社屏世務父子懽有餘忘懷還澹素韋匡多諫章擾擾渾未悟光禹貪身榮寧為漢室慮髙風獨東海千載道益著詠荆軻燕國八百年最為逺秦嬴可作殷周基何乃事荆卿癡兒彊復讐匕首揕咸京徑刎於期首更圖督亢行倉皇事不就狼籍斷冠纓寒風死别歌睥睨一世英不若鱄設諸飲恨復吞聲縱使殺一秦寧無一秦生吕政方忘燕忽作繞柱驚并呑勢不已舉兵復有名掃平黄金臺故鼎入秦庭昔我渡易水晚登燕子城投文弔田疇思賢重屏營舉事本道義不繫敗與成為國恃刺客夫豈英豪情讀山海經十三首寓興江風送夕凉蕭蕭齒髮疎種菊滿秋庭偶似淵明廬澹然絶慮營静讀窻前書坐馳造聖域氣馬凥為車自得每厭餘無地容豢蔬重覺洙泗親似與羲皇俱造起幾天地周身一河圖但恐丁壞運閉物將無如清泉沃醉面復見桃花顔運甓置齋外尚擬康强年睡熟如在家詩凡憶歸山偶聞江上鐘忽憶夢中言伊昔住山時高興薄林丘自許作真逸永結烟霞儔竹間挂巖月石上鳴溪流不逢塵俗人甘與鹿豕遊筭心到宻地難藏神與陽付我秪一仁藹藹生意長潜地復經天炳烺生道光羣龍勿使戰每戰雜𤣥黄道寳人共傳自棄真可憐片言未能充積惡如丘山一貫有妙理六經皆天言弗知還弗行人生幾何年天開萬象春生意滿草木好鳥相和鳴嚶嚶出幽谷旭日露華滋天地一膏沐人心暢逹時此理宜自燭當春對花飲酒面浮花隂藉草幽澗邊野色風滿林三月鶯亂飛睍睆弄好音一醉卧郊原萬事不到心世無不藥死得已即命長君看行尸人舉步皆失常狂生莫揠苗癡叟無休糧節食謹作為壽樂元無央瑣瑣䝉利徒掲掲事奔走自得乃自失甚勝即甚負身外皆屬人區中竟誰有配極惟大業方保萬世後淵明忘世士何必讀山海神仙荒有無怪誕豈真在若有西王母武皇不終悔歸來當痛飲白衣久已待怪力與亂神不語有深㫖兹生理未窮何暇逺徵死不須妄云為祗在實踐履過髙皆異端中誠足深恃道衰多散人體亡有放士受命備萬物稟彛各有止方士欺凡庸異書寧有爾子瞻號通儒亦重抱朴子嗟嗟蠧書蟲本無經世才鹵莽欲援時逩走遽南來明月果暗投按劍還驚猜掇患既違時委順庶優哉聨句漫興觀星見天體北辰直南極鵬圖亦有待必以六月息九萬搏扶揺翺翔豈人力君子有天運俟命祗自飭焉用熬中腸鰥目重反側時來沛然起㑹矯垂天翼雲逵無阻修河山改顔色行止各有時作詩為袪惑桃花源詩桃花荒有無誰云隔塵世秦人既能往我亦從此逝歸舟忘津途頺運急興廢緬懷别一天花隂好休憇淳風無澆誕道種可樹藝凡夫安得到俗駕豈容税君看閭閻下聒聒形聲吠苛法如牛毛浮偽兢新製髙人肯著足有山皆可詣隠見須適時淺掲深則厲淵明資好遯棄官在中歲處身向田野曠逺黜智慧把菊祗見山種秫自為界盃酒與浮沈林樾重䝉蔽到處桃花源真境不在外當時避秦人未必識妙契陵川集巻七
