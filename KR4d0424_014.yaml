body:
  text: 陵川集卷十四元郝經撰律詩升賢村二首棗栗荒山腳懸崖石作牆共言長樂老此是讀書莊五季乾坤黑三綱道義亡誰云不直死更請問歐陽兩嶺青林夾孤山黑石圍雲攜疏雨過風約斷虹飛為告姦雄叟難逃筆削譏荒村好終老白首竟忘歸張燕公讀書臺石窟煙龕黑懸崖隱斷碑峥嶸大手筆突兀小須彌天入無邊濶山臨欲盡危袛應秉鈞日憶得讀書時寓感二首天運不可測人心空自疑茅廬與耕釣遭遇亦其時火鼠能為布氷蠶自吐絲區區路傍馬笑殺抱關兒前途如暗室長夜老乾坤怪字書衾裂繁雲蔽月昏悠悠心曷展落落志仍存反側不成寐西風葉打門過友人故居不見青雲士唯餘數畝宫斷牆藜藿滿破屋子孫窮肝膽交遊在文章事業空舊時同坐榻間卧夕陽中送王國範北上一别恆陽下雲霄忽羽儀恥為州郡屈直結帝王知歲月不我與河山空自竒黃塵愧先逹感槩入新詩送宋和甫從軍北陸開新運爭依日月光一時乘變化萬里快騰驤碧海轉鯨背青雲列雁行春風吹錦浪好去看三湘下泰山題真君觀壁黃峴趨回馬州人競捧觴忽驚天上夢猶帶日邊光絶頂秦碑裂隂崖漢柏香行行重回首瞻仰意難忘開平新宫五十韻日月旋天蓋星辰合斗樞光騰掌內鐵氣繞澤中蒲金帛羞重賜弓刀奮一呼真人翔灞上天馬出余吾尺箠初開闢羣雄競走趨無勞為更舉乘勝即長驅蹴踏千年雪驍騰萬里駒長城衝忽斷弱水飲先枯肅殺威靈盛驅除運會俱寰區塵澒洞天地血模糊地盡諸蕃外兵窮兩海隅九州皆瓦礫萬國一榛蕪誰與重休息徒為妄駭吁治平須化日殺伐豈良圖聖子曾當璧神孫會握符鐵山深藴玉瀚海特生珠厯數終當在謳歌信不誣欲成仁義俗先定帝王都畿甸臨中國河山擁奧區燕雲雄地勢遼碣壯天衢峻嶺蟠沙磧重門限扼狐侵淫冠帶近參錯土風殊翠擁和龍栁黃飛盛樂榆岐山鳴鸑鷟冀野牧騊駼風入松杉徑霜涵水草腴穹廬罷遷徙區脫省勤劬階土遵堯典卑宫協禹謨既能避風雨何用飾金朱棟宇雄新造城隍屹力扶建瓴增壯觀定鼎見規模五讓登皇極羣生賜大酺還聞却走馬即見弛威弧簡策詢前代弓旌聘老儒恢𢎞回一氣徼幸絶多途雷雨施龎澤乾坤洗舊汙直為提赤子遂使出洪爐逺檄收疲薾音你窮邊罷轉輸江壖遺鄂嶽石窟棄巴渝刀槊存殘骨膏粱换毒痡却令逢有道免使呌無辜契濶還同室鰥惸得字孤八荒皆壽域六合極歡娛白叟休垂泣蒼生獲再蘇只知期用夏更擬論平吳旭日氷天透仁君雪國無終能到周漢亦足致唐虞遇主得知己逢時合捨軀弭兵通信誓奉詔敢踟蹰頓覺心田豁還將肝紙刳行行重回首瑞氣滿闉闍不寐夜久不成寐蒼茫自詠詩客懷三月老春信野梅遲喜子垂窗隙燈花落硯池祗應有行色失語問何時春夜春雨江湖夜東風花栁寒舉頭不見日何處是長安歲月纒星節乾坤繞血盤控拳紛愈甚排難古來難儀真館中暑一百韻五載淹江館三年錯雨暘熱中蒸滯氣涸轍斷枯腸黑井鹽煎火紅爐鐵鍊鋼帡幪加誕罔坎窞觸機張直壯無身慊窮堅著命當鼻煙從燎炬溝汗盡翻漿噎塞難通七摧頽懶揭裳沾濡粘弊屣毒螫上空牀甑擁輪囷肉瓶熬觱沸湯噞喁氣尤偃呌吼怒如狂曉瘴煤生柱晴霾土抹牆片雲遮日薄疏雨灑晴忙熒惑凝青血長庚迸赤芒稿天高破碎乾月死昏黃翕熇渾無露萎焦似有霜燕呀棲不壘鳶跕音喋墮難翔雷殷轟蚊塔沙生暗蜮槍飛螢空自爝戰蟻竟深藏盤礴摧腰脊低垂塌目眶本來觀化日誰使遇愆陽風土聞南國江山異朔方豈期惟酷烈無處别炎涼故國包全晉吾家壓太行髙寒雄地勢瀟灑靜雲莊六月衣冠冷千年草木香長松撼潮海絶壁隱虛堂却到燕山北行歌易水傍雁霜凋夏木鳩雨潤春桑聘幣輝光重徵車道路長沙陀瞻帝里雪谷拜天王的皪星銜凍嚴凝日隱光羣雄奮氷窟六合入氊囊半世無蒸溼于今重禍殃襟裾堆蚤虱肘腋沸蜩螳豈免泥塗辱還令羽翮戕甘言雖未已毒手益難量夾柵仍規覘重圍更限防塹門深虎圈擊柝閙魚榔箝逼罏錘密枝梧觜吻荒釡鬵烹則易刀俎食非強氣數俱臻極天人盡反常旱災綿歲月禍本入膏盲重怒非長策佳兵甚不祥揶揄肆巖阻鄙外極戎羌信誓猶然在明徴固未妨但令心匪石儘自口如簧喟嘆愁仍積吁嗟氣不揚行人竟何罪國體豈無傷反已私尤責知微實愧惶逢時當際會援溺止懷襄自縳懸難解輸人律否藏恧心煨肺腹畏景急炮煻欲掘隂山鼠翻思雪窖羊履危從蹇剝挺節不低昂伊昔當崇慶金源復靖康白虹纒帝座紫電激天狼傅説騎箕尾王良策駟房一龍轟霹靂萬馬快騰驤厯塊無完國蜚鋒舉斷吭才聞過燕趙又已出河湟此際通和好惟時正擾攘渾如沃薪火大似堰流粳狼籍三峯敗顛連五國亡濟師攻汴蔡徼節到餘杭海上盟空濶城南事渺茫劍關開要害淮海失城隍宇縣餘骸骨乾坤一痏瘡百年血肉運萬里戰爭場邊將徼功賞兵人藉糗糧居然忘厄會但請復侵疆虎怒寧須激鯨吞更請嘗肌膏坐銷鑠節鉞漫熒煌破屋渾生亂音亂方畦孰插秧蘼蕪沒洲渚潢潦漫陂塘莽蒼人何在隂森鬼正倀雁兵秋滚滚魚窟夜遑遑豈忍仍擠石無為更藥瘍欃槍閙三紀絲枲紊千箱已亂仁明出中興祚胤昌勝殘須必世奕葉始呈芳秦府鳯鱗質周家金玉相河山收殺氣雲漢煥文章潛邸人皆仰春宫德益彰厭兵符太母歸馬勸先皇禮樂尊周孔聲名慕漢唐恢𢎞張治具突兀振乾綱駿發輸平急鋪敦大命將奉書秪局脊馳驛敢倣徨加額人皆賀摩肩衆所望只今全父子無復痛孤孀延入拘營壘周羅匝廡廊只將人桎梏不用鐵銀鐺龍節埋泥穽狐涎汨土􅣙焚身無取齒避竈豈爭煬炎赫惟加熾風飈不許涼秪愁化灰燼何處薦圭璋天問終無語冥搜未易詳艱屯果誰敢壞亂實難匡有賦誇鸚鵡無媒獻驌驦何當快風雨吹去卧滄浪二月二十三日猶在儀真館三首向晚日華紫殷然轟夜雷龍蛇開蟄窟桃李動春臺淚逐催花雨心同潑火灰何由復龍動百感坐中來一年淹使節二月駭春雷瘴入江心黑雲銜雨腳灰壯心還激烈滯氣忽騫開明日誰聊賴鶯花故惱來二月還如夏炎蒸鬱震驚迅霆侵骨冷飛電透心明海氣霑衾溼江聲拍枕平從今休禁火一雨萬家生是月初二日火二十日丑刻火午刻復火一月凡三火獨遺舍館及漕臺州治在故有是句月夜感懷去國期星歲無家阻萬金江山沉苦思花月動哀吟變故空長䇿蹉跎惜此心遙憐燈火罷兒女夜愁深江暑地軸風濤浸吳門江海流四時長似夏一雨便成秋煙潤青紗幕香濛白㲲裘燕山猶避暑今日向江頭壽何待制歲月間丹竈乾坤坐白頭幾回看北斗何日見西周盤谷蘭花老天壇桂葉稠會當逃世網共與赤松遊雨中感懷舍館年年老江邊日日隂雨聲便熟睡花氣動幽吟樹密鶯愁溼庭荒雀畏深晚風吹鼓角慙愧弭兵心薄莫二首薄莫秋雲合江聲靜裏來無聊空徙倚失志重徘徊細雨金桃落疏煙玉鳯開相看如夢寐觸物總傷懷棘柵今年改庭隅展半隂草依斜徑短苔入後墻深歲逺人空老時危事益沉頻頻問烏鵲何日有佳音曉起傍枕衾裯薄還家夢亦難月華終夜白江氣先秋寒心苦天為碎辭窮海欲乾起來看北斗何日見長安聖節六年瞻北闕八月拜西風氷雪天王聖河山帝業雄但令旄節在焉問酒樽空屬國歸何晚浮江有阿童壽劉詳議甲子數盈亥神強志不衰共知憐絳老誰與問鍾儀萍梗三朝夢乾坤兩鬢絲得年萬事足爛醉復何辭江雲江雲似江水渺渺復粼粼暗靄無窮態紆餘不盡春遮回斷行雁望殺未歸人何日星軺路馮高更憶親新館感春四首東風吹敝褐水氣撲虛簷月窟星河淡江城鼓角嚴年深愁不醒春至恨猶添為問秦通守何顔説錦簾行李金昏節腰圍玉樽鞓居然隔天日不許出門庭歲月侵霜鬢乾坤誤六經誰邊覔春色牆上草還青佇立無人語巡簷思慘然夜江寒浸月春樹暝生煙計拙仍持節途窮擬問天難為繞指鐵萬折志彌堅憶昔清明際昏昏醉裏身吟魂半窗月花影一簾春豈意傷心别空勞入夢頻漫聞烏與鵲悵望幾回嗔丁卯夏六月大雨震電雨連江表黑電入海東紅川瀆翻冥漲乾坤破猛風忽開金碧界幻出水晶宫我欲乘時去長歌向此中八月九日甲子夜雨久旱雨亦好還霖甲子秋隂森當月黑黯黮作天愁北海洶疑落西風浩不收凜然寒入骨鄉思滿牀頭九月五日念母思子甚思母秪應淚更多尚無歸國日其奈倚門何江漢悲溫嶠詩書愧孟軻今朝誰獻壽庭户可張羅戊辰寒食今歲明寒食梨花月正圓客愁催我老春色向人偏強飲稽留酒難辭簇送筵杜鵑休浪語歸去更何年贈魏斌熊虎無堅對風雲滿義襟每將孤劍説但惜二毛侵貫日臨危節巉天討賊心中原有期運莫畏歲華深傳易有感故國河山表中原斗極邊稽留深失計還反竟何年風雨纒孤劒塵埃委斷編漫窮西伯易誰好子雲玄壽正甫書狀往歲正甫壽豫以詩今歲復用其韻以壽之繾綣心尤壯崔嵬志不遷雖云寃土窄猶有片天圜吾道艱危久君才賦豫偏抗秦完白璧禦冦􅂒青氊遂使干旄在終當斗印懸物窮寧不返期逝未為愆在我都無愧從渠遂弗悛風雲纒怒虎霹靂墮寒蟬真玉千燒冷渾金百折堅十年仍齧雪一念久通天莫信枉能直誰言典則全會將乖頷抉還把怒鬚編得失兩端了安危一著先冥區初罔象陸海本忘筌日月圓機轉乾坤大器埏音羶屈伸成變化來往共回旋困極難移石潛深可脫淵九原驚奮迅八表會飛鶱蘇武終歸漢田疇不負燕河山生喜色戲綵舊堂前新館夜聞杜鵑二首啼落深江月催殘故國春不堪多恨鳥偏聒未歸人血盡腸應斷哀餘聲更頻關心尤入耳一枕夜愁新久客難勝感那聞泣血禽乾坤心緒苦歲月鬢毛深亡國元多恨催春漫好音館人將赭樹何處沒青林壬申二月四日二首庭雨滋春草江煙溼落梅病多剛斷酒席合亦持杯氣數冥難測乾坤莽不回還看仍焰焰未肯著寒灰戍鼓晚來急春潮夜有聲燭花侵坐落梅影上窗橫小酌歡尤洽孤吟興愈清最憐星散後一枕故山情病中即事久客難堪病衰顔倍覺秋空杯仍自舉墮甑復何求兩度交金火連年犯斗牛道窮還遇此安得見西周十二月十七日大風雪海立隂風黑氷牀報雪威紛披平地衮攪擾半天飛窗隙楊花亂簷前穀穗肥還聞八千騎飽肉飲江歸俗謂氷顆為氷牀有則有大雪又謂簷前氷柱為穀穗長大則豐年之祥也癸酉閏六月十三日夜病中聞笛二首深夜涼風發迢遙送笛聲只愁江月破不放野雲行怨曲人多感離腸恨易生病中催坐起傾側若為情斷續誰家笛噫嗚入耳偏燕山記疇昔江館是何年餘響星河外羈魂月露邊那堪更三弄老淚已如泉陵川集卷十四
