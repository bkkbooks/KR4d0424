body:
  text: 陵川集卷二十八元郝經撰序一王雅序六經具述王道而詩書春秋皆本乎史王者之迹備乎詩而廢興之端明王者之事備乎書而善惡之理著王者之政偹乎春秋而褒貶之義見聖人皆因其國史之舊而加修之為之刪定筆削創法立制而王道盡矣孟子曰王者之迹熄而詩亡詩亡然後春秋作嗚呼麟出非時而聖人沒禮樂征伐專於諸侯移於大夫竊於陪臣處士橫議異端並作拆為六七并為孤秦焚蕩禁絶而春秋復亡壞亂極矣王道從何而興乎戰國而下逮乎漢魏國史仍存其見於詞章者如離騷之經傳詞賦之緒餘至於郊廟樂章民謡歌曲莫不渾厚髙古有三代遺音而當世之政不備王者之事不完不能纂續正變大小風雅之後漢魏而下曹劉陶謝之詩豪贍麗縟壯峻沖淡狀物態寓興感激音節固亦不減前世騷人詞客而述政治者亦鮮齊梁之間日趨浮偽又惡知所謂王道者哉隋大業間文中子依放六經續為詩書騁驥騄而追絶軌甚有意於先王之道乃今墜滅而不傳李唐一代詩文最盛而杜少陵李太白韓吏部柳柳州白太傳等為之冠如子美諸懷古及北征潼關石濠洗兵馬等篇發秦州入成都下巴峽客湖湘八哀九首傷時詠物等作太白之古風篇什子厚之平淮雅退之之聖德詩樂天之諷諫集皆有風人之托物二雅之正言中聲盛烈止乎禮義抉去汙剝備述王道馳騖於月露風雲花鳥之外直與三百五篇相上下惜乎著當世之事而及前代者略也中統元年今上踐阼詔經持節使宋館於儀真抑塞之極無所攄泄以為由漢以來千有餘年聖君英主忠臣義士大儒名賢猛將良吏穢亂篡逆憸邪姦宄關國體係治亂本廢興不為振而鼓之摛光揭耀搜疵指纇則王道從何而明四壁之內無他文籍乃以素所記憶者取韓杜諸賢義例皆以吾言斷自漢髙帝終於陳希夷絶筆於五季之末自髙帝至於安樂公皆為漢如王莽曹操荀彧管寧孫堅孫䇿等皆為漢臣吳太帝始為吳魏文帝始為魏相錯而書如司馬懿及師昭等皆為魏臣至武帝始為晉而終於桓玄其劉石諸僭則亦如曹操等書其姓名而雜置於晉君臣間宋魏南北亦如吳魏相錯而書而髙歡宇文泰等亦同劉石仍為魏臣至齊文宣周武帝則各為一代隋唐五代亦各為一代其國初僭偽所并滅者皆載於本國開創帝王之下如本史云凡以母后稱制者皆不書得二百二十一人共二百五十篇小者十餘韻大者六七十韻名之曰一王雅抑揚刺美反復諷詠期於大一統明王道補緝前賢之所未及者而已非敢妄意於大經大法之後而輒自振暴故不計其工拙焉始於三年秋閠九月十有九日終於四年春二月十有三日越十有五日陵川郝經序春秋制作本原序春秋以一字為義一句為法雜於數十國之衆綿歷數百年之逺而其所書雖加筆削不離乎史氏紀事之䇿而無他辭説是以聖人制作之意難為究竟學者往往以私意觀聖人因其所書而為之説其説愈肆其意愈逺其例愈繁其法愈亂卒使大經大典昧沒而不明蓋不求其本原而徒用力於支流也夫大匠之作室必先定規模量其髙卑廣厚間架棟宇有成室於胸中而後基構則不愆於素聖人制作一經垂訓萬世又非一室之比豈無所素定之規模乎夫其經天緯地彰往察來始終先後本末原委有一定不易之理然後為一定不易之法自隱公至獲麟年雖逺國雖衆事雖多則若網在綱有條不紊所謂吾道一以貫之者在夫是也學者乃於條目之外事迹之下求聖人之旨難矣哉故必挈其綱持其要探其本原觀其規模遡洄從之而後順流而下則浩乎其沛然矣今自聖經之外求聖人所以制作之本原各從其類而為之説始於心法制作次之言聖人制作之意不在於史氏之迹皆斷自聖心也其次言託始寓終之意其次言為經立名之意其次言即用魯史之意春秋之義以王道行王權以王權正名分也故又次之其法則變周制上以尊王室內以正魯國外以治諸侯故又次之春秋之中其事則五霸五霸桓公為盛故以桓公為首晉文次之秦穆楚莊宋襄又次之晉楚更霸而陳鄭叛服為中國之輕重故陳鄭又次之中國之衰吳越遂霸故吳越又次之中國之所以微由蠻貊之橫也吳越則進於中國而蠻貊則終於蠻貊故蠻貊又次吳越也諸侯之衰政在大夫而春秋終矣故大夫又次之而後舉其要義正其名號别其爵命辨其倫類定其次敘而謹其始聖人始以心法變文制作至是則王法成矣故終之以王法共三十一篇始為升天之階望道之門爾或曰聖人制經無一字之辭説但一章一句才萬餘言而已而吾子之説未嘗一説聖經而直於其外為數萬餘言不亦滋蔓乎哉曰説於聖經之外不敢與經並乃所以尊經也夫聖人不為辭説欲後人之説之也説者不探其原是以語焉而不詳今探其原而為之説惟恐其不足而其義不備也夫豈多乎哉八卦之後重而為六十四而為之辭分而為三百八十四爻又從而為之辭其後聖人又以為未足又從而為彖象文言繫辭説卦等書於聖人之心猶以為未足也以聖人之言説聖人之經猶若是矧於千載之下求之乎末流餘裔雖欲為之滋蔓而不能滋蔓也故今之説每援易書詩以經明經庶幾見聖人制作之意云爾亦未敢謂之詳也中統五年歲舍甲子三月晦陵川郝經書於儀真館春秋三傳折衷序聖人之道大春秋之旨微由一世之事業著萬世之事業非研覆究竟精粗並舉本末具見未易學也在厄處危以來為春秋作外傳以聖人之微意求聖人之大道不敢躐等循序而進乃自近者始故先定章句音義次為制作本原比類條目等一本諸經而不及傳尊經也然傳為經作經以傳著雖曰尊經傳亦不可廢也春秋以口授而寖失其傳雖大典大法公道正義具於書法之中各有所見而不沒其實原逺末分説者不一而羊亡於多岐則亦昧夫真是之歸矣六經自絶於秦復於漢易書詩周禮禮記僅得其本文獨春秋有傳其傳皆出於聖人而不同非總萃鈎校備為剖決徵諸大典大法以求夫真是之歸而定於一則聖人之經終不能明矣夫傳之不同自夫傳平聲之不同也必推本傳之所自而後傳可一也仲尼於魯哀公十一年冬自衛反魯刪詩定書繫周易而十四年春西狩獲麟乃作春秋十六年夏四月卒則其書之成歲月無幾當是之時聖門髙弟從聖人在外遷徙往來多歷年所分仕他國札瘥夭昏漸以凋落蓋口授之際在夫曾參氏而巳何者曾子少孔子四十六歲於諸弟子年最富而其賢亞於顔氏故獨得一貫之傳而子貢冉求終不聞性與天道夢奠之年一王之義必屬之曾矣故曾子之學自顔氏之後獨為正大以致知格物誠意正心為學之本則春王正月之義也一貫之道大一統之旨也推而為忠恕則豫奪之法潔矩之道也以是傳之子思子思傳之孟軻孟軻氏以其師説遂言制作之本曰春秋天子之事春秋無義戰詩亡然後春秋作孔子成春秋而亂臣賊子懼其事則齊桓晉文其文則史其義則某竊取之以是數語發明春秋之大綱後之言春秋者皆莫出乎此其説有所自而然也惜乎孟軻氏凡而不目不著其傳而為之傳而使後之學者紛紛也自孟軻氏發明大綱傳春秋者三家左氏公羊氏榖梁氏其書皆出於西漢而皆不著其傳謂左氏學者謂為左丘明與聖同恥親授經於仲尼為經作傳丘明雖見稱於仲尼而顔曾諸弟子問答之際一不及焉而不厠於不及門十人者之列豈大經大法不授之顔曾之徒而獨授之丘明乎且其傳載易文言詩三頌及孝經等皆仲尼晚年所作而經終孔丘卒傳終悼公十四年韓趙魏滅智伯事在春秋後二十有七年其作傳則又在於滅智伯後數年必不甫滅智伯而書之也如是則傳之成在仲尼沒後四五十年之間爾大率以七十年計之則丘明見稱之日年甫十六七聖人與之並稱名以為同恥則賢於顔曾逺甚賢於顔曾而稱顔曾者屢顔曾問答之際相稱道又屢而不復一及丘明諸弟子記注之書如論語曲禮檀弓等及孟軻荀况諸子之論説亦不一及焉按太史公十二諸侯年表謂孔子之作春秋七十子之徒口授其傳指魯君子左丘明具論其語成左史春秋則口授其傳指者七十子論其説而成書者丘明也則丘明論七十子所傳之語耳非親授經於仲尼也先儒謂丘明殆先賢老彭之流故聖人尊之如此是巳藝文志謂左丘明魯史也杜預序謂丘明身為國史躬覽載籍亦是巳蓋左氏魯左史世掌䇿書故以左為氏如漢倉氏庫氏之類仲尼沒傳其經於諸弟子之間而在七十子之列以其史䇿為經作傳故事見始末而多得其實焉劉向别録謂丘明授曾申申授吳起此必有所自然亦可見曾子之傳為不易也申曾子之子起曾子之門弟子也夫論語曲禮檀弓曾子問大學中庸等皆出於曾子之門人樂正子春曾元曾申之徒為之記録而子思孟軻傳之也豈大經大法不傳之於曾子而傳之丘明乎劉向所録蓋丘明上有曾子字而失之矣春秋所譏多父子夫婦淫逆之事故不能親授之子使丘明輩轉相傳之申曾子之子而受春秋於丘明曾子於諸弟子年最少則丘明又少於曾子其學出於曾子無疑也嚴氏春秋又引觀周篇云孔子將修春秋與左丘明乘如周觀書於周史歸而修春秋之經丘明為之傳共為表裏此又妄焉者也聖人修經不敢公傳道之口授弟子豈與其徒公然如京師探天子之史而觀之以譏貶當世必不然矣聖人修經髙弟如曾閔文學如遊夏而皆不與豈獨與丘明共之乎親受傳旨猶不敢與又况與聖人同時並修分為經傳乎故此為尤妄焉者也為公榖之學者以孝經説云春秋屬商孝經屬參閔因序云孔子受端門之命制春秋之義使子貢等十四人求周史記得百二十國寶書遂謂公羊髙榖梁淑受經於子夏彼皆漢興以來讖緯曲説豈可以為按夫聖人修經子夏以文學稱使之從周太史請求記録與魯史左驗卒成其書事或有之謂春秋之義授之商而商傳之公榖二氏而為之傳則未敢以為然也而公羊氏於昭公二十五年稱孔子者一文公四年稱髙子者一莊公三十年稱子司馬子者一閔公元原本作二年稱子女子者一隱公二年定公元年稱子沈子者二莊公三年二十三年僖公二十年二十四年二十八年稱魯子者五穀梁氏於桓公三年十四年僖公十七年成公五年昭公五年哀公十三年稱孔子者六定公元年稱沈子者一隱公五年桓公九年稱尸子者二桓公二年稱子貢者一僖公二十四年稱蘧伯玉者一公羊氏終篇非惟不及子夏但稱孔子者一而孔門髙弟皆不及焉穀梁氏亦不及子夏而稱孔子者六稱子貢者一而其餘髙弟亦皆不及焉夫加子於上者辟聖人直稱子也直稱子尊而師之也故公羊氏之稱子沈子子司馬子子女子與自稱子公羊子皆其師友也其稱髙子與穀梁氏之尸子沈子等皆其師也故尊之與孔子同榖梁氏於隱公五年自稱曰榖梁子而上不加子榖梁氏之門人尊稱之也其蘧伯玉則記孔子之時賢大夫之言亦著其師之所授者也獨公羊氏稱魯子者五與孔子直稱子同則著其師之所傳故推尊之如孔子亦如孔子既沒門弟子之稱有子師事而尊稱之也既尊之又屢稱之豈非本其所自而樂道之歟孔門之髙弟一不及焉語孟傳注無所謂魯子者而屢稱焉故嘗疑魯為曾曾魯之文相近傳寫之誤遂以曾子為魯子昔人辨古文之差以魚為魯此豈非誤曾為魯乎且公羊氏於昭公十九年許世子止殺君之傳以樂正子春為説樂正子春曾子之弟子則魯子為曾子無疑也左氏則言授之曾申公羊氏則屢稱曾子榖梁氏言子貢而不及子夏蓋左氏公羊氏皆出曾子而榖梁氏授之沈子尸子之徒沈子尸子之徒則受之曾子也二氏之傳出於曾子非出於子夏明矣三傳之傳皆本諸曾子故其傳正左氏之傳本自史臣是以序事精博麗縟典贍而約之以制使聖人筆削之旨有徵而可按公榖二氏口授其義而為之傳故其文約其辭切其辨精反復詰折使聖人微婉之旨可推而見由曾子而來轉相授受其人不能皆如子思是以不及孟軻氏之醇而其説亦有戾於聖人者故春秋之旨由三傳而得者十六七由三傳而惑者十四五西漢以來專門授受言左氏者黜公榖言公榖者黜左氏互為短長相與訐擊至於師弟異而父子不同文辭枝葉户牖穿鑿末流散殊涇渭淆混始則一經而三經末乃三傳而百傳左氏之學至晉杜預始為集傳而一以左氏義例典禮為本不雜乎他以遏衆説公羊氏之學最盛於漢董仲舒發明大旨至東漢何休為之注以明所得雖逺探力窮而推演圖讖反有纍夫傳者榖梁之學亦盛於漢至宋范寧為集解並采何杜且列諸家取其所長以釋經傳示不敢專三傳之學始定著而紛更之流少殺矣唐興孔頴逹為六經作疏乃取三家之注以疏三傳而頴達為左氏經傳作疏而不取公榖氏其同僚楊士勛疏之遂行於世然其學終莫能通而聖人之意散一王之統分真是之旨終惑而莫能解雖然由三傳以學春秋如岷山導江雖别為沱為九為東為中北支流餘裔泛入洞庭彭蠡要之發源注海而朝宗者不外焉三傳之説雖不同要之出於聖人之門而學有所自終不外聖人之書法自王通為三傳作而春秋散之言而盧同輩遂謂三傳當束髙閣而獨抱遺經陸淳啖助趙匡等因之遂創為之傳自是春秋之學不専於三傳矣宋興以來諸儒疊出各為作傳以明聖人之旨莫不自以為孟軻復出而其義例殆皆不能外乎三傳而每以三傳為非夫聖人不欺天下後世作為六經確然如乾隤然如坤易簡示人而天下之理得故本諸易以求其理本諸書以求其辭本諸詩以求其情本諸禮以求其制本諸語孟以求其説本諸大學中庸以求其心本諸左氏以求其迹本諸聖人之經以求其斷則春秋不吾欺也不吾蔽也聖人之意可見而三傳之傳之自之本之差得矣今於聖經下各具三家之説以左氏為按故先之且變其錯經之體各類於本經下使即經以見傳以公榖二氏為斷故公羊氏次之而榖梁氏又次之其傳故各附經後因之而不革杜何范之注則或去或取各見於本傳下從而為之説先辨經之不同者而次及於傳三家之説同於真是則同真是之皆失其義則皆是正之一得而二失則一得而二失之二得而一失則二得而一失之不純任傳而一以經為據使不相矛盾而吻合於經庶幾聖人之意因三傳以傳三傳之學不為諸儒所亂而學者知所從不茫然惑惶以自亂名曰春秋三傳折衷俾三傳為一傳折之以義理之至中歸之於義理之至當有萬不同貫而一之俾萬世之事業不外乎萬六千言之文學者不復竊三傳以自私名家而復厚誣之也僭妄之罪固無所逭為道受責亦所甘心焉耳中統六年春二月辛丑朔陵川郝經書於儀真館春秋外傳序天之於人有所窮而後有所不窮窮者其時也不窮者其道也是以聖人於易每申明窮之理而輒繫之以不窮於乾則繫之以坤於泰則繫之以否於剝則繫之以復於既濟則繫之以未濟復為之言曰易窮則變變則通通則久則道之所以不窮者皆自夫窮而得之也昔者文王周公孔子孟軻嘗窮矣拘而演易變而制禮老不用而修六經尼不行而著七篇一時之窮萬世之不窮也故張籍嘗遺韓文公書勸令著書如孟軻揚雄以傳後文公謂古之人得其時行其道則無所為書書者皆所不行乎今而行乎後世者也及貶斥去位始為原道等以左右六經則古之聖賢之為書皆自夫憂患困厄窮而無所為而後為不窮之事業以自見於後也金源氏之亡朔南搆兵幾三十年上即位之元年始下武昌之詔詔經持節使宋諭以弭兵息民意而姦宄樂禍誤為欵兵拘於儀真之揚子院經之始入三十有八年矣歲在庚申至於甲子猶不見釋經之窮則固同夫古之聖賢矣而不德瞢昧以自速戾其敢望於古之聖賢乎然而宋人以一國窮豫天不以道窮於豫也豈可以人之窮而并天之不窮者而棄之以自絶哉河陽荀宗道嘗受學於豫時以書狀官從行於是五年之間講肄不輟甲子春宗道請傳春秋之學且志其説而無書以為據乃以故所記憶者為春秋外傳蓋自三傳之外而為是不敢自同於三傳也以春秋正經多不同乃為論次作章句音義八卷求聖人之意者必探其本以為綱乃作制作本原三十一篇十卷春秋一書義在於事必比事而觀其義可見乃為比類條目一百三十篇十二卷三傳之説不同故聖經之旨不一乃為三傳折衷俾經之大義定於一凡五十卷卷首又著三傳序論列國序論一卷嗚呼窮於人而不敢自窮於天是以為是非敢妄意於古之聖賢之窮而亦為之書也其間訛缺謬戾者甚衆俟變通之日取諸書以考實之庶幾有成而見素患難之志云既具草以授宗道復為書此以冠篇首中統六年春二月十三日陵川郝經書於儀真館陵川集卷二十八
