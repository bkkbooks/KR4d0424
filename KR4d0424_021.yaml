body:
  text: 陵川集巻二十一元郝經撰祭文祭淮瀆文維中統元年夏四月天子遣臣經奉書使宋告登寳位布弭兵息民意秋八月二十四日啟行渡淮謹以清酌之奠致告於淮瀆之神皇綱不𢎞壞運締兇海嶽氣分迭為長雄千里長淮寔為兵衝屍斷其流幾不能東蜚血淪天崩濤漲紅征夫力殫居民室空殆三十年莫知其終皇帝踐阼乃眷南顧釁各有端吾可重怒事當一新豈論細故一視同仁以廓天步乃命臣經仗節啟行輸平繼好光允篤行武用不殺徳惟好生南北東西皆底于平河海江淮有波不興魚龍戰罷天地澄清舟子掛席置醑于斝四宇熈熈雲旗風馬維神有相安流順下保合太和共成新化尚饗禡牙文維年月日具位将南轅啟行謹以清酌庶羞之奠昭告于牙旗之神維我國家威定萬國前矛所指莫不頓折際天之覆海外有截逖爾荆楚邈爾呉越江淮一流而乃限絶譬彼金甌粤東南缺經備戎行受天之鉞謂余爪士薄言徃伐載飭王度載申師律蒐乗補卒敦陳固列茲爾桓桓茲爾烈烈建而斾之王靈赫赫蚩尤竟天太白掃月以纓扱矢釃酒釁血毋作神羞駐看鯨㨗尚饗祭遺山先生文維年月日陵川郝經謹以清酌之奠致祭於遺山先生之靈嗚呼氣數之靈靡物不壞或者不淪胥乃造物者之所在造物之所在宜莫不生而奪于成是理其可明邪嗚呼先生萃靈蜚英羈丱宦學嶽嶽稜稜碩士鴻儒莫不震驚以為間世生閒閒初見公文曰是間世生者渡南河而為名公入京師而為名卿張洞庭之天音引岐山之鳯鳴方雷厲以風飛掞鴻章而振纓挫萬象於筆端倒河漢而一傾攄塵言與滯思瀹錮濁以為清闢斯文之洪源俾灝汗而淵澄而乃汴蔡淪亡蜚血凌城氣數俱盡萬化崩騰時惟先生獨矯首而行挽崦嵫之日嘒欲曙之星收有金百年之元氣著衣冠一代之典刑辭林義藪文模道程獨步于河朔者幾三十年豈非造物者之所在而斯文殆將興邪去魯西來聿峻有聲天奎不芒遂入杳𡨕筆未獲麟年未中壽而奪去之遽彼造物者果可明耶嗚呼先生雅言之高古雜言之豪宕足以繼坡谷古文之有體金石之有例足以肩蔡党樂章之雄麗情致之幽婉足以追稼軒其籠罩宇宙之氣撼搖天地之筆囚鎻造化之才穴洞古今之學則又不可勝言人得其偏先生得其全天不假之年嗚呼哀哉先生雖死文或不死是謂亡而不死先生雖可哀吾徒無所仰尤為可哀也嗚呼哀哉尚饗祭魏先生文嵗舍辛亥正月壬戌朔越三日甲子陵川郝經謹以清酌之奠致祭於故徵君魏先生之靈嗚呼世變風靡滚滚湍若既莫之遏亦莫之瀹懷山襄陵稽天滅壑真宰睨而不視元氣湮而索寞榱崩而孰與之支癰潰而孰與之藥根披而孰與之植蔓滋而孰與之削是以渾訌龎昧板板蕩蕩道益喪而俗益薄鹵莾熖熾士夫氣鑠莫不巻舌于咽頓脰于殻既刓方以為圓又琢雕以為樸則吾誰與歸而於焉是學幸一二遺老挺特而不衂山立而不却維持䕶藉天旋而斗幹俾夕日與曙星不遂至乎墜落嗚呼今先生復逝矣天不欲斯民之有活乎何於遺老之遽奪何為吾道之虐也嗚呼先生學正而博義理昭著襟宇清廓守不可移嶷如山嶽有經世之志有佐王之器有已亂之才有致平之略果鋭剛明百鍊之精肯造次而輕脱巻而藏之束而縛泥而滑之櫃而鑰嘗一試乎天興之末王孫宗䠞悍臣驕跋坐視國斃卜所於託磨牙垂涎瞰鼎窺洛先生慨然請符曲躍責以臣義申以王約萬人震懾一軍駭愕客氣俱盡心死神怍由是而觀則先生之志與先生之養亦孔之灼幅巾歸來聲震河朔朝庭載徵安車繹絡方敬之如蓍龜委之以心膂迓續斯民之命砭􅀈斯民之瘼躋斯民於仁壽挈斯民於遂樂皇風扇而皥皥吾道裕而綽綽企仰延佇甚於饑渴忽萬里之悲風遽沉淪于𡨕漠秘于重泉斯民其無望塟於九京吾道其弗爝世變愈下志氣愈弱吞聲為辭雪泣于酌嗚呼哀哉尚饗祭趙敬叔文年月日陵川郝經謹以清酌之奠致祭於永平趙先生之靈嗚呼天不勝人人不蹈道禍亂寧有至極邪莫不惡直醜正翔偽飛佞而福淫佑邪紛紛而蝟起糾糾而棊布轟闔駭散風霆雨電百千情状可一端而槩邪而其中人以毒斃人以禍固仁人君子之所不能免其肆行吞噬耽耽逐逐有如垂涎傅翼之虎而吮血磨牙者猶可逭也其禍人而人弗覺毒人而人弗悟卒之乎顛踣壞亂如含沙之蜮隠草之蛇其能免邪嗚呼小人之乗時如是之烈為君子者宜乎出處之節也宜出而處辱其自取宜處而出自取其辱嗚呼處而不能存出而不能遂為時所制而小人所戾憤悒而終者先生也哀哀先生止于是邪云誰之咎其亦命邪士夫奪氣狡孽增華有室其苴有子其麻葬于九京去日益賖善人亡矣小人之幸君子之嗟時則弗偶而徳音不瑕其又何以加嗚呼哀哉尙饗祭順天賈侯文嵗舍乙夘正月十一日門下士郝經等謹以清酌庶饈之奠致祭於故左副元帥賈公之靈嗚呼石隕有徵山崩有徵人之云亡社稷隕靈繄公堂堂氣阜而京殆三十年嶷為國程當金紐之中絶皆狡狡以蝟興公於草茅撆如孤鷹紫濤怒掀偃如雄鯨瑰珂偉岸突兀骯髒闢掌中之天地陣胸中之甲兵南直滹沱北薄幽陵魚龍鬭分河海澄清先後張公建邦成城束裂帛之旗卧斬木之干鎖沮耰之刃結納茅之産糞輂音菊瓦礫屠夷棘荆鋒鏑之餘遂底于平民物日夥帑庾日盈截然燕趙之交與天下爭衡鄭有人焉雪山孰敢輕端序則見如蘖而萌有撥亂之略有致治之術有不可奪之節與不可蔽之明未竟其用未成其行未充其器業未終其勲名而天奪之遽薨于朔庭淚平氷天莫不震驚牛童馬走涕泗從横葢不為公惜為天下惜不為公悲為天下悲不為小人之不幸為君子之不幸如是則公雖死而不死雖不生而亘千古而生也五馬南來萬里悲鳴不平之志越柩有聲蒲水湯湯西郎青青玉氣萬丈埋于杳𡨕樹之墓檟必材而榮挽萬牛以囘首終扶危而柱傾嗚呼哀哉尚饗祭蕭孟圭文年月日陵川郝經謹以清酌之奠致祭於故蕭使君之靈嗟嗟乎君秀拔乎羣東丹之裔嶷若青雲魁梧昂藏鬛脩而神翩翩揚揚信陵春申粹然天和四時之春琮璜䧟湼而不滓玉樹臨風而不塵胷中汪洋涇渭自分芬如蘭薫純如飲醇故莫不以鉅人長者推聞其為人愛而慕敬而親至止肅肅而來止欣欣射穿札而孔武書斷編而甚文交天下之豪右友天下之縉紳敬賢下士倒廪傾囷瑰材偉器為時俯馴故一命而將千軍而襟度未展志略未信振落殆忽憤不顧身豈人衆勝天天奪棄人邪嗚呼共子新城莫敖荒谷一則事父一則自速君何為哉而與若為屬窮當益堅老當益壮百折不挫志士所尚君何為哉自糞輂以喪恥欲弗弔恨欲勿哭泣涕無從湧胷溢目始欲責天謂不可測天豈棄人而反自責始欲尤人人惡自賊盡其在我而反自克有聲徹天有淚達泉天邪人邪竟莫能言嗚呼哀哉尚饗祭成玉文中統七年三月二十一日國信大使遣人代奠于故國信使行府提控都管成玉之尸嗚呼哀哉初奉恩詔事皆汝聞爛額焦頭奔走救焚陛辭而南惟吾與汝横身為國去兵報主孰謂姦臣並公謀私根柢蟠結二竪夾持闒茸汚穢脂左糞右腆䏰大彘濟惡營臭汝如一鶚軒然當關羣鳬噎喑盛暑而寒汝嘗言吾此輩宜備吾不汝然竟墮賊計日入慝作聲洶氣麤階下尸殘石之紛如賊遂登門索吾于室乗黒吾出蔽樹而匿賊乃抽戈吾遽踰墻不知數仭形勢倉皇伴使來救汝死吾脱血眥塞坑吾恥偷活大事負任義不苟死吾存爾存是以在此古來義士多死逆徒汝得其死後事在吾一日還反弭楫淮瀆而父而昆而子而孫吾必提攜以叫帝閽討賊贈官賁汝寃魂汝則不死仍大而門嗚呼哀哉尚饗箴志箴不學無用學不讀非聖書不為憂患移不為利欲拘不務邊幅事不作章句儒達必先天下之憂窮必全一巳之愚賢則顔孟聖則周孔臣則伊吕君則唐虞斃而後已誰毁誰譽詎如韋如脂趦趄囁嚅為碌碌之徒歟家人箴有父母以同其體有兄弟以同其氣有妻子以同其室有臣妾以同其治父母無非是兄弟惟友悌夫婦則待以敬而禮以閑臣妾則接以和而荘以蒞必兢兢而處以誠親親而持以義此焉無虞而天下治此焉有虞是面墻而立可悖而忍殘而忮以賊天倫滛而侈私而蔽以䘮有家極二南之原於詩冠昏之本于禮釐二女于書首乾坤于易由是而言家其可斁師箴責善在巳我心即師責善在人善人是師覺有先後年有長幼智有大小徳有凉厚成已成物用作新于舊其流之清其源必澄其本之茂其末必榮故䝉者求聖而闇者求明彼靈不㝠實右我後生如聽如瀆如反如復授者不明而學者不篤師道淪以没師也是司敢告其僕友箴入門而父兄出門而朋友獲于上說于親者無不在輔其仁成其徳者無不有棄挾論世必召厥真去益即損必貽其咎無比周以相阿無面諛以背詬無舍義而即利無重新而輕舊無輕怒以相絶無私惠以相佑有胥仵者勿較有忠告者必受無以眤而相狎是構離而結鬬無狥巳而絶人是起穢以自臭友兮友兮以有徳兮以有志兮無志而無徳又奚友之為思箴粤惟心官必思而得既為必用又為心迹發我天機生殺語黙勞焉則耗佚焉則溺放焉則侈昧焉則窒惟睿惟敬乃正而實勿竊我以私勿殉我以必勿愚我以固勿顛我以逆於焉是去聖神斯立心也是司操之其勿失正心四箴幷引傳曰心有所恐懼則不得其正有所憂患則不得其正有所忿懥則不得其正有所好樂則不得其正四者皆本心之固有得其理則雖有而無非其理則不得其正心亦因之以亡故申而為正心四箴以自警云恐懼箴直大而方本然之勇莫我敢遏何懼何恐偽妄自私内曲而老股栗聲澌氣竭身倒憂患箴知命樂天憂患外來在我者盡旡妄之災憂從巳召患亦自取畏壓巖墻夫孰援汝忿懥箴見理不明咸其自恕隕身及親忿然不顧自反而縮横逆我加修巳以道戮人以瑕好樂箴善善惡惡乃其良好宜惡而好好樂非道禮義悦心芻豢悦口簞食瓢飲樂哉孰有立箴惟天行徤萬化斯立君子體之自强不息下學上達與天為一彼昏不知惑以溺志從其所欲蔽于血氣怠弛放誕猖狂恣肆自賊自戕自暴自棄自絶於天卒僨而斃何不反巳何不自思以敬為本以謙為基慮患也深操心也危所立卓爾嶷嶷岐岐可以盡性可以知天立事立功立徳立言不朽不撓于千萬年凡百君子其惟勉旃自恕箴自治不嚴而去惡不勇者自恕之心害之也恕以及人則待人以寛其可也恕以自及則處已以寛不可也已所不欲勿施於人絜矩之道也巳欲立而立人已欲達而達人强恕而行也責巳重以周待人輕以約則已可克而仁可為也以責人之心責已以愛巳之心愛人則盡道盡仁也責人必以顔閔而不貸恕巳自為桀跖而不疑則長惡不悛從自反也寡助之至親戚畔之矣銘樗菴銘梓孰與材樗孰與惡惡乃得全材乃自斵葢全者天而斵者人我初無心惡用斧斤故惟散人乃知散木有不散存散乃自足莫惹蔦蘿莫纒葛藤曠蕩一天逍遙此生容齋銘郭君之才容名其齋以銘為請銘曰偃偃以弗顧藐藐以弗矚是之謂忽落陷穽而不為之引溺淵水而不為之拯是之謂忍當於義而弗為事俯仰以狥時是之謂隨惟茲三者人欲之私凡百君子察而去之剷閼塞以為通撤藩籬而大同東西其横南北其從浮雲在空馬牛其風彼横逆而至於我何加焉反之於吾躬弗示人以不𢎞汪汪洋洋百谷之王俱收竝蓄黿鼉蛟龍而是非邪正不亂乎其中如明鏡如止水爾不吾欺吾不爾從是之謂容乃天理之至公凡百君子維始維終曲肱亭銘有序昔濓溪先生嘗使二程尋孔顔樂處與所樂者何事葢孔顔之樂不在夫蔬食水飲陋巷簞瓢也安時處順盡其在我毋意毋必與物俱化窮達得喪夀夭貴賤非我性分澹然相忘而其樂有不可量者所謂天下之至樂也徃嵗靖肅徵士魏君過保下以祥止王氏父子語余而余未之見也今年春始得入燕祥止先生已僊去其子惇甫明敏純粹質而不華謙而有守與物無競於别墅築亭曰曲肱将以全天下之至樂踵聖賢之髙䠱故為引其端而繫之銘曰孰不為處處欲其中孰不為樂樂欲無窮彼不義之富貴詭名與倖功嶷嶷自憙狡狡自雄玉觀金宮胡為乎其中一時之樂侈然自肆覆巢之禍旋踵而至則其樂也豈能無窮伊亭中之髙人方擇勝而棲神與時屈伸與道為鄰知時之不可以苟合乃逍遙乎此身髙卧曲肱不凂世塵徜徉從容窒不求通從爾卿相盡爾王公不為伏鳯不為卧龍本無心于求世又何意於非熊惟軒中之明月與席上之清風翛然而徃翛然而來曾不知其幾何過耳目如朦聾肘則生柳首則飛蓬其神也矯矯其樂也融融飲水而眠日自生東乾坤一亭樂在其中命邪天邪竟莫能窮日觀銘有序惟帝出震故東方首庶物在南北西之右而其嶽鎮號為天帝之孫羣靈之府故泰山視衡華恒為獨尊自嶽麓而上越黄峴入天門登太平頂又極東南轟出而危峙者曰日觀視泰山為獨髙故東土為四方之冠泰山為四嶽之冠而日觀則又冠夫泰山者也以其嶞髙尊峻下視日出故以為名焉嵗乙夘秋九月癸丑自奉符登嶽拜謁絶頂神祠遂登日觀光怪自觀北谷底環屬而上九采聯締入于天心不啻數萬仭百千萬層日入始滅翌日復瞰觀旭日神光瑰景洞灼精魄異遇靈界皆所未覩則又日觀之傑觀也觀之巔有危石四削突起勒銘其上傳示不朽銘曰巖巖岱宗作鎮大東峙列三州旋拱三峯扼海拒河綰結蒼龍嶪嶪日觀岱宗獨冠八蠻九夷平視天半石脚隱日昏曉割判我來一登神光揭摛金環碧繩連虹屬蜺亘地經天植起不移雄雞忽驚日出峯底火山盪搖紅海沸起俯瞰愕睨身在天裏蓬萊方壺金闕銀臺赤城光明照耀洞開鰲頭突兀飛仙飛來囘視秦漢磨崖鐫石玉檢金泥夸示罔極侈心崔嵬青苔滿壁我來大書增塵其間記異揭靈揮斥神姦庶答昭休壮觀名山居庸關銘有序朔易幹會斗極揭控地勢隘天隱日𤣥冬之氣黄鍾之律凝結形見聚而不散常為氷雪故號隂區瞰臨懸絶以建瓴之勢居髙走下毎制諸夏死命故自三代秦漢至于今號稱彊悍之國營幽幷代之北山嶺隔閡連髙夾深呀口傴脊數千里巖壑重複扼制出入是天所以限南北界内外固中原之圉壯天地之勢者也自秦隴亂大河東抵太和紫荆繞出盧龍之塞列關數十而居庸關在幽州之北最為深阻號天下四塞之一大山中斷兩巖峽束石路盤腸縈帶隙鏬南曰南口北曰北口滴瀝濺漫常為氷霰滑溼濡灑側輪跐音此足殆六十里石穴及出北口則左轉上谷之右並長嶺而西隂湮枯沙遺鏃朽骨悽風慘日自為一天中原能守則為陽國北門中原失守則為隂國南門故自漢唐遼金以來常宿重兵以謹管鑰中統元年皇帝即位於開平則駐蹕之南門又將定都于燕都則京師之北門而屯壁之荒圯恐啟狡焉故作銘畀燕京道宣慰府使勒石關上且表請置兵以為設險守國之戒云銘曰國宅天都髙寒之區居庸其樞兮遼右古北隂幽沙磧控帶阨狐兮山連嶺重鍵閉深雄巍巍帝居兮伊昔掣鎻金源敗破遂為坦途兮函谷一夫百萬為魚竟執哥舒兮思啟封疆備不可忘禍生不虞兮寇不可玩機不可緩實惟永圖兮天險地險莫如人險兵刄相須兮刻銘巖嵎用告僕夫當戒覆車兮面銘大本達徳合坤配乾小智自私面墻蔽前明通公普誠一静專恭已南面所以事天背銘不獲其身與天為一惟欲之從物皆我隔勿欺勿蔽勿引勿絶室中造車天下合轍左銘所惡於左無以交右汝則弗欲人奚汝受反身致曲曲能有全絜矩之道自人而天右銘所惡於右無以交左惟意惟必道惡乎可巳所不欲勿施於人克巳之要宜書諸紳竹瓦枕銘氷深玉肥雷聳石裂架空傾雨迎刄破月斵為髙枕清風散髮安眠滅念萬古一節陵川集巻二十一
