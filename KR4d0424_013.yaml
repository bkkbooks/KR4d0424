body:
  text: 陵川集巻十三元郝經撰律詩秋興五首風振長天秋氣豪幽人興與雪山髙霜纒短褐歌商頌月滿空庭讀楚騷萬事已應隨弊俗一身寧忍墮塵牢㑹須散髮滄溟上鞭擊魚龍舞碧濤世事雖窮道不窮金聲猶振魯王宫看書極探天人理下筆全侔造化功未灑後塵心有贅忽驚前哲坐生風六經依舊垂天地千載秦灰散刼空沙冷雲平塞外天霜風掣箭射幽燕羣狐蹀血濡腥尾一鶻摶空弄老拳白玉樓成賀安在黄金臺廢隗猶賢翩翩精衛休填海驅石秦人已斷鞭永夜澷澷苦飯牛北溟誰下釣鰲鈎拘雲琢句鬼神泣倚劒長歌天地愁日暖桃源秦世外月明蘭國楚江頭但能握節終吾事絶食猶輕漢五侯萬里長風掃陣雲浩歌一曲倒清樽昔人猶有未埋骨䆳世難招不返魂隂沴豈能昏日月濁河難使貫乾坤皇天不許中州静夜夜長庚出薊門寓興實學湮沉偽學張四科一併入文章詞源更不窮西漢詩律惟知效晚唐風雅義迷元氣死天人理昩正心亡何當倒換銀河水净洗雲孫織錦裳李淑玉送醉梨李氏家梨㸃漆光蟄龍遺卵結氷霜香中風味爛中得皮裏陽秋凍裏藏破酒滿盤烏玉顆醒心一掬粉紅漿燕南竒士共竒果不獨張公擅洛陽雪意暘谷初氷冽曉霾瑶花一夕滿瑶臺雲飛海嶽寒難吐風振堪輿凍不開秀魄暗成氷井月冷魂潜入楚江梅梁園此日多豪俊濯濯無因展異才晚晴登西臺電明雲黑轉驚雷忽送諸山暮雨來萬騎蹴風飈陣駭六鼇噴海漲天開無情漫作陸地浪有意不洗中心埃落日明霞照湖水一天爽氣上髙臺呈王内翰霜落雲枯秋盡時翰林遺得桂林枝春風久己歸桃李刼火從渠照虎貔白髮操戈浮世在赤心傾葢幾人知壺中有酒無天地醉後休歌貝錦詩送陵川魏夢臣太行一脊壯中州上有吾家最上頭蓬鬢他鄉淹歲月錦衣何日拜松楸塵埃滿面將何往羽翼生心漫起愁聞説棣華堂尚在紫荆花老鶺鴒羞南樓書懷贈趙丈仁甫慘澹風雲鸚鵡洲蹉跎歲月仲宣樓從渠得失兩端了不媿乾坤萬事休往行前言秪自省樂天知命復何憂此身難著人間世只合長歌老飯牛送仁甫丈還燕一鞭天地起孤愁髙戴南冠賦逺遊濟瀆醉探窺海眼岱宗濶步望吳頭唐虞問學傳千古伊洛波瀾浸九州七十餘君皆不遇却攜漢月渡盧溝送髙聖舉之闗西碧落心期已自通滿襟霜月又相同斯文不墜浮雲外元氣常存刼火中太華峯頭老秋色銅駝陌上舊春風終當對此一樽酒豈限秦闗西與東哀王子正鹿去中州道不行先生今日死猶生長鯨萬里朔風急獨鶴一天秋月明擬見斯文還太極時方作太極書院未畢遽收浩氣反元精世無程邵知音少雲黯燕山恨不平追挽楊文獻公二首九龍猶未復金源柱石儒臣不假年社稷隕靈興廢定圭璋無玷死生全筆頭黼黻能華國掌上星辰解補天景畧格言今在耳空令有識淚如泉晚進無由拜搢紳空將行録問前津身兼逹徳智仁勇學貫三才天地人月落丹山嗟鳯鳥風悲大野哭麒麟文章從此無公論安得餘波灑後塵送董巨源錯落霜華季子裘茫茫何處是西周乾坤破碎無元氣歲月蹉跎漫客愁舉世横身歸虎口幾人懷策射龍頭相逢不得從容地空著長歌慰逺遊挽喬侯挾槊歸來鬢未霜便如王翦卧頻陽風雲墜地空黄土劒甲埋光慘白楊壯節固應書北闕英名更好刻西郎傳家有子無遺恨珠樹蘭花滿玉堂老馬百戰歸來力不任消磨神駿老駸駸垂頭自惜千金骨伏櫪仍存萬里心歲月淹留官路杳風塵荏苒塞垣深短歌聲斷銀壺缺常記當年烈士吟詠史八朝髙祖擅英聲盡以姦雄簒奪成曹魏規模為故事帝堯禪讓竟虚名貪夫胠篋盜仁義䜿子欺人弄甲兵天下區區幾千祀誰能端肯為蒼生壽毛徳義振落紛華别得天誦詩學道便超然黄花明月琴三弄緑竹清風易一編本與聖賢相對偶却教塵土强拘攣他年看取騎鯨去揺曳長裾入紫烟題楊之美尚書寄王運使守太原書後憶昔風塵暗兩京北門此日賴真卿乾坤翻覆見忠節臣子危亡置死生一柱數年支大厦孤軍千里重長城尺書便是中丞傳讀者猶能感義聲哭髙監察問學淵源算畧長中樞近右轉臺郎繡衣春照金宫日白筆寒生玉殿霜亡國失身雖共苦無兒死客獨堪傷摩挲翠琰徐河道駐馬西風淚幾行先生諱嶷字士美遂州人以才幹精絶拔為樞宻院都事學術純正轉監察御史金亡入燕喪子感疾而卒居順天嘗語僕以讀書作文法故其卒賦詩以哭之今順天北徐河橋上修橋碑先生之父都轉運使之文也故及之讀昭烈皇帝紀誓將餘燼熾髙光誰意區區竟蜀亡三顧雄圖起諸葛一生遺恨逐劉璋吞吳絶援誠無策為羽誅仇義不忘可惜後人私漢統周文孰與漢中王南堂即事長夏禪房絶㸃埃鬱蒸襟袖迥然開半軒流水移天去滿榻雄風送雨來不記閒愁千萬種有時清唱兩三杯輕鷗也自知人意浮入驚波却便回大宛二馬天廏所育詔錫張蔡公二馬飄飄萬里來玉花蕭颯上金臺風生兩耳雲霄近電掣雙瞳日月開渥水虎文連殺氣大宛龍種絶氛埃將軍正欲成勲業看汝驍騰展驥才落花彩雲紅雨暗長門翡翠枝餘蕚綠㾗桃李東風蝴蝶夢闗山明月杜鵑魂玉欄烟冷空千樹金谷香銷漫一樽狼籍滿庭君莫掃且留春色到黄昏哭魏先生臨危正色義巍然曾叱三軍誚武仙赤子共知歸大老晚生獨喜見先賢鳯鸞重赴丘園詔鬼蜮潜生李郭船高棟傾摧更誰屋衣冠苦淚欲平天挽劉善甫葱葱玉樹照清秋蹭蹬羣倫正黑頭方以孝廉升茂等便能籌䇿佐賢侯氣凌天宇虹千丈怨入東風土一丘寂寞神交與英契幾回中夜淚横流挽賈叔儀把臂論交氣吐霓青天白日快襟期誰知夜半驚鸞去漫使秋殘獨鶴悲刼火只燒希世寳惡風偏損出林枝玉昆新有池塘句夢斷空看墮涙詩哭祁陽賈侯萬巻巉雲慘六經三千拊髀惜生靈地維斷絶翻河海天柱傾摧變日星相印不交虚左揆衮衣忽斂閉幽扄恩門知己將何報淚洗貞珉刻墓銘哭蕭侯孟圭譙都狠蜮致中傷毒手隂謀果扼吭方喜明時見麟鳯忽驚平地碎圭璋人心甚海誰能測天道如弓不可量為告遺孤休䑛血玉壺氷鑑有賢王挽劉房山節鉞盧龍十令公紫髯如㦸氣如虹半生笑殺春閨月一夜歌殘玉樹風羲獻典刑存筆外遼金興廢列胸中飄零竟向梁園死苦淚空隨汴水東題李轉運碑後宣政宵人禍搢紳先生道義獨能存恨身不入蘓黄黨此足可登童蔡門賴有髙文見完節惜無佳語為招魂屠龍大筆神明䕶滄海遺珠在後昆次韻答王國範薄寒孤影澹黄昏步出空齋自掩門霜落池萍清見底風凋庭樹静歸根天髙雁去人千里江濶烏驚月一㾗兩國音塵俱斷絶幾年懷抱與誰論丙寅新館重九幾度重陽雜溷蛙舟中一夜總仇家半囚半客儀真館不死不生揚子衙巖桂渾疑是楓葉牡丹誰使作黄花强將瓊露澆斜日萬里西風萬里霞是日伴使送木犀一瓶牡丹菊一本故云丁卯春日夜飲見月新年新月照愁人白髮新添愁更新擬著長鞭遊海外豈期孤劍坐江濵醉殘蠟炬前冬酒開盡梅花今夜春自古行藏有天命不須兒女淚霑巾雨中飲臘封瓊露簷溜琅琅戛玉繩隂氛鬱鬱釀炎蒸江湖不見繋書雁風雨偏驚墮網鷹天道本來愁似海人生安得酒如澠臘封賴有瓊花在痛飲從渠變谷陵修易外傳太極演暮四朝三等賦狙斗升幸得活枯魚深庭寂寂都忘世長日沉沉且著書根本還將太極演規模直向先天初興來徑著江濡筆事去從渠雪滿梳贈馬徳璘從君躍馬入長途罇酒風雲日便疎白壁暗投皆若此赤心知己更誰歟不能北闕紆竒策甘向南山守敝廬抱膝長吟意蕭索半生辜負五車書静香亭二首南風吹綠滿庭槐門巷翛然絶㸃埃紅玉生烟塵世隔錦幃遮日洞天開鶯知好客飛無語蜨為新花去復來好酌生前無限酒浩歌長醉亂霞堆小山曲檻映回廊别有一天深處藏人物風流還似晉衣冠儒雅尚如唐四圍紅錦香風軟滿地綠隂清晝長坐久杳然忘世味碧雲髙興欲飛揚燕自兩河之戰遂非唐有薦罹遼金幾四百年然而不漸宣政佻靡之化豪勁任俠渾厚敦雅猶有唐之遺風焉故是詩有衣冠儒雅尚如唐之句題涿州昭烈皇帝廟興王百折似髙皇垂老纔能據一方鄴下只知移漢鼎江東不肯對劉郎千年生長村猶在三代君臣道未忘涿水都為永安淚子規啼血怨樓桑衛南感衛北傳聞巻甲趨衛南誰意却南驅百年厯數雖當盡孤注乾坤便可輸漢割鴻溝還鬬楚蜀亡江表益征吳兵家勝敗尋常事萬折彌堅是丈夫靈巖道中輕騎長鞭踏老埃蕭靈爽氣動靈臺霜餘落水三秋盡日照扶桑半夜開袖裏還攜泰山去筆頭又巻東海來臨風悵望有所憶魯連安期安在哉金線泉不著靈犀水自分輕金一縷見天根飛來寒電空留影消盡春氷尚有㾗亂劃波心還便續醉探泉眼不能渾㝠㝠化窟呼真宰此理須當與細論過臨淄區宇沉雄海岱間漢家曾著此秦闗風煙老樹千年國金碧斜陽一片山管仲霸圖無謂小魯連髙義孰能攀半生失意仍漂泊嘆舊懷賢益厚顔竹溪竹溪無竹背隂崖澗石參差漬老苔六逸於今竟何往四賢不復更誰來葉邊重覔懷英畫天末空思太白才為向居民問遺跡路南秪有看山臺泰安文廟有羊祜孫明復石介党世傑四賢祠哀李文甫亂來嗟嘆子衿風英俊無聊坐死窮數冊舊書塵滿甑一間空屋淚霑蓬最憐短折抛嫠婦忍見咿嚶哭騃童収拾同門二三子挽輿權厝草岡東文甫保州清苑人其父祖皆第進士為顯宦金亡以孤童歸鄉里教授句讀安于貧窶年三十一歲疾卒經嘗與之游故賦是詩以哀之哭亡友孟振文簮笏箕裘出鼎腴泥途誰使擲瓊琚負骸千里還墟墓泣血三年殞敝廬聞説朱衣畏金石豈期白粥亦癰疽羈孤撩亂號嫠婦淚浸牀頭幾冊書振文順天軍節度使某之孫故須城令某之子轉運使李公特立之甥也㓜孤三十年後始于河南登封求得其父遺襯負歸甫塟於清苑先塋而喪其母母喪適終而疽發背卒故云曉渡溠河旌旗斷續出林巒部曲喧豗過石灘殘月沒時愁地險宿雲收處覺天寛自知不武還為將漫使閒身也屬官落盡黄榆秋色老楚山青曉石樓寒營獨山谷秋風獵獵建牙旗月澹昏黄馬不嘶區脱定時林影黑邏兵行處艸聲低豺狼逺跡終宵遁烏鵲驚飛到曉啼中夜幾迴還自惜缺壺歌罷意凄迷徳安道中聞大軍渡江萬騎吞江勢欲乾江神一夜倒狂瀾縱横竒計山河壯霹靂先聲艸木寒下令推恩今始見存心不殺古猶難天將海宇都平蕩休道東南有謝安公夫人毛氏挽章雍容二十四城春叶賛元戎作虎臣家法自傳王令尹流風復見謝夫人種香忽去花辭樹秋月俄空鏡掩塵最苦一年門下客不能執紼在江濵孟少保後園四題芙蓉池館無人花正愁仙家城郭楚江頭一簾斜日錦雲晚萬里西風紅露秋深院周圍情脈脈小山側畔思悠悠秪應來歲蓬蒿底埋沒兵塵取次休木犀湖玉山前緑玉房靈犀幾㸃透心香麝塵和露花間結金粟嫌風葉底藏寂寞生情動騷客殷勤通信與春娘短襟翠袖偏能惜戴了還看意緒長山茶雪塢欹斜緑葉稀梅邊竹底弄嬌姿小山曲檻偏宜著飛蝶狂蜂總不知秦樹怨離抛翡翠漢宫愁絶冷臙脂内家最愛常留得生色屏風有數枝瑞香羽葆層層擁細花甲梅斜映隔山茶兩三叢裏氤氲氣數百年來富貴家雕玉香濃團瑞雪翠翹春暖插輕霞主人一去無消息庭户蕭疎落晚鴉題汶陽王太師彦章廟不許乾坤屬李唐孤軍直與决存亡大梁僅得延三日匹馬猶能敵五王誰意人間有馮道幸因身後遇歐陽千年豹死留皮在破冡風雲繞鐵槍晚登徐州黄樓人物河山自古雄郡人猶説大蘇公黄樓去後風波惡赤壁歸來文字工戲馬尚能存壯觀沐猴且莫笑重瞳我來慷慨懷今昔樽酒超超駐晚風題留城留侯廟龍蛇繞亂出氛埃隆凖相逢帝業開三世相韓攜劒起一言平楚據鞍回掃除亂畧伊周輩駕馭英雄管樂才崔浩張賔是何者敢將驥􅀈比駑駘宿州夜雨飛電穿牕滿室光却從陡黑見昏黄雷霆半夜翻龍窟風雨終宵撼客牀塞上詩懷尤索莫天涯壯氣獨昂藏星麾何日平康了兩國長令似一王震南樓危樓雄塵楚氛收緩帶輕裘日燕游赤羽萬夫開虎幕黄流一曲枕鼇頭天髙樹老闗河暮水落雲枯澤國秋此地誰教限南北蒼茫極目使人愁以三弟庸將别憶二弟彛西風木葉下湘潭鄉思離愁兩不堪二弟分襟向河朔一身持節使江南斷鴻噎噎吹秋别疎雨零零梗夜談莫為他鄉重懷憶要將忠義麈烟嵐沙洲夜泊一來駐泊便淹旬洲渚人家雁鶩村滿地月明疑白晝半帆烟影易黄昏天連平楚無邊濶河入長淮徹底渾夷甫諸人慿寄語莫教石勒上東門九月晦盱眙南為何待制壽雲國回春事亦難每將和議動龍顔不辭溟北三千里喜見淮南第一山總謂豚魚知信使誰言虎豹守天闗先生此舉真豪傑鶴髮遨遊二帝間奉和詳議叔蠟梅之什蠟顆含春色更嬌物窮宜著㸃枯條日融蜂翅黄將破雪壓檀心紫欲消驛使最憐和竹把野人不惜並薪燒何當走馬燕南道管領東風玉燭調月丹小艇移來江漲橋盤盤矮矮格仍嬌丹霞皺月琱紅玉香霧凝春翦絳綃一種是花偏富貴三冬無物比妖嬈廣寒記憶曾攀折滿殿光揺照紫霄王承宣致月丹一本云山茶大者曰月丹又大者曰照殿紅故為賦此館中書懷一夜風濤洶客牀覺來無處問行藏頭皮新起粼粼雪鬢脚潛生短短霜李順包藏情己露王驩朝暮意難量事成却被庸人擾心緒和梅也不香劉房山方鏡二首銅老寒芒欲動揺斬然圭角背鸞翹四邊蝕却月猶在一段裁成氷不消挂向霜臺空耿耿照來蓬鬢漫蕭蕭好將物鑑為人鑑圓行圓幾滿市朝端瑩無塵電影􅀢先生心印見秋毫氷池落手洞庭小玉井涵天太華髙物外將迎何足數世間妍醜莫能逃開奩一照還驚掩疑有蒼虬噴雪濤伴使秦文舉欲入維揚故賦詩以見意東風吹落瓊花雨南浦潜生荔子烟夜久有懷聞獨鶴春歸無語怨啼鵑天沉海底涵金鎖日隠鼇頭頓玉鞭千尺絲綸萬年井文園消渇竟誰憐芍藥王承宣送揚州芍藥數本夜來風雨洗殘春芍藥還開春又新入座忽驚持酒客舉杯先酌送花人烟輕雪􅕹丰容質露重霞香阿娜身鐵石肝腸總銷鑠都將軟語説風神瓊花淮南江北春三月天上人間玉一株有地欲移移不得見花方落落還無氷蕤􅕹碧開香雪金粟銜黄簇蘂珠聞説隋家自亡國莫將詩句重相誣館中書懷星麾留滯楚江邊葉落樽空又一年兀坐政如游黑海舉頭時復見青天拘同羑里難重易拙甚揚雄媿草𤣥聞説長歌猶慟哭慰愁賴得有詩篇晚步花落深庭步晚風雨苔生緑上幽叢黄鸝隔葉啼巖桂翠碧攀枝啄海紅静裏細吟詩有趣閒中遐想事無窮江雲不定生愁思白疊為鱗散逺空為劉詳議壽鶴髮垂肩雪滿鬚故鄉耆徳更誰如風流杜牧心尤壯湖海元龍氣不除白酒芙蓉秋爛漫青山桑梓日蕭疎去年淮上今江上安得稱觴向敝廬曉起屠龍心事碧雲重卧誦離騷嘆我儂墜甑幾回傷往事斷蓬何處著孤蹤雁啼揚子江心月風遞金山寺裏鐘喚起小童添半臂且乘曉露看芙蓉湯計議生朝一夜芙蓉著早霜江風吹浪到中堂兩朝和氣回春色百萬生靈入壽觴傾葢便能知肺腑舉杯時復露衷腸靈椿未老多丹桂今日燕山竇十郎湯時年四十餘一子請舉一知無鍚縣二補太學上舍生朝祭先有感金橘堆盤荔子丹瓊花滿奠爇沉山風生香案空遥拜月掩重門尚未還目斷松楸心耿耿氣填胸臆淚澘澘三冬又盡三年數兩國無成兩鬢斑先大夫忌日墨絰歸來艸滿墳擬將還葬奉遺言幾年竟墜蹉跎計萬里徒勞慘澹魂客裏可堪逢忌日夢中却得見生存連夜夢見先君如平生遥知今夜佳兒女哭斷寒雲静掩門為劉郎中壽翠羽同舟共陸沉蕭條江館歲華深艱危愈識斷金義險阻尤存底柱心表海亭邊今昔事雲門山下短長吟幾時拂拭塵埃了尊酒盟寒却重尋鏡薌亭薄薄輕雲似霧塵隂隂江氣冷侵人一庭芳草留連客兩樹夭桃斷送春檻外流鶯仍語巧梁間旅燕又巢新東城飲伴西湖栁寒食中間入夢頻望金陵雲際參差是石頭天浮斜日雁横秋誰將故國千年恨都付長江萬古流破屋殘城未埋骨焦頭爛額盡封侯不逢四海為家日獨立蒼茫漫起愁贈都事苟正甫接屋連牆受學初嶄嶄頭角氣凌虚将鬚便敢刺雙虎回首還看總一猪未齧子卿氊上雪且傳黄霸獄中書天教三士從重耳返國尊王儘有餘甲子秋懷江館無家久似家西風院落老天涯黄纒薯蕷猶多葉緑擁芙蓉尚未花紗幕墜塵歸晚燕窞池生草窟秋蛙枯腸欲斷誰濡沫擊柝聲中夜煑茶秋晚後園獨步孤館年深艸自荒愁來無語立斜陽裂冠毁冕霜雞紫接屋連牆露菊黄仰視飛鴻腸欲斷佇聞靈鵲恨尤長中原萬里家何在江氣霏霏水潑裳壽劉詳議坐數年華更覺頻今年猶在大江濵却秦但惜侯嬴老反晉全慿舅犯親把酒相看如夢寐圍碁正急羡精神丹心不誤蒼生命黑井從渠白髮新晚步持節寧知墮甑空政當竭力効公忠鬢毛變白烏元黑頭角尤髙馬自童日月麗天常轉北江河宗海必朝東下帷講誦朝還夕玉振金聲道不窮贈魏斌我解屠龍推第一君能射虎説無雙乾坤磊落心何愧歲月蹉跎義不降白刃斬袪離舊館黑風吹血破寒江競將康瓠欺神鼎正賴孤忠力與扛戊辰新館守歲贈正甫書狀坐上春回北斗邊梅花驚落燭花前六人同出今三歲一夕相看是十年行入玉門持漢節却朝金闕見唐天不須更作楚囚泣歸馬東風快着鞭勉孔進學萬巻撑腸是大夫豈宜冠玉作庸愚學書便得吾家法開巻願為君子儒十載甘心作蘓武九齡誰意得童烏天將男子屠龍技著力須探頷下珠己巳三月二十六日二首春來渾不見花枝春去蕭條總不知有酒四時難有興無情三月竟無詩歸鴻恨别排雲逺雙燕嫌孤入户遲江渇風髙還欲斷魚龍宛轉亦堪悲夢遊故國人仍獨春到空梁燕自雙雲淡星疎祗見斗浪平風定不聞江五更鼓角纒孤枕千里闗河入破牕落盡好花春又老依然塵土暗金杠庚午夏至夜雨至日元陽霖甲子中宵隂氣一何豪龍蛇起陸乾坤黑風雨翻江鼓角髙病骨溼侵寒似水寃腸恨入毒如刀幾回坐起椎牀語白地南來坐鐵牢壽正甫書狀歲晚途窮漢節遙秋髙江濶尉佗驕銀潢雁度五更月赤岸鯨吹半夜潮世路從來多梗塞雲天無日不風飈艱危正要胷襟豁磊碨同磈須將斗酒澆杜少陵王宰山水圖歌赤岸水與銀河通赤岸在𤓰步山東南連皇天蕩海濤入江衢激六七百里金陵之至險也在儀真西南故有銀潢赤岸之句江城兀坐聴秋聲羡殺西風雁背輕一紀乃能同患難數杯聊復慰生平新書總付徐無黨半臂誰添宋子京昨夜太行還入夢倚天青碧大河横時余改修三國志正甫為余集註故有徐無黨宋子京之句陵川集巻十三
