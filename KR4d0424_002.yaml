body:
  text: 陵川集卷二元郝經撰古詩寓興弄丸觀古初洞見天地心不外人與物坦白無幽深如何妄意者肺腑戈矛森亂鑿渾沌竅遂使天機沉世失鍾氏子孰與傳希音欲言復無言感動為長吟靈源洞無極混混春泉瀉流為川上波晝夜逝不舍榮枯遞乘除寒暑相代謝化機一闔闢圓方自陶冶君子惟乾乾惕夕懼以藉勿謂吾道亡中有不亡者思慮即鬼神所發不可妄人物或可欺鬼神其可誑山川鬱其傍日月烜乎上化幾速影響昭晰示情狀屋漏謹操存頃刻不可放重華尚兢業吾儕可浮蕩孶孳持此心斃已無他望衆變成大化總萃入神紐渾淪包無外開闔紛參蹂伊人具斯理往往昧所究湮沉血氣中頓躓牛馬後哀哉何不淑自棄甘凡陋孰能與湔拂俾見高明囿世運何無涯質文繫所尚弊政與先務取舍定興喪嗚呼周轍東王室歌板蕩虛文不知革實禍國相望區區八百祀猥處諸侯上落日下西極仲尼悲死麟王澤久已熄煽火焦斯人中原一戰場戈甲埋驚塵驅車屢途窮處處傷問津歸來續韋編理窟搜鬼神百流收一源炳烺光日新六經垂天地一視萬世仁綿綿河畔柳婉婉成盤匜素絲玄復黃織組為裳衣迢遙門外路客子各所之並行不相悖並成不相夷如何墨翟氏慟哭為傷悲聖人無常師師襄又郯子無入不自得豈惟柱下史夸徒以藉口妄誕為評訾當時五千言洞達窮妙理大出六合外逺探無極始後人弗克承削繩復破軌流漫源以湮枝披根以死借問蓬壺仙吾道誠爾爾明堂一牘書制作本至道折衷六代典密理參玄造煥乎其為文表表垂世教豈惟得時制萬世是則效新莾何為者剽竊資篡盜大典即委地生民弊殘暴至治何由興有淚滔蒼昊潛觀聖人用乃在筆削書矯矯百王法挺挺森天誅立義本忠恕淳風還唐虞後王政苟且舍此由他途僣逆尋干戈血肉汙皇居遂世不復古永永沉真儒鹿門有髙躅彭澤歸去來劉伶醉不知痛飲銜深杯何如王夫子教育經濟才河汾大澤流唐運實此開彼伊皆季世此獨何為哉坎坎咸秦坑下有六經燼後天百代迹泯泯同一盡厲階仲尼沒諸子各啓釁短長互相擊世主孰取信異端實禍因莫將獨罪秦中原二十世逈無一漢祖關中無一民沛下無尺土寬仁代暴虐麟鳯消豺虎所欠惟學術不得同湯武擾擾草竊盜紛紛孺兒女局促無逺略屈強何足數獨有唐文皇僅得為英主漢鼎既已墜海內必有歸誠能正德業亦足為王基何必由禪讓以為篡弒資鬼操勿謂鬼百戰得偷兒征西題墓隧永世將誰欺太康晉一統中國威幾振天子無逺略宰二爭欺徇清高機務廢曠達廉節盡往往矜豪奢珠璧家充牣搆成骨肉禍結起邊陲釁自此中國亡罪莫加石晉天王不巡狩高居事遊燕侈心自兹啓欲歷寰海遍陋矣逢惡儒拜疏請封禪名數聖無徴事典不經見萬乘壓川谷供具窮寓縣鏤玉以銘德千古示誇衒豈知蕰藻菜足作王公薦茂陵休著書請讀史鰌傳周謗尚赤舄孔尼猶弦歌大節窮乃見首陽髙峩峩白刃義可蹈之死矢靡它子雲漢巨擘問學崇丘軻投閣遽隕穫劇秦真㛪音宴阿玄文與法言辨口徒增多與器不與節天命其如何道入王霸雜氣逐山河分有才或不德有武或無文小智私已甚竊位徒自尊患失以持祿往往植禍根采采商山芝麌麌秦庭鹿商山白雲深不見秦庭骨乾坤百戰場松下才終局笑殺子雲公幾被髙皇戮伊尹五就湯嚴陵不臣漢所履元不殊心迹孰與辨濟時與全節亦各適所願紛紛夸毗子利欲迷生死黃塵事走趨青山為仕途昊天有至文倬彼雲漢章秋風波洞庭漪瀾肆汪洋嗟哉破觚士徇辭刳肝腸執柯以伐柯元氣為凋傷千金享弊帚魚目誇夜光道喪實昧昧浮偽方翺翔孰為托其華立聖追羲皇昻昻兩飛鳥不知何許來結巢黃金殿弄語登瑶臺吾民競奔走恍愡為驚猜或為魯雞鶋拜祀祈矜哀或為長沙鵩與世生殃災歲久卵翼繁百千為朋儕山水割膏腴搆宇凌天街遂令周孔徒凍餒纒霜埃天容恆青青日月自昏曉此心本澄淨萬事空紛擾日月不變天萬事不變心洞觀天人際一理神幾深草木變榮瘁松柏獨也正一色貫四時閲世還無竟咄嗟樵蘇子仰視驚盻瞪雖云梁棟姿不免斤斧橫顔夭跖乃年匪道實維命非為桎梏死亦非寒餒病修身以事天終自為賢聖西山有佳色東溟浩淵波區宇仍崢嶸雷風相蕩磨借問先天公吾道其如何麟鳯久不來西伯安在哉俯仰天地間吾身眇何許百年交一臂竟自為黃土灌以仁義波植之天人圃握蘭當靈風清芬遍寰宇可與無極翁乘化遊千古秋風吹幽蘭明月照寒江戛然一長嘯遺響纒飛霜有味非蓴鱸齒頰流氷漿逺駕中和車高遊一氣傍濂溪訪達叟深探先天囊有飲不滿杯有蓄不盈握牀頭一卷書即是平生樂落日從昧沒浮雲盡輕薄且濯冠纓塵不爽崆洞約碧海驚蕩潏音聿中無安穴鱗風濤浩無際我來方問津飛流霑衣裳顧眄潛悲辛扶桑繫孤槎不見同舟人浩歌登日觀喚起雲中君玄臺上凌虛中有帝子室縱橫羅萬家曠蕩含虛碧我有今借契竭來為扣擊無聲亦無臭默默還寂寂時有清風來颯爽吹江石漠然竟無應真似無知識瞬目一晝夜寤寐一死生為善尚不及作惡竟何成仲尼幸知過顔子不復行君看貫盈者果莫逃天刑皇天分四時庶類能蕃殖聖人定四經萬世扶人極率經以事天非聖即為賢人事乃天道大經即天言下學上達理捷徑餘無先骯髒一丈夫鼓掌下崆洞嵩高看山色杳杳乘長風悴然兩頰春不語指西東偶來洛下居舉世欣相從三年忽成市遂為天地中世人竟不識耳目如矇聾問之皇極君乃是無名公朱絃寂無聲太羮淡無味其中還有物磊磊軒天地毫末晉楚富眇小王公勢孟賁弱其勇離朱暗其智卷舒穹壤間與化同無際吾道古有統軻死迷其傳昌黎功甚勤突兀排金仙奎宮吾星會麗天光羣賢太極出面目伊洛開淵泉吾道本吾心心在道即全但使心不昧吾道長昭然北風北風胡為來掣箭飛沙石無乃化樞逆贔負塵昏塞萬竅怒一吼土口哆一吸噴叱一氣轉大呼天地窄掃平長城隍卷起黑山磧野馬突空走舊雪來塞北曠宇驚崢嶸六合危屹岌中原一囊土再逐混沌闢靄靄薄扶搖黃盡勢轉黑堪輿亦不守慘淡歸岑寂卉木盡搖落鳥獸皆竄迹斷鴻撲雲去下有退飛鷁神鰲蔽兩目大鵬摧六翮有物入驅除迅鋒誰與敵惟餘冀北駒驍騰數萬匹乘此振威靈踏碎中夏國吾民一孔僾攣手重局脊住時雖不寒口箝復股栗矧此烈烈威露頂裸以赤破屋簾不閉土挫才半席鶉懸肘不掩壞褐才過膝妻踣子亦仆並日無一食抱臂走道路無奈征賦急肌裂氷刀刲肉死霜矢射骨稿痺不仁氣竭凜不植心飛靡所薄指直不能屈十室一無在道左骸岸積箕伯方震怒橫空賈餘力乾坤氣不平更欲吹海立時余亟奔走欲入蜩殼夕暝排竟不前佇足猶畏逼池氷徑作聲地底生霹靂雲飛月縮艷日落天失色斗尾垂三星擺蕩光的皪所遇變於前頓覺所失易耽耽道在樓磨天百餘尺毳幕重重圍光彩耀金碧氣濛翡翠鎖香潤椒塗壁上有金貂兒銜冰驅熱疾樽爼快號呼淋灕文錦溼長歌葉落柯笑擲千金璧四座自三春杳與人間隔俯思心惄惄幾為吾民泣何此有二天天乎不余恤孰能以此意沛我蒼生澤且息絲稅賦且弭兵戈役四海一狐纊家家趙衰日此意竟誰會歲月逾回遹黎亦冀休止虺虺以颲颲黎亦冀霽止曀曀愈不息何日不鳴條黃鳥鳴習習五絃解吾愠薰兮來帝室原古上元學士麟死九鼎淪萬世無孔孟文字粳粃餘扶藉不絶聖伊昔大觀季天王始失政中聲入哇淫吾道孰不競金源東北來一洗河海淨斯文甚濫觴幾墜土梗橫吳楚割半天瘡痍僅續命伊洛遽騫騰朱張立朝廷𢎞肆六藝學俾與日月並中原有奇才詞賦方鬬飣天門黃金榜赫耀動萬姓君臣此為得父師此為令或者語詩文環視驚盻瞪孰意元化精不遂入昏暝浚發自蔡黨高步出遼􅗥墨浸天壤深筆掃風雷徑絲綸帝載熙訓誥王言瑩諸公繼踵作互執造化柄黃山與黃華雙鳳高蹭蹬清風玉樹鳴千古一輝映有若間間公光彩璧月恆雲煙恣揮灑乾坤快歌詠亹亹金聲鏗矯矯銀鈎硬楊馮李雷麻嶷崿胥倡應五行連麗天四海望而敬偉哉遺山老青雲動高興文林剗荆棘翰府開蹊徑秋空玉琴張搏拊分雅鄭三閭一曲歌忽喚劉伶醒哀哀汴蔡亡六合為懸罄此老獨巍然聲價駭羣聽振袂凌孤霞珠璧飛咳謦人宗一代文天賦百年盛紛紛夸毗子捆托為訾評自謂人勝天詎知天已定行行野史成共為天下慶作噩建子月投我以照乘蔀屋驚見斗寒熖忽蟠亘經也生已晚弗及拜先正窮閻一束書十載成墮甑學問苟有歸貧屢安足病今乃得溟渤問津有龜鏡挈我登龍門綆我出虎穽搖搖風中旌兹始見依憑緬思先世澤于今果無竟嗚呼世道喪欲語寒淚迸何時倒銀漢與世開䒌靘昂頭冠三山俯瞰旭日晟陸海闢文源生民共涵泳明月明月不自照漫作地上雪不照蒼天心照我多顔色天下一月明美人何相隔靈波許我浴好花許我折滂沱淚沾血蹉跎望明月黃花有華春不開苦愛風霜節有根風不栽有子霜不結華開難及時華落難載色眷焉涕泗零桃李肯孤潔西風一萬里搖蕩幽香歇古意行行重回首日落天風髙擊黎歌正月曳屣吟離騷何當御六龍醉蹴三山鰲一劒絶坤維灝海無波濤蒼玉軒緑玉劒拔起翠龍飛紫煙虛簷生爽氣六合涵幽妍老露洗珠國秀月涵金天蒼茫太古意蕭颯長風前中夜誦書有感日月猶不死吾道曷其昏天地猶不壞吾道曷隱淪世我實相違贅蔓徒紛紛有道復無鳯非時亦獲麟為抱大人器願歸大人門長劒空倚天安得靜風塵藜糗一鼓腹布褐還生春曠蕩五車書悾恫一幅巾青錢買濁醪置之老瓦盆一醉南山頺載立元氣根虛白菴郭抱大素朴搆菴萬物表不礎亦不楹曠蕩含幽杳中有無名公獨立何矯矯神存一室固心死萬化了下視人間世汙溷驚擾擾客氣賈餘勇浩然還自小紋錦裹血肉珠璣裝偠音杳㒟同裊金宮壓地軸玉觀飛雲杪一朝等黃土閲世急飛鳥何如此菴中振古一昏曉白雲滿霜樹老月涵風篠此色與此界昧者恆背繞苟能反身觀捷徑明瞭暸無欲觀其妙有欲觀其徼即知此菴中眼界闊多少義士燕趙古多豪士其借交報仇排難解紛以義相許固其俗也丁巳春余入燕得義士人一焉曰晉古跌宕於搢紳間聲名籍甚故得其為人尤詳初以蚤失怙恃著道士服杖屨去家觀覽山川交識名右王內翰白樞判魏靖肅元遺山一時名流皆嘗為之先後尤喜周急援難凡孤弱頓躓莫能自致往往賴之以濟一日挈壺酒踵余門而求詩余素喜奇節士聞其槩梗尤有激于中焉乃為之賦詩嶷嶷一義士能激壯士肝燕市忽相逢布褐春風寒謂余欲赴難白刃色無難義烈我克舉鴻毛輕泰山嗚呼世道喪私智忘厚顔狗苟復蠅營青天井中看自救亦不暇碌碌長辛酸為爾舉一杯萬古髙風攀會與魯連子把臂觀海瀾鶴媒胎禽昂藏姿仙家有髙躅堪輿雪月精凋刻為毛骨金鼎百鍊丹結為頂中物清秋唳江臯圓吭振哀玉時逐無心雲間向天邊出弄月過赤城警露晞暘谷還聞緑綺琴翻翥舞終曲道人庭户幽滿院苔痕緑春深步落花天寒倚修竹每惡鷹鸇忍大笑鸞皇俗誰知藪澤間甘為獵人畜反藏媒翳機解發刀矢毒翩嬛舞仙裳著意親麋鹿左右成犄角顧盼爭血肉有如欺世人長往謝奔逐木食還草衣緘口復瞑目與世若相望白雲繞茅屋淡然似無心干戈還滿腹當時王夷甫豈勝何平叔巖廊髙一世危坐翻地軸鴈媒雲衢眇飛鴻往來解隨陽序當夜有所次進朝有行瀚海天山西卵育歲為常八月秋風高雍雍共南翔水國足汀洲江湖多稻粱暗靄帶殘蘆老岸青草長哀鳴洞庭月亂點瀟湘霜太和開冰天北去頏穹蒼信禽法天運斷不為炎涼偶為篝燈誤縛足離江鄉飲啄養為媒朋儔總相忘嗷嗷解愁人乃反無愁腸弋人見冥鴻矰繳潛施張置媒使號呼投網來搶攘奄忽一舉盡羽毛皆摧戕厭然束縛去又向雲間望嗟嗟罔民徒詭計不可防被獲反為用竭力如鬼倀有信復無智終自為身殃誤已更誤人不悟真可傷三臺飲馬清漳曲看山上三臺爾來一千年平地猶崔嵬當時兩京荒鄴下王業開竊國深規模根基重栽培藻幹壓太行半空丹碧堆氷井極髙寒金虎何雄哉銅雀中天飛鴆毒澆鬼魁兆已成鼎足浪戰端可哀諱死著死欺涕泣效嬰孩分香儘遺臭臭腐不肯埋笑殺歌舞人兩耳生青苔舜禹才二世漢武尤雄猜公卿皆負士殿閣磨瓊瑰忍死待仲達癡騃真堪咍誰知篡國臺即是亡國胎美人為黃土西陵等寒灰把酒憶思王山影青滿杯高詠朔風詩日夕鴻鴈來書羑里祠周德奕世修殷道屬不競陋哉一抔土欲以厄大聖人衆方勝天故使俟天定聖乃先天作靜斡造化柄六畫出象數萬世立龜鏡終亦有天下羑里安足病後來僣偽者視此驚盻瞪為王以不死瞰鼎窮恣橫隨得亦隨失肉薄還骨併何如會兹理在德不在命去三汊見太行二年大河間胸次洶餘浪身與天根浮泱漭隨下上靈槎沓虛舟顛倒泥底樣恍疑渾沌初溟涬天水象揚鞭得西歸瞪目為一放舉首見太行逸翠蜚萬丈爽朗肝膽張豁達氣宇曠真宰聳奇骨頓覺天地壯兹山自佳色何乃氣凋喪吾家在椒嶢老霧橫莾蒼松楸日樵采山靈亦悽愴何時鶴髮翁攜我蹭疊嶂雖無錦繡裹粗著文彩狀山河表裏全自古更霸王于今何索然死石徒映向在人不在山先民語無妄行行重行行落日兩相忘陵川集卷二
