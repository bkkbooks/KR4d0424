body:
  text: 陵川集卷五元郝經撰古詩幽思江山鬱幽思靜止有天光宛然褰薄帷明月照我牀蟋蟀鳴孤根鴻鴈頏飛霜惄惄動羈衷耿耿發清狂有萬來無端百折縈囘腸晤言且伏枕一寐成兩忘搔首視天宇幄幕四垂碧道窮誰與言逌然坐孤石黙黙心語口㝠區扣虚寂老鶴翩然來聲帶江臯溼偶與成唱和玉振動肝臆感寓遂無窮亹亹參元極性天入無極窅窅觀化初渾淪一活物極盡都無餘乾坤藏首尾坎離互根株擺拉屑磨齒出入軋户樞遂生無量人乃有萬巻書總萃成六經所以為吾儒衆動劇藏葢獨覺還發䝉揭焰開瑩臺赤日凌青空宇宙一蔀屋至明元無窮但見人物異誰知地天通君看九泉下景曜皆燭龍昧者烏可言耳目真矇聾有物與生俱混涵具萬象昭昭為吾天暠暠不可尚妙合元化精屬底更無上澹然入虚明大惡滋意匠如何窮奇徒穴蠧肆豪彊胡不觀其生未死先自喪天幾為身樞轉幹主性情靜定得其正焉用巧與螢化窟每雕鎪焜燿開萬靈僞妄相冶陶蜾臝為螟蛉反觀心地初周匝惟一誠莫漫彊作為無本竟何成吾身眇天地太倉一稊米洞達乗道藴大易乃吾體胡為生町畦祗自揭底裏戰心作蠻觸鬭物劇角抵並行本無悖用智私乃爾終令八尺軀𤨏𤨏同螻蟻爰念算心者愈算愈無數脱兔驚處女不知竟何處豈如千歳日坐欲窮其故清風翛然来皓月皦然去太虚自澄湛寂歴降霜露求體與追迹抱甕渾不悟至神妙無方倐忽驚掣電歸藏豈無所至密周匝遍君子慎不出與民亦同患念兹即在兹過化復乗變何須七處徴非必八還見槌碎玉連環總是光明殿風輪載水輪天地一虚舟歴世千萬年生滅祗幾漚大吹推濤山組練翻神洲有生當盡壞物類仍自稠漂泊往何深推盪來亦周安得窮其原神區莾悠悠化區一洪鑪萬化總銷鑠誰知鎔冶際圍範已附著倐忽聚散間共是一蜩殻古今都無跡曠蕩歸㝠漠易簡故不弊悠乆相盤薄若言天地壞大塊何處著凡物皆抱一太極元有兩厥初無端倪乗化互消長何人與安排妥帖自來往萬物儘銷沉山川空泱漭秋水雙芙蓉玉鏡花俯仰並蔕復同根一種誰涵養地中有晦明天體無晝夜人物互寢興擾擾争傳舍形器兩疣贅面目更假借化工急轉圜光景速代謝君子惟立德乾乾擬泰華揭焉與化俱萬古常不化誰將碧桃核種向虚空天偶然落地上紅雲滿山川秋風實離離到處桃花然太極禪兩儀萬物相繼傳堯老舜乃攝伯禹不與賢父父復子子一家三千年二乃極之儀三為易真數渾然一推背竟不失故步昨朝遶屋行百匝誦佳句日暮碧雲重褰裳自闔户夢裏遍天下還向家中住偶奇遂無窮總在相因處太極易始圖先天乃心法重重自環中井井皆成八一從孔孟後此幾無人發誰知周與邵千載合符節精窮無餘塵表裏儘通徹青天碧玉樓影壓秋江月太虚道之藴太極道之體象滋本太元氣母託太始維繫復融液有萬皆本此總向此中生㑹向此中死誰作先天囊顛倒不見底我欲包無窮滿貯本然理賦予初無私禀受各分定渙汗出大號有物歸一令羣倫或弗從是乃與天競爾貴非吾心爾富非吾性篤恭恒自盡慥慥言與行窮通無加損靜俟乃安命數有本然差參伍行鬼神乾坤互傾壓氣運潜屈伸遂生無量物乃有不盡人脩短變則殊盛衰化相因向非冰雪姿安得花栁春或欲一死生苐恐理不純元陽首庶物蒼蒼豈正色轉圓開化幾剛健乃天德伊人體其全造命還立極往往欺以誣反復為戕賊還看仲尼處亦是帝堯則乃謂吾不能自暴烏足責屈平窮作問栁州怨為對蒼蒼都不聞自致誣罔罪不周彊為柱杞人漫憂墜無擊復無鏬居然誑茫昧君子惟脩身屋漏極謹畏吾心即吾天炯炯不在外道宰藏殺幾天斷運神武剸割與裁制乃為造物主躁欲生内兵神奇入臭腐撑裂太元體鑽穴成苦窳漫合神農藥枉費女媧補遂成血肉運萬世一刀爼盈盈水中荷郁郁畹内蘭娜娜楊栁春挺挺松栢寒資度與余同生意最可看内恕惟恐傷吁嗟懼凋殘如何被秦人伐木仍赭山又有跖之徒瀝血還膾肝人生㑹有為事物各有義苟非吾所取千駟不一視峩峩君子心磊磊丈夫志泰山輕鴻毛無復顧勢利悲哉患失徒滿目惟富貴䑛痔復嘗糞甘心同狗彘道有本然分立世為大節抑抑卑高陳井井貴賤別昭布作禮經巍峩正人極有位當自守有門誰敢越維世為大綱少紊王政缺端本必正名大哉春秋法姿貌争寢揚髑髏無好醜魂氣忽登殂骨肉歸一朽中心足良好衆美集萬有不與死生俱能同天地乆粲粲含笑人皎皎當窓牖寧知賈大夫還有射雉手丹砂雜青空珊瑚映瑶草瑩美絶雕飾物外天然寶元精赤子心炯炯顔色好淨徹無㸃滓本真當自保光明天地藏萬象跡如掃藹然一壺春䆳古常不老鄰里遞歌哭萬古一死生不知道之常擾擾競衰榮都為利欲驅每被寵辱驚胷中忽成敗堂上生棘荆終朝飽則已胾肉同藜羮十萬下箸難安用志慮盈白楊纒悲風萬象總一丘前哭後還嗟相送何時休君看華堂上幾人能自留為善已無及顧盼驚蜉蝣如何貪生人作孽謀阻脩腐敗不可埋遺臭徒千秋形氣有盛衰魂魄共彊弱志師彊心田天地相旁薄苟為物欲屈消沮不復作精成百鍊鏡躍馬能矍鑠伯有死猶見陰燐雨中著莫讀無鬼論神全鬼自却髙山洩雲峯陸物水必具野草茁獸毛林葉開鳥羽剛柔乗萬變天地一逆數形色毎相因真宰解陶鑄一受不復易妍蚩總天賦更教影問形陶老端慕顧嘗觀西伯易兩兩皆反對初從消内長却向進中退止是一乾坤倍蓰生萬類如何區中人失計即憒憒吉凶互乗除否泰相嚮背富貴爾欲榮貧賤彼何罪重險入坎窞心術乃凌跨靈田初坦平底處藏譎詐都因已弗盡牙角潛締架節節生城府岌岌深罟擭厭然欺一世巖阻無隙鏬誰知方寸間乃解坑天下見邇當應逺知前必念後勿謂苟且已天地甚長乆雖遮一人目難塞萬世口輪囷南箕舌轉幹北辰斗森列甚可畏洋洋在左右克已與不欺此語宜重守市賈争錐刀喘汗忘昏曉夸毗角名塲提踵中忿擾復有欺世徒毎患機穽小易陽反為陰揭本都在杪儘為僞妄没至死心不了焉知無事人獨立萬物表大鵬欲南運北溟待天風龍神九地潛雲氣㑹相從有形皆受制無體方獨通超然謝世塵杳杳遺孤蹤化㝠復神俱進退何雍容掌握起消息孰能為樊籠天地無棄物聖人無棄人大澤生龍蛇原田長荆榛載質遽出疆遑遑告時君有教不擇類善誘皆循循濟衆已所任謀道豈謀身至哉擊磬心中有堯舜仁飲水澹無味顔氏何所樂陋巷并日食至今見蕭索當時一瓢中總是天人學無悔不違仁造道乃獨覺義理泰山重富貴秋雲薄畏匡不敢死襟度何落落通逵有大鼎能函十二牛内可膳千夫外足鎮九州䝉童抱束薪短焰如鬼幽勺水竟不熱誶罵增怒尤力到功自成適逺匪坐謀未行恐有聞千載一仲由乾坤廓奥區衆動自紛擾萬世一寒暑往來幾昏曉兹生顧指間倐忽急飛鳥大人車輪目獨見明瞭瞭斂藏入化宇夐出造化表道德高無極教化今未了一理初不殊萬化各所之室中本無車門外元多岐君子盡在我我盡夫何疑可行吾即行斯乃聖之時屢空仍自樂途窮安足悲為告處世人勿為世塵欺開春桃李花川原發艷陽盡室出綺羅嬿婉衘盃觴太和暢天地晝景方舒長一旦鵙鳥鳴霜露凋衆芳短日頽崦嵫塞向皆閉藏君子法天運行止亦其常鸞皇翥丹霜尺鷃搶枯株知止各翺翔卑髙一何殊精衞苦填海寃憤一何愚鳲鳩不為巢亦自有所居偉哉衡門士高臥一束書曲肱有餘樂不用長者車死生由一陽靜陰存大樸卓午見牆影旭日昇海角焰焰火燎原祗畏水澆潑區區揠苗徒强把混沌鑿黄庭衣朱衣著意皆假合寧知歇心地自有長生藥叔世王道缺斯人絶其綱况復異教祛瞢昧皆發狂陋儒萬口和追逐尤犇忙潤飾借寇兵倒戈蠧天常或者以邪攻出筥復入筐吾将抱六經鑿室深山藏悠悠窮原人極上不及下作計入鬼窟有物皆土苴兩墮歸虚無天地亦僞假終然禍仁義舉世一野馬與物都無情刻忍恩遂寡至今慕髙逺誰是真識者梁折入小成僞妄亂本真為我亦為義兼愛同為仁厥初毫釐差其禍無父君向非大儒辨䘮心幾殺身誰知寂滅術遂使無人倫巍然文章伯詆斥一何勤日出開心窓日入潛水府寤寐不在吾晦顯竟誰主槖籥一往来何處有龍虎癡頑坐徹明瞢暗睡卓午矯揉徒自勞漫使形神苦君看乗化者徜徉樂終古昨夢入高寒御風驂兩鸞扶揺青羅界日下看長安烈烈丹鼎紅紫焰燒肺肝清晨餐玉屑半夜登金壇茂陵一抔土依舊在人間鼓掌為一笑舉世皆面謾夜窺古潭月洞徹天心心滉朗色界異焜燿皆黄金旁有蔚藍叢上有丹桂林倒影下無極湛墜入幽深衝風颯然至波蕩不可尋始知人間世有動皆陸沉隱几罷心官塌焉偶皆喪忽在無生前窅處太古上頃之開内目百骸洞五臟知覺猶有滯尚未都無妄遂加存養功玉宇森萬象造化皆由吾乃見鬼神狀濯纓厭世塵入海求夜光貝闕涵珠宮異色森綺芒采采滿懐袖駕龍登扶桑赤烏驚上天火曜舒乾陽回視乃瓦礫自愧空犇忙書生莫謾愚弊帚安足藏聖域每反觀洞達萬物情知盡理自窮祇是本然明恢廓無滯滛静止不將迎翛然坐乗化皓月滿中庭忽聞鴻鴈來偶聴風水聲秉燭入暗室驚落東牕螢有物莫不由萬古長安道區區往來者總向塵中老年年雨灑清日日風驅掃行人竟無迹涸轍生秋草我欲謝帝閽離居事幽討束載無良辰幾回問蒼昊一念游萬仭塊坐不盈尺片席凝塵埃顧盼竟充斥誰知呼吸間即是一太極有鳥鳴牕䟽唧唧和機織偶然作聲聽出入幾自適但令無錯應萬類等喧寂藏舟泰山巔偶值懷襄流忽從歸墟東直向西海頭洗日復濯月光抱空中樓扶踈散青紅異氣纒九州忽焉閣寒沙佇立令人愁明朝早潮來欲住不得留興感思往事邈若不可及觀化推將来遽覺今為昔今昔本無異至理萬世一不朽惟事業天地共終畢前波復後波日夜奔注急祗是眼前水源深遂無極景晏念慮歇支頥坐看山起來復何為結佩紉幽蘭萬事從悠悠不愧俯仰間舉杯謝塵世月落梅花殘深江總風波天淡孤鳥閒氣數當閉塞我亦方閉闗惟時屬屯䝉患難豈能免南北走孤蓬秋風任飄轉五年一龕燈半世幾詩卷老吟調鬼神深造每懼淺乆為造物惡今日復洞闡無思重苦思甘心向連蹇宓犧地中復唐虞天下泰三王當革命五伯極破壞孤秦龍戰野塗地儘一敗既有昔時寅復到後來亥消長數相因治亂更萬代無為我生初委順從運㑹采杞蕪城古道荒有杞雜荆棘西風結霜腴纍纍綴秋實肥瑩珊瑚珠朱殷明欲滴長條擁寒葉射日光的礫采采置傾筐入手火齊溼歸来奉二親煮茗紅脂泣前秋入新館枯枝倒懸壁冬初半青乳慘淡不忍摘忽憶采杞時樂事不可得隻身對孤叢片影深暝色王事尚稽遲何日共子職陵川集卷五
