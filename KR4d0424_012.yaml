body:
  text: 陵川集卷十二元郝經撰歌詩彭城李師射虎行偃林風色號驚烏山殘樹老虎負嵎將軍躍馬翻雕弧飛電一點金僕姑赤羽飲肉血滿鬚徑欲一撲垂霜顱谷神不靈喑且愚山靈僨死悲狸狐十年一徑無樵蘇一日便使為通衢虐政既革虎害除郡人咄唶為嗟吁歸來猛氣慘不舒勇無所用將賈餘舉杯側坐紅氍毺玉鞭擊碎青珊瑚意欲一舉開八區櫜弓却馬還隆儒作詩問君能從無當路先去入於菟八月十五夜五河口觀月去年燕南醉明月黃金臺上秋風發兩行燕玉笑姮娥直著風神比顔色前年山南醉明月露氣風聲纒玉節甲士撾鼓邊聲雄漢水波翻峴山裂今年又作江南行五河河口澆雄鯨鯨本字舉杯對月月浮動酒浪搖碧金鱗生倣徨四顧天宇豁九州四海一月明誰令此地限南北閧起禍亂拿甲兵人生大抵隨所遇南北東西無定住今宵對月傾金尊便可長吟嚼佳句醉時抱月凌孤風桂苑煙霄快髙步浩歌亂扣白玉盤天上人驚亦何懼不須槌碎黃鶴樓何必翻倒鸚鵡洲大江江頭呼李白我欲與汝蓬山遊赤城城頭搖曵紫綺裘白雲雲邊倒卷蒼玉甌雙成佐酒飛瓊唱不解人間更有愁燭芝行更長燭明對幽獨紫煙青焰噴赤粟燻為芝菌亂炯碎莖葉輪囷花篤䔩珊瑚小樹凝霞腴一片金沙襯紅玉嗟嗟既以明自煎尚有精英結尤物江南江北富貴家喜氣氤氲滿華屋髙燒深夜照紅妝剪落煙花花更出余方孤館交一臂兩國愁添兩眉蹙魚龍慘淡湖山昏風雨飄蕭鬼神哭星芒錯落劒花澀慷慨歌謡動心曲投戈散地三十年殘姓遺黎儘魚肉子亡其父婦亡夫淚䀶更甚銀盤燭不知此瑞胡為來奕奕層層生不足祗應臘盡將回春再立元氣開乾坤發為陽和盟二君億萬性命從今存金蓮夜對承主恩玉虹千丈纒朱門照耀萬古光斯文與世作瑞垂後昆書焦山瘞鶴銘後江流赴海勢莫遏潮頭推山怒噴薄崩崖倒影浴朝日金碧萬丈涵石腳右軍將軍筆如椽擘窠大字銘瘞鶴剸劃造化去畦町六合萬象歸旋斡烏活切意趣宛在結繩前巧寓拙外無心學氣壓江海爭雄深飛動還疑地軸弱年深石爛水波沸鯨鯢淬齒龍礪角書家元氣老欲死濺沫掀濤半斑駮華表空存舊年月胎禽竟自翔寥廓儀真館中三伴使攜來貽我襟宇豁墨粘紙溼帶江霧神采超超勢沉著忽從滄海得遺珠舉目全牛己刲割乃知書法盡本此泝流求源各穿鑿惟餘魯公坡仙得其正永州磨崖中興頌惠州李氏潛珍閣照耀萬古傳脈絡何時摩挲斷石一樽酒揮灑江山卧煙壑坐中還有打碑人直待今年秋水落書磨崖碑後書至於顔魯公魯公之書又至於中興頌故為書家規矩準繩之大匠河朔嘗見三數本皆完好而森森如劒戟有不可犯之色今得此本頗為殘缺既裝褙則反得古中韻勝乃知崖角刓弊本真全露有李白所謂秋水出芙蕖天然去雕飾者尤可賞激也乃為賦詩云汝南昔曾謁公祠霜日皓冽森英姿乃今江館坐牢落奪目忽覩中興碑神明煥若還舊觀義烈凜凜生見之滯氣激起天宇豁快意發冡揮金鎚生平每為二賢惜以技掩節公羲之不阿桓溫止殷浩遺世脫屣終遊嬉平原突兀杲卿死李唐中僨公能持政令二賢書不工隻字片楮猶當竒矧於超凡入聖筆冠冕百代書家師坡仙論書至公止此本於公又其至正筆篆玉藏李斯出筆存鋒兼漢𨽻古硬陵轢瘞鶴銘韻勝韜抉蘭亭記離堆雄峻僅能亞畫贊沉深還櫛比書法至此為絶塵頓覺諸家異端異恢宏正大極遒緊馳騖剛方窮壯麗萬古千秋討賊心二十四城忠義氣惜哉歲久頗殘缺苔蝕潮舂寖磨滅去國幾年似者希滄海遺珠亦竒絶酒酣對酌虎賁郎况乃摩挲是明月斷畫嶄嶄屹斷金倔強常山筆端舌中間剝泐尚含胡慘淡中丞面餘衊載看激裂壯士肝意苦時危將泣血置書勿論撫膺嘆更有何人似公節忠貞端不負巡逺文字尤令重元結只今誰識段文昌世上焉知李希烈終南太華皆可磨後人竟莫墮嵯峨惟餘浯溪青天一片石照耀邃古馳江河誰能與世見此不朽業蕩攘邪穢蠲祆痾再立元氣攎澆訛踵武至德肩元和九原起公吾其歌江梅行江城畫角吹吳霜破月著水天昏黃波澄煙妥林影淡雙梅帶雪橫溪塘此時承平風物盛家家種玉栽琳琅朝來伴使宴江館銀瓶亂插吹銀管霏微香霧入紅袖零亂春雲繞金碗都將和氣變荒寒錦瑟愁生燕玉暖為言儀真梅最多苔花古樹深煙蘿一年十月至二月紅紅白白盈江沱自從天馬飲江水草根齧盡梅無柯揚子人家楚三户今年幸有燒殘樹忽聞星使議和來盡貯筠籠待供具從今江梅好顔色爛醉長吟嚼佳句江聲行雁啼月落揚子城東風送潮江有聲乾坤洶洶欲浮動窗户凜凜隂寒生昆陽百萬力一蹴齊呼合譟接短兵鐵騎突起觸不周金山無根小孤傾起來看雨天星稀疑有萬壑霜松鳴又如暴雷鬱未發喑嗚水底號鯤鯨袛應靈均與子胥沉恨鬱怒猶難平更有萬古戰死骨銜寃飲泣秋濤驚虛庭徙倚夜向晨重門擊柝無人行三年江邊不見江聽此感激尤傷情須臾上江帆欲舉舟子喧豗閙撾鼓江聲漸小聽雞聲慘淡芙蓉落疏雨花蘂夫人詞青城費氏以才色入孟蜀宫後主嬖之效王建作宫詞百首國亡入宋備太祖後宫嘗召使誦詩因誦亡國詩云君王城上豎降旗妾在深宫那得知十四萬人齊解甲寧無一箇是男兒豫感其事故為作花蘂夫人詞花蘂夫人似花蘂氷肌玉骨深宫裏等間蜂蝶那得知惜殺風流蜀天子芙蓉開滿摩訶池月殿香來動風水廣寒却有兩姮娥鬢亂叉橫飄桂子自作宫詞一百首學得晚唐王建體六宫寵愛渾一身太真飛燕親曾比誰知一夜花開了子規啼向汴梁邸始知世上花蘂多一番春去空紅紫榻上真龍方鼾睡絶語新詞不到耳向人更誦亡國詩爭妍忘盡降王恥十四萬人皆男兒夫人宜向蜀宫死二年冬至日湯安撫送梅風吹雪霰日南至銀瓶又插真州梅塵封蠟顆春欲透添水細浴清香回去年擬向西湖看今歲猶然揚子岸燭花相對淡橫斜江靜天寒聽孤雁後聽角行丁未冬十有一月漢上趙先生仁甫宿于余家之蜩殼庵霜清月冷角聲寥亮乃作聽角行以贈其行近在儀真每聞角聲因思向來卒章四句江上舊梅花今夜落誰家樓頭有恨知何事牽住青空幾縷霞便有江城羈留之兆故作後聽角行以自釋云燕南壯士江城客孤館無眠心已折那堪夜夜聞角聲怨曲悲涼更幽咽一噴牽殘楊栁風五更吹落梅花月霜天裂却浮雲散雁行斷盡疏星接餘音眇眇渡江去依稀似向愁人説勸君且莫多嘆嗟家人恨殺生離别可憐辛苦為誰來凋盡朱顔頭半白萬緒千端都上心一寸肝腸能幾截當時聽角送南人南人吹角不送人不如睡著東風惡拍枕江聲總不聞巧蟠梅行金陵檻梅曲且紆松羔翠箸相倚扶紫鱗強屈蟠桃枝藤絲繳結費工夫白蘂紅蕚玲瓏層玉錢亂貼青珊瑚江石細嵌蒼蘚泥百巧直要似西湖盈盈矮矮密且疏北客乍見忘羈孤聞説江南富貴家金漆洞房新畫爐錦簾深垂春自生繞牀羅列十數株清香透骨滿意濃翠袖捧觴歌貫珠開殘不向前村尋送新易舊常有餘細思只是兒童計不是詩人與梅意深江古岸三百樹亂落潮溝遮野渡苔封雪漬硬剟青玉錐半開不開萬里霜風吹犯寒燒酒傾數杯折殘戴了乘月回一天清興詩家梅電白馬行余方丁年喜鞍馬費却千金總駑下忽從河壖得驥子躍出驚湍汗流赭逸足追風名電白電掣騰空一片雪幾回間踏汴梁花半生快意燕山月身如膩玉不染塵面無餘肉腕露筋不驕不惡穩且馴良馬可人如美人顧盼徘徊會人意門巷街衢盡能記繫向垂楊立如睡逍遙布路方半醉恆山堂北曾躍數丈橋漢東事急一踴上山椒臨危赴難每索轡兩耳直欲摩雲霄前年渡江飲血鸚鵡洲今年朝天五千里金蓮花開却飲灤江流忽從監牧羣中過大青小青盡回頭詔令持節南使宋黃金臺前始解鞚儀真夜夜來入夢突兀使我心魄動長星行甲子歲七月一日始見九月十六日沒銀槊萬條日沒酉玉虹千丈月合丑雄雞一聲半天赤太陽欲出星在栁東南勢妥裁氷刀東北迸開驅雪帚行侵熒惑掩太白直從北斗向南斗上相黯慘忽無色上將參差都不守明堂帝坐總茫昧房駟王良欲奔走漸過輿鬼漫兩河渾掃三垣當井口突煙滚滚欲浮動異事驚人古未有初從暵旱忽風雨拔木轟山聲亂吼爾後妖芒忽亘天七月初吉又踰九縱橫凌犯卧復堅自暮至朝長更久五年江館戴片天變故紛紜翻覆手摧心褫魄又見此閉目不敢窺户牖天傾地裂由積釁敗國亡家皆自取吾聞有道必得壽長星勸汝一杯酒入奏行贈千户魏斌天王推恩下寶書龍節玉幣金虎符邊臣喜兵禍二國隂使竪子來相圖七年姦凶緘髓骨故作狼跧期一撲朦人救死趨夜發羣起先尸帳下督拔柵登門強斬關直入卧內殺長官洶湧逆氣噴信函模糊生血撼帳竿魏斌慷慨掉臂入舉頭為城令避賊抱書登墉性命存黑風卷地飛沙石賊徒駭亂各散走館吏嚴兵擁前後倉皇國士幾委地再活還因此人手人心事急方可見平日相看祗見面只今歸國俱入見為君草奏黃金殿整頓腰間大羽箭討賊誅讐為一戰觱栗行昔年燕都賢豪宴我百花樓張觜合吹原缺絶藝象花短管安蘆頭主人捧觴初壽客一聲便作新涼州傾側四座皆寂默清冽揭起嘶蒼虬漸為怨曲凄且幽更有珠裙翠袖揄音赴節囀鶯喉宛如飢鳯來求凰碎挑銀字眉黛羞有時亂敲檀板忽惆悵渾似薊門桑葉秋軒昂悲壯多感激有客淚滿紫綺裘幾年南來坐江館但聞江城畫角聲悠悠昨宵花落啼杜鵑月窗孤影生離憂誰家夜把觱栗吹一噴新聲喚舊愁窅如深江一葉舟髙如楊花春不收忽然掩遏成百折低昂頓挫如有求一絲解將心緒抽挂向燕山新月鈎無情漫激壯士肝中夜坐起涕泗流狠牆嘆危牆濶峻倒插棘四簷抵匝無罅隙東日曬透西日炙周興鐵甕熾火逼置豫此中不許出虐哉狠牆甚狠石嗚呼何時見天日寃鐍嘆重門重鎖禁不開伴使送入不復來鐵簧生澀深金苔沴氣纒結埋隂霾竇中進食當門回咬唇閉目猶疑猜嗚呼寃鐍孰為哀憶寶刀歌生平知己壓腕刀借交報仇燕南豪一從濠梁成隔絶梟獍觸忤狐狸嘷夜夜斗牛多異氣玉虹縈天光燭地幾回夢裏飛入手痛惜當年都廢棄近來館下遇家賊空拳無奈徒忿激撼牀一夜寶刀鳴黑風卷地吹霹靂只今使節猶未回祗應玉琫生青苔何時磊落却在手為我討賊除氛埃陽春怨去年春歸花滿空今年無花酒樽空起來墻頭望歸鴻却見花落千片紅劉郎劉郎怨東風武陵桃源一夢中西樓畫角東寺鐘深閨月落昏簾櫳美人美人隔江水流年暗逐江水東江頭怕見楊栁春楊花飛來愁殺人紅顔落盡花片新黃昏無人淚霑巾舊花被疊凝春塵夢中忽見渾未真隔花半面春山顰恨郎不歸多怨嗔不知兩處同苦辛同是天涯愁恨人幾年心事向誰説花落鶯啼晝掩門别時重約頻付書一字不到八年餘死耶生耶漫嗟吁是耶非耶有還無應言被郎誤殺余豈知郎在空牀居春風滿簾酒滿壺落紅零亂飄庭除不言不飲愁恨俱半睡不睡情緒無杜鵑啼落桃花月紅燭無情泣座隅芳草凄凄春又青階前院後喚愁生隔牆飛花帶鶯聲都因無情却有情強飲不醉愁難醒欲睡不著夢難成一簾斜日堆緑英春風淡沱江無聲楊花茫茫揚子城總是天涯流落情夜來説殺梁間燕一世春愁在此行長歌行為正甫書狀壽髯公子聽我歌歌聲苦長奈若何窮天亘地怨不盡顧視萬古都蹉跎借問怨何事怨我與子久在江之沱嗟子之才世豈多琮璜縝潤琢且磨圭珽特逹正不頗宜在巖廊奉璋峩紫霄絳雲白玉珂翠蕤孔蓋金錯摩論建唐虞開太和突兀磊落不㛪婀髙風颯颯吹明河秋天水鑑冷不波六合表裏盡清徹世塵不到更把佳句哦誰知一旦雜黽蛙翻風豫章蔦女蘿所以歌聲長與子砭沉痾子居河陽縣我住陵川頂子方丁年我知命龍文虎氣心炯炯大才自古多抑塞會當拔起快馳騁金樽滿浸太行影黃河倒卷入天井門前大江流幾度秋風吹我歌聲正長莫嘆猶未歸壯節巉天虹貫日志士豈作兒女悲丁卯冬十二月二十八日修易外傳畢記夢君子道長及夬決聖筆無麟義當絶尋終究尾動精爽黑日入夢寒滿魄頑氷瑩徹轉車輪隂鑑水深嵌屋壁山東日月忽分曜一線微光變䀶迹兩手摩挲冷逼心恍然記悟祗一易韋編斷後二千年故紙紛紛壅南極却從孤館學蠧魚自笑蚍蜉不量力雕鎪太極百萬言破碎乾坤裂肝臆大江粘天硯滴乾風雨滿窗真宰泣邵先生程夫子是聖人能不死平地重成五鳯樓精義入神還有此補遺太平頂讀秦碑岱宗太平頂磨崖與天齊左列則天頌右刻張説辭文采與書法不離近代規漢封宛在周觀東秦壇敻出絶頂西壇前圓平值中峰突兀上有始皇碑年深雨漬百裂餘析作兩峰蹲半規面陽數字仍可辨隙縫重銜苔蘚皮中間隱約見制可完好可辨惟臣斯拳如叉股直如筯屈鐵碾玉秀且奇千年瘦徑益飛動回視諸家肥更癡當時風雨有餘怒豈容夸石獨在兹秖應神明愛尤物不肯轟擊常護持昔年韓文公曽賦岣嶁詩字青石赤皆傳聞漫為咨嗟涕連洏何如親登泰山日觀峰光怪特見絳氣纒金虹摩挲細讀秦相碑天門髙咏來清風乃知山靈不相負夜宿天邊不忍去醉倚雲窗重回顧陵川集卷十二
