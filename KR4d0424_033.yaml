body:
  text: 陵川集卷三十三元郝經撰碑文唐帝廟碑道本於皇成於帝降於王終於霸厯數之運會帝王之統紀在焉孔子贊易自伏羲至堯而止黃帝以下不論曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤言生民之道至堯而後大備始並乾坤而為三則堯為皇之終及其定書斷自堯典高辛以上不論則堯為帝之首於是帝堯上兼皇帝下冠王霸獨出乎震而其仁如天也故揚雄謂法始乎宓犧而成乎堯匪宓匪堯禮義悄悄蓋三皇以來少昊顓頊非不神聖而堯之在位舜相者二十有八載以聖相聖久於其道天下化成治厯象以成天平水土以成地教人倫以成人賞均刑罰以成典去凶庸善以成政然後以天下授舜以德為位公天下之端自是始而命之以中傳其心法以道為統立民之極亦自是始故為帝者之宗一降而王又一降而霸而後德衰故德莫盛於帝帝莫盛於堯宜乎配天而食也自三代以來載在祀典世封其後以崇明祀後世帝王其德弗逮於王有愧於霸而兼皇帝之號往往崇飾淫昏以為大祀而帝之祀闕然不舉漢氏自以為堯帝之苗裔而廟不及焉則亦忘其祖矣唐高祖以內禪法堯號為神堯稱其代曰唐而亦未嘗享於帝立廟乃推臯陶老子為帝以本所出則亦虛其號矣於是陶唐之祀忽諸後之不建而神乏主矣近世惟平陽故帝都有廟存焉中山之永平帝之所生故有廟焉而今則弗存按地志伊祈山堯母所居葬於慶都曰慶都陵又曰望都山一曰靈都山又曰望都堯母之名也故以名山今中山之永平之西水出伊祈口越蒲隂為祈水而州曰祈永平之南有故城曰堯城故有廟有碑言堯生於此永平之東有縣曰慶都而無山永平之西有縣曰唐有碑言堯初封唐縣其故國也有水出於常山之西北曰唐水東合於祈水以是徵之蓋堯生於此始受封焉其母殂落葬之於此及其為帝則都平陽國家不以為命祀帝王不躬親致享國人與居人不忘其德厯數千百年獨能指示其處廟而享之則其德在人之深者可見也永平故中山屬縣金源氏升為州曰完今𨽻順天道歲甲辰監州事蕭侯顒以堯城之廟久廢乃令進士董仲方規故基復為立廟并督其役期年廟成侯率州文武及其故老落而享之經侯之門下士也請碑其事故援李唐張謂虞帝廟例題曰唐帝廟而不名且贊帝德而為之詩庶幾居人識賡載之遺音知為陶唐氏之民焉其詩曰伊祈蒼蒼唐水湯湯神母之邦是降生陶唐曰帝之鄉帝德是昌纂于有皇唐哉皇哉帝道光哉乃聖乃神於戲前王其能忘哉載葺茅茨載築土階尊酒簋二曰蒸嘗哉享于有成曰馨香哉曰雨曰暘帝德惟常哉民無殃哉神豈無方哉廉將軍廟碑將軍名頗趙之良將也當秦人虎吞諸侯趙獨雄山東援韓魏蔽燕齊故秦特忌趙屢加兵邯鄲欲斷山東根柢趙用將軍及上大夫相如秦人畏焉趙重而山東安一旦被讒秦殺趙括坑降卒四十萬秦遂壓趙韓魏燕齊皆事秦將軍乃去趙卒于楚今順天之清苑趙之北邊也西北隅十里而近雞水泛出别為流澮有石梁焉謂之廉梁梁之北有廟在汭之曲初河南亡經自蒲適保往來其間見其遺址沒於荆棘以為荒祠略而不問一日忽為新廟簫鼓闐溢因問之其人曰趙將廉頗葬於此古有廟焉廟之北有墓存焉則梁以姓名廟以爵稱也初將軍以讒去趙適魏趙遣使召之故為健啖以示可用復廢於讒楚人知趙不用迎以為將戰不勝將軍思用趙人落莫而卒今墓於是豈將軍終不忘趙楚人歸之而葬於是耶豈將軍與趙奢自雄北邊有功於民而將軍獨沒於異域邊人思之為虛墓而廟祀於是耶然將軍以一人為趙之安危在趙而秦却去趙而秦肆非止一將亦豪傑之士仲連之儔也觀其勇於為義折節以下相如負荆詣門而謝罪烈烈風度千古不渝宜其英靈在天死而為神廟而世祀也廟之獲成本於權帥府事苑侯終之者其鄰並居民也乃書其事俾刻諸石作楚歌以刺讒告諸神云黃榆落兮刀滿霜朝中山兮墓光狼甲萬騎兮血染裳一夕絶漠兮禽代之王趙有人兮主父為不亡將軍虎步兮國無與強秦人閉關兮弗敢望高壘堅壁以作氣兮期一鼓而奮以驤老寇而壯吾兮中權之良孰知君之信讒兮括為騎劫而貞可傷士卒何辜兮坑死于降趙豈能國兮折棟而壞梁彼譛人兮尚畢翕而箕張猶為頓米肉而示可用兮冀其君之不忘竟不召而去兮卷甲免胄而倣徨客死而莫之歸兮孰為墓于廉之梁魂兮來歸兮將軍之故鄉御李光兮露瓜香斟糯醑兮傾酪漿鼓相如之瑟兮歌慨慷邯鄲無人兮叢臺荒郭開野馬兮祗何方漢義勇武安王廟碑高光以仁義得天下而桓靈失之一時豪傑莫不欲代漢受命比迹高光而祗事於詐力智計土地甲兵獨昭烈帝始終守一仁武安王始終守一義盡心於復漢無心於代漢漢統卒歸之袁氏徒為僣偽曹氏徒為篡竊孫氏徒為偏霸竟不能以有漢初王及車騎將軍飛與昭烈為友約為兄弟死生一之及昭烈取益州留王鎮荆州獨當一面掎角蹙操昭烈進取漢中王威震許洛幾復漢矣不幸而操權合謀以圖王王死而曹氏篡昭烈與飛出師伐權以誅讎飛死而帝崩始則王與飛以死事昭烈終則昭烈與飛以死報王嗚呼仁之至義之盡也王諱羽字雲長姓關氏解梁人起義於涿郡戰爭於徐兗奔走於冀豫立功於江淮而殁於荆楚其英靈義烈遍天下故所在廟祀福善禍惡神威赫然人咸畏而敬之而燕趙荆楚為尤篤郡國州縣鄉邑閭井皆有廟夏五月十有三日秋九月十有三日則大為祈賽整仗盛儀旌甲旗鼓長刀赤驥儼如王生千載之下景仰嚮慕而猶若是况漢季之遺民乎天假之年誅操復漢有餘地矣容偽醜正實繁有徒嗚呼哀哉順天當燕趙之衝而府中之廟二皆庳俯墊逼不稱王之威靈歲丁酉權帥府事苑德於雞水南湖之右創為新廟耽耽奕奕神居巍然初為廟貌並昭烈皇帝車騎將軍及王為三萬戶張公來享于廟退謂德曰廟無二主尊無二上君臣同祀而王侍側如昔享覲不専非制也遂議别為昭烈皇帝廟而王始正南面之位焉己酉秋大享禮畢請碑其事故推本君臣之義以昭不朽仍作詩以侑神其詩曰漢季草澤生英雄王自蒲坂來山東結交四海皆兒童燕南壯士忽相逢義氣許與開心胸樓桑五丈即沛豐破屋半夜噴長虹指天誓日除姦凶萬折不易以死從瞰如兩虎夾一龍風雷蕩天漢火紅誰知京都遽蕪空盡為曹氏妖狐蹤忽爾陷賊當天窮躍馬斬將萬衆中侯印賜金還自封橫刀拜書去曹公千古凜凜國士風跨有荆益事戰攻直指許洛期一戎操如喘鼠謀避鋒權如黥梟示象恭肘腋掩襲有吕蒙遂令大業弗克終飛死帝崩永安宫三人在天義烈同惟王神威地天通血食廟祀仍軍容操骨已朽王爵隆操鬼不食王禮崇作詩頌王興義功願如東坡贊孔融四賢祠碑四賢者何燕賢臣郭隗樂毅劇辛鄒衍也辛亥之秋過督亢至易水投文酌酒弔太子丹聞水汭有祠國士劉鑾所塑技極精巧不知為何神遂往觀之四像皆南面列坐一王者拱其側衣冠極古殆皆周制問諸守祠丈人言祠故有榜曰四賢不知為何代之賢契丹時有題曰樂將軍者亦不知孰為樂將軍也某乃大悟其列坐曰郭隗樂毅劇辛鄒衍拱而侍其側者燕昭王也因為敘其事曰按北燕周文王子召公奭所封至王噲效舜禹事推國于其相子之燕遂大亂齊人伐燕入其國都遷其重器虜其民人幾亡其國齊師退國人立故太子平是為昭王王思得賢臣以雪國恥乃築宫師事郭隗以招徠四方賢士於是樂毅自魏往劇辛自趙往鄒衍自齊往遂以樂毅為上將軍并將秦趙韓魏之師以伐齊下齊七十餘城入臨淄歸大吕反故鼎徙汶篁祀桓公管仲示之以禮不拔莒即墨示之以義燕幾於霸當是之時儀秦方以嘴吻傾軋孫吳方以詐力爭奪孰知春秋復讐之義以仁義為王者之師哉而燕天下莫弱也齊天下莫強也孰知夫仁義之兵能以弱勝強哉獨孟軻告宣王於前樂毅佐昭王於後天下始知仁義之無敵燕有國以來七百餘年矣世服事於齊晉今乃一戰勝齊而以秦晉為屬遂雄七諸侯又知用賢之功有如是者易曰履信思乎順又以尚賢是以自天祐之吉無不利昭王有焉其後樂毅父子大顯於燕趙俱為封君郭隗之事不復見劇辛事業亞於樂毅鄒衍又能著書以明律吕之本及終始五德之運漢以來大行於世嗚呼以昭王之禮賢四賢之不負昭王君臣之義師表百世世祀於燕宜哉遂作思賢之詩以遺易州守郭公俾刻諸石仍大署四賢字俾榜諸祠以識之其詩曰督亢之坡易水之滸臺平樹古昔賢何許有祠遙遙塵暗香銷廟貌肅然想見燕昭臣乃嚮明君猶北面敬賢若兹豈惟一戰仁義之師幾及三王世言管樂於仲有光當時九九今何足數不用如鼠用之如虎冀北多馬材皆日千世無燕王斷鞭不前人有黃金裝飾子女士皆餓死可憐黃土燕國之金盡在一臺宜乎諸賢莫逺具來為告邦人勿乏其祀庶幾永世賤金貴士爰想燕丹乃用荆卿不得秦城遂傾燕城君臣道合千古是仰師臣者王視此遺像羑里周文王廟碑相之南屬邑曰湯隂去朝歌五十里而逺故殷紂畿內地也湯隂之北道右有古城圮復之餘猶峻絶屹然以其隘小而逼故土實其中幾與堞平乃紂拘文王羑里之庫也前有文王廟祗存數楹一碑斷碎不可讀然過者望望必披荆棘拜謁咨嗟而去莫不尤紂之凶閔聖之厄於是屬諸相臺總管蕭侯使新其廟以朂斯民善善惡惡之心重為序其事曰昔有殷既錯天命受熹毒逞戾殺九侯醢鄂侯西伯聞而竊嘆怒而拘之羑里西北乃推天命重卦觀象繫辭設戒恭畏警省益篤臣節七年諸侯皆從之囚受始歸之於是天下不直受而共起亡殷嗚呼三分天下有其二以服事殷而不二七年拘繫畏罪自責而不校以憂患作易反身修德而不怠此文王之所以聖也或謂文王在羑里使閎夭泰顛等以賂悅受而獲免及受命稱王者皆妄説也若然則其於天下有意於得失非所以為聖也韓文公作拘幽操謂為小臣畏罪兮天王聖明可謂知聖人之心矣銘曰嶪嶪垠土兮至今崔嵬適以彰聖德兮驅天下之歸易之多戒辭兮憂世之衰而繩已之違不入于朝歌兮吁嗟乎羑里之祠周雖舊邦其命維新廟其可不新兮齊太公廟碑齊有兩太公薑姓四嶽之後國于吕遂以國氏太公其後也當殷帝乙及紂虐亂聞西伯善養老而歸之釣于渭濱以俟天下之清西伯畋而遇之載與俱歸使佐理其國時年已八十矣武王即位尊為尚父而師事之稱師尚父遂并將八百諸侯之師誅紂救民周有天下遂為太師而封之齊五侯九伯得専征伐而在周召之右及薨葬於周子丁公伋嗣復相成康五世皆葬於周齊以其始受封之君稱為太公廟為始祖而世祀之至桓公為五霸首尊周抑楚王室賴以復存是為薑齊之太公當陳禦寇之亂公子完奔齊其後為田氏又以國氏稱陳至田常専齊周安王命常之孫和為諸侯滅薑齊而代之及卒亦稱太公至威王僣號稱王後為秦所滅是為田齊之太公齊人以薑齊有大功於天下故不祀太公和而特祀周太師太公由漢迄唐廟享於故齊都臨淄以故薑齊祖廟尚不絶唐開元間又特立太公廟于京師以名將留侯等十人為十哲配享其後又進爵為武成王號為武廟禮秩與孔子廟同宋金以來遂為大典金亡而臨淄之廟廢今大行臺李公總統山東淮南道開府于益都東海西河穆陵無棣四履盡在統內遂於臨淄復立薑齊太公廟請碑其事為之論次云夫太公聖人也其相武王伐紂救民亦一伊尹也詩曰維師尚父時維鷹揚亮彼武王肆伐大商會朝清明特言其功烈之美而不言其所以聖至武王既受命進丹書謂敬勝怠者昌怠勝敬者亡乃見其所以聖者其言舉於緝熙敬止敬之敬之天惟顯思不顯亦臨無射亦保相在爾室尚不愧於屋漏等共為周家心傳家法以受天命而維王統同夫堯舜之允執厥中惟精惟一兢業之道聖之事也故孟子謂若文王則聞而知之太公則見而知之知之者何知堯舜禹湯所傳之道也知堯舜禹湯所傳之道而為文武師臣非聖而何後世兵家者流乃以六韜書為太公作皆隂謀狙詐功利之説謂以是佐周取殷而埒於孫吳嗚呼豈知太公者哉後世又推為武臣之首而與起翦並以一將待聖人則又誣太公甚矣武成之號公有所不受也故不書繫之詩載揚公之所以聖以侑神云渢渢乎大哉齊之風乎表東海者其太公乎顯與西土而國之東乎不顯惟德祗稱其功乎敬勝乎怠神道之充乎心存不忘堯舜之中乎乃武乃文聖德之同乎於乎不能忘三代之隆乎涿郡漢昭烈皇帝廟碑王統繫於天命天命繫於人心人心之去就即天命之絶續統體存亡於是乎在觀漢氏之三起三滅民到於今稱之廟食血祀於興王之地越千歲而不忘者可見也夫有仁民之誠心上通於天而下固結於民雖欲舍之而去天與民弗舍焉不篤於仁不誠其心一以暴戾詭偽驅民而力爭之自以其民為已有而民視之為巳讐縱一時或得則必失之昔秦之暴甚矣髙帝寬仁愛人聖度豁如而得人心留侯自留從之以為天授義帝諸將推為長者使之入關除殘約法秦父老爭持牛酒惟恐不王雖避楚王漢天與民弗舍卒一天下受天命纂承三代之統莽之偽甚矣光武仁厚英明推赤心置人腹中而得人心鄧禹仗䇿而求見耿弇倡義而來歸馬援以為帝王自有真遂留而不去雖避更始留河朔天與民弗舍卒復漢祚而大一統操之暴則如秦而其偽則甚於莽復有項籍韓彭之智力盜有漢祚隂畀之丕偃然自以為無漢矣昭烈以遐胄遺孤有大志尚義烈與人誠盡堅忍自強一時推為英雄尤得人心關侯張飛熊虎之將恩同骨肉諸葛孔明伊吕之佐而為之用雖逼于操忌于權奔走于二袁身無所歸而所在民輒歸之尤篤於君臣之契顛沛之際信義愈明掃境以復關羽之讐身死而無憾遺命孔明謂孺子不可輔則自取至於不負劉荆州哭墓而去當陽長坂不忍棄民勸於座襲劉璋以為當與操如水火及其屬纊自謂德薄皆古之賢王所難能髙光之所無有故曹氏雖據中夏祗為僭偽天命王統卒在昭烈嗚呼高帝光武昭烈三君傳一誠心歸之於仁作漢命脈以為統體維繫中國始則造漢中則復漢終則存漢幾五百年涵浸深浹固結民心至今不忘在所廟祀秦楚莽操之後卒皆無聞仁與暴誠與偽之徵昭昭矣沛豐邑之高帝南陽之光武涿郡之昭烈皆為帝里故其廟祀尤甚涿故燕國也古多豪傑之士歌謡慷慨借交報仇遺風尚存每言曹魏篡漢之事莫不欷歔流涕想見昭烈君臣父子之際仁厚灑落藹然三代之風故其祠下拜謁而致奠者朝夕不絶其歲時祀事合沓走集不逺千里指示樓桑故居倣徨不忍去故其神靈赫奕又有盛於沛豐南陽焉廟在涿郡南十里而近自隋唐五季遼金以來皆即故居代為增葺其正殿當中山靖王之後昭烈之諸父祖墳園其神室則昭烈像設衮冕南向其佐命將相則列於兩廡左則諸葛亮龎統法正許靖右則關羽張飛趙雲馬超位序崇敞有法制焉廟又有碑金翰林應奉王庭筠詞推明昭烈之志論義文采近世所無然猶題為先主名號有末正焉按春秋左氏傳稱先主者大夫稱其先大夫之辭生則稱主沒則稱先主非帝王之號也魏晉私計以昭烈父子為僣偽故稱蜀不稱漢以昭烈為先主安樂為後主至陳壽作國志即以漢統與魏使昭烈父子與劉璋共為蜀志其後著書者皆以魏為正統惟宋司馬光更蜀為漢初曰漢中王即位曰漢主崩則曰漢主殂追稱則曰漢昭烈帝而亦不以正統歸之至建安朱熹始奪黃初之統以章武繼漢漢亡始為魏夫高帝以寬仁得人心開漢統光武以謹厚得人心復漢統昭烈以信義得人心存漢統故魏篡漢之始昭烈以為天下不可遂無漢傳序在已故即漢中王位及魏遂代漢廢漢帝而幽之乃即皇帝位于武擔之南正名定分聲罪致討及崩而畀之孔明使復漢卒事其中興功烈雖不逮光武其出師誅讐纂承高帝之志揭示漢家神靈震竦姦偽若天假之年必拓定中原如建武之際矣且與光武皆漢子孫豈容神器之他歸而獨不與其統稱大夫之稱乎或者又以為族屬疏逺不能紀其世數名位猶宋高祖稱楚元王後南唐烈祖稱吳王恪後此又從而為之辭者也後世之致疑未若孔明之傳信初昭烈見孔明即曰今漢室頺傾姦臣竊命孤不度德量力欲信大義於天下即以復漢自任孔明即曰將軍既帝室之胄信義著於天下又曰霸業可成漢室可興為帝胄使興漢室當是之時莫不以昭烈為漢帝曹氏為漢賊豈至於後世而欲以一已之私反之哉故為推本漢氏家法心傳統體所在正其名號曰漢昭烈皇帝榜其殿而碑諸廟再歌義烈系之以詩詞曰高祖造漢拯民塗炭世祖斟難民適思漢兩都二祖垂四百年昭烈之興死灰復然難於二祖百折不沮倉皇奔走衆才一旅豈弟仁厚民心是歸必得國士乃可有為既挾熊虎復起卧龍電掃漢南雷震江東蹙操脫吳據有梁益遂取漢中興王立國高皇之起始實在此拓定中原貽于孫子漢賊不並顧豈偏安丕豈其敵誅讐弗難天不假年僨軍崩殂不能致討還于舊都顧命孔明伊周之事不私其子天下大計琅琅格言朂以為善三代君臣乃今復見宗臣流涕效死出師遊魂倀鬼折敗不支崦嵫返照有光屬天既絶之統復一再傳三君一仁三起三滅廟食帝里至今不絶燕山之陽涿水湯湯篤生異人復一高光杜鵑不來桑猶在寢刻詩廟門萬世是諗漢丞相諸葛忠武侯廟碑以天下自任佐王而行道濟時伊尹也以天下自任無王而不能行道濟時孟軻也以天下自任佐王行道不能盡濟斯民不盡其用諸葛孔明也伊尹之佐王而行道孟軻之無王而道不行皆判一定無復於憾至於孔明以王佐全才立政於區區庸蜀不能疆理天下完漢故物制禮作樂比隆三代以節制之師祗平雍闓禽孟獲馘王雙斃張郃不能汛掃中原討魏黜吳翦操虜懿方雜耕固壘敦信明義張漢天聲信九伐之法而遽隕星嘔血與道而不與命與之才而不盡其用是以有志之士莫不痛哭流涕而致惜焉嗚呼唐虞三代之盛孔子歎其才難而僅稱九人至孟子則又獨與伊尹一人為聖之任何哉蓋士不能自重則不能任重不能輕天下則不能有天下伊尹耕于有莘之野不以道義繫馬千駟祿之天下不顧三聘而起遂任天下之重一夫不獲若撻于市放夏桀廢太甲一以天下為計已獨任其責故為聖之任也孟子為稱道則亦已之志也當其時中國無王有王者起則必為伊尹之事行道以救天下故每自謂天未欲平治天下則己如欲平治天下舍我其誰若齊能用豫則豈徒齊民安天下之民舉安以齊王猶反手也又謂萬鍾於我何加焉富貴不能淫貧賤不能移威武不能屈乃為大丈夫則亦伊尹之儔也故伊尹而下以天下自任者孟子一人漢室傾頺羣雄競起天下之士莫不徼幸功利反復於智數詐力汲汲以爭天下獨孔明高卧南陽抱膝長吟視天下不足為躬耕隴畝若將終身焉則亦伊尹耕莘之志也及昭烈三往知其仁誠敬讓可以有為遂起而委質焉則亦伊尹幡然而改也既從昭烈慨然以興復漢室為己任及永安顧命則曰臣竭股肱之力加之以忠貞繼之以死則亦伊尹佐太甲之事也至於內治既修將以外攘以圖報效臨發上疏精忠懇盡藹然三代君臣復見伊訓太甲之書其將兵薄伐出入巖阻一以節制不為浪戰申明賞罰開布公道不規近利恢張逺圖秦漢而下復見王者之師其駐兵五丈原懿終不敢出則己定勝至其臨沒懿按視營壘亦歎服以為天下竒才則孟子以來以天下自任者又祗一人耳論者乃以為自比管樂蕭曹亞匹將略非所長又謂不當復漢不可以詐力雜仁義去中原入巴蜀非其地當如陳平用金間魏君臣或者又以魏為正統而書伐罪之師為入寇嗟乎孔明其可若是班乎乃以是竒孔明而又以是責之乎豈真知孔明者哉初昭烈即漢中王位以孔明為軍師將軍及繼漢即帝位遂以為丞相安樂公即位封武鄉侯領益州牧及薨諡曰忠武魏晉以來既以昭烈為蜀先主乃書孔明為蜀相至於杜甫甄别題評號為精當亦仍蜀相之名今既正昭烈之號而碑之涿郡樓桑之廟復正孔明位號曰漢丞相諸葛忠武侯則君臣統體皆得其正推本論著碑之配享之廟庭作歌以悲其志云季末汨於功利兮咸跋蹶以顛躋苟無益於已兮則並其民而棄之士氣日卑兮任天下之重者其誰莫不欲臣其臣而莫豫違兮孰能以臣而為師莫不患失而欲得其君順而弗違兮而甘妾婦之為治弗逮於古昔兮皆苟且而詭隨漢室傾於桓靈兮薄崦嵫而日益阽危姦渠偽魁羣起兮閧為力爭而竊窺或豺狼以肆毒兮或狐鬼而誣欺不以為羞而助桀兮自以為是而不知其非獨之人高卧而不起兮若太山之四維雖不足以有為兮胡淟涊以自脂王室乃有遐孤兮逼無所容而民莫知歸三往乃見而益之以恭兮沛然龍起而夾之以飛以復漢自任兮吐胸中之竒君臣之契灑落兮相與撥亂而興衰顧命而托國與子兮涕泣而以死繼之伏義而討賊兮雜耕按堵而軍無私反正而抉偽兮還舊都而有期巍然聖之任兮將越孟而配伊天不假年兮忽隕星而反旗志士莫不痛惜兮至今以為悲嗚呼噫嘻使侯不死兮禮樂其可興三代其庶幾兮不侯之知兮侯其可幾有格天之才兮以造命有佐王之略兮以濟衆有不可奪之節兮以輔政有不可窮之智兮以應變有必信而不可屈之義兮以誅仇而匡時成敗利鈍畀之天兮一不動於中而死生以之處世而磊磊軒天地兮其道淳曜而無疵俾萬世之敬仰兮視此麗牲之碑陵川集卷三十三
