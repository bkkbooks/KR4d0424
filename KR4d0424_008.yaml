body:
  text: 陵川集卷八元郝經撰歌詩白溝行西風易水長城道老濘查牙馬頻倒岸淺橋橫路欲平重向荒寒問遺老易水南邊是白溝北人為界海東頭石郎作帝從珂敗便割燕雲十六州世宗恰得關南死點檢陳橋作天子漢兒不復見中原當日禍基元在此溝上殘城有遺堞歲歲遼人來把截酒酣踏背上馬行彎弧更射溝南月孫男北渡不敢看道君一向何曾還誰知二百年寃孽移在江淮蜀漢間歲久河乾骨仍滿流禍無窮都不管晉家日月豈能長當時厯數從頭短日暮途窮更著鞭百年遺恨入荒煙九原重怨桑維翰五季那知魯仲連只向河東作留守奉詔移官亦何疚稱臣呼父古所無石郎至今有遺臭賢臺行古黃金臺也土人稱為賢臺髙臺突兀燕山碧黃金泥多土猶溼曉日曈曨赤羽旗燕王北面親前席費盡黃金臺始成一朝拜隗人盡驚誰知平地幾層土中有全齊七十城禮賢復讐燕始霸遂與諸侯雄並駕七百年來不用兵一戰轟然駭天下二城未了昭王殂火牛突出騎劫誅臺上黃金少顔色惠王空讀樂毅書古來燕趙多竒士用舍中間定興廢還聞趙括代廉頗敗國亡家等兒戲燕子城南知幾年臺平樹老漫荒煙莫言騏驥能千里秪重黃金不重賢古菱花鏡詞燧人燒殺太古月化為片銅藏死魄噎光沈曜解反照黑潭萬丈生虛白蛟龍遁去不敢藏髙秋無波更澄徹徑圍數尺透膽寒一身忽入空明穴背紐深嵌邊如刀周圍菱花纒枝葉毫髮縈回印水紋朱砂翡翠編鱗甲不知世上幾千年依舊團圞無壞缺百煉得道遂不化又作爐中一太極寢揚寧陋各成形焉用區區強裝貼一略精神隨臭腐眼前脂粉墓中血菱花鏡裏都無物瑩淨圓平本顔色等間棄擲漬苔蘚未免昏翳人不識忽為磨洗開玉井孤電繞手明月璧蔀屋褰開有神物挂向青天照白日皎然盡見不欺人魑魅魍魎焉敢出壽福蓮花空自名不須倒影尤竒絶藜杖行家君命作荒藜一兩青墻隅數莖拗深勢扶疏柯葉張磔忽過墻赤絲綰結緑珊瑚雨餘霜重凋傷後瑩節髙肥幹枯瘦斷截為杖徑且堅黃玉壓手光欲透更將月漬晞朝暾潤滑隱隱分細紋家君垂老添數僕馮藉看月復穿雲倚牀半夜風雨怒只恐飛騰作龍去乃為作詩重相告從臾少陵桃杖句天生此杖向吾家再起衰宗振國華會當拄到太行頂指點千年墓上花剗除蕪穢重灑掃橫膝琅琅過庭教搘傾拄壞植孔孟永使子孫扶聖道蔡江月歌郎山五季稱孫姑兵家洞逹握化樞遂令方諫擁節旄南振趙魏北燕都爾來燕南道術髙往往卓犖動星閭晚金乃有蔡江月採桑神授青衣書歸來了髮辭姑嫜脫去帉帨投叉梳便向牀頭尋紙筆揮灑萬字紛瓊琚夫壻瞪視不敢詰鄰里環矚皆駭吁為言諸人當避兵西山岡頭是我居未幾雲衆四逺集豪傑望風皆奔趨指授方略無不中權謀每笑孫吳踈嘗將勳業論諸將指示張公都不如名髙兩受紫泥詔道重六屈金虎符留道澗賈瑀靖安民張甫武仙今萬户張公皆嘗師事之金宣宗下詔賜號江月真人事平笑傲作天仙緑眉粉面堆翠鈿絳襦青帔玉冠佩插花吟諷香雲纒繡帷深處説黃庭碧桃隱映燒丹煙篇章不似婦人語磊落見道參幽玄異人異事會當傳為學韓公稱道謝自然誰與刻向西郎巔姑姑堝音戈邊玉劍前天賜夫人詞八月十五雙星會佳婦佳兒好婚對玉波冷浸芙蓉城花月搖光照金翠黑風當筵滅紅燭一朵仙桃降天外梁家有子是新郎芊氏忽從鍾建背負來燈下驚鬼物雲鬢欹斜倒冠佩四肢紅玉軟無力夢斷春閨半酣醉須臾舉目視傍人衣服不同言語異自説成都五千里恍惚不知來此際玉容寂寞小山顰俯首無言兩行淚甘心與作梁家婦詔起髙門榜天賜幾年夫壻作相公滿眼兒孫盡朝貴須知伉儷有緣分富者莫求貧莫棄望夫山頭更賦白頭吟要作夫妻豈天意君看符氏與薄姬關繫數朝天子事緑珠詞石郎癡騃誇多財三斛明珠買禍胎墜樓獨有一緑珠緑珠不負三斛珠君不見息媯無言生成王西施歌舞向五湖水流花落金谷園土花零亂埋花鈿娼女笑殺真女憐欲著明珠三百斛金谷園中買玉谷朝雲詞章惇不愛東坡睡再著罪名投海外骨肉故舊但哭送朝雲請行了無畏朝為行雲暮為雨朝朝暮暮珠崖下為憐國士奉巾櫛秃髮無眉都不顧海南又甚大法場春淺愁深不可當一夜東風掃落花為賦海棠空斷腸三作埋文盛德事掩淚無言志王氏文正清獻及張公地底雄文還有四君不見世間多少回頭人舊花摘却繫新裙癡哥癡哥笑朝雲翻手覆手江上雲讀鄉先生劉景玄碑太行元氣果不死弊世有此魁傑士胸中羅列世間書泛異窮竒無不至嘗借莊周十日還成誦未嘗遺一字萬言默識殆片時記問區區總餘事詩文清雄簡且髙濶步不讓坡谷豪散談四座誰敢言橫膝搖吻獨滔滔未見皆如汲冡竹劃開砉若并州刀超遙孤風送行雲爽朗夜月虛秋濤初欲有為下天井寡鶴遂把霜毛整時危事去可傍人清露滿天還自警終不一到當塗門回視俗子徒紛紛洛城西南有佳處竹間水繞梅花村此中儘可嚼佳句笑傲煙霞有深趣著書藏山不示人坐看石田生老樹九臯清唳誰不聞海內至今揚清芬鄉閭晚生不及見掩淚空讀遺山文讀麻徵君遺文太初百煉透光鏡突兀心魄無氛埃神姦遁伏徹膽寒日月分曜乾坤開一詩拈出託怪銅挂向青天白玉臺陋儒效顰不敢視一世盡服瑰竒才豫時髫童誦黃口似為古人今未有忽從亂後得遺文磊落從橫百餘首就中不獨此篇竒黃金滿籯珠滿斗髙古遠探秦漢前奧雅要繼詩書後正大初從孟及韓新澀却將韓變栁金源百年富詩文伊洛一𣲖獨徵君説易不肯坐臯比公卿大夫日盈門工夫詣理全道技日薄崦嵫終隱淪嗚呼一鏡􅑁渺茫血食肉漬莓苔昏我欲重磨扣帝閽虎豹呵禦不得聞魑魅魍魎忽成羣湖水來枯風怒遏長川回兩湖五月生黃埃水晶宫碎洲渚出昆明老火飛狂灰魚龍錯落半生死乾坤枯稿無雲雷海鯨怒抉海眼破濤頭一箭湖水來新聲汨汨入黑壤寒虹矯矯收蒼霾鷗鳥靜盡波不起澄清無瑕玉鏡開浮光四動青雲第倒影半浸黃金臺何當乘興呼太白棹歌長入琉璃堆滿船明月露華冷翠綃銀管飛瓊杯梨花曲春風羅綺傾城出踏破一川生恨緑競堆芳樹占春光海棠癡睡夭桃俗梨花兩株最幽妍姑射風神素娥骨微光半展兩三葉弱蒂相扶生一簇膩粉攢攢青淡淡纎纎翡翠輕輕玉開樽徹幕對芳姿一時英俊皆潘陸辭鋒席上戰珠璣談藪胸中湧川谷肝腸爛漫發天藏滔滔濯洗澆醽醁虹霓萬丈氣相許削去町畦開窘束或如磊磊搖孤松或似森森掃秋竹或如赤驥奔長風或似蒼虬起幽窟歡成氣合花亦喜舞殺微風香蔌蔌疏隂浮動酒杯中一吸霜魂清滿腹緑鶯飛來隔花語花間似聽飛瓊曲卑枝拂面不忍折醉眼髙橫看不足所恨此花不解語與説瑶池舊追逐又恨此花不解飲共醉廣寒宫內宿最憐人散月玲瓏玉容寂寞還幽獨題琴戚先生畫像齊人善瑟王好竽逵也豈效伶人趨歸來坐石樓長裾突兀天地為蘧廬王門有路多塵土封豕磨牙鬭虓虎何如此曲不須彈風入長松鳴太古聽角行贈漢上趙丈仁甫疏星淡不芒破月冷無色千年塞下曲忽向窗中得當空徑作六龍嘶四海一聲天地寂長呼渺渺振長風引起浮雲却無力此聲誰謂非惡聲借問何人有長策漢家有客北海北節毛落盡頭毛白聽此空令雙淚垂中原雁斷無消息南枝越鳥莫驚飛牢落天涯永相失江上舊梅花今夜落誰家樓頭有恨知何事牽住青空幾縷霞蜀亡嘆贈眉山唐仲明子規啼缺峩嵋月嘉陵江中半江血青天蜀道為坦途馬蹄蹴落隂山雪芙蓉城碎朔風急虓虎磨牙綺羅穴不識兵戈三百年疊鼓一聲肝膽裂小臣鬭死尚南首大臣見殺猶望闕漢家陽九厄再逢忽焉王氣西南絶孔明廟前老柏死四賢堂上英靈滅愁雲深連白帝城哀湍逺瀉瞿塘峽坡仙玉里子西孫挺身北走來中原峩􅡠秋色橫眉宇骯􅗣獨倚燕市門時望蘇樓一回首漠漠萬里煙塵昏古言蜀險甲天下一夫扞禦足成霸前劉後李王復孟虎視中原雄並駕于今底事谷為陵錦城萬里趨龍庭當時不與秦塞通一天自可延千齡吾子莫漫嗟飄零厲階權輿實五丁仲明初被俘鬻於燕市自言子西孫且道陳侍郎被執不屈朝服望闕自盡賢王課端為立祠事安陸趙仁甫作疏鳩資贖之疏中有云錦江秀色都為巴蜀之蕭條玉壘浮雲盡入峩嵋之悲慘余讀而傷之故作蜀亡嘆畀仲明為行劵云西郎吟上左副賈侯西郎峩峩秋凌空萬壑秋氣丹霄通翠蟠燕趙一千里蒼束刀巖十二峯壁立不讓恆山雄顔行欲過東海東老鷹南來駕黃隼結巢便入山靈宫羽毛不鎩爪距禿肅雲慘月驚長風巨靈雖為重御護湫穴幾為修蛇訌音洪相君巖巖西郎秀夀與西郎髙不朽老鷹黃隼正吾儕亦賴恩靈庇黃口黃金臺上秋風髙會當凌風快鴻毛為公摶擊驅雲䬞懷素青簾鬭將二帖歌青布髙垂誇美酒醉僧扶書賖幾斗朝朝挂向長安市行人看書不飲酒唐家既滅酒家亡青簾草聖千載後瀚海西邊唐將鬭將軍揮戈虜連彀當時本自説戰功却使醉僧誇好手筆勢更比青簾雄常山長蛇救尾首賈侯愛玩看不休不肯插向萬卷樓壁間一雙嶽湛璧灑落神俊懸清秋見我酒酣使題評快飲數鍾澆枯喉為説草書秦漢間變出楷𨽻蓋有由但存妙處遺土苴縱筆自如成鎖鈎大巧既窮出大拙作者每向無心求所以顛張醉素嗜酒能出竒放浪縱恣隘九州天矯騰蛟龍峻利森戈矛婀娜春樹花蕭颯秋江鷗兔起復鶻落雲行溪水流神聚精不散抉怪還撑幽都非有意舉自然所以超凡入聖直與造化侔陶然以酒寓天趣一著直在最上頭莫言只作醉僧圖君未得醉方隱憂一身纒縛萬古愁焉能浩浩復悠悠侯乃大笑言君更飲數甌壁間又添珠一斛三帖使我子孫收再飲陵山春滿城山城好風土土厚人淳樹木古陵山倒壓西南城山泉白重如鍾乳山家釀作陵山春春波滉漾紅蓮府朝朝撾鼓獻大捷醉殺張公萬貔虎豫年甫童監榷酤直向山根置官務涸泉為酒酒如泉潮沸雲蒸日傾注撥開醅面漲霞腴輕膩鵝黃湛玉湖石泥大白不動聲米脂浮顆泛金酥清香插腦甚酷烈冷飲頓覺詩腸熱萬卷強將一斗澆春入四肢紅兩頰詩腸自此為酒海痛飲髙歌忽千載昨來夜燕秋月堂風味依然渾不改只無山色與泉聲滿耳笙歌不欲聽何當揭甕看濁清一吸春泉快渴鯨不須注金仍注瓦醉卧婆娑古槐下長歌哀李長吉元和比出屠龍客三斷韋編兩毛白黃塵草樹徒紛紼幾人探得神仙格青衣小兒下玉京滿天星斗兩手摘胸中旁魄銀河湧驅出鱣鯨嗔霜雪逸氣似與秋天杳辭鋒忽劃青雲裂剸空一劍斷晴霓齊梁妖孽皆泣血上帝俄驚久不來恐向塵寰覆迷轍赤虬嘶入造化窟千丈虹光繞明月人間不復見竒才白玉樓頭耿孤潔自此雄文價益髙翠華灼爍紫霓掣我生不幸不同時安得從衡騖清絶思君嶽嶽矯首立扣破玄關天地寂忽驚鳯鳥入寥廓恍惚渾疑見顔色車聲嘒管縹眇間亂霞顛倒無蹤迹六龍驤翼夾秋日神鼎俄空鉉華碧丹霄盤礴冠元精縱有新詩招不得煙凄凄兮鎖瑤臺望王孫兮去未回瑛瑛玉樹生瑤階有瑶花兮花不開仰天三嘆天無語萬里長風酒一杯壽元內翰秋風颯颯吹庭梧長庚吐焰橫太虛遺山先生曳長裾醉鞭黃鵠來天隅蹴開化窟肆搜取玉斗倒瀉明月珠九原呼屈原底事為焦枯青雲問李白佳句今何如百年元氣一杯酒千丈光輝萬卷書髙卧一曲歌聲價百硨磲雲璈宫徵奏玉宇春鶯花桞鳴天衢惜哉時不與命偶西周削弱為東都明堂一柱入樵採安得致主為唐虞遺山山頭有舊廬歸來亦足為歡娛既有墮地風雲之驪駒又有竹花弄語之鵷雛仰天一笑萬事足倒騎箕尾遊蓬壺辨磨甘露碑國賊反城自為功萬段不足仍推崇勒文訟德召學士滹南先生付一死林希更不顧名節兄為起草弟親刻省前便磨甘露碑書丹即用宰相血百年涵養一塗地父老來看暗流涕數樽黃封幾斛米賣却家聲都不計盜據中國責金源吠堯極口無靦顔作詩為告曹聽翁且莫獨罪元遺山陵川集卷八
