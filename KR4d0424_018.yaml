body:
  text: 陵川集卷十八元郝經撰論五經論并序邵子曰昊天之四時者春夏秋冬之謂也聖人之四經者易書詩春秋之謂也昊天以時授人聖人以經法天是則四經也謂之五何哉其一則禮樂也夫論性者言四端而不及信序五行者土配王於木火水金故易書詩春秋之間禮樂為之經緯雖五而為四也惟齊非齊竒耦錯綜所以成變化而行鬼神乃作易書詩春秋禮樂論易盡天下之情者詩也盡天下之辭者書也盡天下之政者春秋也易也者盡天下之心者也昔者聖人之於詩書也刪定之而已矣於春秋也筆焉削焉而已矣其於易也則上下數千載歷四聖人焉或畫焉或重焉或辭焉不敢率易而備為之沒齒刳心焉始就于一端而已何獨如是之艱且逺也蓋顯天下之至神必待天下之至聖探天下之至幽必待天下之至明况於以天下之至神於天下之至幽而為大經大法也哉非至明者與至聖者迭興繼作艱且逺而為之則不能也所謂至神至幽者何也凡天下之物非主不立無精粗巨細大小皆有主焉者一户之闔闢主之者樞也一裘之裼被主之者衽也一鐍之啓閉主之者鑰也是物也而猶有所主夫仰而目之蒼蒼然俯而足之廣且厚者昭然而往來而為晝夜者粲然而麗天晝隱而夜顯者起於青蘋之末怒於土囊之口而撓天下者藹然而遍空殷然而驚世油然而潤物突然而高沛然而就下者薈蔚蔥鬱而夭且茂翼焉飛雲蹄焉走陸者而其中有黔首而橫目衣冠而飲食有男女夫婦之别父子兄弟之親君臣上下之分化化生生無時而已焉者是至大而至衆也主之者果何物耶唯其所為者至顯故其所主者至幽其所造者至妙故其所主者至神索之而不可得也聽之而不可聞也視之而不可見也浩浩乎其無津涯而無畔岸也漠乎其無紀極而無朕兆也搏之而無迹語之而無徵也於是衆人之中有聖人焉曰吾民之性甚善而其智甚靈也是不可與草木並朽而無知焉乃盡已之心推而盡天下之心假天地萬物畫而為卦以垂道之統明夫所以主之者至矣盡矣不可以復加矣衆人之中又有聖人焉曰吾民之情甚易遷而其智甚易變也不可與草木並變而同盡乃盡已之心推而盡天下之心引而信之以盡天下之變而重其卦明夫雖變而主焉者在也至矣盡矣不可以復加矣衆人之中又有聖人焉曰吾民之欲甚大而其惡甚易長也懼其淪於非類而不返也乃盡已之心推而盡天下之心而作爻象彖繫之辭發理形象數之幾命性心迹之本以明夫吉凶消長之道進退存亡之理而垂教焉使不失其所主而至幽者顯至神者著煥乎日月之正中而弗是也於是而始成夫易故易也者四聖人之所以盡天下之心而為之者非他經之所得比也詩書春秋如夏冬各一其時易則一元之氣貫天地而通四時也大哉易乎在天為神在人為心其在經也則為易合而言之一也形而上謂之道形而下謂之器合而言之亦一也嘗觀之於吾心於寂靜感通而見無畫之易觀之於書於竒偶變動而見有畫之易觀之於造化也於至賾至微而見無體之易觀之於天地萬物也於至大至衆而見有體之易吁易果何物也大傳曰易與天地凖或曰易凖天地而已乎天地之外無復有物乎曰天地無外其有外聖人存而弗論也聖人垂世立教以有徵者傳信也豈為是忽恍不可測者引而自高以惑世也哉老氏能言之矣而入于偏釋氏能窮之矣而入于誕二氏之所以得罪於吾聖人也其曰易與天地凖至矣書孚于中則不徵於言徵於言者皆未孚於中者也故言之愈簡則其孚愈篤辭之愈繁則其疑愈肆然則無言可乎不然也言心聲也心有所用則言以宣之雖欲勿言焉得而勿言夫孚于中者其言自可徵也不孚于中而苐徵於言誣譎誕妄可勝也哉嘗觀夫書自宓犧至于帝嚳則泯而不録唐虞二代之聖也五篇而已而夏后氏之書四商之書十有七周之書三十有二周踰于商商踰于夏夏踰于唐虞豈唐虞不及夏夏不及商周與何唐虞之寡而商周之多也上世聖人之垂統也宜其多而反寡後世聖人之繼承也宜其寡而反多何也昔周豐之言曰有虞氏未施敬於民而民敬夏后氏未施信於民而民信殷人作誓而民始畔周人作會而民始疑謂去古逺而俗日益薄狙詐日益盛馴致而然也蓋信則不言而喻故其書寡不信則言而不喻故其書多自伏犧至于帝嚳其俗朴以誠其政簡以一不徵于言而天下信是以聖人存而弗論也堯禪舜舜禪禹三聖授受以天下與人而不疑有人之天下而不與然而授受之際猶懼其不克負荷而始有疑焉故堯之語舜曰允執厥中一言而已矣及舜之命禹又有疑焉加之以人心道心之分喻之以惟精惟一之戒三言而已矣厥後湯武以臣誅君作為誥誓以信天下之信伊尹以臣放君作太甲三以明已之不篡周公攝政召公不説羣叔流言於是啓金縢之書作洛召誥命諄諄歡歡以一已之誠破天下之惑是以彼如是之無如是之寡此則如是之重且多也雖然是皆孚于中而有徵之言由疑而發之耳自周室東傾五伯更政刑牲歃血而愈疑登壇載書而愈叛交質子而愈弗信骨肉睽為仇讐肝膽濶為楚越朝執牛耳暮尋干戈不孚于中不徵于辭惟欲是變聖人傷而憂之乃斷自唐虞訖于周而定有徵之言以垂教以明夫堯舜三代之世其中甚孚其言甚信足以傳大道破大惑已大亂立大政不曾是喋喋虛飾而已也嗚呼日昃而羣隂作聖人沒而異端起曼衍之言慘刻之論從橫不根恐愒之談蝟然而興豈惟不孚于中而不足徵也哉卒之以言亂天下而莫知適從激毒發戾一僨而火于秦悲夫詩天下之治亂在於人情之通塞甚矣人之情惡塞而好通也故天下之亂恆生於塞而其治恆生於通君人者亦審夫通塞而巳矣激揚疏暢導之而使就于通剔抉滌蕩達之而使去乎塞蓋塞則上不信下下不信上上下交惡藴賊崇圯反目以相睽憤心以相戾板板憒憒以及于亂在易則為否通則上孚于下下孚于上上下相孚郁乎相扶煥乎相輝濟濟洋洋以臻于治在易則為泰夫人之情猶水也湮其流窒其源則必壅汨而內潰穴地而突出湍奔而肆行不為疏之而又障之則必沈沈淪淪洶湧旁魄觱發之而上行愈障之而愈深愈防之而愈沛久且逺溢而一決則必襄山懷壑放激衝觸肆其所之其害有不可勝言者故善治水者疏而通之而已矣瀹而注之而已矣適其性因其勢道之而巳矣昔者聖人懼民情之塞而弗通也於是乎觀乎詩詩者述乎人之情者也情由感而動故喜怒哀樂隨所感而發感之淺也或默識之而巳或形乎言而已感之深也言之不足長言之長言之不足詠歌之詩之所由興也喜而為之美怒而為之刺其哀也為之閔其樂也為之頌美而不至於諛刺而不至於詈哀之也而不至於傷樂之也而不至於淫已不能盡而託之於人人不能盡而託之於物物不能盡而歸之於天上焉公卿大夫下焉薪翁笱婦有所感而必有所作君而知之天下之情無不通矣故致治之君觀乎人情也必於此乎取之於是婦寺言之史書之瞽歌之於其巡狩而采之朝貢而陳之太師聲之君人者儼然而坐聽之聞其安樂之音循已而省之曰吾何德何修而臻此歟乃兢業祗懼德日益加修行日益加檢潔齊粢盛作為樂歌薦之郊廟曰兹先王之致也其聞怨以怒哀以思之音也矍然而起愀然而變循己而省之曰豫得罪于天下矣豫負責于後世矣豫其遘天之誅矣前言往行何者之愆禮樂刑政何者之紊惴惴乎蹈深淵也訴訴乎履虎尾也德日益修行日益檢以鎖神人之怒猶可及也其不幸而萬民怨嗟四海扼腕而君人者無聞知患生而弗之覺禍至而弗之悟卒僨其社而沈其宗此文武周召之所以治宣王之所以中興厲之奔幽之死平桓之所以失政也至矣哉詩之於王政如是之切也於人之情如是之通也於治亂如是之較且明也故有國君人者不可以不讀詩春秋六經一理爾自師異傳人異學各窮其所信而遂至于不一易春秋之學相戾相逺相捍蔽特其甚焉者易載聖人之心春秋載聖人之迹心迹一也何逺之有彼學者見易之神妙不測變通無盡範圍天地曲成萬物而知鬼神之情狀探賾索隱而逆知來物乃臨深以為高而遺其迹視拘拘於世教法度之間者以為沈於流俗而不返也而學春秋者於一言一動一事一物必律之以禮而繩之以法惟恐其弛而不嚴濶略而不切也而狹其心不知有變動不拘周流六虛上下無常不可為典要者故各極其所執相乖相格無有為貫而一之者蓋易窮理之書而春秋盡性之書也易由正以推變春秋由變以返正者也人之性甚大而其理甚備在於行而盡之而己一行之不當一性之不盡也於是聖人因其性之分與夫分之節而制夫禮故人有是性必以禮行之而後能盡是性雖然行不可必也時得而行行之于時見于事業而己矣時弗得也行之於身著書立言垂訓于後而巳矣舜禹湯文時得而行盡性于事業者也孔子弗得時行盡性於書者也而春秋者盡性之迹也故即性以觀性莫若即迹以觀性即性以觀性無聲無臭不可得而觀也即迹以觀性有徵而可觀也故觀性之書皆莫若春秋孔子之著書也於易則翼於書則定於詩則刪而其於春秋也則謂之作何哉權天下之輕重定天下之邪正起王室之衰黜五伯之僭削大夫之専治亂臣賊子之罪以魯國一儒行天子之事而斷自聖心書國書爵書人書氏書名書字筆則筆削則削遊夏不能贊一辭非若易詩書之因其舊而加修之也至矣哉大經大法百王不易萬世永行舜禹湯文盡其性而行之於一時孔子之作春秋盡其性而行之於無窮也信乎其生民以來未之有而賢於堯舜逺矣故世之學者觀於春秋而行之足以盡性而學夫聖蓋性盡而理窮則易在其中易在其中則聖在其中矣嗚呼三傳之禍興而論説紛紛豈惟不知與易一而各標異議莫知所從彼以為是而此以為非彼以為非而此復以為是彼出乎彼則曰余出乎此至於師弟異而父子不同已之偽是非侈聖人之真是非喪則性烏可盡迹於是乎泯泯也下此而又有甚焉者誕妄者入于讖緯馮藉者入于叛逆深刻者入于刑名有王者起則必削而去之蹈聖人之迹以求聖人之心用易以窮理用春秋以致天下則舜禹湯文之功業可指顧而至不然則其亦已矣禮樂喜怒哀樂之未發性也其既發情也可喜而喜可怒而怒可哀而哀可樂而樂則情之所以率乎性也喜怒哀樂不當其可而發則非性情之正而人欲之私也夫人之有性也而必有情有血氣也而必有欲情欲常相勝也非情勝欲則欲勝情情勝欲則為君子欲勝情則為小人情勝欲則治欲勝情則亂故天下之治亂在夫情欲之相勝也聖人者懼天下之欲勝情也於是因其本然之分而為之禮以節制之因其本然之和而為之樂以宣暢之為之禮雖有欲而不能踰為之樂雖有樂而不能悖天下有僭越之姦狂狡之戾則有禮以折之有忿疾之亂鬱塞之慝則有樂以釋之洋洋乎發育萬物峻極于天故禮樂者王政之大綱也得則治否則亂聖人致治之功必於此乎取之而不敢易也以性情治天下以天治人非有我之得私也故禮樂之治王者之極治也自宓犧而上理具而無器宓犧而下器具而無文至乎唐虞文具矣而未備至乎周公理與器與文於是乎大備故其中間有堯舜之治有夏后氏之治有殷湯之治有周文武成康之治夷厲而下欲勝而情亡禮樂之理寖以昧而其器寖以缺致治之功寖以墮而王政之大綱寖以不舉繼以幽而周室大壞平王而東禮樂遂為虛文矣陵夷至于孔子雖欲與之焉得而與之乃曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也我觀周道幽厲傷之舍魯何適矣於是因魯史而修春秋以明禮就大師而正雅頌以明樂然而無其位無其權明王不興卒不能復禮樂之實苐存其名而巳子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮夫告朔之禮不行是實亡矣羊存而何益而孔子惜之者謂名存而實亡愈於名實之俱亡也嗟夫禮樂根於性情而其弊至於虛名之不能存天下之治從何而興乎自是而下判為十二折為七國并為孤秦燔燒詩書削禮瘖樂置生民于鈇鉞之上用鞅斯申韓之術一以刑法繩下而遂至于亡嗚呼禮樂根於性情文與器雖亡而生民之性情未亡也有明主舉而行之禮樂之治可復矣思治論無意於取而有意於治者殷周也有意於取有意於治者漢唐也有意於取有意於治而不知所以取與治者晉隋也取之以道治之以道其統一以逺取不以道治之以道者次之取與治皆不以道者隨得而隨失也嗚呼安得知治體者與之共論治道乎治少而亂多也尚矣所以然者知治體者鮮矣將百萬之衆舉天下如鴻毛者易得也決䇿制勝慮皆逼臆者易得也平賦役調糧餉聚如丘山運如風雨者亦易得也至於乘幾挈勢以仁義道德厝天下於泰山之安者則難矣故漢知所以取之者蕭公子房也知所以治之者賈誼董仲舒汲黯也漢不能盡其用所以僅能為漢而不能三代也漢季之失天下也知所以取與所以治者孔明也天不盡其用不能三代而區區庸蜀也晉既盜魏又欲取吳取所以取與所以治者羊叔子也僅能用其取而不知所以治是以隨得而隨失也唐有天下因隋之亂名義近正知所以取貞觀之治魏徵房杜知所以治惜乎衆目雖舉而大綱不立也是以一治一亂卒僨以亡僅能為唐而不能三代也三代而下千有餘歲竟不能復其治何治如是之少而亂如是之多也蓋雖有願治之君而無知治體之臣僅為一時之治而已雖亦或有知治體之臣而復無願治之君沒沒於世卒不能用一時之治亦難也嗟夫世變而既下矣可乘之機可挈之勢豈遂無有哉前世則亦已矣國家奮起朔漠奄有北土一舉而收燕雲再舉而滅夏又再舉而得關中又再舉而覆汴蔡荆襄蜀漢繼踵而破髙麗濊貃日出之國委命下吏莎車烏孫崑崙虞泉日入之地盡入鞭箠臣漢唐之所末臣蜚揚突蕩席卷夷夏蹂斥宇內四十餘年矣豈無意於取乎而不知所以治之者夫得寸而治之國之寸也得尺而治之國之尺也務取而不知治猶獲石田也夫致治之道自治為上治人次之自治其本也治人其末也本固則末盛詩曰枝葉未有害本實先撥言本既撥則枝葉從而害矣又曰綿綿葛藟施于條枚豈弟君子求福不回言本根芘則可以求福矣葛藟猶能芘其本根况於國乎所謂本者不勤逺略而反自近者始也修仁義正綱紀立法度辨人材屯戍以息兵務農以足食時使以存力輕賦以實民設學校以厲風俗敦節義以立廉恥選守令以宣恩澤完一代之規模開萬世之基統即此為之不求之於外大總其綱小持其要上下井井有條不紊蘇潤瘡痍補葺元氣如此數年治體既定綱紀日張户口增益民物繁夥禮義隆懋心格其非風俗完厚上下妥安如餒而飫如醉而醒如瘠而肥本根既固德威惟畏弱國入朝強國請服矣蓋不屈則無以信不翕則無以闢不靜則無以動不存則無以施理勢然也苟信而不屈動而不靜施而不存馮鋒恃鋭謂莫已若鮮有不弊者傳曰兵猶火也弗戢將自焚也言兵以禁暴誅亂不可窮也又曰天下雖強好戰必弱言兵凶器戰危事不得己而用不可久也夫文止戈為武詩曰載戢干戈載櫜弓矢肆于時夏允王保之此武王之所以為武也國家擁百萬之衆衡制夷夏莫敢誰何雖數年無君無大吠之警豪傑弭耳瞬目奔走奉戴吏民竭膏血倒倉庾空杼軸罄筐篚以供賦役可謂力勝矣少霽威蓄鋭固其本根漢唐之舉也焉有用兵四十年而不已者乎遺民安得不膏鈇鉞糞草莽乎有千金之璧而不琢執之以擊瓦礫而不以為寶不玷而缺亦云幸矣曷若琢為琮璜藴之櫝而藏之密與天球河圖為奕代之寶乎蓋不智不勇然後可為大智大勇不恃其力然後可以大用其力役其智者則必至於暗肆其勇者則必至於困竭其力者則必至於踣以智力勝人者人亦以智力勝之矣以義勝人者天下無敵也綱紀禮義者天下之元氣也或偏或全必有在而不亡天下雖亡元氣未嘗亡也故能舉綱紀禮義者能一天下者也不能舉綱紀禮義者安于偏而苟且者也天下嘗分裂矣昔秦不能舉而漢舉之漢所以一天下也吳不能舉而晉舉之晉所以一天下也陳不能舉而隋舉之隋所以一天下也隋不能舉而唐舉之唐所以一天下也南唐吳越不能舉世宗藝祖能舉之宋所以一天下也晉隋不足稱也粗立綱紀猶能一天下矧於幅員萬里巍巍堂堂莫之與京能舉綱紀禮義乎其混一區宇囊括海內厝天下於泰山之安而四維之也必矣蓋天下之勢必一方之綱紀禮義立天命之人歸之而後天下一此善於彼而後天下一地醜德齊莫能相尚欲以力勝之未之前聞也縱能勝之不能安之無以挫英雄之氣服天下之心反使乘時徼幸斂羽毛而待風飈者得以窺其隙而投其間羊祜所謂既平之後方勞聖慮者也今梁秦之西東既被其澤綱紀既立矣河朔之民獨非國家之赤子乎書曰無黨無偏王道平平使河朔之民亦如梁秦復加之以意而致之以理不在於耀武萬里之外而可以文致太平豈惟生民之幸天下可一而社稷之福也嗚呼二帝三王不得見之矣舍漢唐何適也漢唐又無及矣舍今之世何適也詩曰洌彼下泉浸彼苞稂愾我寤嘆念彼周京經布衣也夫復何言念之而已居得致之位操可致之勢者幸留意焉陵川集卷十八
