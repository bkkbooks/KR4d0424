body:
  text: 陵川集卷三十一元郝經撰述擬先人初命經為決科文迷擬宏詞數十首仍命各依厯代體制立法措辭謂西漢格高辭約有先秦三代遺風後世辭章不可及已東漢而下至晉宋六朝漸趨近體駢儷之作李唐以來對屬切律遂為四六謂之官樣或為高古以則先漢依放盤誥則以為野而非制故皆模寫陳爛謹守程式不遺步驟至於作者如韓栁歐蘇亦不敢自作强勉為之而世謂之畫葫蘆行之千有餘年弗可改已然而㸃化詩書六經雜用先秦二漢暢如陸贄質如吏部富如文饒情如封敖雄如東坡工如彥章學經作句亦足自為要之典雅古贍情實感激得體而已故自東漢終於李唐為詔赦制冊檄書露布等述其事而擬其辭其後専為古文不復記録近在儀真館與書狀官苟宗道論次詩文雜著裒集追憶得故述擬者若干首復依世次别為類云漢淮陽王檄郡國討王莽文淮陽王更始元年舂陵戴侯曾孫𤣥即皇帝位光武大破尋邑於昆陽遣將破武關檄諭天下使共誅莽漢更始元年月日某官告郡國宗室父老士庶漢德休明天命未改豈容僭僞久肆叨竊俾我高廟神靈無所馮依億兆之人遂墜塗炭皇帝陛下以近屬懿親不忍失職坐視夷滅是用奬率宗盟纂承大統恢復漢室誅讐討賊今月某日類于上帝遍告山川羣神即皇帝位於淯水之上逆賊王莽椒房餘蘖飾詐搆僞夤緣為姦適漢統之三絶乘四父而輔政言方色厲溪壑深固謙遜卑讓象恭滔天遂弒孝平皇帝抱負孺子比德周公號曰安漢其實篡漢既受九錫因稱假攝假而不歸遂謀即真卒盜有我有漢更建位號改易制度變置名器顛倒六合翻覆海宇弗寧弗令擾弊民物鋪張妄意潤色虛文自以為新於是黜奪我大漢諸侯王剪滅劉宗俾為齊民至於金刀錢文亦不行用我高廟十二室遂不血食聿至於今奮其威詐逞其暴戾窮凶極惡過於桀紂乃自以為黃虞復出志欲盈溢高視濶步鄙隘漢家毒流諸夏禍延蠻貊四海囂然猶未足厭今幾二十年矣故家遺民無不歌謳思漢矧我宗室之人哉惟我高皇帝肇造區夏伐秦救民軼於湯武孝惠文景武宣文治幾於三代鴻恩龎惠暢浹穹壤膏於肌膚藏於骨髓哀平短祚惡不及民豈令姦僞異姓遂盜有之乎紫色蛙聲餘分閏位秦政楚羽皆為我漢驅除莽又萬一弗逮慿藉外戚恣僞矯誣豈令遂綰皇帝璽稱說天命乎且外戚吕霍上官稗我漢道皆伏其辜豈獨釋莽使遂代漢今漢兵巳斬莽將甄阜梁丘賜取宛又敗嚴尤陳茂下昆陽定陵郾又殺王尋王邑破莽兵百萬徇潁川諸郡偏師入武關攻三輔矣羣龍奮迅大人虎變風蜚雷厲星馳電邁火德炎運有光燭天凡我劉氏及故臣民宜各率先共雪讐恥誅莽爨社訊清郊廟復爵土為侯王一如漢制如或尚為逆黨則有常刑如律令漢昭烈帝討吳孫權檄獻帝建安二十四年孫權令吕䝉取荆州襲殺關侯稱臣于操昭烈帝章武元年自率諸軍伐吳移檄諭權年月日尚書令某諭孫權及江東將校部曲父老士庶先王之典負固不服則侵賊賢害民則伐矧于僭竊位號蔑寡王室屠害方伯黨附叛逆者哉是用興師以致天罰申明逆順庸示播告夫叛逆之罪小黨逆之罪大逆而無黨則為惡者孤實繁有徒則為惡者衆故先王重治賊黨春秋必誅同惡所以湯伐韋顧而夏桀喪齊桓侵蔡而楚子服我高皇帝虜魏豹以禽項羽光武皇帝平隗囂而滅公孫皆先治賊黨之義也國家遭陽九之厄當四百之運漢道弗昌皇綱不振致令羣盜撑裂於縣曹操父子窺𨵦神器陛下以帝胄皇孫誕膺天命龍蟠幽朔蠖屈漢南郁神武應運之姿奮撥亂反正之志一旅復夏百折興漢天方佑賊用武無所顧惟孫氏有功漢室破虜則訊清河洛討逆則蕩定江東畀之孫權使誅賊操誰知托國竟匪其人操之陷江陵權遽欲迎降陛下遣丞相亮諭㫖相與拒操遂大破操於赤壁堅甲利兵盡作灰燼江濤山木總為漢兵權遂不復畏曹公天下始知有劉氏陛下不矜不伐推功讓能割吳越以封權奄荆益而復漢操不敢取遂畀之丕孺子童昏夫豈我敵方為犄角一舉蕩平祀漢配天不失舊物權乃謀為僭竊妄肆姦凶志溪壑之無厭罪丘山而不顧乃欲如熊繹之陵中國不止子夏之在西河前將軍督荆州關羽陛下親同骨肉分則君臣有古義士之風為漢虓虎之將報效而去操所畏敬所當無前權豈能敵分權江表置關羽荆南身出漢中三道並進相與蹙操討賊之規也陛下已拓定梁洋進攻關輔羽已威振許洛懾服河南權祇保據江東不謀進取遂怵隂謀襲殺關羽盜有襄漢奉賊稱臣反為掣肘之仇與作輔車之勢則權復一操漢賊不在丕而在權矣受其王爵南面稱孤忘父兄之忠義陷臣民為逆虜倔江湖之中經營子孫之計一操未巳一操復生天下之人不復知有我漢所以必先誅權而後圖丕今陛下舉梁益之衆連交廣之師水陸東下順流揚麾星飛電邁哭羽荆楚尸權秣陵恢張討賊之威益大復讐之義爾皆世服於我有漢乃二祖之遺民寬仁之所覆育恩澤之所涵浸顧豈迷復靦面事賊舍衣冠禮樂而斷髮文身以徇蠻夷之人哉且天道助順不登叛人吳楚之王世為僭僞擯斥逺外不通中國一時跳踉卒致禽滅故三苗逆命終於投竄夫差爭長自剄幕下老劓驕恣利刃揕胸苟不以道江湖之險安足慿恃夫權之姦虐桀猾自視與項籍王莽子陽輩何如哉卒皆覆亡不暇則天祐我漢高廟之神靈未艾也今爾有衆為權詿誤俾為匪民乃祖乃父世篤忠貞一時脅從必未丕變陛下總干問罪宜去逆效順倒戈前行共治賊黨并掃僞蘖還於舊都大者王小者侯各加賞典如欲與權併命甘為蠻夷逆虜者則有常刑如律令漢丞相亮諭僞魏檄安樂公建興十二年丞相亮出斜谷伐魏至郿屯于五犬原檄諭魏丕朝告以討賊之意年月日丞相長史楊儀告魏將佐故漢父老士庶及曹睿中表族屬蓋聞五帝官天下三王家天下故堯舜與賢禹湯與子苟無桀紂之惡勦絶基命族屬之微斷祝嗣續則傳序統體在於一姓其或間惎僥幸必干先王之誅昔后羿篡於有夏少康以一旅之衆起而殺羿王莽中絶我漢世祖以十世之裔奮而誅莽殆天未厭有夏皇漢之德天枝帝胄磐石之宗維持擁衛他姓莫得而有仁如徐偃賢如齊桓强如楚莊不能易姓改物况慆淫匪彜豈能盜有之哉是皆天下所共聞古今之大義也自周室陵夷秦人吞并民受塗炭我高皇帝代虐以寬易暴以仁除其煩阻置之夷坦受天明命開大漢萬世無疆之統孝文皇帝繼體守文增修德政恭簡愛養滋息涵育刑清政簡開大漢萬世無疆之德孝武皇帝南勦徑越北討强胡東置朝鮮西定西域表章六經制禮作樂開大漢萬世無疆之業光武皇帝剷除祅穢子惠謳吟恢復境宇懋建社稷投戈講藝息馬論道開大漢萬世中興之功則我皇漢基圖鞏固神州中嶽不拔之宗也厯世數十載祀數百本支繁衍九州四海盡為劉氏雖桓靈失馭漢道中微苐宦戚専胡隳敗王度非有桀紂自絶之惡也故天命復集於我先皇帝暨皇帝陛下國賊曹操螟蛉假姓贅閹遺孽自其祖父騰與左琯徐璜瀆紊朝憲父嵩馮藉叨據台鼎弱昧漢道傾覆帝室職此之由操尤剽狡無賴清議不齒國家之材授以偏禆穿窬窺覬遂領方州少帝反政使修郊廟倒持太阿放虎自衛操乃輒行劫遷重為囚執逞其梟獍之心肆其豺狼之志握皇樞而䠞威柄挾天子以令諸侯祇將篡竊為謀動以詔㫖行事南征北伐抑并屠滅植根柢于山東置巢穴于鄴下睚眦以肆狠刑戮以立威弒母后而帝不敢詰殺皇子而帝不敢怨誅鉏豪傑剪刈人望族九江太守邊讓殺將作大匠孔融及議郎趙彥搒掠太尉楊彪殺彪子修至於荀彧許攸崔琰毛玠皆中朝茂異衣冠領袖或位常伯或參帷幄天子之昆百寮之師少有抵牾即加刑害毒螫若蛇虺詭祕如鬼蜮罾繳遍寰宇機穽盈道路自昔人臣不道貪婪㳫鄙狠忍暴戾未有如操之甚者也先皇帝孝景皇帝子中山靖王之後也語宗盟則近於屬籍為尊以仁厚之資挾英雄之氣慨然以復漢自任收攬豪傑從臾義烈扶奬王室操尤忌惡必欲誅除託足無所流寓漢南丞相以伊吕之志為顔孟之學才兼管仲知若子房躬耕隴畝不應辟召先帝三顧於草廬之中幡然而起為漢討賊連衡孫權破操赤壁挫其凶鋒折其毒尾於是不敢遂取既為漢賊又為漢臣狐媚梟伏謂天可欺逮其將死分香析履不及禪代生平姦僞至此盡露逆丕嗣立公為篡竊父以趙高為桓文子以浞羿為舜禹厭然自若居之不疑拘執漢帝降削位號大統幾絶先皇帝遂跨有荆益立漢社稷期於攘除不幸殂落謂丞相才十倍於丕畀以討賊之事師保陛下拓定中原於是撫百姓示儀軌開誠心布公道先盡內治次乃外攘曹丕遽死逆睿復立乃逞童心窮奢極侈至使公卿百官負土版築竭我漢民膏血以奉僞妄土木丞相痛心疾首拜表出師義旗一指關輔響應遂營五大雜耕渭濱非不能將五諸侯縞衣問罪直入彭城付信一面轉戰出竒以舉燕趙但以一民莫非漢臣尺地莫非漢土衣冠右族皆漢庭公卿之子孫畎畝細民皆漢家風俗之涵養固未忘於祖宗豈遂違其君父是以不忍蹀血以自相殘按兵觀釁用敦文告故夫曹氏非有高皇帝寬仁之統也孝文皇帝恭儉之德也孝武皇帝盛大之業也光武皇帝中興之功也特一時僞定篡竊之賊耳雖據中原漢有奧主威虐逼窄又有孫氏則其篡竊又不若莽之强也祖孫一再傳以僞承僞刻薄寡恩禁錮骨肉勢成孤立彼司馬懿者又一操耳其能久乎與其托於新造危亡之僭僞靦面同賊曷若臣事二十六葉之大漢天子歸四百餘年之舊主乎則去就取舍之義昭昭然無疑矣且昔誅滅祿産迎立代王者平勃之臣也蕩逐尋邑臠食新莽者南陽之親也洞刺董卓暴尸燃臍者王允之謀也矧今漢世之危過於二京曹氏之禍甚於莽卓豈無一義士相與誅讐討賊哉丞相肅將天威所嚮克捷宜共合勢摧拉震蕩張大漢之天聲掃僞庭之妖孽奉迎鑾軫還於都邑遂使建興復如建武告於髙廟論功行賞在兹舉矣如律令隋晉王廣滅陳禽陳叔寶露布文帝開皇九年晉王廣為元帥大舉伐陳獲陳叔寶露布以聞臣聞伐罪赦民是謂天討禁暴誅亂乃為義兵所以用五材而正萬邦奄四海以大一統黃帝戰于涿鹿垂衣裳以無為大禹征于有苗混車書而致治不享不覲割據河山稱帝稱王叨竊名器無與覆昏援溺為之推亡固存紛爭惟日以興禍亂何時而已我國家天開至聖運啓昌期建皇極於中朝纂天王之正朔復見唐虞之盛揖遜而興乃有高光之才指揮而定粵惟吳楚實古荆揚詩人刺為蠻夷春秋貶其僭僞逮孫權三分以自立暨司馬六代以相傳競尋干戈月一易主殘并骨肉歲幾弒君血淮海之橫波魚蝦盡赤汚江湖之隙地草木皆腥莽卓桀驁於門庭曹馬喧呼於傳舍至陳叔寶尤極慆淫頸瘡猶帶夫藥刀狎客已行其酒令雜遝女御倡和詩篇珥貂蟬者百餘曵綺縠者千數肆為瀆侮無復君臣歌玉樹之新聲斷金陵之王氣珠璧飾臨春之閣光耀半天沈檀構結綺之臺香聞數里祠宗廟則稱疾拜妃妾而臨軒惟侈是崇蔑天弗畏趙高視事於武帳妲巳畫可於寶牀以江總為臯䕫任孔範為伊吕國益告病民不聊生疏斥忠良賊虐諫輔不止二十罪殆逾三千條衆叛親離而不知神怒人怨而不恤聽謡言而弗悟卻畫像而自如謂限南北有長江豈能飛渡比敗周齊有大福皆使不還方幅員共致於雍熙乃東南獨阻於聲教爰示禮意反致辱書釁乃自生罪底不赦授臣以鉞致天之誅總統百萬師徒節制八十總管過庭而奉承算略禡牙而昭告神祗布宣雷霆之威將率熊羆之士申湯武之仁義蕩桀紂之淫昏東西連衡首尾並進視風濤如平步卷江山而順流舳艫隱天旌甲耀日忽龍驤之電邁謂楊素為江神賀若弼出廣陵韓擒虎濟采石甫航一葦即走萬艘乘大霧而縛醉人當元日而驚睡主正月某日若弼自北擒虎自南㑹於秦淮以取建業前徒倒戈於朱雀後庭指莽於漸臺禽虎自南掖門入宫若弼自北掖門登殿陳叔寶啼泣掩袂猶然詩酒興濃倉皇竄身乃謂衣冠道盡落臺城之翡翠墮辱井之胭脂不銜璧而出降欲下石而始應授繩引之叔寶與張麗華孔貴嬪同束而上丙戌臣斬張麗華施文慶沈容卿等以謝三吳執陳叔寶及僞王公百司擁衛赴闕下掃數十世之僞朝盡為王士合三百年之異域皆貫諸華荆舒為中國之人江漢被文王之化此皆皇帝陛下允文允武聖謨洋洋乃聖乃神帝德蕩蕩是以諸將宣力兆民同仇師不踰時役不更舉㑹三光五嶽之氣安九州四海之人宋齊梁陳以來始復混一夏殷周漢之際今乃比隆臣無任慶快之至謹遣某官奉露布以聞年月日唐太宗即皇帝位赦文門下朕嗣守丕基獲承休緒厲宫聞之變故致遐邇之震驚庸釋羣疑肆行大賚敷於心腹告爾神人昔虐政之毒流致皇靈之壅底朕從太上皇帝糾昌義舉奬率宗盟稱無辜而籲天為有衆以請命下河東之甲孤隋自斃於維揚翔霸上之師僞政行平於伊洛化家為國代虐以寬遂統承於先王乃撫治於方夏維爾萬姓甫出阽危肆豫一人退守藩服執臣子之節推尊榮於父兄持恭遜之心全始終於孝悌孰意天未厭亂時弗底寧締構姦凶藴隆讐敵變起蕭牆之內禍生骨肉之間力百戰以方成忿一舉而自棄社稷大計須行管蔡之誅宗廟再安遽有唐虞之禪讓焉弗允退亦無從仰順宸慈肆登大寶處兆人之上可無及天下之恩得四海之歡庶幾盡天下之養可大赦天下云云於戲遭家不造幸免於覆亡繼志無能豈堪乎授受施大易雷雨之澤始潤瘡痍負春秋肆眚之譏重增祇栗無稔怙終之惡遂生僥幸之心各去舊汚共成新化咨爾有衆體豫至懷太宗伐高麗班師詔貞觀十九年上親征遼東不能成功深惜之十月癸未敕班師制曰止戈為武佳兵不祥爰有弗享則征殆非得已而用叛而伐服而舍是謂德攻忘則危好則亡時乃大訓朕自削平四海奄有多方施教化而不復言兵制禮樂而惟期于治祇務修文偃武庶幾保大定功裔夷高句麗逺負海隅自謂日影怙恃河伯之勢矯誣箕子之功謂隋三往而竟亡夫誰萬里而更舉敢行威虐公肆馮陵格文祖而苗民弗庭㑹塗山而防風不至朕膺傳禪姑示涵容乃拒璽書愈失藩禮至蓋蘇文弒君以逞以莫離支専國而驕連結民夷侵擾遼右蕩搖我疆埸竦動我諸華命將致討而弗悛致朕親行而問罪舉泰山而壓卵彼惡敢當傾滄海以沃焦則莫我遏奪命而浪走絶島棄城而空濶無人兵刃莫支其鋒將士咸賈其勇蠢兹小虜敢怒大邦不足辱於王師姑增修於德政諸軍可即日發還嗚呼聖有謨訓鬼方反憊于殷宗悔其可追輪臺漫勞於漢帝勝之不武祇以為勤不能自克而遂非以致貪功而過舉違大臣之强諫蹈亡國之覆車越朕之愆式愧爾衆布告遐邇咸使聞知贈魏徵司空制貞觀十七年徵薨贈司空諡曰文貞給羽葆鼓吹陪葬昭陵制曰古有社稷之臣力行而濟天下以道為朕帷幄之佐强諫而格君心之非方垂拱以仰成遽彌留而不起宜崇優數用恤忠勤故特進侍中知門下省事兼太子太傅鄭國公魏徵中誠積真仁義立德以坤之直方大用乾之純粹精不二三以釋君篤忠貞而事主恥朕不及堯舜作佐時之臯陶致朕必如成康為制禮之姬旦每進藥石輒中膏盲有政事之或遺而諫章則即至爰自言職遂踐台司施教化者四年俾風俗如三代奪去之遽天不憖遺忽廟堂之遂空何斯人之不幸雖臨小斂忍視大還追登平土之司以為下泉之賜庶幾英爽服我寵休嗚呼在亂臣則十人共期豫治亡正身之一鑑誰弼豫違中流而虞風波未濟而失舟楫興言不已涕泗徒零可特贈司空云云宋璟右丞相制𤣥宗開元十七年以璟為尚書右丞相制曰共政必圖舊人以篤儀刑之典格君尤賴莊士式資匡直之忠重德佐王則朝庭尊元老在位則社稷固乃眷耆英之宰宜升上相之崇黃門監同平章事開府儀同三司致仕廣平郡公宋璟𢎞毅而明靜肅而勇堅如鐵石凜若氷霜不阿不撓而行以方至大至剛而養以直盡心强諫獨配魏徵之忠良正色立朝復見汲黯之風采夷險一節寅亮三朝共倚賴于袁安匪中庸之胡廣佑我先后相豫冲人既撥亂以有為以中興而自任革去神龍之弊追還貞觀之隆厚風俗而振紀綱肅典憲而抑僥幸格天大略非一旦之救時經國逺圖舉萬代之長策抗章而去成功弗居宜正位于中台復登庸于右弼燮和四海表正百寮於戲股肱之寄久已倚毗體貌之餘敢忘尊禮方詢咨於黃髮以允慰于蒼生懋建大猷圖惟極治兹朕無斁時乃之休可特授右丞相云云贈張巡揚州大都督制至德二載冬十月睢陽陷巡逺死之十二月上御丹鳯樓赦天下贈巡逺等官敕執干戈以衛社稷焉得勿殤聞鼓鼙則思將臣况於死節挺英靈而不散凜烈氣以如生重為褒崇庶慰精爽故御史大夫河南節度副使張巡慷慨立志突兀效忠開誠心而待人委軀命以徇義苟不以道甘餓西山胡能詭隨欲蹈東海屬逆胡之荏惡熾凶焰以燎天從臾興師倉皇討賊聲淚俱發而誓衆邀截不暇以乘城戰百合而氣益振馘萬計而賊乃沮料敵應變出竒無窮屹承天之不周巋中流之底柱牽制醜虜絆一孤墉遮蔽江淮全半天下走令狐而矢盡眇子竒而事危罵賊而嚼齒空齦乏食而殺妾饗士援絶乃陷不復求生力竭被禽付之以死無負國而奚憾得其所則為榮嗚呼大節巉天古實罕見精忠貫日今孰可侔實祖宗之神靈乃國家之元氣有士若此賊不足平無爵以稱人何以勸巡可特贈揚州大都督其守許逺功與巡同可特贈荆州大都督其將南霽雲義烈尤著可特贈開府儀同三司訪求其子孫各加官爵皆立廟睢陽歲時致祭主者施行郭子儀賜號尚父制建中元年德宗嗣位詔攝冡宰賜號尚父制曰朕以眇德獲荷丕基諒隂之中方恭默以思道嗣服之始惟垂拱而仰成兹既太公之在朝尚何傅說之求野宜進異號以崇元勳中書令天下兵馬副元帥汾陽王郭子儀華嶽炳靈金天傑氣純誠惟一忠勇俱全沈雄而略包河山高明而精貫日月早識兵勢嘗甲武科屬孽胡之慿陵致中原之板蕩舉燕趙而搗巢窟復雍豫而清京都保乂皇家殄殱逆虜功愈大而心愈小事益殷而謀益深乃師中之大人實天下之大老方叔克壯佐周室之中興孔明勤勞期漢家之恢復單騎見虜壓之以誠孤軍逐戎勝之以義於古人則未有固當世之罕儔羽翼四朝用舍一節存億萬衆之性命繫三十年之安危雖位中台久疏王爵琢金石而許宥十世逮子孫而進用數人賞不酬勞名未稱德宜俾兼于元宰仍錫號為父師於戲富貴著社稷之功始終乃人臣之道范蠡泛舟而去豈曰見幾子房辟穀為辭亦未盡善豈如今日之繾綣而無曩時之猜嫌極其尊榮永俾稱頌敬服朕命其代豫言可令攝冡宰賜號尚父云云贈韓愈禮部尚書制穆宗長慶四年愈卒贈禮部尚書諡曰文制曰道復有統乃為百世之師天不憖遺孰謂九原可作梁木壞而復將安放衮衣斂而庶以為榮故吏部侍郎韓愈執德不回以道自任幾聖未達於一間大儒兼綜於四科傳仲尼心若顔淵曾參之親炙述孟軻志謂荀况揚雄為未醇明白而皆仁義之歸奧衍而得性命之正完三光五嶽之氣浩然而獨存承八代百家之微嶷若而自振力闢二氏申明六經去陳言而新斯文距邪說而立名教巍巍乎泰山北斗玉潔石光浩浩乎長江大河龍翻鳯躍置之朝廷之上而不喜斥之嶺海之外而不憂六軍無譁踰月而清輦轂萬刃注視片言而折凶鋒以有用之才明佐王之道直造先秦之上豈惟由漢以來於戲才難其然間生乃爾子房而下有賈誼卒棄於文景之隆孔明之後生王通不與夫堯舜之運今甫中壽遽即大還為邦竟無百年致治豈能三代爰申遺恨進長儀曹庶幾幽冥之中不忘制作之意咨爾精爽服豫寵休可特贈禮部尚書云云追復李德裕太子少保衛國公制宣宗大中元年貶德裕崖州司戶卒懿宗咸通九年追復太子少保衛國公制曰朕祇遹先烈爰念英賢每待旦以旁求嘗當饋而屢歎眷惟㑹昌之政實賴社稷之臣厥德不回運乃逢於千載於今為庶道終否於九原䀌焉傷心何以為訓故太尉同平章事兼太子少保衛國公東都留守貶崖州司户參軍李德裕𢎞毅軼世挺特邁倫廓達而無町畦明辨而有風采淵源問學滔滔不窮議論辭章滚滚可喜以興起斯文自任以經濟天下自為入掌絲綸則高文大冊動觀聽出為牧伯則深謀逺略服荒遐遂踐台司獨専大柄信任之重古今所無政如昭烈之孔明又甚高宗之傳說當國一相輔政六年威令幾如元和削平藩鎮風俗頓還三代罷絀僧尼雖逢不世出之君幸得大有為之佐至先朝遽褫官而退乃權臣快私忿而行湮沈海島之中淪棄煙瘴之表兆民謗讟四海訟寃天亦致傷朕胡能忍嗚呼豈意姦邪之黨復見於今乃令忠直之賢銜恨而死不為昭雪以謝衣冠永使沈冥終負義烈可追復太子少保衛國公依禮改葬主者施行李克用破黃巢露布僖宗中和三年雁門節度使李克用為京城東北面行營都統破黃巢遂復京師尚書兵部臣聞兵以禁暴王者所以行天誅德在除殘聖人所以運神武故草竊姦宄之構亂非芟夷藴崇而莫寧惡不去則善何以信伐不張而政何以舉霜露既墜乃成亭育之功隂沴盡消方定高明之位我國家基圖鞏固德澤汪洋高祖太宗除隋亂而軼湯武高宗𤣥宗致唐治而肩成康植兹鴻休畀我列聖陛下誕膺明命紹復先王憲章以承天心勵精而張治具十八葉太平天子德本好生三百年有道邦家仁而不殺孰謂亂生於治遂令安底於危逆賊黃巢器實顓庸資乃樂禍㑹䘲氛以為氣包蛇虺以為心初無偷劫之謀豈有帝王之意乘仙芝之鼠竊聚亡命以蝟興始則距躍於河南終乃翻騰於嶺外蜂蜚吳楚蟻結江淮高駢玩寇而不追王鐸畏寇而不戰或嬰城而固守或擁兵以窺窬遂致姦凶恣行亂略鴟張而無所忌憚豕突而莫敢誰何郡國以之丘墟京師因而覆沒謂已有命乃啓異謀奸踰王鈌稱建僞號諸陵乏祀可勝抔土之悲萬乘䝉塵莫雪終天之痛雖神人之共怒而禍亂則方殷猰㺄血世以無厭豺狼肉人而不置臣克用繆膺旌節逺在邊陲父子俱受國恩君臣敢忘大義不能先事入衛曲突徙薪固當投袂即行焦頭爛額乃揮淚而為禡遂㰱血以成盟掃部內以興師指天心而誓衆下兵嵐石建斾夏陽義聲振而軍聲揚賊氣沮而士氣倍彼謂鴉兵已至褫魄喪心我知龍運方興賈勇儲鋭乃屯沙苑以告師期進及乾坑便禽賊將二月某日遂合臣重榮臣處存等兵與巢及其將王璠林言趙璋尚讓大戰梁田師直為壯天棐惟諶雷萬鼓而一枹震三川而皆沸馬逸不止而橫騖衆怒欲泄而長驅激土雨以奮威彗霜鋒而合勢營頭壓陳二百萬賊衆皆奔積尸橫空三十里僵胔不斷雖巳奪氣尚􅣭游魂襲其餘師再戰于零口邀其奔路先扼於藍田彼猶釡中之魚乃作几上之肉四月某日進臨京雉直繫渭橋我七戰而七禽彼一遇則一敗乘勝以奮勢破竹以無前逐北而攻快建瓴而孰禦越某日入自光泰門挺身决戰先衆摧鋒呼聲動天殺氣蔽日彼則建輪擁盾柵巷而排牆我乃投刃揮戈執俘而斬賊由東內及於西內自外城入於子城居人擲瓦石以助威僞官裂冠裳而請命萬騎一蹙百道並攻賊窘相擊人自為戰蕩蜚血於魅穴薄死骨於貍丘蹂賊於望春宫庭蹴賊於升陽殿闥賊乃大潰崩於巨鹿之沙彼惡敢當碎甚長平之瓦首尾俱斷羽翼皆殘鳥駭而衝獸窮則躩叱魯陽之日鬬又踰時見鄢陵之星戰猶未巳巢乃乘其暮夜奪命遁逃其衆巳熸雖貸息其何濟分師捕討旋授首則有期臣竊念此凶渠禍踰往昔熾甚樊崇張角慘於朱泚祿山幾頓我皇綱敢窺吾神器蓋皇天所以申警於陛下使陛下以之寅畏於皇天開萬世無疆之休啓一日中興之運臣今肅清禁署灑掃神京宸極巍巍罷狐鳴而梟噪雄都嶪嶪復虎踞以龍蟠伏念臣本裔夷生於沙漠非良平智謀之士乃統戎行無信布爪牙之材亦承鈇鉞元凶遂殄菲劣何能此皆皇帝陛下德並乾坤明侔日月藴英圖於彀內隲大造於區中以撥亂之才施致平之略委任不僭授受是宜兆人所以傾心諸將為之宣力日出而羣隂伏盜竊發以何為聖作而萬國寧兵一試而即己櫜弓却馬挈黎庶于雍熙端委垂衣躋瘡疲于仁壽延我唐祚過彼周期臣無任慶快之至謹遣某奉露布以聞諸鎮討朱全忠檄哀帝天祐四年蜀王王建岐王李茂貞約晉王克用共討梁克用乃傳檄諸鎮告以討梁之意天祐四年夏四月晉王克用致告諸鎮諸侯王及僞梁臣僚蓋聞田橫列國之壯士恥臣漢而竟不西朝魯連縫掖之書生聞帝秦而欲蹈東海蓋義烈著于平昔而死生為之不踰昭昭在天矯矯貫日亂臣賊子所不敢肆微君弱國賴之以存粵惟皇唐奄有四海踰二十帝幾三百年雖紀綱寖以陵夷而德澤尚為龎厚鼎未可以問其輕重厯惡得而窺其短長故朱泚祿山肆其姦凶而遂以殄滅黃巢尚讓張其盜竊而繼即誅夷緬維人心灼見天意僞梁朱全忠資尤凶悍內實姦雄初以碭山之一夫亡入寃朐之羣盜負跳踉之劇氣稱庸狡之謏材遂覆京師以毒海內知賊必敗乃謀自歸斂羽戢毛以待風飈之㑹瞑目弭耳長懷蛇虺之心國家推寬大之恩致懷柔之道賜之旄節適為養惡之謀分以土田祇作資賊之計既䝉優渥乃寖騫騰伐叛捕亡收二以為已邑厲兵秣馬假義而逞異圖遂踐台司益封王爵窺日切意望彌深乃納交于朝權叨求天寵又激怒于鄰壤締起兵端遂連十萬之師并有四鎮之地國賊崔𦙍知賊熖之方熾惎王室之甚微賣鼎命以外交持天權而內劫全忠益自恣肆無所憚違中潛犄角之機遙作輔車之勢力制中外威臨邇遐𦙍以為宦官天子之腹心非盡去而國不我得百官天子之輔翼非易置而權不我歸全忠乃效董卓之尤興晉陽之甲京師因而覆沒乘輿以之播遷進逼鳯翔乃犯行在矢及君屋血濺御衣凶鋒肆以無前毒尾搖而益怒侯景渡江而指闕梁帝倉皇晉師遷墓以成圍曹人凶懼乃抄餽餉而遏惟蘇天子併日而食後宫析骸以爨主父親探于雀鷇楚王安復得乎熊蹯言之傷心痛如疾首不能岐託終入梁亡全忠乃泣下沾襟徒行執轡奉龍顔而效順極狐媚以欺人急於攘竊之私乃定劫遷之計挈萬乘而不置挾孤注以遂東殺戮諸王賊虐宰輔惡其名士投畀濁流文物為之一空衣冠為之掃地乃蜚血于禁禦而薄肉于宫闈天子涕泣求生哀矜請命社稷已非唐有左右罔匪梁人雖李氏之天王實朱家之日月甘行禪讓冀免誅夷懼人望之不除竟椒蘭而行弒大肆殺戮恣為矯誣戕成濟而貸賈充釋羽父而討蒍氏大器既以入手蘖運遂乃應天賊母后以示威立幼君而資篡卒移皇祚構建僞朝以鄙㳫之材蹈崇高之位恃已有命謂秦無人逞其梟獍之心行夫狗彘之行姦子婦而自肆淫臣家而不歸汚穢我皇綱䙝瀆吾神器如此不道自昔罕聞禍絶三綱罪踰九法人神之所共怒天地之所不容惟爾多方乃祖乃父世惟唐臣有社有人豈非唐祚可坐視而不救乃偷生而自營不共討平有靦面目彼既盡其東略必又肆其西封雖欲不危其可得巳今孤以沙陀之騎契丹之甲建旗麾而出漠北聲金鼓而下河東瞰臨黃流直抵白馬背引趙魏橫約青齊東西連衡首尾並進岐王則卷三輔而直搗下二川而旁馳蜀王則舉梁益之衆出江陵楚王則㑹荆襄之師渡漢沔吳王則跨連淮海蟠亘東南厲三吳之鋒進圍濠泗淬兩淮之鋭直壓汴梁梟賊首而剖逆心祭先皇帝掃寇穴而削僞號復唐乾坤立宜臼於宗周奉世祖而歸漢其為梁臣人比及師臨有能斬全忠首者王得其支者公侯舉郡國降者超遷仍赦附叛逆之罪急急如律令陵川集卷三十一
