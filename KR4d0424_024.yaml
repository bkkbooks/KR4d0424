body:
  text: 陵川集巻二十四元郝經撰書與漢上趙先生論性書經頓首再拜啟日幸一拜得聞髙誼望江漢之驚瀾漸伊洛之餘波晉之鄙人庶幾終用楚材以為堂構造大成之室求仲尼之意然羽毛齒角其肯傾囷倒廩而遂畀之乎垂槖而入必梱載而後歸爾靖康之亂吾道遂南矣自伊洛入于江漢自江漢入于閩越百有餘年之間蟬聨荆楚蔓衍巴蜀蠭湧旁魄彌亘嶺海如冬之日至南而極極則復北矣葢天之道也於是近嵗以來呉楚巴蜀之儒與其書浸淫而北至于秦雍復入于伊洛泛入三晉齊魯遂至燕雲遼海之間而先生巍然以師道自處學者雲從景附又為伊洛發揮一書布散天下使孔孟不傳之緒家至日見則道之復北雖存乎運數其倡明指示心傳口授則自先生始嗚呼先生之有功於吾道徳於北方學者抑何厚耶而經牽制於時不能奉杖屨備弟子之列抑又何不幸耶不能親炙而以書先生其忍棄之哉經自十有六始知為學今復十有餘年矣世之科舉文章記問之學强勉為之弗好也非六經孔孟之書弗讀也富貴利達紛華之事弗志也獨於性分之内求之甚力體察之甚熟究竟之甚專苐恨諸儒之説相與雜亂使自信之弗篤也敢以為質乎夫道之在人謂之性所謂仁義中正而主静焉者也統而言之則太極之全體也分而言之則命隂而性陽也命静而性動也天命而人性也人性而物理也合而言之祗一道焉爾又何有論説之多乎哉道之在人一而静純粹至善充實之理而巳又焉有異端之多乎哉書曰惟皇上帝降衷下民若有恒性詩曰天生烝民有物有則民之秉彛好是懿徳則性之善詩書巳言之矣孔子曰元者善之長大哉乾元萬物資始又曰一隂一陽之謂道繼之者善也成之者性也成性存存道義之門則性之善孔子備言之矣於是孟子道性斷然以為善而不惑而以巳天下萬世之惑也荀卿大儒也學孔子者也而謂之惡揚子雲大儒也學孔孟者也而謂之善惡混始惑于情而以氣質之稟受者為言於是大起天下後世之惑至于今而不巳也至今先儒謂性非學者所急又謂顔状未離於嬰孩髙談已及於性命於是不言性縱或言之不過夫性習之説不辨夫理性與夫氣質之别遂謂揚子雲之善惡混為最得又謂論性之差自孟子始孟子不當定名為善復談空説無入于老佛氏皆自以為是而不知其非又在荀揚之下矣是以人之有性不能自知自盡而至于命其説不可復聞矣自漢至唐八九百年得大儒韓子始以仁義為性復乎孔子孟子之言其原性一篇髙出荀揚之上至其徒李翺為復性書反復於中庸大學之間以復乎曾子子思之言恨不得親炙之而問其所以然質心之所素定者自唐至宋復四五百年得大儒周子邵子程子張子朱子之書明六經孔孟之旨接續不傳之妙論道論理論才論氣論質論情又備於韓子之書皆先儒所未道者又恨不得親炙之而問其所以然質心之所素定者由宋迄今朔南分裂復二百餘年矣先生及朱子之門而得其傳裒然傳道於北方之人則亦韓子周子之徒也又不得親炙之而問其所以然質心之所素定者性理問學之本也敢以書為請不大鄙外以為可教則幸教焉指其要歸焉則幸甚矣經雖不佞亦敢為北方學者之倡使吾道復明于中國兼晉楚之富必不乾没先生之材矣經再拜上紫陽先生論學書十二月五日陵川郝經齋沐拜書大使先生經生今二十有八年矣自十有六始知問學世有科舉之學學之無自而入焉蠟乎其無味也有文章之學學之無自而入焉蠟乎其無味也退而歎曰利祿其心組繡其辭質日斵偽日翔何區區爾也而狃於俗陷於世有不能已焉者如是者有年始取六經而讀之雖亦無自而入而知聖之學道之用二帝三王致治之具在而不亡也真有用之學也學之今十年矣背馳而左事形示氣露已聚誚而羣議矣是以箝口重足而不敢言動焉日舍館一拜幸先生不以鄙騃置之隅坐霽以懌色煦以春言䑕腹而既果然矣再日而再侍示之以明白純粹之書揭囊倒篋啟之以開廓正大之論正襟而讀之黙黙而思之乃知吾道之果不亡學之果有用斯民其有望矣愚之素所蓄而不敢發可熟數之於前矣夫道貴乎用非用無以見道也天地之覆載日月之照臨皆有用也六經之垂訓聖人之立教亦皆有用也故曰顯諸仁藏諸用盛徳大業至矣士結髪立志誦書學道卒之乎無用可乎哉㓜而學長而立也邇焉而一身小焉而一家大焉而一國又大焉而天下必有所用也鳥獸魚鼈屑屑之物也猶皆有用也蜂蠆虵虺毒世之物也猶皆有用也靈而為人學而為士夫乃反無用可乎哉世有人焉之無伏臘之不辨魯魚亥豕之不分乃辦天下之大事立天下之大節濟天下之大難享天下之大富貴聲色不動而有餘裕焉吾誦書學道之士試之一職則顚蹶而不支委之一事則衂撓而不立汲汲遑遑終其身不能免于凍餒而趨利附勢殞義喪節何也事無用之學也葢自佛老盛而道之用雜文章工而道之用晦科舉立而士無自得之學道入于無用惟其無自得也故内輕而外重外重矣曄乎其曜矣侈於物而衒於人矣文章之所以工也文章工矣功利急矣義理晦矣道之所以入于無用也嗟乎不耕鑿不蠶繅而衣食者謂之游食之民不道徳不仁義而文章者謂之逐末之士甚哉天下之襲訛踵陋而莫之知也大聖大賢不作而逐末之紛紛也天下已亂生民巳弊無有為拯而藥之者之士也方相軋以辭章相髙以韻語相誇以藻麗不知何以堯舜其君民也道其不行矣夫伏觀先生韓子辨正統例還山斆學志洋洋灝灝若括元氣而翕闢之其事其辭其理皆有用者也非世之逐末之文也天其或者悔禍而自先生發源歟不窒塞不夭閼而遂承其流推而放之四海則道之用可白而至治可期也不見誚于江左諸公矣經也小子敢激其流而揚其波乎經載拜與撖彦舉論詩書經白昨得足下詩一巻瑰麗竒偉固非時輩所及然工於句字而乏風格故有可論者詩文之至精者也所以歌詠性情以為風雅故攄寫襟素託物寓懐有言外之意意外之味味外之韻凡喜怒哀樂藴而不盡發託於江花野草風雲月露之中莫非仁義禮智喜怒哀樂之理依違而不正言恣睢而不迫切若初無與於巳而讀之者感歎激發始知己之有罪焉故三代之際於以察安危觀治亂知人情之好惡風俗之美惡以為王政之本焉觀聖人之所刪定至于今而不亡詩之所以為詩所以歌詠性情者祗見三百篇爾秦漢之際騷賦始盛大抵怨讟煩寃從諛侈靡之文性情之作衰矣至蘇李贈答下逮建安後世之詩始立根柢簡静髙古不事夫辭猶有三代之遺風至潘陸顔謝則始事夫辭以及齊梁辭遂盛矣至李杜氏兼魏晉以追風雅尙辭以詠性情則後世詩之至也然而髙古不逮夫蘇李之初矣至蘇黄氏而詩益工其風雅又不逮夫李杜矣葢後世辭勝儘有作為之工而無復性情不知風雅有沉鬱頓挫之體有清新警䇿之神有振撼縱恣之力有噴薄雄猛之氣有髙壮廣厚之格有叶比調適之律有雕鎪織組之才有縱入横出之變有幽麗静深之姿有紆餘曲折之態有悲憂愉怢之情有微婉鬱抑之思有駭愕觸忤之竒有鼓舞豪宕之節若夫言外之意意外之味味外之韻知之者鮮又孰能為之哉先為辭藻茅塞思竇擾其興致自趨塵近不能髙古習以成俗昧夫風雅之原矣嗚呼自李杜蘇黄已不能越蘇李追三代矧其下乎於是近世又儘為辭勝之詩莫不惜李賀之竒喜盧仝之怪賞杜牧之警趨元稹之艷又下焉則為温庭筠李義山許渾王建謂之晩唐轟轟隠隠啅噪喧聒八句一絶競自為竒推一字之妙擅一聨之工嘔啞嚼拉於齒牙之間者祗是天地風雷日月星斗龍虎鸞凰金玉珠翠鶯燕花竹六合四海牛鬼虵神劔㦸綺繡醉酒髙歌美人壮士等磨切錙銖偶韻較律鬭飣排比而以為工驚嚇喝喊而以為豪莫不病風喪心不復知有李杜蘇黄矣又焉知三代蘇李性情風雅之作哉足下之作不為不工不為不竒殆亦未免近世辭人之詩願熟讀三百篇及漢魏諸人唐宋以來祗讀李杜蘇黄盡去近世辭章數年之後髙詠吟臺之上則必非復呉下阿䝉矣經再拜荅馮文伯書十二月十五日陵川郝經謹載拜復書于文伯幕府執事徃嵗車乗過保氣阜色瑩心咸意孚有古所謂氣焉相許不待言而喻者近復領書所以賁繢于塵槁者甚厚諄諄灌灌所以劌厲于茅塞者甚切而明也抑其所謂俟時而動不至猖蹶於愚志固然而閉滯辟左有猶未達焉者其以經為有意於冐進耶抑又動作云為不時乎中形似乎妄吾子得以窺之也經之問學疏蹈道淺失慮左見理未熟而齒穉動不時乎中則有之矣其貪冐妄進枉尋直尺昧於一行倖於詭獲葢亦有之矣而反求之身殆未之見也孰不為動顧其幾何如也君子見幾而作不俟終日有可乘之幾而不動後時之悔無及也未見其幾而妄為之動惡足以為有志之士乎哉君子誦書學道砥節礪行其修已切其植身正固期有用而不與草木腐埃塵飛安忍視天民之斃而莫之救也學而有用亦不脅肩謟笑于未同以求試乎用不以天民為己任而自私也夫有有用之學必有可乘之幾而後動進退雍容必有可觀巍巍堂堂必有可立其致君其裕民其行巳其化今其傳後必有建諸天地而不悖質諸鬼神而不疑百世以俟聖人而不惑者故伊尹耕于有莘之野湯三聘焉而後起孔明抱膝長吟時人莫測昭烈三徃焉而後應彼非敢以布衣偃然而傲萬乗也俟幾與時耳湯仁而漢義是可為之時也夏暴而魏簒是可乘之幾也於是奮然而起卒之乎有殷配天庸蜀繼漢閎肆尊顯莫之與京吾子所厭聞而飫道經亦所竊受教於君子者也經不佞雖不敢望其輝光而亦不至顚沛妄冐周章失措養之乆而傾之亟遂以失己而辱吾徒壅吾道虧喪聲實委斯文於地也經自十有六束髪學道非先秦之書弗讀也非聖人之言弗好也嘗自誦曰不學無用學不讀非聖書不務邊幅事不作章句儒以是而行之殆六七年六經既治思有以奮然而復古也於是作古文不為流俗所為蓋自孔子没異端作楊墨行而聖人之道衰二漢亡佛老盛而聖人之道絶文章工語言麗俗學騖而六經之義晦故忘其菲陋斷然欲有以樹立揭世左馳而不顧僨忤百折而不衂塞吾道之衝盤桓而不進饑寒迫於身而不恤合則進否則止苟遂不合則将委世長徃抱明月以孤騫吸清風而髙蹈續聖賢之墜緒傳之無窮亦不至於失巳而委斯文於地也奈之何家君戴白而無菽水之奉為子之職分未盡也二弟幼孱婚娶未畢為兄之義未盡也為人子而事父未能為人兄而撫幼未能惡在其為道也是以低睂俛首為人講讀餬其口於四方以養老以畜幼以俟時之幾而不以為愧恥其自視猶愈於抱關擊柝者也雖然不為威惕不為利疚不犯非禮不為不義以業自食亦不至於失巳而委斯文於地也士信於知巳非髙明而敢為瞽言若是哉惟髙明亮恕焉經載拜上趙經畧書月日陵川郝經謹齋沐載拜獻書于大行臺經畧相公閣下經自前嵗八月到杞杞屬部内尤宻邇京邑擬額地一拜而布衣疏逺天淵懸而海山隔進而止者屢矣於是黙黙以思以為士雖貧賤而傳言之禮不可廢昔韓文公大儒也三上書宰相以自論薦非戚戚貧賤而汲汲富貴躁舉妄進自輕而失巳也士束髪學道期於有用豈坐視天民腐同草木噤不一鳴瘞九原而巳乎故范仲淹有三年之喪而言事不已或者誚之曰此豈言事時耶仲淹曰士豈以一身之戚而忘天下之憂其意以為天與巳者大已不敢私而小之也一身之戚小而天下之憂大也嫠憂宗周而不恤其緯矧於士乎哉經自十有六始知問學今幾二十年矣失道左見與時背馳亦自知其無用也身之弗修學之弗成親之弗能養家之弗能庇天下於我何有雖然遂欲自棄亦自不忍明天子賢王公在上區區之言可遂已矣今又以事将北轅去執事日益逺胷中之藴蓄者日益甚不避僭越捃摭芻蕘驤首振袂瞻望清光積年耿耿可熟數之前乎夫見天下之幾者能應天下之時撫幾應時而不失焉者能成天下之事業見其幾失其時事業弗立也遇其時失其幾事業弗立也有其幾有其時非其人事業弗立也故豪傑龎艾而無幾與時雖匵竒抱異瑰竒偉岸欲不待文王而興而知不可為即退而窮處與物無競亦不强為以速自弊姦宄驁孽有幾有時不乘之以正應之以道侈然自肆卒錯天下於禍亂骫骳熟爛龍斷詭獲見其幾愉愉而弗乘遇其時苟且而弗應解弛舒緩不能固結人心痿痺國體銷鑠國勢卒之乎天下寖以滅亡幾乎時乎其惟人乎幾與時未嘗無由漢唐以來千有餘嵗有百年而一來者有五六十年而一來者有三四年而一來者有繼日賡月叢㑹而疊來者惟人也不可知故有百年之治而復有百年之亂有五六十年之治復有五六十年之亂亂方弭而復興治方成而遽壊卒不善治生民不免於塗炭有志之士所以痛哭而流涕也國家光有天下四十餘年矣奮起北土奄有燕雲據建瓴之勢以强馭弱遂有河朔比之湯亳周豐髙帝之漢中光武之河内不既大矣乎致治之幾一來而弗乘也并西夏克遼東服齊魯定關中瞰陜窺洛張為龍形蟠亘萬里析天下之脊扼天下之吭而撫其背稍霽威息民足以善治也致治之幾再來而弗乘也繼而蹂荆襄覆汴蔡滅金逼宋有天下十之八降夀春破襄陽舉漢中入成都俘西域形勢既定混一有期棄襟帶而弗固得要害而弗守舍二帝三王之墟而觀兵海外其小天下以為不足治也歟既徃之幾不可追巳幾之來無窮因勢成幾如水之有源遇風而為波也逝者如斯而未嘗徃也後來者如先而未嘗絶也如或見之又可失之乎徃嵗天子踐阼廓清宇内更革弊政振舉綱維修明統紀收偽符命汰濫郵傳責已肆赦與天下更始舉燕雲之南畀之執事湔濯舊汙解釋紛糾藥其瘡痍新其耳目不期月而報政致治之幾復來而又太弟開府都督諸軍天下翕然望治巖穴幽隱莫不彈冠振纓引領拭目將以窺太平之盛也徵車絡繹登崇俊良冠蓋弓旌相望於道則朝廷有意於斯民至厚也可謂能乘致治之幾而應致治之時矣惜乎願治之速進人未盡其選而挾術射利誤蒼生之姦假王之命成其詐謀天誘其衷隨舉輒敗不念朝廷用人愛民之意欲欺天下而卒自欺跋胡㚄尾頓躓狼籍宜矣雖然致治之幾猶在也有如執事之雄剛正大挺不世之資任天下之重斡斗極之運㑹開吾道之榛塞特立獨行不流不倚挽囘元氣春我諸華立志而行之以終用人而加之以審收攬俊乂進用老成張本汴洛為天下倡至治有期矣天下之士没蒿萊局墊隘有年矣苟遇明時孰不欲刮磨振厲以自効矧於執事嶷然而為之倡乎旭日始旦羣隂自伏震雷一驚勾萌盡達嗚呼瞻烏爰止于誰之屋捨執事其將安歸撫幾應時執事之事也談王道議國政士夫之職也是以敢為是言而不忌也異日執事成天下之事業生民樂生雍雍皥皥經又何敢言哉鼔舞康衢謳吟聖世守太行之敝廬足所願矣瞽言滋蔓瀆浼髙明惶懼惶懼經載拜為家君請命書維丙辰夏五月辛卯朔二十一日辛亥不孝男經等頓首拜手言惟天降監篤棐于有忱肆經敢誕籲于天時台郝宗殷庶𦙍罔顯惟曾伯王父及余王父浚源于茲文而大余宗本支肆羡亦罔顯于世天步惟艱厄于南河折于析崩又剡于兇殘幾具盡厥類大割余宗惟遺余孱父俾纘厥緒是天大造不敢不敬是亦天大賚不敢不應若斷菑孽覬于春有夏以考天惠肆逮余冲愚以永以遂而天弗弔集疢厥躬恫鰥于厥中乃在牀第如楚如刈弗克興以寤至于彌留若天斷厥命不宜俾遺以育俾墜厥宗具盡于南河既遺以育是天弗斷命乃有大造于余宗若稽考則亦宜引年俾考終命惟天有明命非台敢私于親越惟余父自時厥立適大艱于身乃奉王父涉于北河于厥喪復奉于宗塋突于戎兵逸于寇場罔敢逭死于佚以考其子義既金墜厥命俘于南河梗踣于邁饑饉喪亂跋涉流亡撫余及弟妹艱關百至以盡其父義四十有五年而無一日之燕惟天降監越經之年有斷以引父命畀余以終養余聞曰始於憂勤終于佚樂若弗引是憂勤以殄獨于余父敢罄究私昧以迓續父命惟天畀矜閔用宏生生陵川集巻二十四
