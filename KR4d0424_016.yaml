body:
  text: 陵川集巻十六元郝經撰圖説易大傳曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業至宋濓溪先生周茂叔推廣其義作太極圖而為之説夫大傳之言固自有次第雖未為圖而圖已具乎其中矣易有太極即此也是生兩儀即此也隂静陽動兩儀生四象即此也四象生八卦即此也坤道成女乾道成男八卦定吉凶吉凶生大業即此也茂叔乃為此圈圖指明其次第以太極本無極為天地人物五行根柢以動陽静隂為太極妙用分隂分陽為太極體段隂陽既分則兩儀立兩儀立則二氣五行行乎其中而八卦成列太極之跡著矣乾統三男坤統三女善惡分而吉凶定太極之功用無窮而人道立矣是以死生化萬物吉凶生萬事而太極之大業成故易窮則變變則通通則久此為圖之大㫖也其説曰無極而太極隂静陽動太極動而生陽動極而静静而生隂静極復動動極復静一動一静互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也坤道成女乾道成男五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣隂静陽動五性感動而善惡分坤道成女乾道成男萬事出矣聖人定之以中正仁義聖人之道中正仁義而已矣而主静無欲故静立人極焉故聖人與天地合其徳日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之説大哉易也斯其至矣無極而太極者包本末貫隠顯一體用極始終而為言也屈信消長之幾氣形象數之藴命性心跡之原天地人物之理造化之樞紐鬼神之情狀道徳之統體無不在焉其曰無極而太極猶曰莫能極盡而莫不極盡焉爾故極者極盡無餘之稱也其上則盤薄無顛而不可窮其下則滙蓄無底而不可測其外則周匝遍滿而不可出其内則旋𦂳嚴宻而不可入渾淪圓轉而無上下内外開廓布置而皆上下内外含𢎞天地人物包括鬼神造化混然一大活物旁行而不流無所不往而未嘗去居其所而變動無窮焉聖人無以指名故名之曰太極易之全體大用皆在夫是矣故孔子謂易有太極邵康節謂畫前有易則太極者易之所固有也庖犧所以畫其故文王所以演其故周公所以效其故孔子所以説其故周茂叔所以圖其故也不畫不演不效不説不圖太極自若也而無所損畫之演之效之説之圖之太極亦自若也而無所益聖人將明易道必指其故以為法於是畫演效説圖之爾學者將求其故必自圖以求説自説以求效自效以求演自演以求畫稽諸天地考諸萬物本諸聖人反諸吾身混然一太極皆吾所固有而後可以言易矣六經無無極二字出於老子知其雄章先儒謂周子得是圖於穆伯長伯長之傳出於陳希夷希夷初為老氏之學故以無極冠太極雖然作圖之義本於易不本於老子言太極之本然無聲無臭而無所不具無所不極雖非六經所有假以明道故謂之無極而太極非太極之外復有無極也太極動而生陽動極則静静而生隂静極復動動極復静一動一静互為其根分隂分陽兩儀立焉者言太極之體以一具兩而本静也静極則動動極則静所以為兩静者動之根而動者静之根互為其根如環之無端所以為一造化之幾生而理具夫是矣動而生陽静而生隂動静為隂陽之幾隂陽為動静之氣變化相乘流行不已各造其幾於是分隂分陽一定不易兩儀之象成而氣具夫是矣陽變隂合而生水火木金土五氣順布四時行焉者天數五地數五五位相得而各有合隂陽動而倡隂感應而合陽一變而六隂合則生水隂二合而七陽變則生火陽三變而八隂合則生木隂四合而九陽變則生金陽五變而十隂合則生土互變互合迭隂迭陽相生相克而成五行隂陽氣也五行質也質具乎地而氣行于天故謂之行也二氣變而為五行之氣布而為四時之行則人與萬物生而數具夫是矣理入于氣氣形於象象别為數而太極之統體具矣自無極至此由本及末自隠至顯一極之終也五行一隂陽也隂陽一太極也太極本無極也者復自一極之終而反之始也非五行之外復有一隂陽隂陽之外復有一太極太極之外復有一無極夫所以為五行者秖一隂陽也所以為隂陽者秖一太極也太極之所本秖一無極也自其分而言之則有隂陽五行之别自其本而言之則皆一太極也五行之生也各一其性者再推本立説也夫動静相根而隂陽立則命之賦予而不已者也五行變化而隂陽分則性之付畀而不易者也分隂分陽五氣順布則水火木金土各一太極而謂之性性命之原著矣性命之原著則人與萬物自是而出矣無極之真二五之精妙合而凝者推本人物之始也無極之真則道之本然也二五之精隂陽五行之精氣也妙合而凝脗合凝聚精氣為物也於是天地絪緼萬物化醇復具一太極而人物生矣乾道成男坤道成女者言人物之所以生也二氣五行凝聚為物得動陽剛之精者為乾道而成男得静隂柔之精者為坤道而成女乾統三男坤統三女分男分女八卦成列人與萬物各一太極而三才具美二氣交感化生萬物萬物生生而變化無窮焉者男女構精萬物化生人自生人物自生物命流而性正質變而氣化生生而不窮自無極太極隂陽五行生出人物而人物以隂陽五行各自相生又一極之終也隂陽分而兩儀立五氣布而四時行真精凝而男女成乾坤位而八卦列二氣交而萬物生太極之道於是備矣惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬物出矣者此復自萬物推人道之極也夫人於真精凝聚之處天命流行之際義理付予之時獨得其秀而為最靈得二氣五行之全而備萬物之理所以配乾道而為男合坤道而成女而其心之神靈復自為一太極分隂而形生分陽而神發具水火木金土之氣為仁義禮智信之性物欲感動或得或失或是或非善惡分而萬事出如萬物之生而為事業亦自為一極之終也聖人定之以中正仁義而主静立人極焉者善惡既分萬事既出非修道立教則人極不立故復以聖人立教為説也太極之在人其本體則静其標凖則中其位置則正其發生則仁其行用則義聖人定此五者使人無欲而主静存夫吉善去夫凶惡以全太極之本然則人極立矣故聖人與天地合其徳日月合其明四時合其序鬼神合其吉凶者聖人人極之極也徳合天地明合日月序合四時行合鬼神則與太極同體而主乎太極矣君子修之吉小人悖之凶者氣質之不同學問之不至故自聖人等而下之又有君子有小人而其徳有吉有凶五者有所不至克已脩身以至之雖不能如聖人之自然而不假脩為則可以為吉人君子以保人極五者有所不至惟欲是從而不中不正不仁不義亂而不能静則為凶徒小人而人極喪矣故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽既分兩儀既立五氣既布四時既行八卦既列男女既别人極既立善惡分而吉凶定隂陽之氣行於天而為天極剛柔之質具於地而為地極仁義之性充於人而為人極分一極而立三極則太極之功用顯而三才道備兼三才而兩之六位時成而太極之全體具易行乎其中而造化無窮本末具舉始終道著死生之説可知矣故又曰原始反終故知死生之説自無極太極發而為動為陽為剛為仁則原其始而生也自無極太極復而為静為隂為柔為義則反其終而死也終根于始始根于終死根于生生根于死互為其根迎之而不見其首隨之而不見其後而天地人物截然而不亂判然而不雜混然而不昧開闔變動生生而不窮主張維持泯然而無間自天地觀之則天地各一太極自五行觀之則五行各一太極自八卦觀之則八卦各一太極自人與萬物觀之則人與萬物各一太極合天地五行人物觀之則共一太極一生一死一見一隠而有不生不死不見不隠者存此所謂無極而太極也易之為道至是極矣故復賛之曰大哉易也斯其至矣此圖既本於易大傳而其説皆掇拾大傳之要區以為言以明易之大義大傳謂生生之謂易故每節皆以生言動而生陽静而生隂陽變隂合而生水火木金土二氣交感化生萬物萬物生生而變化無窮於其末始言生死以為結以一生字貫天地萬物則生者太極之本原也非生則天地萬物皆莫得而見也故讀其説但見生意一篇塞于天地溢于肝臆一太極混含流轉無一息之或死而發育萬物造起天地生生不窮數圈幾字範圍法象自太極内推出動静自動静内推出隂陽自隂陽内推出五行并隂陽五行推出人物自萬物内復推出人自人内推出聖人其次又推出君子小人末乃自始終上推出死生合而為之易以盡易之道仲尼以來無此作也可謂幾聖之學矣初宓犧氏畫八易卦而不及五行箕子作洪範九疇而不及八卦至仲尼贊易説卦之本謂天地定位山澤通氣雷風相薄水火不相射五行在其間而其數不備天數五地數五五位相得而各有合其數備而不舉為行葢八卦成列則五行不復見矣故八卦可以備五行五行不能兼八卦八卦備三才之道五行則備二氣而已是以五行僅為洪範之一法而八卦則具易之全體所以言卦而不言行也洪範本於人故以皇極言易本於道故以太極言故易能兼洪範而洪範不能兼易是以此圖上推無極下窮變化中備三才隂陽五行八卦人物各分四段太極著二氣之本隂陽著二氣之儀五行合二氣之變乾坤男女備八卦之索八卦備二氣五行人物之道精粗巨細無不具脗而合之為一太極非天下之至精其孰能與於此嗚呼按河圖以畫卦先天之易漸著于人道文王備於宓犧周公備于文王仲尼備于周公由宋以來邵康節圖先天以盡卦之理周茂叔圖太極以盡易之道張子厚為西銘合先天太極之㫖總為人道探於宓犧氏之先繼於仲尼之後再造一極而天人之事益備始則天出圖以示人末乃人為圖以契天而始終一圖始則以先天為後天末乃以後天為先天而先後一天於是太極之道貫萬古而無弊焉伊洛諸儒承受開闡推尊擬議以為千載不傳之緒不為妄矣先天圖説先儒謂康節先生得是圖於李之才之才得之於穆脩脩得之於希夷先生陳摶葢自宓犧氏畫卦巳具此圖而未為之圖其意言象數心傳口授至希夷而傳諸其徒至康節而遂為之圖示之人而筆之書爾其圖自圓而方有畫無文其制作本意則具於皇極經世書觀物諸篇其言論風㫖則凡而不目曰圖雖無文吾終目言而未嘗離是葢天地萬物之理盡在其中矣曰先天之學心也後天之學迹也出入有無生死之間道也曰先天之學主乎誠至誠可以通神不誠不可以得道曰先天圖者環中也有是數語而已葢引而不發欲學者潛心究意以求心法知天地萬物不外此心無畫之卦無體之易無方之神盡在于是則圖亦為筌蹄矣經自束髮問學即以是圖心觀意㑹迄今二十餘年始則見黑白于紙上後乃見動静于心中涵茹既久推而放之則見開闔於天地參錯于萬物變化于鬼神重重相因井井不紊死生消息莫非自然反之于心㑹為一圖乃申而為之説以明先生之意云按乾之文言曰大人者與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時先天之文昉乎此仲尼以之贊大人也先生之學大人之學也以為能造天地者太極能先天地者此心也盡心窮理與道不違黙執左契無往不合我亦一太極亦能造一天地於是謂畫前有易而以先天名圖先天即太極也故濂溪先生則圖太極先生則圖先天其原則皆本於河圖昔者宓犧氏當制作之時將造書契以代結繩開斯文之統作易以明道面目太極以為萬世用則必假物以示象於是因河圖而畫卦仲尼曰河不出圖吾已矣夫言雖無圖亦當制作也故伊川見賣兔者謂此兔亦可作八卦宓犧見河圖而畫卦孔子感麟而作春秋取神物之至著者以發端爾故有理而後有象有象而後有數象數既具理在其中而當其可即物而皆可畫也前乎宓犧豈無聖人不當其可雖有河圖而弗畫也後乎宓犧豈無聖人不當其可復有河圖亦弗畫也當其可而圖出焉則宓犧所不得辭是以畫之以為大經大法之始雖曰後天其實先天也然不知何以為圖何以為畫按大傳河出圖洛出書聖人則之而不言其何者為圖何者為書何以為則書顧命謂天球河圖在東序則河圖乃一物厯代以為寳然亦不知其為何物與其圖之所以制作度數孔子又嘗嘆鳯鳥不至河不出圖終不知其所以為畫所以為卦周官雖有太卜筮人並言三易而亦不言圖書之所以為卦由漢以來孔安國劉歆闗朗謂大傳之天一地二天三地四天五地六天七地八天九地十為河圖去十用九而為洛書遂以河圖為八卦洛書為九疇而大傳與書皆無明文亦無㸃誌孔子則並稱河圖洛書聖人則之不别為八卦九疇然河圖之數凡五十五洛書之數凡四十五而河圖十位洛書九位不知其何以畫三卦八重而為六錯綜為六十四若以位言則去九與十而一二三四五六七八合夫乾兑離震巽坎艮坤之序然不知其所以為卦所以為畫雖為推衍湊定不免牽合不能合夫畫三卦八之所以然若以生成之數而言則一六為水二七為火三八為木四九為金五十為土秖成五行而無八卦亦無三畫若以五十為衍母一九為衍數則揲蓍求卦之法非按圖畫卦之本河圖卦之本數蓍策擬卦之數故謂之衍謂之象謂之參天兩地而擬數衍則推之象則放之擬則比之也蓍䇿出於卦畫非卦畫出於蓍䇿也夫神生數數生象象生畫畫生卦而後蓍贊神神藴象象成數數成畫畫成卦十有八變而成卦八卦而小成六十四而大成故卦畫非㸃誌之牽合河圖之象固有之宓犧因而畫之也按大傳曰易者象也象也者像此者也圖則圖像云耳易之為畫象河圖之像也夫道有一即有二二者一之耦也至於三四五六七八九十皆本然之一二至十而終之耳至於百千萬億皆是也故有静即有動有隂即有陽有竒即有耦死為生根實為虚形地為天體月為日魄莫不兩兩對待以成變化而後生生不窮所以為易也故大傳謂天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也即河圖本然天地相錯初無㸃誌亦無文字秖如是耳天地象數卦畫蓍策皆具其中太極為道之物主静而本隂以静生動以隂含陽故此即太極所謂天地之中也從中因起以一具兩一竒為陽三耦為隂陽旋轉而上而為天隂翕聚而下而為地相銜相次兩兩相因各環乎中内則參天兩地而為五外則參地兩天而為十於是一三五之間而有二四以竒兼耦天中有地而陽根隂六八十之間而有七九以耦兼竒地中有天而隂根陽參天兩地則隂從陽參地兩天則陽從隂於是參伍錯綜互相依附陽伏乎隂隂伏乎陽天依乎地地依乎天隂陽相為倚伏天地互相依附陽變隂化天推地盪開闔聚散擺拉旋轉人與萬物莫不各具一天地以本太極三才兼兩卦畫自成不假作為而莫非自然故一三五之三天而自為乾二四六之三地而自為坤一天依二地而自為震一地依二天而自為巽二天間一地而自為離二地間一天而自為坎二天依一地而自為兑二地依一天而自為艮太極動而生陽一變為天自子變而進信而為神繼道成性左旋行徤故一天為震二天為離兑三天為乾至午則極竒而窮上静而生隂二化為地自午化而退屈而為鬼歸根復命右轉處順故一地為巽二地為坎艮三地為坤至子極耦而窮下故一竒一耦合而為三錯綜天地為易真數陽卦則天包乎地隂卦則地包乎天三竒三耦自成本然三畫竒耦相參自成本然六位重卦已在其間矣又益之以兩而天地各五者所以極數之終著重卦之六為蓍䇿之本也太極不動而居中則不用之一也非不用之一無以為有用之兩故五天五地各一太極而為六太極則成始之一十則成終之一天地之數各五而不用者各一故一與十如初上其四則中爻也乾知太始故有一而無十坤作成物故有十而無一分而言之内各具天地之三因一以生三外各因天地之三加兩以成三合而言之天無十因地以成十地無一因天以為一於是乎竒因十以成耦耦因一以成竒始則陽因陽隂因隂終則陽因隂隂因陽重重相因從中因出如水之漣漪卵之渾淪而無間斷道之體用備内外合脗而為一别而為兩畫三卦八重而為六錯綜而為六十四易於是乎與天地凖矣故大傳復曰參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象極道之變所以為易固無㸃誌之牽合也此則河圖之本然卦畫之具體具在而未畫未分也故大傳復明畫三卦八之所以然曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業夫太極一也非一莫能生兩故太極以一具兩為易之樞機天地萬物之根柢旋轉而生生而又生所以為易而為竒耦之原也故一分而為二二分為四四分為八别圖定象其序如此其下之如此者即圖中之太極以一具兩者也所以動而生陽為此也静而生隂為此也此即為竒此即為耦故太極生兩儀乃圖之天一地二也動静相根隂陽相乗竒耦相因生而又生一陽一隂生氣而本陽一剛一柔生質而本隂故兩而又兩兩儀生四象乃圖之天三地四也隂陽之氣各有太少於是為太陽太隂少陽少隂剛柔之質亦各有太少於是為少剛少柔太剛太柔故四而復四四象生八卦乃圖之天五地六也祇加一倍分而錯之耳於是分圖立畫以天之一二三地之二四六相交相合為兩儀四象八卦之以次縱加横分分而為三定易之真數别為上中下以象天地人於是道生一一生二二生三各以兩抱一成變化行鬼神定吉凶生大業而發育萬物開闔天地者如此為畫而為陽剛者如此為畫而為隂柔自二而四自四而八三變而成竒耦三畫自具八卦遂盡三天三地之變乃分圖立卦天天天五三一竒竒竒乾地天天二三一竒竒耦兌天地天三二一竒耦竒離地地天四二一竒耦耦震天天地五三三耦竒竒巽地天地四三二耦竒耦坎天地地五四二耦耦竒艮地地地六四二耦耦耦坤三天純竒曰乾二天依一地復竒而耦曰兑二天間一地竒耦而竒曰離一天依二地竒而復耦曰震一地依二天耦而復竒曰巽二地間一天耦竒而耦曰坎二地依一天復耦而竒曰艮三地純耦曰坤遂畫為之卦卦於是乎小成復於一卦之上各加之八八卦相錯而為六十四卦於是乎大成是以小成因大成大成因小成各具天地之中太極為竒耦之中三為五中五為十中具備天地之數而成六爻不假作為而莫非自然於是畫三卦八開闢一天地推出無窮天地藴藏無窮天地小成之八大成之六十四小衍之十大衍之五十天數二十五合而為五十地數三十合而為六十五十為蓍數其徳圓如天六十為卦數其徳方如地六乾之六為三十六為乾之策四坤之六為二十四為坤之䇿一二三四五為竒卦之策六七八九十為揲扐之䇿七七四十九為蓍之用以象天其一為不用之用以象太極八八六十四為卦之體以象地其四為不易之體以象太極始於竒耦一天地終于蓍卦一天地故卦畫重卦蓍策無不備於河圖著乎八卦之中矣此宓犧氏之所以聖也及周文王一卦之上遂各加八而遂重之因其本然而無我其間兩兩而重分為上下著其義而為之名繫之辭以明其理兩兩反對以示其變以連山起艮歸藏起坤皆非河圖天地之固有乃首乾坤而命之為易易變易也所以變易宓犧之卦盡道之變而為萬世之用也故為乾下乾上乾坤下坤上坤震下坎上屯坎下艮上䝉乾下坎上需坎下乾上訟坎下坤上師坤下坎上比乾下小巽上畜兑下乾上履乾下坤上泰坤下乾上否離下同乾上人乾下大離上有艮下坤上謙坤下震上豫震下兑上隨巽下艮上蠱兑下坤上臨坤下巽上觀震下噬離上嗑離下艮上賁坤下艮上剝震下坤上復震下旡乾上妄乾下大艮上畜震下艮上頥巽下大兑上過坎下坎上坎離下離上離艮下兑上咸巽下震上恒艮下乾上遯乾下大震上壯坤下離上晉離下明坤上夷離下家巽上人兑下離上睽艮下坎上蹇坎下震上解兑下艮上損震下巽上益乾下兑上夬巽下乾上姤坤下兑上萃巽下坤上升坎下兑上困巽下坎上井離下兑上革巽下離上鼎震下震上震艮下艮上艮艮下巽上漸兑下歸震上妺離下震上豐艮下離上旅巽下巽上巽兑下兑上兑坎下巽上渙兑下坎上節兑下中巽上孚艮下小震上過離下既坎上濟坎下未離上濟六十四卦分為二篇上經起於乾坤終於坎離下經起於咸恒終於未濟雖皆本於八卦由其變動綜錯故其位置不同仲尼贊易乃於天一地二易有太極明宓犧畫卦之本而皆倍起一本於數於天地定位山澤通氣雷風相薄水火不相射明宓犧八卦之位則乾上坤下離東坎西兑東南艮西北震東北巽西南由乾而左則乾一兑二離三震四由巽而右則巽五坎六艮七坤八分而為二而皆反對於序卦有天地然後有萬物有男女然後有夫婦明文王重卦之序亦分而為二而皆反對於帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮明文王八卦之位則乾西北坎正北艮東北震正東巽東南離正南坤西南兑正西乾統三男坤統三女退位錯處以用為位而不反對然而自宓犧畫卦而畫前之易始著自文王重卦而畫後之易始備於是宓犧之卦不復特見而盡為周易矣葢宓犧之卦即有文王之重文王之重舉是宓犧之卦故仲尼謂宓犧之罔罟佃漁則取諸離神農之耒耨之利則取諸益黄帝堯舜之垂衣裳則取諸乾坤未嘗重卦已有其象故又謂八卦成列象在其中因而重之爻在其中則易宓犧之先天八卦乃文王之先天重卦乃周孔之先天故周公為爻辭孔子作十翼以聖繼聖不敢舍犧文而自為殆天下之理不能外夫是矣其後揚雄為太𤣥闗朗為洞極司馬光為潛虚皆以凖易而不由犧文卒皆重複造鑿雖揚雄之太𤣥得數之理而方州部家一定而不易不能如八卦之可以錯綜為卦從横成象而不離竒耦二畫之本然是以不免於屋下架屋牀上疊牀之譏矣至康節先生出此圖脗合犧文之卦自其重而觀之則皆文王之卦也自其純而觀之則皆宓犧之卦也自一卦而為八則皆始畫之序也合八卦而為圖則皆河圖之位也故圓圖其始分河圖之數未分畫重卦則有此圖以著固有故易有太極即所謂環中與心也乃圖之中虚者此也一分為二是生兩儀即卦之初畫一隂一陽此也二分為四故兩儀生四象即卦之二畫一隂一陽各兩之此也四分為八故四象生八卦即卦之二畫二隂二陽又各兩之此也八分為十六即重之四畫四隂四陽各兩之此也十六分為三十二即重之五畫八隂八陽各兩之此也三十二分為六十四即重之六畫十六陽十六隂各兩之此也中分二體各具四卦横列六位分為内外其内秪一隂一陽其外亦皆一隂一陽秪固有之天一地二其序不紊自左而右自陽而隂皆太極固有之兩河圖本然之十故成此圖既分而為重而為卦乃成此圖左三十二卦自一陽為復至六陽為乾内皆陽畫為乾兑離震四卦自震向乾左旋其卦外皆各具乾兑離震巽坎艮坤亦皆自震向乾左旋右三十六卦自一隂為姤至六隂為坤内皆隂畫為巽坎艮坤四卦自姤背乾右轉其卦亦皆各具乾兑離震巽坎艮坤亦皆自姤背乾右轉是圖本以説卦天地定位一節下數往者順知來者逆是故易逆數也為法故先生謂數往者順知來者逆若順天而行是左旋也皆已生之卦也故數往也逆天而行是右行也皆未生之卦也故知來也夫易之數由逆而成爾此制圖之本意也故其内之一隂一陽而統夫八者不易之體也外之隂陽相錯而各具夫八者變易之用也變雖八而不變其序者雖易而不易也乾直午坤直子隂陽之極也離居東坎居西隂陽之中也震巽兑艮居於四隅隂陽之偏也乾兑離震在天為陽在地為剛巽坎艮坤在天為隂在地為柔四象於是乎具八卦以之分也隂生於午而並乾陽生於子而並坤隂根陽陽根隂也乾盡午中坤盡子中窮則變也剝復夾坤夬姤夾乾死生之交變通之本雖盡而不盡隂陽之幾要造化之原委太極之本然所以易與天地凖乾坤毁則無以見易者也故先生謂天生於動者也地生於静者也一動一静交而天地之道盡矣動之始則陽生焉動之極則隂生焉一隂一陽交而天之用盡矣静之始則柔生焉静之極則剛生焉一剛一柔交而地之用盡矣又謂無極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為復父生長女而為姤是以陽始於復而隂起於姤也自乾至復隂在陽中則隂逆行自坤至姤陽在隂中則陽逆行自復至乾則陽在陽中皆順行自姤至坤則隂在隂中亦皆順行於是天地相銜隂陽相交晝夜相雜剛柔相生其理自然而其變無窮其皆本於乾者先生謂陽尊而神尊故役物神故藏用又謂陽者道之用隂者道之體陽幾於道故以况道也是以圖自中起而止於中始於乾而終於坤也乾兑離震居東南為陽而震離為春當丑寅夘兑乾為夏當辰巳午巽坎艮坤居西北為隂而巽坎為秋當未申酉艮坤為冬當戍亥子乾知大始坤作成物也故先生謂乾坤定上下之位坎離列左右之門天地之所開闔日月之所出入是以春夏秋冬晦朔弦望晝夜長短行度盈縮莫不由乎此矣此圓圖之理也圖之既為圓而備之矣又為方以變之者復推本三聖脗合一易以盡卦畫之變也其在圖之中者象宓犧變圖畫卦之始也按大傳蓍之徳圓而神卦之徳方以知神以知來知以藏往圓方之文昉乎此仲尼以之贊蓍卦也圖所以盡蓍卦之理也圓象天天象道信以知來太始之體盡矣方象地地效法屈以藏往成物之用盡矣故先生謂圓者河圖之數方者洛書之文圓者徑一圍三重之則六方者徑一圍四重之則八裁方而為圓天所以運行分大而為小地所以化生天變方而為圓而常存其一地分一而為四常執其方圓者尅方以為用方者引圓以為體天以體為基而隠其基地以用為本而赫其用故既為之圓而又為之方也圓方相乘八卦相盪天覆地地載天天地相合天中有地地中有天地下有天天上有地天體動一氣旁薄運轉而不移窮上而不窮地體静一脈錯綜迴環而不易極下而不極可謂盡天地之情狀而見天地之心矣故希夷謂龍圖天散而示之宓犧合而用之仲尼黙而形之言天以太極兩儀四象八卦之象列而示之人宓犧則畫為乾兑離震巽坎艮坤用而合諸天仲尼則為太極兩儀四象八卦之言以形其所以然也故濂溪則推出太極本然一物而具兩體動静相根隂陽之精互藏其宅者合一坎離并五行二氣以示之象先生則舉太極八卦之全具於未畫之前推本宓犧之卦倍而相因具於已畫之後錯綜文王之重為六十四者合而為之圖既為之圓又為之方以盡四聖人之意一易之變也故方圖字位過密無法显示兑二萃兑二咸困大過隨革兑二兑夬離三晉旅離三未濟鼎噬離三嗑離睽大有震四豫小過解震四恒震四震豐歸妺大壯巽五觀漸渙巽五巽巽五益家人中孚小畜坎六比蹇坎六坎井屯坎六既濟節需艮七剝艮七艮䝉蠱頥賁艮七損大畜字位過密無法显示從横逆順左右上下其卦皆八以圓圖之左旋者乾兑離震自下而上横疊之皆四行其下皆純卦其初畫皆陽也其上各具八卦其序則亦乾兑離震巽坎艮坤順而不紊也以圓圖之右轉者巽坎艮坤復自下而上横疊之亦四行置於震之上其下亦皆四純卦其初畫皆隂也其上亦各具八卦其序亦不紊其乾兑離震巽坎艮坤於是陽下而隂上乾始於西北坤盡於東南否隔於西南泰交於東北地南天北地下有天隂南陽北隂中有陽由西北自下而上觀由西南自上而横觀由東南自上而下觀由西南自否直泰而斜觀由西北自乾直坤而斜觀隨行而上觀復隨行而横觀皆不紊其乾兑離震巽坎艮坤之序破圜為觚反上倒下而充周縝宻停當妥帖一無矯揉造鑿之私而莫非自然此方圖之理也始則坤下而乾上今乃乾下坤上以體為用交為一泰始則渾渾沌沌形圓而不可破終則紛紛紜紜鬭亂而不可亂布散退藏隂陽不測順而數之則知天地之已然逆而致之則知天地之將然破壊無窮天地推出無窮天地再造一易而不外乎羲文周孔圓圖既盡其妙方圖復盡其變一以見其體一以見其用一則為竒一則為耦一物而具二體亦一太極也前乎宓犧有易而無畫後乎宓犧有畫而無文至乎文王有文而無説至乎孔子有文而有説於是不可復加矣由孔子而來學者忘夫易與畫而不勝其文與説又入于術數而壞于穿鑿故先生脗合犧文置易畫前裁為圓方藴易畫後不為辭説一掃秦漢以來千五百年支文蔓語於仲尼氏之復復立一宓犧氏以著本然之易嗚呼先生之學可謂幾於聖矣道本於一行於二復於一静者一之體也動者一之用也動所以行夫静二所以終夫一也一動一静道有太極而理之體具矣極信而長神則生矣極屈而消鬼則生矣一二生三數則生矣竒耦具兩象則生矣神鬼數象是生萬變理之用具矣一動生陽一静生隂一隂一陽太極有天而氣之體具矣陽精焞麗日則生矣隂魄分曜月則生矣陽暉昭布星則生矣隂體潛構辰則生矣日月星辰是生萬象氣之用具矣静隂生柔動陽生剛一剛一柔太極有地而形之體具矣一剛化柔水則生矣一柔化剛火則生矣剛根於柔木則生矣柔藴於剛金則生矣水火木金是生萬物形之用具矣動静有理隂陽有氣剛柔有形五行八卦合為一易乾道成男坤道成女一男一女太極有人徳之體具矣静隂不易命則生矣動陽變易性則生矣剛宰不易心則生美柔見變易情則生矣命性心情是生萬事徳之用具矣道形而上推而下之貫極而為一理貫天而為一氣貫地而為一形貫人而為一徳而道之大體具人形而下推而上之貫已之一徳貫地之一形貫天之一氣貫極之一理而道之大用具於是道貫天地人理貫氣形徳人貫地天道徳貫形氣理而上下一道一理貫萬變一氣貫萬象一形貫萬物一徳貫萬事而從横一道神貫鬼數象日貫月星辰水貫火木金命貫性心情而始終一道動貫陽剛男静貫隂柔女變貫象物事事貫物象變而反復一道故孔子謂吾道一以貫之其理葢如是矣然而道之功用委之太極著之天地萬物而歸之人人必一其徳而後可復歸于道故人得其道則謂之徳失其道則謂之不徳必立命養性存心制情以一其徳而致諸道人得其道則天地萬物得其道人失其道則天地萬物悖其道故孔子又謂一日克巳復禮天下歸仁焉以道觀人則道貫人以人觀道則人貫道人能貫道然後可以踐形下學上達乘化入聖盡在是矣陵川集巻十六
