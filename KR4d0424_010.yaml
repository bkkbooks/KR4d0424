body:
  text: 陵川集卷十元郝經撰歌詩宿鐵塔寺西風蕭蕭暮煙溼滿袖青攜亂山入枯雲黯慘忽蔽空未及黃昏陡昏黑行行暝投荒寺宿繫馬階除劍懸壁中庭一塔揭暝色倔強生獰半生澀鐵龍雷轟不能蟄怒尾呀天轉張磔須臾蜚雨過前山密灑窗扉寒淅瀝黃塵萬事隨雨來壯懷零落憂思集學成書劍兩無用竟作窮途奔走客短衣著處逐秋蓬誰信胸中有長䇿孤燈照夜耿不眠老焰憧憧動輕碧寤言欲問復無言抱膝長吟轉蕭索楷木杖笏行金源以來進士登第例授楷笏無則以槐代之今曲阜祖庭有孔道輔釋褐時擊蛇笏殷血猶在橫絡一線旁迸數砂粒色若棗漆以水濯洗則其色鮮紅如新濺著者今此笏乃其尺度故制也孔氏族人又以長材為杖以贈好事者乙卯秋九月經拜謁墳林家長翁以笏杖各十相貽故為賦此兩楹夢斷壞梁木天出斯文生宰木翳雲擁霧二十里虎踞龍蟠泰山足道德仁義為根株禮樂枝葉光扶疏芘蔭百代吾道尊户有絃誦家詩書中間楊墨常蠧食重欲剪伐逢老釋崔嵬柯幹尚生意千古堂堂孟韓力年來旦旦加斧斤幹為扂楔枝為薪知音抱去甚泣玉觀者掩面如悲麟大橫庚庚紫蛇腹手版霑恩照緋緑老儒扶藉見聖人豈並枯藤與桃竹斯文將墜吾道亡不絶一線甚濫觴豈為區區徇枯木亦如告朔存餼羊孔氏家庭手植檜楷樹相望閲千世亂來秦火幾番燒土黑灰寒共憔悴靈光殿基秋草深牧童相喚穿墳林青蛙亂聒顔氏井飢烏落日啼白禽佩玉長裾新進士回視詩書等間事赭袍白馬飛將軍濶劍長槍不識字中原慘慘無神靈白骨蔽野無蒼生只知下石誰手援老夫有淚洪河傾皇極厄會數流血誰與澄清倒溟渤摩挲東家扣脛杖拂拭囊中擊蛇笏會當立聖蠲祅昏鞭擊魚龍起春窟手植檜孔子像稷降播種生百穀封植積纍鍾運木東枝扶桑西昧谷柯葉薈蔚盛文物七百餘年開世卜子欲代母彗東出仲尼傷麟掩袂哭手植庭檜鍾遺躅三代脈絡拱把續先王遺澤不滅沒歲寒髙隱闕里屋忽遇秦火傷老佛榱崩棟折不可復民莫芘蔭殃禍酷千年餘根重儲蓄孔庭家傳深韞櫝遺我尺許香馥郁手澤膏潤如紫玉道德根株太極骨神雖無方像髣佛刻劃乾儀鏤坤軸象環綦組殷士服瀾翻海口與河目突兀六經還在腹梁木可仰天未祝元氣不死生意足不須金身駭氓俗見者再拜重祗肅文楷十里泰山麓墓前舉是韋編竹聖世不絶生民福我欲載之告四隩斥去偽邪信抑屈矯矯更用擊蛇笏并以楷木及墓竹緝神室故云梁甫吟南山有芙蕖北山有鯉魚河乾石亦爛海竭桑亦枯于嗟乎將安歸乎南山有鵷雛北山有蒲蘆蒼梧竹不實朝陽桐亦枯于嗟乎將安歸乎秋蘭兮青青秋菊兮有英美人兮不來芳菲兮滿庭望美人兮山之阿褰桂子兮披緑蘿美人兮不來臨風兮嘯歌荒山陂陀六龍蹉跎雲雷不從將奈之何封松行始皇登泰山風雨暴至避於五松下已乃爵松為五大夫今其處猶有稚松存焉乃為賦此六國西移周道絶草木盡汙秦兵血泰山山頭五株松黛色猶參周日月文武成湯深雨露八百年來養貞節祖龍一旦侈心生坑深不用諸儒説千乘萬騎壓山谷檢玉泥金自銘德鬼神呵禁不容上振雨凌風力飄蕩人誅未即即天誅欲使碎骨千年障偶來擇音幸偷生濫爵斜封重誣謗真松本自如魯連泰山豈不如林放山東赤帝子已生山靈亦己居芒碭秦王雖云幸余亦為松悲君不見湘妃祠前風雨夕赭山伐木一無遺乙卯秋九月十九日登泰山太平頂窮秋老雨四十日坤軸欲爛隂霾纒我來方作泰山遊玉虹一夜收雲煙山靈奕奕生喜色突兀撑裂青羅天輕裾飄飄過黃峴乘興直到三峯前霜餘灌木出秋色萬疊紅錦幪椒巔泓澄寒溜浸太古翠壁細瀉珠璣圓當時秦漢極侈麗未必如此皆天然天門中斷兩屹立箭筈一磴蛇蜿蜒凌層絶頂肆崇峻佇立矯首望八埏長天沉沉入西極九州却在東海邊衝風慘淡萬里來海窟徑刮鯤鯨涎須臾白雲生嶽麓腳底泱漭無山川秦壇周觀覺浮動滿地覆冒兜羅綿忽疑山移入海中白浪四洶虛濤掀山隂瑰詭光怪出赤氣翠暈相鈎連下從谷底上碧落寶塔萬級髙蟠旋遂登日觀叱日馭六龍倒著珊瑚鞭玉鱗剝落金甲拆九芒迸綺生血鮮三山搖蕩海水沸蓬壺縹眇來飛仙為言此色與此界君自固有非塵緣恍然記悟復無語把手一笑三千年華不注行崑崙山巔半峯碧海風吹落猶帶溼意氣不欲隨羣山獨倚青空逈然立平地拔起驚孱顔劍氣徑插青雲間濟南名泉七十二會為一水來浸山我來方作鯨川遊玉臺公子邀同舟君山浮嵐洞庭晚小孤滴翠清江秋酒酣興極煙霏昏魚龍慘淡回山根少陵不來謫仙死舉杯更欲招其魂魂兮不來天亦老元氣崔嵬山自好超超絶頂凌長風注目東溟望蓬島㟙山陵行五國興王兵一旅并滅兩家都一鼓燕雲忽使遼作金汴洛遽令齊代楚乾坤入手肯與人根本未牢難遂取漢人且使漢人看一旦不須煩再舉當時若欲存中國只向京師留少主石家父子尚徒勞今次重來渾浪語邦昌數月又劉豫二子猖狂都不悟誤添鱗角欲為龍刮盡肌膏送兵賦我為其德爾為讐百姓囂囂怨嗟聚君親無將將必誅大寶何人敢叨據臣節便棄真鹵莽侈然竟致人神怒八年辛苦漫經營兩手歡欣却分付祖宗天位爾乃姦倉皇被執欲免難㟙山山前齒己冷道君猶自在三韓當時徼幸學敬塘錯把金源比契丹地下若逢張孝純赤汗滿面不敢看劉豫何須責邦昌先己爾莫言從權為社稷爭忍便受傳國璽君不見滎陽紀將軍也曾詐作漢天子漢王既脫不用生鼎鑊談笑就一死居庸行驚風吹沙暮天黃死焰燎日橫天狼巉巉鐵穴六十里塞口一噴來氷霜導騎局脊銜尾前氊車轣轆半側箱彈筝峽道水復凍居庸關頭是羊腸橫拉恆代西太行倒卷渤海東扶桑幽都却在南口南截斷北陸萬古強當時金源帝中華建瓴形勢臨八方誰知末年亂紀綱不使崇慶如明昌隂山火起飛蟄龍背負斗極開洪荒直將尺箠定天下匹馬到處皆吾疆百年一僨老虎走室怒市色還猖狂遽令逆血灑玉殿六宫飲泣無天王清夷門折黑風吼賊臣一夜掣鎖降北王淀裏骨成山官軍城上不敢望更獻監牧四十萬舉國南渡尤倉皇中原無人不足取髙歌曳落歸帝鄉但留一旅時往來不過數歲終滅亡潼關不守國無民便作龜兹能久長汴梁無用築子城試看昌州三道墻北嶺行中原南北限兩嶺野狐髙出大庾頂舉頭冠日尾插坤橫亘一脊繚絶境五臺南望如培塿下視九州在深井上有太古老死氷沙埋土食光炯炯盤磴滑硬草無根枯石摩天墮生礦南人上來不敢前撲面欲倒風色猛坡陀白骨與山齊慘淡萬里殺氣冷嶺北乾坤士馬雄雪滿弓刀霜滿頸稀星如杯斗直上太白似月人有影寄語漢家守城將莫向沙場浪馳騁懷來醉歌胡姬蟠頭臉如玉一撒青金腰線緑當門舉酒喚客嘗俊入雙䏬聳秋鶻白雲亂卷賔鐵文臘香一噴紅染唇據鞍側鞚半林鬛春風滿面不肯嗔繫馬門前折殘桞玉液和林送官酒二十五絃裝百寶一派氷泉落纎手須臾髙歌半酡顔貂裘潑盡不覺寒誰道雪花大如席舉鞭已過雞鳴山雞鳴山行一峯竒秀髙插空萬馬踏碎青芙蓉桑乾黑浪落絶壁霜淨天澄更覺雄窮邊絶徼誰曾顧千古行人少詩句渾如定武看嘉山絶勝齊州華不注沙陀行老鼠山隂界墻北隱隱磷磷起沙磧泉腴草薦地髙寒王氣瑰雄當斗極幾回秦漢儘消沉隔斷中原沒行迹坡陀瀰漫重復重舊濼新尖宛如一天傾海倒白浪枯中有生龍千萬匹雲屯霧郁無半岸水灔煙浮川谷溢騵驒窟宅簸蕩寬騄駮康莊戛磨密參差不斷動魚文洶瘇相銜翻蟻隙噴風掣電脫兔疾色别羣分鮮錦織春回凍裂怒蹄齧踏碎氷天轟霹靂分馳茁壯賈餘俊突兀權竒綰生力角伏踠促口義豁目凸銅毬凹溝脊鯨鬛瀾翻鳯臆橫山字圓平尾梢直飄飄舉是萬里足往往玉立八九尺雪壓草根脂滿口不解人間有皂櫪腹腴氣猛穩且馴不喜牽籠喜迎敵隘視河山渾一抹仰首西風聽鳴鏑古來伯樂未曾見天下更無多馬國國初西北半天紅房駟光芒繞天策帳前白馬飛下天青草年年益蕃息開國一戰何所須木鎗五千跨生駒百萬山崩排堵墻乘勝逐北過燕都更得金源四十萬大青小青絶世無回戈却取西南夷奄有渥窪與余吾長鬚巨鼻入監牧大宛空羣王作奴崑崙蹴平飲河源瑶池月窟皆長驅沙陀拓境數萬里驥騄驍騰古無比金粟堆空漢月沈馬上真人作天子釁端不在宴賜年斗尾堆金勢難止西域既定右臂舉皂旗隨風便南指迅鋒踏破李王城抄騎直入杏花營小關透漏潼關敗嶢峯扶出汴梁驚黃流見底江漢狹我馬正渴方橫行中原無人馬有足殘城破屋不足平風聲鶴唳皆落膽但言有馬不問兵既平西海復南海馬鳴蕭蕭回斾旌歸來罷戰合長圍令如殺敵誰敢違包山絡海數千里兩稍把手隔年期一朝圍合密鐵匝馬耳戢戢為藩籬百獸擁起自衝蹙骨牙挂角傷毛皮先開一面放三日然後共施弧矢威黃羊野馬不足數躪躐貙兕驅熊羆赤霧不散肉山赭乾坤模糊血淋漓長楊上林莫大誇舍長露短彼一時向令見此無復獵相如枉用多文辭以戰為獵國俗然况乃萬里皆鞭笞馬多地廣兵力徑將士能將馬為命終身騎射不離鞍辛苦生獰殆天性每將飢渴勒狂橫一飽一肥無復病俊逸都無水草態變化自有真龍性鼓鼙聲動便開張人人據鞍皆王良直入飲血齧頭顱查牙生人潤枯腸所向空濶都無敵遂令四海皆天王馲駝錦背髙崔嵬玉帛萬國來梯航琵琶絃急曳落髙酡顔半醉馬乳香玉脂瀲灧玻璃滑浮動酥顆金粟黃供官大羣肉擁腫揮霍鴻洞如酒漿馬頭一璞驚孱顔橫截數尺琢玉鞍鞗革編珠排碎錦繁纓小鈴絡金鐶前朝不數大無價九采奪目誰敢看五花虎文稱裝束踏地恐破驕且間大官牽來至尊御馬前拜舞朝百蠻此時息民立紀綱泰山四維萬世安地無與大兵無強何用更舉秪自殘天生此馬為天下敵盡兵窮亦當罷五十年來不摘鞍安得瘡疲被王化但願沙陀馬無數會見中原有新户深宫九重不動塵永使驊騮脫羈馵化城行東郊野馬如馬驚依稀隱約還成城參差雉堞雲間橫鰲頭岌嶪擎長鯨壯哉三都與兩京殿閣樓觀頏空明丹艧峭麗欹且傾煙氣荏苒搖斾旌其中似有百萬兵是邪非邪寂無聲秦邪漢邪杳難名長風忽來一掃清赤日如血髙天青霜淨沙乾雁鶩鳴路傍但見棘與荆秪有慘淡萬古情人間城郭幾廢興一抔聚散皆化城君不見始皇萬里城長城人土並築頑如氷屈丐按劍將土蒸堅能礪刀草不生神愁鬼哭枯血腥殺人盈城著死爭只今安在與地平平地深谷為丘陵江南善守鐵甕城城外有田不敢耕西北廣莫無一城控弦百萬長橫行身為心城屋身城一朝破壞俱化升佇立感化參玄冥乾坤翻覆一化城鐵堠行漢家窮兵漠南無王庭解甲百萬標北庭髙摩斗尾似隂山氷埋雪漬生鐵腥殺氣昏昏無白晝行人不識呼鐵堠北去和林又數千衛霍過此猶窮鬬中原無人益蕭條僅得呼韓一再朝子卿不來王嬙去平城冒頓仍自驕長城蹴踏誰遮截千年費盡九州鐵道傍白骨皆人堠井田廢後無長策古長城吟長城萬里長半是秦人骨一從飲河復飲江長城更無飲馬窟金人又築三道城城南盡是金人骨君不見城頭落日風沙黃北人長笑南人哭為告後人休築城三代有道無長城白山行鴛鴦濼東白石山一峯峻前尤髙寒金蓮花擁玉芙蓉竒秀誰教在此間頑氷積雪雕鎪就追琢琳琅露枯瘦霧披煙染不能青草隱沙昏日依舊當時朱勔若相逢玉京不運萬歲峯華陽宫中第一山沉水灌洗金泥封瑰異無緣到華夏歲歲年年聚羊馬幾回重著吟鞭點崔嵬貌作詩中畫曉來雨過無埃塵落月冷浸光更新就中必有連城璧世間誰過三刖人北山安得移山叟移向石淙玉溪口太湖烏玉都壓倒更添風月三千首戊午清明日大城南讀金太祖睿德神功碑雜花妝樹燕草緑珠翠重重擁燕玉踏青車騎各一簇巉天一碑杏梢出軃肩垂袖立馬看穹龜交龍勢崛蟠四面渾鐫堆字山填金剜盡黑蠟斑冒頭遷史學舜典序事班書雜文選銘章生民麗且婉太祖帝紀都一卷初賄肅慎兆已陳日出之圖生聖人周雖舊邦命維新不事殺戮義與仁海青一翅海西落兩國君臣俱不覺鷓鴣聲裏降王縛漢民不失生聚樂平地突起金天龍面如紫玉真英雄化行江漢服羌戎百年以來誇俊功參用遼宋為帝制文采風流幾學士磊磊髙文辭稱事卓冠一代誰復似汴亡文物委地壞不收獨有此碑岌嶪在幽州荒煙莽蒼無人讀使我掩面涕泗流鄭王已自磨甘露故壠移來立新墓小民世情多心諱更欲去除誰愛護不久拽仆野火焚後人不復見此文攀花冉讀傾一樽朗詠直過宣陽門聽姚尚書彈玉磬琴桐焦漆死聲無木首尾斷裂烏蛇腹江氷絃索玉軫足瑟瑟音徽明碧緑龍池鳯沼銘山谷髙人爇香一揮拂氷泉雜弄碎金玉沈著凍雨打疏菊磊落鏗錚不煩促注坡寶馬急回復峻嶮屹立驚突兀蕭散清越重紆曲委珮編磬輕撞觸霜秋月夜風萬斛帝子揮淚滿湘竹大雅一變無塵俗斷絃今乃煎膠續名琴絶藝會遇難頓覺古意生肺肝回視鄭衛何卑凡坐中乃有郝髙山子牙從今放手彈趙州石橋輪囷太古緑玉月半插水面不挂天一矼一段數十丈大業至今七百年深銜密匝無罅隙嵌磨妥貼堅且圓仰視壓面勢飛動徑欲拔起疑墜顛鬼功神力古未有地維欲絶還鈎連蛟龍辟易洚水伏細紋參錯如新鐫晴虹不散結元氣海撁縹眇纒蜚煙衝風倒景鯨背搖金瀾滉漾青環偏乾坤壯觀全趙雄幾回笑殺秦人鞭往來細讀張相碑直與北嶽相輊軒先君有詩不忍看摩挲華表空泫然東坡先生畫像曹州教授王安仁所藏巳未六月一日敬題五精聚奎五季平三朝積纍三蘇生東坡一龍獨峥嶸抉裂西極來承明頓撼日月轟雷霆萬喙蓄縮喑不鳴顛倒六合江河傾瀾翻奔注洶四溟閎肆捭音擺闔掀鯤鯨紆餘曲折重關扄脫兔處女孫吳兵珠璧噴薄光怪驚嘻笑怒罵似不情卒止禮義歸中聲既竭復鼓氣益盈轉石決溜方施行變窮出竒伏且騰常山蛇走捩孤鷹恣睢安間便且輕鳥鳴花落春山晴根極孔孟據六經道德仁義炳日星蹴踏漆園隘蘭陵揮斥戰國跨兩京睥睨儀秦更縱橫每笑子雲譏長卿屈宋賈馬擷華英李杜韓栁皆包并諸子百氏歸題評出入老佛雜刑名雜不越理純粹精融會變化集大成更不蹈襲自名家一張新錦秋江澄巉巉峨眉去天尺倒插崑崙有餘力雪嶺隱日嘉陵深翻動鸞皇織金碧乾坤都作一錦城回視前王甚寒乞書法淋漓元氣溼以𨽻為楷尤雄崛為嫌顛張醉素俗特與魯公添出筆九天九地未曾見總向篇章揮灑出備具百體窮道技橫拈竪出皆第一竒才本欲濟時了慷慨屢進萬世策王道還疑仲舒緩時務仍比陸贄切以重自任伊周學貫日巉天天下節大儒不使為大臣豪傑竟作文章伯區區小技皆遊戲舉是先王等間事從渠喚作謫仙人恥作翰林直學士當時不止忌才名凜凜都因有英氣初為子孫得宰相竹筒吹喘競逐放隂謀毒手必置死禍致詩文厚誣謗玉堂遽作赤壁磯金蓮却照儋山瘴政足大公無所損粘天更覺風濤壯不恨不得居廟堂但恨夷甫誤蒼生遂使諸戎更霸王一網打盡朝廷空八賊揶揄宗國喪蘇公竟不到中原舒王却在凌煙上昔嘗讀公文今乃拜公像至神無滯形丹青莫能狀畫工豈有浩然氣漫著南箕翕舌空點痣不如夜寂對江月皓皓見公真顔色面間多黑子故云溫公畫像王安仁藏後來三代漢唐宋太師溫公絶世無汲黯魏徵與宋璟馬遷劉向及仲舒問學德度兼名節純粹骨鯁一大儒麒麟鳯凰代希有布帛菽粟民所須無心求世篤修身正襟危坐三省吾以道事君入官聯循分守信不敢踰進言格非理必盡渾厚質直辭無餘制禮作樂如成康漸仁摩義期唐虞不幸熙豐方有為祖宗良法盡剷除磊磊顯諫章十上不用不可一日居勇退不補樞密班分司洛下甘著書論列治亂尤愛君心存魏闕身江湖鉤深致逺推象數更擬太玄作潛虛窮神知化德亦盛不忍赤子極焦枯一僮一馬哭裕陵萬民遮擁牽衣裾有田不敢種青苗司馬相公來活豫兩宫下詔登一相旱火潑雨天下蘇東丹驚喜西夏服中朝突兀尊皇輿誰知孔明食遽少以死勤事皆駭吁革弊治蠱雖未竟已定鼎命開規模建炎國脈實在此紹聖姦黨徒厚誣髙風奕奕今共仰遺像尚可懲姦諛稿木寧有食肉相隱隱但見金粟膚布衾自可覆蒼生貂蟬不稱山澤臞泫然想見公薨時鬻衣致奠哭過車不獨此本在人間一日四海皆畫圖更不負公有子瞻兩碑萬字堆瓊琚刻石署公為首惡小人私計真區區間間畫像王安仁藏烏巾鶴髮鳶雙肩丹沙噀面深兩觀存神垂老孰與傳正大八九天興前金源一代一坡仙金鑾玉堂三十年泰山北斗斯文權道有師法學有淵中華命脈屹不偏楚妃正色絶纎妍石光玉潔無腥羶髙文大册職所専潤色帝業星霓纒體制妥貼開坤乾官樣奧雅舂容篇筆力壯浪傾源泉草聖肆意揮雲煙晚年遊戲西域禪月江卷盡藤蘿涎清風翛翛易一編每欲杖屨尋伊川熒惑犯昴光竟天不與亡國天惜賢始終無慊獨巍然國初學士汴與燕世章蔡黨方騰騫宣政佻靡快濯湔補完大朴無雕鐫卿雲腴霞鳯鸞翩具闕寶府珠璧聯崇極欲圯龍步遷此老始終元氣全大儒巖廊筆如椽六鰲一掣三山連紀甗墮地誰續絃破觚頓脰皆沈綿東塗西抹競取憐夸紅姹紫十百千安得起公重著鞭萬古一日當天懸德陵嘗賜公所服丹潮紅滿面公先壬辰之變以禮部尚書翰林學士承旨卒於第人以為天幸髙麗歎髙麗立國千餘年跨山連海東北偏文物制度慕漢唐衣冠禮樂如中原曾蹶煬帝困太宗拒險守要尤精雄瞰臨遼碣飲鴨緑風帆轉出東海東自被天兵都破碎稱臣納質兵弗退殘滅虜掠五十年窮蹙無聊竟何罪盡將生口賣幽燕年年探借髙麗錢肌膚玉雪髮雲霧羅列人肆真可憐前年令公輔太子鈎魚山前見天子掩面過市衆皆哭哭聲痛入燕人耳幾回事宋事遼金不似今畨寃苦深甘心曲股渾不信要把髙麗都殺盡嗚呼哀哉何時免此殺戮運曉登昆陽故城弓刀蹀躞西風鳴慘淡夜入昆陽城疏星牢落楚氛黑立馬起坐東方明凌晨厯覽增壯觀世祖凜凜猶如生以寡敵衆古亦有以怯為勇夫誰能始知謹厚是真勇彼偽不足當吾誠眼中百萬已破碎著手一戰成中興天定豈容人復勝新莽猶然事符命漢家王氣滿咸陽空向漸臺看斗柄慿髙落落生壯懷萬里一片青山來子陵不屈亦堪惜乃使耿鄧升雲臺東都制度遂狹陋王室陵夷寖傾覆漫將風節與維持終入曹瞞莫能救巖巖髙節固可竒濟時行道胡不為釣魚臺上秋風老我欲與子論襟期蕭蕭草木南陽道龍虎舂陵氣仍好須當策杖向軍門整頓乾坤濟時了武當道士歌武當道士數十百亂兵驅來不動色就中一人尤瑰竒兩頰紅潤鬚髮白怪目深涵漢江水仙骨逈立秋山石肘後髙懸緑玉符簮頭倒挂丹砂筆傍人為説不記年上聖親傳官斗極掌上曾教起風雨袖中傾下生霹靂玉肥咽嗽身體輕居無七箸不火食深巖綰縛龍幾潭逺岫逍遙鶴一隻爇香重與扣玄關為説天道方在北斂藏形氣更不語我亦無言兩寥閴巴陵女子行有序巳未秋九月王師渡江大帥拔都及萬户解成等自鄂渚以一軍覘上流遂圍嶽嶽潰入於洞庭俘其遺民以歸節婦巴陵女子韓希孟誓不辱于兵書詩衣帛以見意赴江流以死其詩悲婉激切辭意壯烈有古義士未到者今并其詩録於左方嗚呼宋有天下文治三百年其德澤龎厚膏於肌膚藏於骨髓民知以義為守不為偷生一時計其培植也厚故其持藉也堅乃知以義為國者人必以義歸之故希孟一女子而義烈如是彼振纓束髮曵裾峩冠名曰丈夫而誦書學道以天下自任一旦臨死生之際操履云為必大有以異於希孟矣余既髙希孟之節且悲其志作巴陵女子行以申其志云北來諸軍飛渡江突騎一夜滿嶽陽樓頭火起入閭巷曹逃偶走如牛羊巴陵女子尚書婦生平不識門前路亂兵驅出勢倉皇夫壻公姑在何處吞聲掩淚行且啼啼䀶沾溼越羅衣此身忍使人再辱裂帛暗寫臨終詩上言社稷安危事下説投江誓天志一回宛轉一悲辛心折魂飛不成字詩成淚盡赴江流蛾眉蕭颯天為愁芙蓉零亂入秋水玉骨直葬青海頭古來烈婦才一二誰似巴陵更文理名與長江萬里流丞相魏公還不死巴陵女子赴江詩巴陵女子韓希孟魏公五世孫嫁與賈尚書男瓊為婦嶽州破被虜之明日以衣帛書詩願好事君子相傳知吾宋家有守節者宋未有天下堅正臣禮秉開國百戰功每陳唯雄整及其侍幼主臣心常炯炯帝曰卿北伐山戎今有警殄滅速為之下民待延頸即日陛辭行盡敵心欲逞陳橋兵忽變不得守箕潁禪讓法堯舜民亦普安靜有國三百年仁義道馳騁未改祖宗法天何賜大眚細思天地理中有幸不幸天果喪中原大似裂冠袵君誠不獨活臣實無魏邴失人與得人垂誡常耿耿江南無謝安漠北有王猛所以戎馬來飛渡巴陵境大江限南北今此一舴艋本期固封守誰知如畫餅裂火燎崑岡不辨金與礦妾本良家子性僻守孤梗嫁與尚書兒含香署蘭省直以才德合不棄宿瘤癭初結合歡帶誓比日月昞鴛鴦會雙飛比目願長並豈期金石節化作桑榆景旄頭勢正然蚩尤氣先屏不意風馬牛復此逸鄢郢一方遭虜劫六族死俄頃退鷁落迅風孤鸞弔空影簮堅折白玉瓶沈斷青綆死路定冥冥憂心常炳炳妾心堅不移改邑不改井我本瑚璉器安肯作溺皿志節匪轉石氣噎如吞鯁不作爝火燃願為死灰冷捨生念麴娥乞憐羞虎穽借此清江水葬我全首領皇天如有知定許血面請願魂化精衛填海使成嶺武昌詞三首王師圍鄂遊騎於金牛鎮得一婦人欲侵之厲聲曰我夫壻翁姑皆死目前未即死又可受辱邪速與我死遂置之自稱梅溪主人張素英作歌詩數篇以見志尋以疾卒於湖中得一路分妻一日以無夫選賜有功軍人即以掌批其頰對今上大呼曰妾夫將千五百人扼敵沅州妾命婦也豈可辱於是乞速賜死上矜其志賜之衣糧使有司存恤之以俟其夫亦尋以疾卒又有漢陽教授之妻為一兵所掠義不受辱投于沙湖三人者僕親見之皆可附希孟之義各為賦詞以寓意云巴陵女子韓希孟梅溪主人張素英解作歌詩還死節不論傾國與傾城烏鬼山頭閙鼓鼙武昌恭人攜孺兒黃鬚回鶻便批頰義感萬乘真英竒漢陽宣教是妾夫妾身未死緣事姑騎士朝來強擁去抱石半夜投沙湖使宋過濟南宴北渚亭往年薄遊宴渚亭髙秋霜落波光清今年持節又來宴菱葉荷花香半城城南倒插泰山腳城北沈涵海氣橫周圍盡浸樓臺影魚鳥慣聞簫鼓聲錦堂流出珍珠冷花底漂搖碎光炯名泉多在府第中繡簾深掩胭脂井推波委濤到北渚滙蓄涵停數十頃虹去聲橋桁栁平分破巨壑雲莊入燕暝濟南名士多老成行臺突兀皆名卿樽中政有李北海坐上寧無杜少陵堰頭臘甕滿船求歌舞要送行人行江南風景已不殊渚亭即是西湖亭古篆行贈髙松嵓文舉亂來小雅幾盡廢文物典章俱掃地紛紛隨世趨所尚天下幾人知篆𨽻關南賴有髙使君書法一世推専門諸家命脈究終始力探逺蹈工古文倔強鐫金還屈鐵徑利玉版昆吾切孔壁汲冡都破碎方矩圓規仍妥帖儀真館中坐老天日看筆陳驅雲煙琴讃一字二尺許顧盼頃刻還終篇圓熟省力似行草霜月氷泉勢尤好自言一畫氣一口少為呼吸便傾倒是乃精意能入神奏刀砉然如運斤文章亦説氣為主巧寓拙外意愈新金源百年黨承旨明月夜光傳片紙屠龍誰意復有人元氣堂堂元不死請君閣筆無妄書鐵門自買堆磚磲他年必到秦丞相今日還逢李大夫陵川集卷十
