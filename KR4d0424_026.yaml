body:
  text: 陵川集卷二十六元郝經撰記去魯記歲壬辰北首濟河居燕趙之交者二十有三年局脊墊隘縻縛塵蔓思有以奮然而新之以為聖人之澤及萬世天地在而聖人之澤與存焉故將抱六經於洙泗之間仰髙鑽堅挹聖人之餘澤追顔曾之髙縱同蹤攀遊夏之軼軌徜徉諷誦風乎舞雩亦庶乎其可也而事梗未得也乙卯秋始得東行由趙魏以適魯八月入于東原九月由東原而東濟汶泗越十有三日丙午自鹿門入于曲阜徑公宫而西兩觀稷門巍然雙髙而道出乎其間泮宫雖廢而泮水猶在又西則靈光故基也遂自顔巷達于闕里由槐路入于先聖廟廷宫序廊廡頺圯殆盡乃拜謁先聖于新宫小寢旋自西序由杏壇而南登奎文閣徘徊徙倚塌然有動于中而莫知其然乃降而北出出于龍門入于墳林林廣袤十餘里前洙水也涉洙繚徑以入漸得輦路乃拜先聖及伯魚子思子墓復自龍門入拜謁周廟及建春門拜謁顔廟栩栩不忍去又事梗不得留積年耿耿方為釋然而茅塞遽至豈非命邪既不能久依聖居有以自得又可默默而去無以自鳴乎乃望而嘆曰大哉聖人之道其不與宫廟並存殁乎宫廟雖圯而聖人之道嶽嶽也平泰華以為基伐鄧林以為楹能庇一時而不足以庇萬世葺翠羽以為宇鏝丹砂以為塗綴以明月之珠繚以崑虛之玉能崇飾一時而不足以崇飾萬世極天下之侈麗而聖人之道無所增極天下之卑墊而聖人之道無所損蓋聖人之道在土木者小而在人心者大也嗚呼太極立於天地而未名名於宓犧而未備至堯而後天極立至禹而後地極立至仲尼而後人極立宓犧先天堯禹後天仲尼則發先天之幾合後天之統著之書與天地並而其興喪則在夫後之人焉推之使如泰山之髙崛若垂天之章者亦人也混混乎元氣之貫四時巍巍乎天地之造萬物屹屹乎人倫之奠萬世者亦人也使之壞爛殘缺支離崩頓晦食而不明萎薾音你而不立壅塞而不行至於禍天下而害生人者亦人也故曰苟非其人道不虛行昔道之方衰也楊墨以似是而亂真申韓以刑名而慘刻儀秦以口給而苟合孫吳以權譎而徼功雜然蝟出莫敢誰何而孟軻氏折之以仁義之言勝之以剛大之氣挽人心於既亡故擴充聖人之道者莫如孟軻氏六經火於秦而士復坑戮漢興髙帝過魯即以太牢祠孔子使後王後帝北面而師事之開其基統發其淵源又使陸賈説詩書以明帝王之學啓人心於未然故尊聖人之道者莫如漢髙帝曹參相齊受教於蓋公啓竇氏黃老之學鼂錯諸人當文景之盛而挾申韓之術戰國餘習幾於復振董仲舒出而孝武方隆儒乃請罷黜百家表章六經尊孔氏明仁義聖人之道復立存人心於欲亡故明聖人之道者莫如董仲舒厥後分裂於三國偏駮於兩晉蠧食於南北西方之誕幻盛行南朝之纎艷相尚人心遂亡天理亦滅而文中子立教河汾推明義理建立皇極而佐佑六經修飾禮樂開唐之治存人心於既亡故存聖人之道者莫如文中子唐業中衰所尚者詩文所尊者佛老學士大夫習以成俗后王君公竟為崇飾中國將遂為西域矣韓文公起橫身而爭之纍九鼎而不移觸萬死而不回收人心於既流然後聖人之道巍然自立故立聖人之道者莫如韓文公厥後陵夷於晚唐奪攘於五季宋興歐蘇則為之藻飾周邵則為之推明司馬則為之經濟程張則為之究竟天理昭明人心泰定故羽翼聖人之道者莫如宋諸公如是則聖人之道雖大非諸君則亦委地矣固不在於土木也嗟夫近世以來以儒為戲放辟邪侈者莫之懲以儒為名骫骳偷生者莫之振竊孔孟之粳粃掞程張之糟粕欺世盜名幸獲詭遇以儒自負者莫之正作為文章衒其儇巧鄙正學為質古目純素為不通規規切切以儒相譁者莫之辨假我六藝文彼姦回靜固幽深矯輮造鑿如新莽篡漢以儒為竒貨者莫之發也破裂衝蹴蕩搖除剗莫知紀極使天下之人以儒為諱復以儒為異吾道從何而興乎言雖興之而心實訌之聖人之道其遂不行矣雖然天地自若也日月自若也山川亦自若也六經俱在而人之類不盡亡也子焉而知父其父臣焉而知君其君弟焉而知兄其兄婦焉而知夫其夫樂生哀喪飢食渴飲在人心者豈獨亡乎聖人之道豈遂不行乎顧瞻遺廟周覽墳林纚纚曳曳泫然而去年月日郝經記麗澤堂記天下有至悅衆人去之君子存焉衆人之去之也非無所悅也其悅也外是以去而不返君子之悅也內是以悅而無窮焉聲色之華衒車服之麗縟飲食之鮮腆宫室之髙塏位天下之至髙爵天下之至貴祿天下之至重嗜欲恣肆志得意滿衆人之所悅也而不知有命焉徇而求之至有殺身而不悔者君子則不然反身率性求其在我者而已在我者盡窮達非我也在我者盡貴賤非我也在我者未盡必求其所以盡事親吾何以盡吾仁事君吾何以盡吾義交朋友吾何以盡吾信欲盡而未之盡則篤夫學問之道求夫義理之明物不能盡而求之於已已不能盡而求之於人內外交孚物我兩盡昭徹而無餘雍容而有餘志同而氣合魚川泳而鳥雲飛也動而不括出而有獲則其悅也不亦大乎是以仲尼贊易觀兑之象以為水澤之悅物莫若義理之悅心一巳之獨悅莫若衆人之同悅義理昭著則一巳悅矣講肄申明則衆皆悅矣推而行之而天下被其澤則天下悅矣故於大象明悅之道曰麗澤兑君子以朋友講習夫易聖人所以盡天下之理也而學所以明天下之理也理有所未明如澤之壅而不行得朋焉而明之如澤之行而不壅內外浹洽於身有潤如澤之汪洋浸漬發而為事業而物皆被其仁如澤之膏潤有生而施及下也故悅萬物者莫悅乎澤君子體之而講習以盡夫悅之道而存天下之至悅焉歷下薑君文卿才具幹敏參行臺事者有年矣春秋鼎富知局日增以為古之人仕優則學學優則仕乃名其堂曰麗澤將與諸賢講劘道藝推明義理求天下之至悅以潤其身推天下之至悅以澤其民去衆人之悅而存君子之悅方落成而余適至請申其義而為之訓故為推本之嗚呼彼去至悅而存衆人之悅縱嗜欲以悅心極從諛以悅人盡逢迎以悅君脅肩諂笑盤辟奔走自同妾婦不以為咎以容悅為事者間君之風寧無愧乎年月日記素菴記素菴淄川先生書室也先生自濟州遷益都既定遷以素其位而行之之義字其室經之東遊也而請記之曰吾生平連蹇今老矣將一聽於遇而莫之忤焉經應之曰天地相遇品物咸章剛遇中正天下大行莫非遇也天地聽遇於道萬物聽遇於天地而人聽遇於天地萬物焉豈惟先生哉苟遇矣吾欲弗遇焉得而弗遇弗遇矣吾欲遇之焉得而遇之哉故遇而弗能逺不遇弗能為命不可以力天不可以人顧吾所以處之者何如也天地賦余以正大之理委余以剛大之氣俾超出乎萬物制宰乎衆變挺特嶷崿不可轉易顧吾所以守之者何如也能處而守在我者盡不聽之以物而聽之以理不聽之以心而聽之以氣則獨立而不倚一智而不惑百折而不挫荷天地之付畀巋乎與天地並為萬物主而萬物聽吾之遇開廓昭著而浩然獨存彼或與余遇則王公失其勢晉楚失其富賁育失其力離朱失其智以水沃焦以石投卵彼惡我當動而不括出而有獲彼惡我閼變在物而我不變則正大之理明剛大之器具無往而不遇也無往而非遇也無入而不自得無往而非達也苟不能處而又不能守則我不能遇物而物皆遇我吾欲達而塞已至吾欲利而害已至吾欲得以有而失與亡已至雖深以極其幾夸以極其巧險固以極其姦詭譎以極其誕冶妾婦之容盡揣摩之術密之以鈎巨窘之以劫制智構心鬭墳墳擾擾愈遇而愈不遇所遇見於前所守易於內變在我而不在物則正大之理不明而剛大之氣餒矣惡乎可遇故天下莫不遇也而莫能遇也如其能而各得所遇天下無事矣惟不能也是以變故相軋而禍亂生焉先生學際天人安於所遇素患難行乎患難素貧賤行乎貧賤歷萬變而中未嘗變曵屣擊藜攄泄運化吟詠情性從容自得翛然天壤之間而寓其天趣其視渭濱之畋傅巖之築陽虎之誚臧氏之沮塵埃之與野馬蜾螺之與螟蛉歟遇也弗遇也又何足為先生道也乙卯冬十月陵川郝經謹記橫翠樓記易定諸山尾常山而北旁礴嶷迆自北而東挾碣石以入於海蟠燕亘趙肆其雄麗順天一道連城數十牙錯棊制突兀乎其間而塘濼諸泉貫城而入縈帶濔漫奫淪泓澄城市之間遂有江湖之趣腴家鼎族往往築臺榭樹樓觀以肆其觀覽焉歲甲寅秋郭君仲偉起樓於市闤之北敞軼掀翥越塵閧而上坐視諸山瞰臨源泉雲容天影水光山色峨翠蜚碧獻竒拱異名之曰橫翠言諸山之翠橫列于下也仲偉春秋甚富嘗學於薦紳先生喜交遊許與結納皆天下豪右每於是樓之上置酒燕集而余必在焉其春煙滿簾春雲繪山西郎十二顔行玉立澄渌淡蕩白鳥容與馮欄撫几觴豆粲如志得氣許把臂暢飲開露肝臆削去町畦杯沉山影酒激紋浪吞江南之清風吸燕趙之徑氣亦一快也至於夏秋之交天虛氣清紅蕖緑芰香滿榱棟諸峯隱隱出沒雲錦白露滴玉霞綺煥月代謳燕歌間起迭作四座淋漓杯盤錯遏壯懷清怨寫入瑤瑟銀管風生翠綃涼重開元之舊曲明昌之新聲揄揚縹渺浮動喜氣一樓之上獨見太平營營之滯思冥冥之隱憂擾擾之塵蔓孰得孰失盡為釋然逺韻髙清脫去凡近超超勝槩莫得名言嗚呼人寓形於天地而適情於萬物初不為物役也翛然而往翛然而來不為拘拘不為孑孑邃古一樂也或浮沉於杯酒或放曠於山林或優遊於廊廟用舍乘化不錮不滯夫是之謂達士今觀仲偉之自處非古所謂達者歟樓之成四逺英賢往往為之賦詩而請余為記姑書其所見且以識登覽之所得云丙辰春三月十五日記積慶堂記貫萬物一理通天下一氣耳隨所為而應焉種稂莠則稂莠興種嘉穀則嘉穀殖枳棘不可以為芝术樗櫟不可以為松柏斷木含生蒸而為菌腐草伏暑化而為螢彼物之微猶若是矧於人乎是以聖人為斬絶不易之論曰積善之家必有餘慶積不善之家必有餘殃所以立人極定天理使天下之人皆至於至善而止其仁天下後世也至矣一國之興衰一家之隆替一人之通塞視履考祥昭昭然莫吾欺也博陵田濟民新其居而落之奉觴以謂余曰先大夫仕於國初遂有深土披荆棘立城市剷除凶穢蘇潤瘡疲使池壘完固疆場不警雖歷大變故而民得生聚安妥免屠夷之患復治平之舊其德之施於人者甚厚未嘗日之燕遽沒於世母氏時年二十餘保字其孤一德不回備極艱苦俾余卒底於成今始構此室將刮磨以自樹立復先大夫之業報母氏之德請名之以自厲焉余謂之曰積德纍功天必報施不在其身在其子孫故鄧仲華不妄殺而奕葉貴盛袁安理楚獄而四世五公王祐以百口保彥卿而纍世台輔是其明徵大驗照映千古君之先世既若是矣而君又能卓卓以自振既受報於天又合德於人其有餘慶也必矣可名之積慶雖然先世之善當益之以善益以自修莫為責報夫造善言於衽席之上目子孫於門閭之下者是謂揠苖之善徼幸於萬一中誠則無有是謂詭遇之善包藏禍心象恭貌仁是謂盜賊之善是三者非惟無慶又足召殃也惟積本然之善務去三者之善則君之世殆未量也其繁衍盛大昭著崇顯之日又當為君書之丙辰秋八月日記北風亭記壬辰春北首渡河居於保凡十一年僦廬而徙者十最後徙南里自甲辰至於丁巳凡十有四年於居為最久夏四月以正陽鬱悠崇土為址斫木為楹虛其北而不置户焉命之曰北風既塈以茨乃偃息其下仰而嘆曰余生三十有五年而不寧者殆三十年今之偃息者非疇昔之匍匐者邪乃取莊生齊物論及宋玉辭賦讀之敞然而樂曰快哉此風凡物莫不如是邪有萬不同而卒莫不同邪客聞之抱琴而至授琴而歌南風而謂余曰子之為是也將以寓豫之所寓也風之為物也而莫適所定也之人也東西南北之人也而子生平不寧而不寧方來獨以北言之何也曰夫子見子之見而不見余之見知子之知而不知余之知也夫風輪水輪天地之所以造物也一翕一闢往來不窮所以成變化而行鬼神也故風起於廣莫之野無何有之鄉衝茸飄跋吸忽鴻洞蕩搖振撼轉化樞運神紐推氣機使天地萬物各盡其變而不與焉固無有東西南北之限也余之以北為言者亦非自狹而必之於方所也夫乾為萬物之終艮為萬物之始坎也者北方之卦也所以為始終之幾也故天一為水而風輪在焉運於東使萬物各遂其生運於南使萬物各遂其長運於西使萬物各遂其成運於北使萬物各歸其本貯於中則沖氣以為和故風之勢伸於巽而水之澤成於兑余之以北為言者蓋有取乎此也其以北為言者又有義焉余方為人子北面所以事父也為人臣北面所以事君也為學問北面所以事師也且夫元光之元長星彗天赤氣起北方國朝建武啓運北風長驅肆其威靈而余實生焉天興之末北風吹雪有金以滅河斷其流萬馬蹀血而余北首焉故余生於是風而長於是風將從是風以徜徉此生也從其所吹遇止而止焉從其所吹遇行而行焉委是身於是風龍蛇也蓬纍也野馬也塵埃也而各無所忤焉客曰大哉子之言也吾當改吾絃而更張吾之琴舍吾之南風而歌子之北風乃命客張其琴而余倚歌而和之曰北風其涼兮吾中之塞其攄以揚兮雨雪其雱兮吾物之翕乃所以為張兮吾於此亭處不遑兮委之以順夀而康兮飄然而行跨六合而凌八荒兮敷仁兮扇義擴道以疆兮年月日書之以為記棣華堂記陵川郝氏世業儒至先曾大父昆季七人皆治經力學教授州閭有聲張徹郝氏益大中堂數楹聚族歌哭之所也諸昆皆賢而尤篤友愛乃植棠於庭名堂曰棣華取詩常棣之華鄂不韡韡凡今之人莫如兄弟之義也歲時燕集尊卑壯稚比次以序秩然有禮熙然有恩而粲然有文無鬩墻反目之私於是家人篤於親國人慕其義道為人師禮為人則焉其季年諸孫繁衍冠娶異室殆十餘人聚則隘諸堂退則逼諸庭於是有别居之議而先曾叔父東軒老以季弟弗敢違命扳庭樹涕泣不寢食者三日諸兄問之曰吾業儒而為是何以為訓終無數人使子孫為之則吾食矣諸兄從之聚廬同食以終是歲棣華特盛人以為友愛之瑞焉壬辰之變郝宗殱於許洛之間獨先君以經北渡居於保以有弟妹孫子郝氏不絶陵川故居獨棣華堂與庭中之棠存豈將使蟬聨華胄穰穰簡簡復其初之盛乎已未夏外伯父牛君視經於曹南言邇年棠華尤為茂異汝兄弟其興乎故作棣華之詩俾識諸堂且無忘先東軒老之懿云吾家中堂髙壓太行茁彼本支是生兹棠棠始有華實大吾家玉昆峩峩德音莫瑕棠華日馨諸孫盈庭有光韡韡有襟青青突決棟焚鞠為荒榛棣華弗凋中堂獨存脊令在原兄弟急難遙遙空堂巋彼髙寒鴻鴈於飛哀鳴嗸嗸郁彼先棠芬如李桃惟彼桑梓尚當敬恭况兹庭實祖植父封為告鄉鄰勿翦勿戕庶幾遺隂本根不忘經也作頌載歌東軒嗚呼兹堂道德是傳越千萬年太極書院記書院之名不以地以太極云者推本而謹始也書院所以學道道之端則著於太極宓犧畫易以之造始文王重易以之託始孔子贊易以之原始至於濓溪周子之圖易則又以為動靜之幾隂陽之根建極承統開後世道學始今建書院以明道又伊洛之學傳諸北方之始也一以為名五始並見則幽都朔易復一太極也初孔子贊易以為易有太極一再傳至於孟子後之人不得其傳焉至宋濓溪周子創圖立説以為道學宗師而傳之河南二程子及橫渠張子繼之以龜山楊氏廣平遊氏以至於晦菴朱氏中間雖為京檜托胄諸人梗踣而其學益盛江淮之間粲然洙泗之風矣金源氏之衰其書浸淫而北趙承旨秉文麻徵君九疇始聞而知之於是自稱為道學門弟子及金源氏之亡淮漢巴蜀相繼破沒學士大夫與其書遍於中土於是北方學者始得見而知之然皆弗得其傳未免臨深以為髙也庚子辛丑間中令楊公當國議所以傳繼道學之緒必求人而為之師聚書以求其學如嶽麓白鹿建為書院以為天下標凖使學者歸往相與講明庶乎其可乃於燕都築院貯江淮書立周子祠刻太極圖及通書西銘等於壁請雲夢趙復為師儒右北平王粹佐之選俊秀之有識度者為道學生推本謹始以太極為名於是伊洛之學遍天下矣嗚呼公之心一太極也而復建一太極學者之心各一太極也而復會於極畫前之畫先天之易盡在是矣使不傳之緒不獨續於江淮又續於河朔者豈不在於是乎是公之心也學者之責也其惟勉旃年月日記鐵佛寺讀書堂記郝氏始自太原遷澤潞復遷許洛復再遷於燕趙之交治經業儒者六世百有餘年以及於先君於是有經壬辰之變始居於保歲戊戍先君官於保之滿城是歲經始知學喜為詩文適詔試天下士第者復其家驅者為良遂為決科文其冬至自滿城先君謂先妣言今吾孱病且老諸子皆幼吾欲使大男經督家事而懼廢其學欲令專為學則無以督吾家奈何先妣曰自吾適郝氏逮事先翁姑聞郝氏之先未有不為學者如楊侍郎士表元內翰裕之武右司從善輩皆有聲當世吾門自出可反令吾子未學而廢先世乎不過吾忍窮數年耳政使餓死亦樂無憾先君曰是吾志也遂決意令經為學時僦廬託處無以為生業乃假屋於鐵佛寺僧張仲安得其南堂俾經居之且聚童子數十輩教之句讀以佐生業夏四月一日始入而從事先君命之曰爾祖所以命吾者今其命汝學所以為道非為藝能也所以修身非為祿養也今國家方以武治未遑選舉汝其無為決科之文今世以詩文事聲譽者記問以事吻頰者皆藝能之學汝其勿為我先世有學之序焉天人之際道德之理性命之原經術之本其先務也諸子史典故所以考先代之迹也當次之諸先正文集藝能之藪也又當次之若夫隂陽術數異端雜學無妄費日力慎勿慕人紛華戚吾之窮也爾祖有言士不能忍窮一事不能立故忍窮為學之本郝氏之家法也遂以太極先天二圖通書西銘二書付畀且指授其義曰此爾曾叔父東軒老得諸程氏之門者爾其勉之經再拜受命退而為學日誦二千言為課夜則考其傳注始入夜往庀家事舂粟治菽二鼓入於書堂龕燈隱几不解衣帶閲誦綴録昏怠則仰就背枕以假寢方五鼓往庀家事負薪汲水黎明入於書堂以是為常雖盛暑大寒不替也先妣時來竊視見其殘燈無熖向晨不寐呼經而語曰汝何自苦如是吾所不忍也經再拜言今二親忍窮使兒讀書惟恐不篤不為苦也先妣曰汝能如是吾無憾矣初治六經之時以為感發志意者莫過乎詩於是乎先治詩二帝三王之心傳口授者莫過乎書於是乎詩而後書先王治世之具莫大於禮樂於是乎治禮大經大法撥亂反正莫大於春秋於是乎治春秋窮理盡性以至於命以際天人之學者莫大於易故以為終身之學其餘自語孟子史諸書各如先君之命治之不敢少躐其等殺焉歲癸卯順天道左副元帥祁陽賈侯邀致其府始去寺堂居寺堂者俶末五年凡當治之書及幾數焉歲乙卯被徵而先妣巳仙去巳未與政於王府宣撫江淮諸道先君亦已亡矣中統元年至自武昌寺僧張仲安來謁與之俱至讀書之所顧二親而不見庭中之柏已自參天而仲安霜枿滿頂欲為向之汲薪之事而無為為矣乃謂仲安曰昔子路思復為親負米而不可得今余有甚焉於是涕泗橫集因為慟號既而仲安請記其事於屋壁乃揮涕而書此名堂曰讀書堂云仲安保州人嘗為汴京相國寺提點每敕試梵具輒為第一慷慨尚義喜延接賓客河南亡衣冠流落仲安嘗日飯數十人無所歸者使之居至於踰年卒無厭色而戒行甚謹經與久處故尤見其嚴而無罅者焉三月十五日謹記陵川集卷二十六
