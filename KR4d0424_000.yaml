body:
  text: 陵川集别集類四元提要臣等謹案陵川集三十九卷元郝經撰經有續後漢書已著録其生平大節炳耀古今而學問文章亦具有根柢如太極先天諸圖説辨微論數十篇及論學諸書皆深切著明洞見閫奧周易春秋諸傳于經術尤深故其文雅健雄深無宋末膚廓之習其詩亦神思深秀天骨秀拔與其師元好問可以雁行不但以忠義著也延祐五年經門人集賢大學士郭貫請以是集與所作續後漢書官為刋板付待制趙穆編修官蒲道源等詳定得旨允行卷首所載江西中書省劄付咨文蓋即其事後官板散佚明正德乙卯沁水李叔淵重刻於鄂州陳鳳梧序之康熙乙酉武進陶自悅守澤州得李本於州民武氏家欲鋟木未果僅為製序辨其首乾隆戊午鳯臺王鏐始校刋之今所行者皆鏐此本云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀陵川集序文所以載道道一也而文則隨時而變焉有唐虞三代之文有先秦兩漢之文有魏晉之文有唐人之文有宋人之文有元人之文唐虞三代之文簡古不可尚已秦漢而下愈變則愈繁至於元而文之變極矣文雖以時異而道未嘗不寓焉其言比于道者文之粹者也其言盩于道者文之駁者也若陵川郝公之文其元文中之傑然者乎公生於冀而仕于元少頴敏有大志自六經諸子歷代史傳以至天文兵律無不淹貫洞達其學博其才贍故發而為文也汪洋滂沛如大河東注一瀉千里抑揚起伏如太行諸峯層見疊出蓋積之深而發之盛理固然也公嘗以元世祖即位奉使輸平于宋適理宗末季賈似道誤國遣人幽公于真州者十有六年公處困而裕方且日以著述為事初無抑鬱無聊之態則其所養又可知己文集凡若干卷板行于元久而散逸見者鮮焉吾大憲長李先生叔淵博學好古以公鄉先哲也景慕之尤深求其集踰二十年始得全帙如獲拱璧遂手校而刻之梓以傳嗚呼宋開慶間公從元世祖次師於鄂登髙弔古其詠武昌三節婦詩實載集中則鄂固公所嘗遊覽之地也距今二百餘年而文集乃刻于兹夫豈偶然也哉抑公之所著有續後漢書及易春秋內外傳皆卓然自成一家惜乎無傳焉安知是集一出不有因之而旁求者乎公名經字伯常諡文忠世家澤之陵川其履歷顛末具在銘志兹故得而略云正德二年嵗在丁卯春正月吉賜進士出身奉議大夫湖廣等處提刑按察司僉事奉勑提督學政前翰林院庶吉士廬陵陳鳯梧謹序陵川集序明道立教之謂文何代蔑有其間升降隨乎運會而顯晦因之六經道言無意成文文之至也先秦兩漢下由文溯道疊更盛衰後或弗逮夫前變而不失其正其人類皆􅈺經術貫百氏大放厥辭力回瀾倒中流一壺如馬班賈董韓李歐曾之徒代興者是情有各深才非相借雄長一時羣遂奉之為宗而旁出唐子末由竄入正統則古今一轍援此以定南渡金元之文莫不然矣陵川郝伯常先生崛起冀南奉使不辱中誠大節載在元史間嘗取其世論之當干戈俶擾之秋齊盟早渝邾莒不狎寧復知有通經學古之事先生蒙難艱貞不夷其明藴釀載籍發為贍博宏肆之言理性得之江漢趙復法度得之遺山元好問而獨申己見左右逢源固自有其文以之驂驒前哲何愧嗣後姚氏燧虞氏集揭氏傒斯戴氏表元黃氏潛栁氏貫歐陽氏玄吳氏萊咸以其文成一家言有名元代非先生導其先路哉蓋作者難識者尤不易歷下李攀龍創論不讀唐以後書貌史漢皮毛者靡然從之以故近世遺文放失間脫蠧口則煙煤庋閣者多在昔昌黎起衰八代必俟二百年後六一居士得舊本韓文為之演繹其學始昌他可知已故明三百巨儒講求復古不以世限往往掇拾標舉疏通證明若所稱牧菴道園諸君子之書次第昭布先生所著續後漢書暨易春秋內外傳太極演等書不下數百卷俱不傳其文集三十九卷曾一刻於元逮明武宗朝沁水李司農叔淵官楚復鏤諸板江右陳司空文鳴為之序其本行於北東南學士罕藏之余願見既久購不獲會移知澤州嵗乙酉纂修郡志遍搜得李刻全册于陵大喜逾望惜魯魚漫漶訪他邑又見一前本似初刷者頗明晰較其可知餘則姑付闕如因歎先生之文宜冠元儒遭逢不偶至宋被留真州十六年當時其地守臣請與張䇓吳澄並祀曰三賢祠訖今不可問陵川故里廟亦頺廢製作逮將澌滅此大闕軼事忝守先生鄉責不在我乎檄屬鼎新其祠爰舉前集命刋梨以行敢謂先生異世之桓談聊志私淑且厭求者心爾然後知處晦之必有時而顯先生實大聲宏光芒終不可掩曠在易代一遇於余則表而出之彼雷同剽竊龎無一物者即汗牛充棟初何異水火之投撫先生集于是乎有感詩文具在卓為諸大家後徑固也余覽其論兵議及上宋主萬言書通達國體指陳利害務俾守以持重答天心惜民命於和議拳拳三致意非空言無實可比其見超矣經濟専門望洋徒歎孰云文士弗適于用哉發微者當自得之沾沾源流𣲖别又可置弗論焉澤州牧武進陶自恱撰陵川集劄付延祐五年五月初九日奉江西等處行中書省劄付準中書省咨集賢院呈延祐四年十二月初五日伊克集賽第二日嘉禧殿內有時分對蘇庫爾齊明里棟阿學士喜春等有來本院官陳大學士奏郝伯常學士做國信使入宋講和去時于真州拘留了十六年間做了一部續後漢書並他平日作來的文章陵川文集這兩部書中書省交江西行省有管下學校錢糧內開板去了也奏呵奉聖旨你與省家文書交疾忙了者麼道聖旨了也欽此具呈照詳得此咨請欽依施行準此省府仰依已行開刋施行奉此陵川集咨文中書省移江西行省咨文皇帝聖旨裡中書省禮部呈奉省判翰林國史院呈照得先據經歷司呈奉禮部符文承奉中書省判送本部呈準尚書郭嘉議關竊謂士遇側致君澤民功被一時不遇則著書立言名垂後世故翰林侍讀學士國信使贈昭文館大學士資善大夫文忠郝公以命世之才為世祖皇帝所知潛邸召見置諸侍從中統御極即命講好使宋拘留十有六年至元乙亥始得歸國凜然風節逺配古人將被大用以宿瘴而卒其平日著述如三國志黜曹魏而主劉蜀使正統有歸吻合朱文公通鑑綱目筆法一洗前書之謬誤是誠有補於世教又如春秋外傳一王雅陵川文集等書學者願見而不得似此遺藁家藏尚多不幸其子山南江北道肅政廉訪使文徵早卒伏慮前書久而散失良可惜也如蒙朝廷允許于懷州本家取發前來付翰苑披詳發下板行庶使一代儒宗雄文傑作不至湮沒傳之將來以見聖治文明之盛是則非惟死者之幸實後學之幸也請轉呈都省照詳施行本部參詳如準所言將郝文忠公遺文裒集梓行誠有補於世教具呈照詳覆奉都堂鈞旨送禮部依上施行奉此行據懷孟路申今將陵川文集并三國志申解前去乞照驗事省部仰照驗議擬施行承此具呈照詳得此除將發到陵川文集一十八册三國志三十册送付編修官蒲道源等考校去後今據待制趙穆編修官蒲道源等官連呈文忠公郝經所著文集筆力雄深議論該博忠義之氣藹然見於言意之表其續漢書得先儒之至論黜晉史之帝魏使昭烈上繫漢統扶立綱常有補世教其間敘事典贍核實多前史所未及者若蒙呈達都省行下書坊版行傳後非惟使斯人生平精苦之志有以表見於世亦示我國朝之有人焉呈乞照驗得此翰苑議得如準待制趙穆等所言相應除將前項文集依數發付禮部依上施行外得此奉都堂鈞旨送禮部照擬施行奉此本部參詳郝文忠公著述三國志陵川文集等書既翰林國史院考校得堪以板行相應得此南行省所轄儒學錢糧多處刋行相應得此今將前項文集隨此發去都省合行移咨請照驗行下合屬依上委官提調如法刋畢各印二十部裝褙完備咨來
