body:
  text: 陵川集卷四元郝經撰古詩渡江書事朔龍蜚冰天瀚海開日月萬國入尺箠海外迄有截東南天一隅區宇獨限越我鞭莫及腹我車莫通轍阻山還據江深逺極亘絶桓桓天策王建斾秉鈇鉞睿衷推深仁不忍遽翦伐𢎞霈縱俘囚下令明不殺威鋭極晦蓄龎恩肆霑洽彼乃執信使謂令旨所差張天鐸也徼鄙閧偷劫本以禮義期誰知重驕跋王乃振師徒揚旗禡太白東西兩距海百道相綰結幹腹出大理上流下開達夔門勢扼吭通泰潛搗脅萬里常山蛇首尾徑相接八月馬首南王氣快軒豁千麾繞清霜萬蹄碎踣鐵髙天四旁開厚地一道裂西風楚山空豺虎皆遁迹驥怒憑風嘶一噴飛亂葉羅洑覘江津輕舟詰朝發清波乃舒徐大浪還妥帖中流笑前人浮梁與荻筏白魚入王舟瑞氣浮桂楫曾莫一矢遺諸軍報鯨捷談笑過江東兵刃渾不血居民盡按堵王師有成法駐軍武昌南威聲轟霹靂申令仍緩師天衷有餘恤彼昏還犯順投袂安可及文物三百年衣冠本無敵誤國不知罪虛文猶論列誣以敗為功負以勝為説欺君還毒民何以救破滅右師滿湖湘左師溢巴峽江滸連大屯淮南擁驍甲當朝大冠峩于今有何策外勝常以力內強惟以德乃今并棄擲本拔原自塞伊昔澶淵回信誓始寧謐貽謀燕翼子海內日富實中年或生虞南北動疆埸鄭公慷慨姿開心見肝臆遼主亦為動相視指天日竟無海上盟二帝終失國後來秦太師始悟前王失尋盟息干戈好聘堅金石百年享安榮而反加罪罰經術日窮奇國論甚迂濶賢王本寬仁於彼欲存活而乃極擯蔑激怒爾何益嗚呼天王統紀綱萬世一文物與禮樂百代更纍積一朝遂塗地吾民作何物厲階大江流天地限南北兵爭無時休血與江水赤混一才四家千年儘戈戟何當斷其流舟車到南極宿汝南道院虛庭淡黃昏折梅見新月徙倚為長吟幽香有時發枯葉鳴衝風花間動殘雪悠然憶故山風塵信音絶矯首天一方踈星鴈聲噎浮山堰斷磧呀石蕝長亘青迆迆蜿蜒繚強蛇鑿咢橫齲齒淮流從天來撇捩過一矢氣怒猶不平直欲卷遺址蕭郎真耄期見性不見理日暮乃倒行平地成洚水赤子生魚頭百萬並一死雖無殺戮名亦與挺刃比麵牲及菜果小惠徒自喜梁宗不血食餒鬼未報此侯景登明堂降罰亦天使哀哉無辜民朽骨在餘滓霖潦秋煙深煩寃挂踈葦淅瀝生悲風慘淡動遊子白圭壑鄰邦遺誚今未巳水可亡人國斯言厲階始為報移山人愚叟真愚耳冬至後在儀真館賦詩以贈三伴使突兀天壤間洞視及八軌區宇入割裂疆場更彼此閧怒尋干戈禍亂無期已孰能著手援下石往往是豫方閉關居不忍安坐視復有弓旌招飈然為時起仁義一萬言麻鞋見天子天道本好生天顔亦為喜乃曰哀吾民去殺兵當弭今日踐阼初急務惟爾耳三人奉書行一信盈尺紙詔下癃老泣春風動田里入境及淮壖肺臆即開披剷剃撤藩垣羅列倒瑚簋萬變惟悃赤一念無幸詭白虹晝貫日清江秋見底行人不能行在所輒頓止一自入儀真改館七牢美坐使庖丁勞徒增魯連耻空庭重咨嗟暗室還徙倚蹉跎兩朝事慘淡一江水堂上接玉帛何如四郊壘萬衆七奔命何如一行李新陽復生意歲律已窮紀節候中易感挺特入骫骳折梅愧皇華對酒生顙泚蒼生苟能活志士豈惜死願借君懸河發我弦上矢天下本一氣南北只一理處置一何難鴻毛扇粳粃中原帝高光遽可遼金比君家祖宗法親仁載良史可令富鄭公樹立太平址一若泰山安一若九卵纍事幾或一失千載貽詬訾中間樂禍徒沮遏逞姦宄以為富貴鎡瞰鼎磨血齒高天無風飈側佇羽翮俟激怒起兵端馮鋒肆蛇豕皇皇仁聖資比復當謹始發言漫盈庭執咎誰敢爾是非在目前胡為眩紅紫政如道傍室牽制終誤已區區漫多議紙上何足恃出門懼垂堂何嘗見邊鄙睽孤還自睽見鬼急張弛一斷即遇雨羣疑皆披靡天運屬安治何當合離仳不能鷹脫韝還成肉在几盤飱寧忍食欲斷南八指儀真館後園感春深庭日清亮卉木欣東風冉冉蒼翠香過雨溼青紅天葩擁纎妍膏沐誰為容蛺蝶太放顛百匝繞幽叢自謂擅春色豈知吾汝同一夜落花深緑苔香錦重我來藉醉眠仰而聽遊蜂悠然發驚省桃李不如松繁李夜逾白條楊先時青春深百草長蘼蕪滿空庭生恨復喚愁况復聞啼鶯心事觸處傷有花還無情朝光紅露晞暮色紫煙晴新燕嘲春梁歸鴻眇雲深何當理舟楫麗日清江亭風花點白紵香露滴清晨幽樹靜益鮮虛庭寂無塵亂草縈階除蒼苔老餘春鳥鳴墮紅英䔩蔌著襟巾翠碧挂黃棠飛去誰家鄰陰森現畏景綽約逢花神回首碧雲重紛紛擾天真三月花更愁一雨香百和緑英堆狼籍紅蕾愁亦破冉冉物花暮紛紛蜂蝶過幽事關心深愁來藉草坐春去酒樽空尚有餘花墮世路足迍邅人生多坎軻徙倚盼殘柯吁嗟果奈何幽蘭三伴使致蘭二本感而賦詩春山好鳥鳴淑氣扇芳樾林深草野逈窅與人世絶猗蘭郁幽姿心馨忘目悅薈蘙祗自全荆蒯甘與雜靜深反致冦輕風逺香發虞羅斷芳根逢諛李桃冗本非華堂姿衆卉同搴揠不逢汨羅臣又失長沙客上官增青蠅鄭袖逞顔色薰蕕臭自長瀟灑煙霧質朅來偶相看慘淡初未識却疑子羽寢三嗅清香泣坐久忽目成江雲滿窗白重吟繞雙叢一花還一節青金呀鳯觜紫錦卷鷲舌我欲紉以佩愛重不忍折呼兒課楚辭諷詠思比德所貴香不淫時至酷清烈所恨失所來好玩反爾賊何當煙雨深還山種明月橄欖南人謂之格覽南果足韻勝北人罕為奇銀盤獻青子愛玩驚見之蓮房飽出􅀈棗滑生下枝翠粉苔𡋯音孛新清烈凝松脂齒牙噴艱澀苦硬不可持氣韻久始來靈根瀹天池灑然凌青飈甘露濡仙芝有如宿瘤妻苦節真可期亦如相韓休朕瘠天下肥危辭遽逆耳終自為良規先難阻欲速後得卒莫違默默心語口此樂夫誰知始覺衆果俗橘奴復梨兒海嶺瘴天黑異味翻荼飴雨露存天真颶霧不可滋島嶼出乳泉造化亦若兹元氣舌本甜酸苦歸涕洟本來甘受和衆味相假移居然復其源偽妄焉能欺何當謝世網兀坐忘奔追深山石室空煮石療調飢破鼎煎春芽嚼此吟湘纍翛然沃肺肝看山坐支頥物表有真味載歌采薇詩秋思星麾重霜露落月窺弊裘久客心易傷况乃逢暮秋誰知楚江邊即是窮海頭赤子解虎鬭先拚十二牛太阿授楚柄濤塗竟拘囚昊天有肅殺未肯休戈矛書生本迂濶國計無身謀俯仰但不愧萬事從悠悠燕南二十年閉户鑿混沌先天探首尾立志極悱憤衣帶歲不解強勉忘怠困落筆一萬字開卷即立論不知世代逺但覺聖賢近學問期有用匡濟展底藴徴車賁丘園蟄窟驚一奮使行還尼止江邊坐孤悶江聲萬馬來勢欲衝夜枕志士足多感坐起安得寢靜聽風雨急透骨寒凛凛湖湘湊逺浸巴蜀動餘淰誰令限南北洶怒欲相諗落落弭兵心于今成貝錦薦玉期捧盤墮甑如拾瀋樽中有瓊花明朝且轟飲木葉墮積水西風白鴈來祗應破月底曾過黃金臺昔年弔荆卿臺邊把酒杯落日督亢陂莽蒼秋雲開浩歌易水寒晚山青崔嵬誰知坐江館兩見飛鴻回空庭日徙倚慘淡生莓苔援溺先墮井計拙良可哀弱冠燕市遊許與皆豪英百匝紅錦圍酒海橫長鯨醉倚薊丘竹長嘯秋風生有時按策坐談天復談兵劃破天心胸四座一時傾今來閉重門但聽擊柝聲乾坤惡喧聒竟歲喑不鳴何日九地雷決裂重一轟昔遊東諸侯秋晚登泰山佇立太平頂超然出塵寰日觀望吳越浩渺秋雲間長風漾江海天末生微瀾今年坐舍館江聲滿重關却如在幽陵修阻不得看好花靜有色相對婉且間無由寫哀怨日繞歌幽蘭儀真館後園海棠兩花于秋因為小酌賦詩二年海棠秋幽妍對寥索霜後輒載花枯株吐纎弱化工為詩人故令造物錯木落出奇芬風度亦不惡尖黃簇短葉膩翠光欲鑠蹙縮包紅栗殷濃入深萼稀踈生意怯靜麗尤綽約飛絲罥青蟲蠨蛸共聨絡深閨養春嬌霜花滿珠箔賴得西風輕微薰小陰作盈盈出宫妝新寒翠綃薄空庭自顔色含恨誰附著息亡楚無言意婉心不樂琵琶怨昭陽所遇非所托獨有未歸人相看慰孤酌却似海南時坡仙政漂泊有酒仍有花世事且高閣後時亦何遲適寓今猶昨香霧霑新橙傾酒兩螯嚼銀燭更髙燒秋花易零落甲子歲後園秋色四首雞冠夷則播新律卉木協秋候綰結流火餘的皪金天宿峩峩列庭除摘摘儼雄秀炎帝朝火官絳幘軒宇宙植立竟不拜離披擁青袖奕葉初類莧吐心漸如豆脈絡引絲起一片珊瑚瘦雲芝茁紅腴紫茵卷翠脰碎顆蹙丹砂肉綻殷血透怒割赤龍耳徑磔還亂糅麻葉薄且聳山字缺乃覆查牙欲成角擁腫下連咮生全餘小穗展盡帶殘皺昂藏偃膺高突兀出羣驟還將早霞映欲向朝日雊月露終夜棲風雨幾回鬭再礪復自止交退誰與救區區間草花象物與接搆弭兵日觀戰亦是自貽咎垂簾且相忘高枕臥清晝牽牛野花照天星星中花亦盛長夏蔓草深踈籬掩斜徑幽庭日無事森寂淡相映繚繞絲亂垂默綴葉相並金風一披拂零露光彩競參差碧玉簮綰插滑欲迸霜絲吐冰同容色好娟淨堂陰青錦張牆背紫苔瑩時方鵲橋成佳節當秋孟織女能翦裁天河洗尤稱女以秋為期郎將花作證風雨開雲屏鸞凰鏘月鏡處處乞巧筵家家喜相慶五年江館客萬事成墮甑不能致龍節空自悲虎穽永日鏖炎蒸中暑甘臥病對花淚盈目坐起不覺暝雲漢見雙星回頭看斗柄遙憐小兒女昏嫁俱未竟中流虞風波相見何日更葡萄深院荒草長短蔓裂磚縫葡萄本西果南國誰與種插蘆為扶持灌溉甚珍重瘦骨紫節舒龍頭青線控蟠蟠上踈籬蒨蒨將逺縱遭遇雖後時取實望秋仲摘露添爼豆庶間館人供誰知六月旱卉木焦死衆斷秧餘幾花勉強著土擁竟作纒結枯日繞空悼痛肺渴口重乾望梅心欲烘忽憶河隴秋滿地無歇空支離半空架串草十里洞拇乳積城岸澒癑接梁棟一𣲖瑪瑙漿傾注百千甕往歲見沙陀回鶻正來貢詔賜琥珀心雪盛瓶盡凍查牙飲流澌氣壓黑馬湩一旦離魏闕五載猶在宋見此復何時鳥道目逆送野蓼窞池蓮蒲短久旱餘淺淤牆隈積餘埃玉鳯秋不翥野蓼根莖堅幸得侵沮洳節葉瘦且赤蘼蕪交翠箸細蘂亦鮮潔粉米糅丹素獨窣裊輕穗離披滴清露水花淡晚色幽杳足真趣忽憶過夢澤千里渺煙樹蘆花與蓼花露錦蕩雪絮深入芙蕖藪逺映蒹葭渡舉鞭問飛鴻駐馬嚼佳句乃今四壁中浩渺隔煙霧日斜對幽叢聊以慰遲暮大似辛苦蟲無復風標鷺來因援沉溺底事極幽錮屢上刳腸書無地瀝血訴嗟嗟好花草焉用生此處祗應為詩人故故獨不去嘗膽如啖蔗食蓼猶膳御仰首但有天志節久愈著新館秋懷贈正甫書狀桂香動幽人秋草滿高牆縞袂臨西風佇立歸興長羈翼塌卑枝冥鴻恣翺翔南山豈能移愚叟不自量嗟爾違慈顔從余使炎方亦欲登雲衢逸足馳康莊誰知成阻修按劒看夜光遂生肘腋變梟獍為禍殃顧微仁者勇臨難志力強繾綣百折餘奮義肝膽張吾徒其能人玉石焚崑岡所幸書幣完舌在身不亡老雨洗新屋情話對空牀從渠讒口壓貝錦生鋒鋩誣善祗自欺謗毁痛何傷昨宵燈火新月落霜露涼載續所著書靜默窺天藏稿茗煮黑水數碗澆枯腸楚騷不必歌仰卧看屋梁行止有天運得失理亦常道能全始終終得拜萱堂烈士吟贈總領宋琚薄俗敗風節有志亦中改舉世遂無耻逐利甘鄙猥或有申棖欲難免市道買幾回惜魯連重為嘆朱亥襟期何灑落高義冠千載寥寥復誰繼碌碌等駑駘南北久拏兵吾徒著手解救鬭乃搏撠陷穽生蟲豸歲久或竊發亂刃期爼醢烈士有宋君王事賴不壞敵中偶拘隔凛凛畏英采慨然自拔出喜聞官長在館吏誘令降不語首重擺中宵出儀真五鼓入淮海羈留故箝逼難耐冀自悔睨柱欲碎首守者盡惶駭大官遽稱謝下拜貌磊磊遂陳稽遲故勸令更延待方説在諒陰便對有冡宰彼知辭理屈我乃意氣倍顧盼立功名足以起庸怠君當持此心吾亦重自罪春風波長江佇看振旅凱請鉞雪主辱為國清大憝新館八月三日雨氛祲積穢沴旁魄宇宙滿驕陽鑠洪爐竪電繞新館輪囷赬雲擁決驟白雨建迅雷初喑嗚缺裂蟠空逺猛風忽著人潑目氣即偃光怪入肝膈勢若山壓卵柱天金塔碎奮地火旗卷連閃復疊擊黑海共旋轉羣龍破壁飛驚浪拍戶翦大舟千斛翻空車萬乘碾夜久怒益甚惴惴懼難免童僕儘顛頓覆面不敢喘牀第等階戺無復辨深淺記異古未有大變見亦鮮祗應和龍氣突兀揭幽顯都將生靈恨六合忿一闡蠢爾禍國徒聞此無愧靦新館春日書懷天末聞春鴻梅梢見新月孤影獨徘徊踏破牆陰雪寂寞未歸人慘淡無家節異域機穽深中原信音絶白璧一片心青天竟難説誰將萬古恨總付江城客歲華雖云改突兀祗此心弱質乃重負苐恐力不任走馬活斯人覆舟成陸沉饔牢耗將竭變故日益深東風吹江聲曉日晞鳴禽從今桃李花又是夸園林鶺鴒下空庭飛鳴行且搖飲啄還相呼去去仍相招我有弟與妹江山鬱迢遙膝上讀書時中堂拜母朝鵷雛繞竹花翡翠巢蘭苕衝風吹雲衢兩處聲嗷嗷二親連夜夢慘戚異平日祗應節序改思子不忍食覺來淚滿枕肝裂刀斧劈爇紙死灰飛酹酒霜階溼遙想墳前土歲久深荆棘忠孝兩未盡愧恨空飲泣怨入江流深恨與春潮上天涯獨昂藏顧盼空俯仰誰知誤國徒解結漫天網不漏一民命赤子驚攘攘徙薪重獲戾擲秆乃加賞笑殺伍子胥黃池尚爭長舉杯對江梅酒面生春香一酌酹上元再酌澆新陽自勸未歸人一詠復一觴中原帝仁君突兀恢皇綱緬思好生心此去不可量自昔有天道我本無愁腸丁卯孟春新館望南極八年坐江館祗得片天仰厄運運迍邅乖氣纒魍魎白虹貫黑日彗孛掃穹壤神風忽吹出新屋眼界廣前秋老雨餘霽色開莽蒼參足玉井東去地都幾丈赬星隱江氣焰焰光欲長老人慰羈孤驚喜意惚恍都疑夢寐中怪事非所想誰知今年春更比往歲朗黃閏對天狼數日見乃兩恨無雙白璧薦幣展覲享中庭望不盡漫為拜稽顙南海還無波北辰氣尤敞中原帝聖君太平今有象整頓高世䇿道泰非技癢陵川集卷四
