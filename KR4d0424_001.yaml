body:
  text: 陵川集卷一元郝經撰賦擊蛇笏賦并引孔公原曾孔子之裔孫也仕宋祥符間嘗以笏擊祅蛇其事其節則有臨川之志徂徠之銘王稱之傳在其笏則歸于今張文彥逺經晚進曲學固不足贅于諸公之末然義激于中而有不能巳焉者謹賦而廣之其辭曰昔仲尼之得政也兵裔夷尸姦宄藏甲出大都圯魯宴而齊沮王道之端于是乎啓奈之何天不假命遽行而遽止其餘威遺烈鉞于筆而鈇于禮誅十二公之亂臣二百四十二年之賊子壓之以大經束之以大法莫敢瀆彞倫而擾天紀孰意其孽魄狃而不散逆靈締而不弭蟠結乎大塊之阿囚鎖乎九原之底乃卵狠而孕戾不矜廉而厲恥每間治而為亂輒張慝而掩媺代謝屈信閲越千祀以及于宋化祅蛇而陸起窟宅乎廟堂馮附乎神鬼蜿蜿蜒蜒曳曳頍頍伸腹傴脊呀口侈噬呈露怪狀愕目奪視侈大澤之運動常山之勢愚吏蚩氓崩角蹶趾釃酒血牲匍匐祈祀若新莽盜國而無知之民共稱符瑞狂巫顛覡踴躍驚喜稱為神龍因緣為市若賊操竊權而嗜利之士爭為役使妖聲異聞鼓舌轟耳喁訛唱和歡呶呌噪震一郡而駭千里莫之敢詰亦莫之敢訿聖有賢孫釋褐于是端笏而前山立顧指蓄鋭俟發韜鋒卒起若子房之睨秦始奮笏而擊顙拆身弛祅死于心毒搖于尾若太尉之擊朱泚於是惑民雨解義士風靡天子是嘉用為御史司國之直致國于理而諫中宮之廢折遼主之誚邁節特操凜乎清霜皎乎白日雲高而山嶷是仲尼之以直道詒厥子孫俾萬世如矢者不屈不撓拔邪樹正賞善誅惡無時而已也則是笏也與誅卯刃修經筆兵萊人戈叩原壤杖墮三都鍤異時而同迹仲尼為不死矣嗚呼叔世而下蛇龍混蟄春雷瘖而不鳴直道僨而不植已刓方而為圓又枉尋而直尺誣譎誕偽異態百出有蕩俗惑衆乘高而為姦若兹穴廟之蛇有巧發毒伺中人而不可測若含沙之􅈮者有之笏也無之人也孰為之擊也哀三都賦有序李唐亡長安洛陽遂虛梁篡而汴始建五代荐國日益殷富逮宋受禪太祖以汴土薄易無四塞之固且非王者處上遊之勢也議遷都長安而太宗與大臣不從太祖曰今汴所利者近漕江淮之粟耳不及百年民力殫矣至宣政間民雖繁夥皆遊食不本著佻靡相矜益之以黨禍重之以侈政老姦擅國點閹用事敗盟開邊而宋果亡金源氏都燕掞河朔之勢以雍洛汴為邊鎮既失河朔始南走汴金亡而汴亦虛迄今二十餘年百王之制度九州之壯觀寖以蕪替遂無孑遺神州陸沉永為丘墟可哀也已於是作哀三都賦其辭曰維帝極之弗建致神器之顛趾德者斃而覆宗力者踣而沉祀兑鋭缺而兵頓坤靈黑而士死天王之所居衆大之所止頏野馬而蕩滅走城狐而傾圮噫吁咿嘻伊誰之始乘厥權輿遐哉邈矣亡國之蹤自西而東吞聲隕涕原始要終昔明皇之臨御恃開元之駿功抑漢魏而濶視攀三五以比隆謂天崩與地陷可宴安以無窮學霓裳於天上養祿兒於宫中侈幾一動姦臣愚弄欲未足心禍不旋踵割一統以幾絶耨兩河之盜種陵夷僖昭孽臣姦驕睥睨問鼎倔強不朝巢以飢熾溫用盜帝劫乘輿以入洛血椒蘭而行弒剷咸陽之故基斫萬世之元氣舍洛邑而弗居陋姬旦之王制噫嘻嗚呼兩京遂蕪中夏壯觀削于汴都迄用定命蔑為訏謨龍蛇起陸競為窺𨵦閲五季如傳舍啓二都之永圖戢干戈以禮樂化殘暴以詩書豈期百年弗堪顧天漢黨復錮唐閹再權壞法亂紀拔本塞源既崇侈而肆欲復敗盟而開邊東南朝廷種兩蔓菁花石綱運太湖浪驚祖宗之澤盡華陽之宮成引金源於海上揭汴底而一傾忘社稷之實禍慕燕雲之虛名二帝北虜一馬南渡孽不自天勢成崩土有臣不臣假王張楚有民弗民依國齊豫靈光巋然幸無一炬鼠寶座以飛嘯燕雕梁而不語何故新之多變竟不知其誰主粵惟金源國一再傳舉玄莬與肅慎繩遼武而帝燕合九州之制度成一典而煥然去唐宋惟一間詎元魏之敢先而乃馭失其道潛朽其索北陸翻沙蕭牆禍作公孫于邾王遷于洛日入崦嵫寢適冥漠駐汴宮為玉所不甘卑而分弱藉二京之形勢跨關中與河朔雖日窘而日蹙猶夭矯以磐礴俾早為之定鼎不遂至于墜落嗚呼噫嘻商於雪飛車説其輻火焚其旗一僨塗地三都遂隳彗哲王之偉迹剝列聖之丕基俘梁亡之庾信走吳滅之陸機寧區中以馳矚悵掩袂而興悲碧雲高寒何處長安灃水有芑涇水有蘭煢不見人慨乎其嘆漢室金莖東移淚澘茂陵玉碗暴出人間愁虹兮貫天凄風兮射關覽冠蓋兮弗復蔇音忌帝東遊兮何當還維終南之峻極與太華之孱顔壓九地之王氣鬱千里之秦川雖人亡而事去尚虎踞以龍蟠北邙坡陀伊洛交波惄焉如搗傷如之何悲哉白馬之禍舉衣冠而一盡宵人肆忿寧恤乎他鸞皇胡不冥飛卒莫逃於網羅望清流而揮涕睇濁流而嘯歌水南有花水北無家荒涼國色慘淡天葩衝風起兮飄忽蕩愁錦與驚霞湯湯乎汴蔡三徙兮終敗倐鼎湖之龍去震長平之瓦解曠萬里為一虛疑天地之欲壞文子文孫青城苦魂風悲白日雨泣黃昏陰磷吐焰枯血長存宮百王兮何有山萬歲兮不壽石九州兮果窮巖玉京兮獨秀惡於中原無所歸咎李唐既逺金源弗受熙豐一黨宣和八賊務快私忿竟亡人國言及此兮噎吭涕無從兮橫臆草木為之不春日月為之改色小人懷土君子懷德王澤不流下民蕩析狐猶死而首丘人豈忘乎都邑秦人朝鮮汴人祁連不見鄉園泣涕漣漣父僕三韓子奴桑乾于嗟闊兮乃無羽翰目愁雲乎異域淚老目乎荒原漫搖神而振志忽心死而骨寒苟言還而言歸豈安土而重遷烏兮鵲兮何枝可倚丘平壠徙碑折松摧鄭不來矣鬼其餒而魂一夕兮九逝扣玄關而問之彼氣數則已定何侘傺而自私夫亡有大釁興有嘉運豈九州之神靈無一人而與問王業不偏安坤極不終僨蓋泰生於否而亨始於困國家方尚帝德推天元飛漢唐之龍馭貶拓拔之鴈臣閲帝王之窟宅奠天居而覆民吾何為乎怨嗟艱辛以熱中而疾夏為萬物而憂春也易哀為樂收泣為笑捧葵藿之朝陽返山河之夕照渾沌硯賦賈侯有硯端之異石也溫潤堅潔渾然天成而不鎡匠鑿之力余嘉其能全於朴而致於用也故名之曰渾沌而賦之辭曰昔先天氏之一卵全渾沌於太極有心有迹而惟變是適方其鷇不音而拘龍不蛻而蟄會萬殊於一同而納萬動於一息忽感而化與神俱入祕于重泉贅為老石而潛風波沒泥滓潄沕音勿潏音聿湛清泚哆蟾驚而噴彩老蛟怒而厲齒既未復于故步復見遇乎舟子淵九重而縋出判二氣於太始深固反以誘盜靜密反以求徙割鰲膽而獲翠落鯨肝而得紫一泓鑿而失真六竅存而不死然衆變之夭忽實大化之所使水無風而不波心無物而不起但不離不隨不鑿不弭又焉有卵為石石為硯之異又何疑硯非石石非卵之旨蓋必有是物以明是理必有是用以明是體一貫而通一宅而止是渾沌硯也已故其奕輝光登侯堂琰匣貯而色瑩淨几陳而氣張定心存而玄穎自役大朴在而倏忽自亡散迹於墳典䇿勳於文章石渠東觀陵轢秦漢孔壁汲冡頡頏夏商燼南山之松而不變腐孤竹之管而不傷墨者自墨而不迎儒者自儒而不將舍中和而雲淰音閃雨霮摧堅貞而金聲玉相霧縠披于沍氷隂鑑溢于秋陽色非此色而妄幻滅時非此時而寵辱亡守重厚薄泓洋不名不毒而其用不可量也辭曰硯之珍石之詭杳渺光含玉肥水知白守黑兮為石谷知剛守柔兮為水委是以涸四海而不汔灰萬山而不毁納元氣兮雲之根化無窮兮神無巳而列諸聖賢之軌固不待蒙莊浮屠駕言而作訾時張賈二侯方事佛老故以是諷焉銅雀臺賦天斷漢紀誕植姦孽董則顛而袁則愒曹氏猖狂銅雀巍嶪厄崑崙閉孟門嶡三臺見三山截霓斷雲縵重楹而走六龍折角徙甍頡地頏空碧甃金鎔直外隆中壯天骨柱天崩激千里而怒長風如此之富如此之雄而操之心猶未充俾漢之天為曹氏天漢之國為曹氏國漢之民也曹氏奴漢之臣也曹氏𨽻漢氏之宗廟宮室燼矣而曹氏之列屋長門美矣漢氏之庭寡婦悲曹氏之庭嬙與妃聆義聲觀義旗孰知其非而操之心猶未涯既立海移山分辰斡斗負漢鼎而入魏宫結漢網而維魏臺則丕也拜表植也拜章權退備隱琮降表亡不愧漢霍光自比周文王四顧無人虎踞而鬼倀忘赤壁之辱誦明月之曲笑吳蜀之僻隘鄙桓文之局促乃上重臺入雙闕慨雄姿鼓高節燕歌兮玉糝塵趙舞兮風翻雪望二喬而不見怒孫劉之未滅謂我翼莫吾禦我角莫吾折彼神器入吾手孰敢撤而裂之哉曾不知此世此年守漢宮者孤兒泣血守魏宫者姦雄倚疊也一旦懿不忠國昭不義扶濟戈投車龍悲鼎湖則銅雀之富魏宫之蓄賊規盜模一為晉所居嗚呼天既不有漢而魏復當有天使魏有天則魏之為魏亦昭然矣奈何魏反不務可作真帝逼君而生拱北以漢臣欺世而死征西乎噫欺人者不自見已不欺人人不欺巳魏欺漢作是臺而不能居晉欺魏獲是臺而不能保臺乎臺乎果孰居乎不欺人者其永居乎龍蟠若木山子賦有序龍蟠若木者禁園之奇石也德陵狩汴播棄泥壤遂用崩折有客過而悲之因命僕以為賦其辭曰天蛻奇骨僵立突兀不斤不鑱而盡諸山之秀鎪造化之窟力百轉而􅍶崒鬱龍蟠于若木茁元氣乎一拳露太初之面目潤涸四海幽翻萬谷尺有千仞之峭巋無一粟之俗蓋天鍾美於是備夫三索之藴以終萬物而始萬物不徒説於人而為眼中之物也故其堅足以不磷重足以鎮躁止足以間邪靜足以寡欲使為明堂之礎而足以柱天使為昆吾之硎而足以剸玉惜乎時也非時命也非命投間置散於侈靡之地而為遊觀者所矚故默默以自容兀兀以自足三十六宫方爇沉薰麝爭容而戰媚抹朱而綰緑此則煙凄霧慘風呼雨沐踞長松而倚修竹盡漢武之雄夸與秦皇之凶獨齊管絃于天籟等山丘于華屋寄春色於莓苔寓山鳥之一曲幾雷霆之震怒欲奮飛而起陸媧皇逝而不返懼不周之再觸是以陸沉而不溺朝隱而不屈巍巍乎將閲千祀振萬古而不朽不殁也豈意其山移海倒地圯天覆虎出于柙龜毁于櫝斡神鼎而寶康瓠逐麒麟而囿麋鹿又崩折于瓦礫復閉滯于溝瀆彼不才之石瑰珂犖確全其天而碌碌此其將遂沉淪湫底與糞壤同化亦將有時而出也耶嗚呼一石之奇猶若是矧抱奇之士乎士已為楚大夫之三刖而石復為奇章公之慟哭也宜矣靜華君墨竹賦君姓張氏行臺公之女元遺山之姨姪總管喬君之妻也甚哉物色之有異也不為丹青不為麗縟不為泉石不為卉木墨於用而形於竹開太古之元關寫靈臺之幽獨儲秀潤於掌握貯氷霜於肺腹足乎心而無待於目備乎理而不備乎物全乎神而不徇乎俗蓋達者之有天趣而以貞節為寓也若一葉一節施塗粉澤舒焉而布煙慘焉而綴雪以規規之形似幸他人之目悅是俚惡之效顰惡足以知吾物色之説竹有竹外之形墨有墨外之色故與可有成竹之論坡仙有心識之訣而潁濱謂解牛斫輪心手俱滅而後至乎超絶詎庸陋固滯者得厠其列也於乎靜華琴書滿家雄侯玉胄振吐天葩幽間貞一瑩璧無瑕棄寵光而高蹈緬逸志於雲霞湛虛室之太素曾不喜乎豪奢故其坐雲軒佇靈宇凡蹤絶天籟舉吞八九之雲夢小渭川之千畝沛蕭蕭之神寓植歲寒于毫楮掃胸中之全竹走筆下之風雨忽穎脫而迸裂怒絶繃而掣去何此君之尚玄蔑青翠而不處恍一夢於藍田幻兩身於湘浦措斧斤兮何地陋淇園之漢武揮淚涕兮何從愧蒼梧之二女發四座之清風驅半襟之煩暑欲折枝而不得懼真宰之或怒縱入橫出高森亞舞不步不武不繩不矩百千其狀劍拔戟踞會于嚬呻而得於盼顧豈畫工之屑屑於此焉而得與神奇忽恍固不與萬物同化將落落兮終古則君之玩物色寓天趣又豈紛紅縵緑所得同年而語哉辭曰月府兮雲鄉戲墨兮淋浪震􅊒􅊒兮神蒼筤列數幅兮森中堂氣颯爽兮來三湘粵惟靜華之比德兮秉貞節兮凌霜怒雨賦巳酉五月十三日蟾骨畢而膨脝箕侈口而饞吞帝惡貪兮赫怒氣軒軒兮不平乃命箕伯召坎師轉隂軸翻陽機鬱抑乎兩儀藴隆乎四維包并乎八荒充塞乎九圍括一囊而大舉疆萬里以長吹陳雲移海而起雙霓貫斗而飛肅肅栗栗泬寥慘戚收兩造之和氣寒凛凛兮來逼忽六合之破碎迸金光于虛碧震來兮􅊒􅊒迅擊兮霹靂轟萬乘之空車隕千尋之絶壁徑穿心而裂耳訝踵入而頂出間剝啄之聲落似沙石而還濕忽抑絶而閉默等萬籟之喧寂驟江傾而河沛瀽天瓢為一滴滔滔蕩蕩漭漭泱泱千里一注瞿塘峽上急浪驚湍沕潏飛蟠從天而下底柱山間紛秦堅之百萬避晉玄之五千怒夫差之水犀既射潮而矢天少瑟縮而淅瀝復誕漶以連泫蛟龍奮而不屈走陸梁以高鶱蚯蚓喑而不鳴蛙黽噎而不喧疑天地之嘉運欲覆世而一湔罔兩驚而轉石罔象喜而跳淵溢溷中之汚穢沒庭下之蘭荃疑天地之衰運復太古之茫然稚子踣而不蘇畏崩壤而壞垣老媪伏而不動固局束以攣拳彼胸中兮何主宜外物之變遷羌獨台兮草堂方偃蹇而高眠為攬衣而徐起正冠襟而待旃主之乎以忠信彼胡為乎詖偏倐孤電之長掃賈餘勇而忽還星吐焰而耿耿月流波而娟娟於是撫牀而下擊藜而歌之歌曰尸居兮龍見淵默兮雷殷彼自怒而為幻我惟常而是允存而守之一心而定推而放之四海而凖又何怒之遷而喜之引也瓊花島賦有序歲癸丑夏經入于燕五月初吉由萬寧故宮登瓊花島徜徉延佇臨風肆矚想見大定之治與有金百年之盛慨然有懷乃作賦焉其辭曰楛矢飛燕遼傾宋奔中夏壯觀萃于金源鬱天居之宏麗開陸地之海山忽陵飛而阜走見虎踞與龍蟠建瓴水於河朔浩不知其波瀾沉沉覃覃旋坤轉乾赤城紫府幻出塵寰粵惟瓊花之一島突兀乎其間崑崙之巔海風怒掀劈濤頭而迸落結水面之青蓮巖巖磐磐僵立孱顔嶷如鰲頭冠日觀而却走傴如鯨鯨本字背負月窟而橫髙寒其頂有廣寒殿故云瑤光樓起金碧鈎連斷霓飲海頡地頏天華陽九州之塵雲消露淨遼海百年之藴熢湧煙填慶雲佳氣郁郁芊芊時屬清夷天下晏然倒淮南之戈而荆楚帖崩統萬之角而安西安神武不殺而日趨於平泰信誓既結而無事乎開邊明珠白雉不召而麇至蒲梢騄耳無用而復還一人高拱於其上無所為而樂穆清之燕大臣優遊於其下無所為而興禮樂之盛萬物鈞化而無間四海被澤而不偏風俗既厚綱紀日完財不聚而富刑不用而措政不更張而治士不作聰明而賢民日遷善而不知其所以然而然嶷嶷乎魏孝文駸駸乎漢孝宣宜乎於此樂天下之樂軼邁往而追羲軒收萬方之瑰詭盡九土之纎妍紆青雲之環佩奏鈞天之管絃御長風於絶頂訪蓬壺之飛仙開八荒之壽域正一氣之陶甄躋斯民於仁壽而君臣與焉挈斯民於遂樂而君臣享焉涵浸醲郁上格於天舒愈粹暢下達于泉濟濟洋洋殆三十年見始終之全倐九龍之飛去墮神鼎于羽淵宗沉社僨而乃屢遷雖則屢遷竟不能永其傳功如是德如是不克負荷一舉而棄捐孰為之司而使之然涸金源于汴蔡臥一島于蒼煙悲風射關謂居庸也枯石荒殘瓊花樹死太液池乾遊子目之而興嘆故老思之而淚澘蓋餘恩遺烈膏于骨髓著于肺肝雖死而若生雖亡而若存有與析津同沛箕尾共鶱者雖曰假山而實德山也彼虐政虐世昏君暴主以萬人之力肆一巳之欲刳吾乾坤穢吾山川雖曰石山而實血山民欲與之俱亡卒聚而殱旃寧不愧于兹焉泰山賦粵大荒之播氣肇天一而為水滓沉澄而濁凝柔洞蕩而剛峙故水載乎地地載乎山抵艮茁震冠海而起為萬物之始終藏八索之首尾堪輿之骨壯真宰之形似人皇九頭俶載于祀禹鑿益焚神力是試條而為三別而為九祀而為四中維岱宗獨尊而雄盤踞萬古莫與比隆衡固阜麗瘴海極熾融飈赫赫物燬其鋭華固秀拔金天肅殺一翠橫秋萬化搴揠恆亦宏富天地闔户玄都幽府固隂寒沍粵惟兹山首出庶嶽其頂則呀突乾維其足則亘抐音納坤絡奄東國之全勢孕日出之鴻爝作帝孫而奕大混天胎而不鑿為有生之司命權天地之槖籥露太初之面目愠巨靈之獰惡鼇六卷而矯首龍七襄而奮角障大海使不流俾降丘以東作拒洪河之奔湍俾回翔而北却三州得以完厚萬民得以土著瞰臨冀魏軒輊恆趙背左燕遼夾右瀛鄚闢青徐之疆畛包兖豫之封略壓吳頭而益重捽楚尾而欲割拉琅邪而橫騖控龜蒙而回躍瀹濟漯以為襟帶汶沂以為約瀦大霈于雷夏泄龎澤于邾漷秦觀可以窺長安周觀可以窺汴洛合沓九州之半覆壓數千餘里重覺魯強不為齊弱豈無他山髙蹈磊落劍門則擅其重閉石樓則肆其超卓天台則鬱其詭譎太行則亘其磅礴各據地勢偃蹇岞崿如草昧之崛起據偏方而驕跋恃區區之險固徼制外之封爵孰如兹山中華正朔建極啓元衣冠禮樂天宇夷而皥皥王道裕而綽綽豈無羣山紛紜交錯或繚徑之蛇結或垂巘之鷲啄或刀巖之櫛疊或斷壁之牙遏或青蓮之天開或蒼屏之玉削如夸徒與宵民極其力而相較客氣鼓其餘勇冶容盛其塗抹孰如兹山衮冕黻珽朱絃疏越純粹中正崇髙溥博大哉乎聨延九重鬱如深宮巋其中峯見天子之雍容前列如却後列如剝拱捧旋躩見百工之致恪云云亭亭衆星北辰石閭社首百鷙一鶚既烽湧而豐隆復曠豁而綿邈扶青帝之宮觀締玄臺之樓閣瀛州邃其幽深蓬壺敞其寥廓飛仙飄兮遨遊抱明月而遂樂采玉芝之芳潤探先天之希濶御絶頂之長風眇天地於目末閲扶桑之菌蠢幻魚龍之轇轕卵長鯨於雲根巢陽烏於日腳蒼筤分其霽色鑠紅金于碧落羲和起其龍馭駭萬國以開覺耆貺蓄而奕奕昭靈貯而灼灼豈徒云乎髙大乃與世而落莫豈呈奇而露異等尋常之嵓壑哉若夫觸石而雲膚寸而合崇朝一雨暵旱弭虐卷舒隂陽杳不可度有如是之神儲膏溢澤蒸為桑土衣被天下民無寒苦播為陽春狐纊天宇發育萬物勾芒彚庶信屈起伏如嫗如煦有如是之仁既髙而大又神而仁乃于嶽麓篤生聖人續太皡之統萃奎璧之真太極再造四時復春藴而為道發而為文膏澤其民堯舜其君德與山髙名與山尊六經垂天與不死者存則又與夫育蘭茝囿松椿出器車生皇麟羡金錫之利藴珠璧之珍者不既大矣乎宜乎唐虞盛典周漢極制巍巍堂堂殷秩縟事後王後帝崇德報施繼繼承承垂于萬世虎文龍馬賦有序乾陽萃精星列房駟健之至也故飛而在天則為龍行而在地則為馬雖八卦皆擬其象而獨專於乾坤負圖而出於河包犧氏按之為畫聖人事業以之張本而文籍生焉則又用之至也出於乾陽故産於西北陰國金天往往騰踏羣龍駔駿特異號稱龍種其蕃息盛大皆莫若國朝沙漠廣莫地經兩海盡為遊牧之所又兼金源四十萬并西域三十國古之所謂千里者海飲川量婦人豎子皆乘御之搜奇拔異始得與御苑下乘今上所御虎文龍者空西北百千萬羣而未之有伯樂之所未見書傳之所不載古今之所罕聞又虎變炳然有定武功彰文德之象焉昔漢武帝得之外國而親為之歌唐太宗之所御則圖畫凌煙閣而為之贊矧今生于本國又若是之異乎歌頌不作則與駑駘等為無聞敢犯齒路馬之罪而獻賦曰天柱折地維絶東南傾西北揭隱日星為晝夜結陰陽為氷雪死土銜沙枯山積鐡白草失春黃榆下葉洞澒幾萬餘里蹴踏幾千萬年藴天馬之剛健混神龍之窟穴不知其幾萬餘羣幾千萬匹相我薄伐控弦立國不棧豆而秣粟不棗脯而齧膝盡風呵而雨止恣原皂而野櫪從橫散漫優遊間適全其所天故皆越逸一兵控百百不介一力有餘裕故皆蕃息瀾翻浪動川盈谷溢奮威靈以一戰獵諸國而無敵迄今四十有餘年矣我君中興真龍間生一氣直壯四星曜靈駭西域驚北庭飛黑水晦青冥碎崑崙轟雷霆煙雲墮地列缺生獰振長風而一嘶凡馬喑而不鳴六丁盻瞪而弗執真宰辟易而弗乘於是飲余吾濯渥窪褪鱗介脫角牙食萬虎而類駮化一龍而若騧質金火而黑章剺翦刀而互呀變乾坤之至文散玄黃以為花會運數以呈用來馴服于帝家頭骨隱戟面顴夾璧豎目日出陽鑑電激膺門肉闊汗溝血滴垂梢絲齊分鬛髮直露筋藏骨玉蹄鐵脊前鳳後宛轉却顧飛燕掠地輕不著土奔軼滅沒掣去縱步東西有日天地無路倏忽變化匪龍匪虎逍遙良善遇知得主帝軒之飛黃后唐之赤文周王之騄駬漢武之天驥魏文之澤馬殆皆不得同年而語矣於是帝亦惠異登進上廄一品芻秩萬乘之右鉸玦寶錯鞍勒珍鏤金韉玉鞭服習馳驟建斾西出足力騫張渴飲洱水怒蹴點蒼萬里一息建業興王吸絶江流瞰視武昌朝楚暮燕載會衣裳新宮法駕金蓮正香飛龍在天遂卻走馬和鑾雍雍垂拱而治天下視彼夸毗盤于遊畋放心事侈黷武求仙奔二師走嫖姚志欲無已焉則又天淵之懸也辭曰嗟異馬兮遇主知虎為龍兮風雲期奮靈虬兮躍神螭隘萬里兮強一馳乾坤小兮日月低適時乘兮加馽羈效倜儻兮呈權奇宣皇靈兮耀主威朝江南兮暮遼西功德盛兮天人歸飾玉輅兮開金扉馬在廄兮方無為冠軍樓賦有序中統元年庚申夏六月奉命使宋道出宿州潦路霖雨蒸厲作惡遂為稽留時東平嚴侯之弟開府于是一日置燕于冠軍樓在城北隅西望平逺盡得東南之勝乃為賦之其辭曰庚伏苦雨沴氣中人壞垣毁屋沒馬滑輪蒸飈鬱攸卷局不伸豫乃斷羈思振氛翳藏天倪肆棲倚將超超乎邁往而沛沛乎凌厲為引領而延佇快遐觀而馳睨玉臺公子金羈列侯立馬却坐起豫勝遊越黃泥之坂而登冠軍之樓清風翛翛火雲四收別入一天曠如三秋闊步髙視覺九州之外復有九州欲中天而上征削塵蔓與隱憂頡汗漫以為友翥逍遙以為儔旁薄乎希闊徜徉乎燕休既而觴豆粲列吹歌疊發涼入翠綃怨生瑶瑟邊聲跌宕壯氣激烈卷山河於霞腴駐風雲於玉節目與天逺萬象入睫夾右齊魯面左楚越海岱連絡遡東北而去淮甸平逺轉東南而坼聨陂塘而際野渺青山於一抹屹震南之相望嶷鼇頭而岌嶪千麾霜橫萬壘星列皇輿鞏固藩牆不決隱若長城淮海有截惟威惠之並舉俾姦宄則遁迹雖平衍之一區固形勢如四塞伊將臣之司邊不在于地而在于人不在于兵而在于德所以為冠軍也玉盤醽醁遽一再行吳歈楚謡激為新聲淋漓參錯飲驥澆鯨酒酣氣張心翼馮馮慨嘆今昔反有纍乎高情顧瞻彭城隱隱垓下想見髙帝之嫚罵項羽之叱吒騰擲宇宙而競為凌跨白骨蔽野魚龍戰罷孰得孰失皆為解瓦一時偶然莫驚王霸睢水復為之流而怒魄邈然而化還望維揚壞堤迆迆土蛇一脊千有餘里負汴水而依淮猶繚首而曳尾遺長雲與老樹見窮奢而極侈藐瓊花於天風弔荒淫之帝子凡以欲而從人乃保宗而延祀將以位而為憂固兢兢而不恣詎可從耳目之欲血生人而肆一已哉其僨社沈族身被其戮為萬世笑宜矣登髙而賦樂極生悲擾擾紛紛將安所之納萬變於一息復駕焉而還歸月在疏桐步玉馳嘯書而為賦以寓遐眺瓊花賦有序中統二年春三月制使李公致瓊花數枝是年冬十月而夢二客相邀至維揚之后土祠飲于花下嘯歌為樂既醉而覺乃作賦焉辭曰江風吹雲枕壓霜月神不棲目軼思超越栩栩曳曳境與世別天宇闢凡蹤絶歷蘭路開桂闕飄飄乎馮髙御空不知身之幾何而造乎虛白已而扶搖頡頏恍惚莫量疑在鈞天亦如巫陽孤鶴飛來縞衣玄裳翩然負豫背風翺翔下視淮海雉堞相望貝錯珠瑩接屋連牆繡簾雕櫳綺疏緑房十里一市金紗煌煌混灝海之魚龍駭飛埃而陸梁忽丹霄之二仙翥青鳥以相將指仙花以為言可嚼月而飛觴是閬苑之仙根來瑞世而呈芳坼膩雪以搖碧刻春氷而帶黃噴蘂蝶於花心引輕絲而不狂天風收其落英不委地而飄揚彼衆卉則俗死漫紅祅而緑娼玉陰婆娑徙倚徜徉清香忽來莫知其方乃誦明月之曲歌窈窕之章倚歌橫簫鏘鳯鳴皇挹芳瀾之浩渺傾墜露之淋浪卷瓊瑶於杯盤吸霜露於肺腸欲折枝而不敢懼真宰之或傷且對花而舉酒澆遁世之茫茫倐焉玉女隔花而語髣佛花神是為花主謫自瑶華以臨后土翦氷綃以為裳染麝塵於金縷拂白霓而下征泄秋霞而輕舉現仙姿於塵寰寓風神於月府且曰有妹其字飛瓊適來瑶池善為新聲與君佐酒以薦豫誠遽作穿雲振搖瓊英説仙家之幽杳詠蓬壺與赤城閲花朝以逍遙駐芳姿以輕盈嗟胡為乎斯世而沉冥于此生也時豫既醉二仙亦去花落尊空歌殘玉樹斗轉參橫脫兔驚寤餘香冉冉月滿窗户乃為記夢之歌歌曰玉宇春兮花始開與二仙兮飄然而來花亦喜兮搖搖乎瓊瑰掇飛英兮泛酒杯飛仙為我兮歌以纍纍亦既醉兮胡不歸花滿袖兮香滿幃謂豫是夢兮豫不疑嗟時之人兮孰非夢之為秋風賦有序久在舍館偶因秋風之起一時介佐三節人員皆為感愴故作是賦以激釋云駐星麾於江滸歲月會于作噩漲老天之黃雨鬱餘蒸而欲灼忽焉西南天露雲駮槭槭栗栗慘慘邈邈抵罅吹隙涼冷遽作始則叱􅊒突厲撲蠛抑蚋漸乃蕭瑟披離衝牖動幕散宿溼于雲梢眇新聲于木末觸餘感而興懷倍陰森而索寞既乃一時介佐塌焉而噓撫髀搏膺掩面向隅以為行如返如執如棄如相與愴恍怨艾咎躬責已天實斫余行使尼止方變故之無窮則憂思其曷已或當饋而三嘆或中夜而九徙歌缺壺而寓哀痛撫牀而裂眥金石化而色變骨肉悲而心死余乃紓徐而告之曰士不以一失自沮一得自喜金百鍊而方精節萬折而逾厲持此心之亢矯奚外變之軒輊今則暑勇退涼風至困疾蘇淹抑肆我雖連蹇宋猶有禮撫問仍存德音在耳當凌厲清氛躍然而喜排去鬱攸攝衣躡履灑然濯熱泠然淬志快側佇於雲霄期翺翔於帝里乘此風以成行俾照耀於萬世何乃作楚囚對泣竟不為魯連毛遂而漫為宋玉之悲耶子以秋風為悲余獨以秋風為樂夫以秋風為悲者非獨子也常情皆然門巷蕭條良人逺征傷心砧杵掩淚邊城庭樹翛翛鴉啼栁斷帷薄生寒夢長人逺此怨婦之以為悲者也弱水雲沉交河日落風急霜清重城擊柝令重身輕黃雲畫角十年不代有書無衣吞聲飲泣又下邊陲此戍役之以為悲者也塞北遊子江東賈客去國期年音塵杳絶行露沾衣風吹曉月草根蛩吟喚愁啼血四顧無人氣填心拆此羈旅之以為悲者也囊中金盡淚滿貂裘從橫不就報主懷讎葉落尊空心事悠悠知已不見天髙鴈沉彈鋏風悲長歌短吟白草荒山塵埃滿襟此不遇之以為悲者也菽粟青黃草肥弓徑瀚海波翻鐵山塵亘肉飽顔酡控弦馳競一噴生風長林葉下陳合鞭鳴驍騰萬馬破屋殘城崩沙解瓦此遺黎之以為悲者也今則仁聖御世霈德施惠下輪臺之詔發輸平之使二鄙不聳嗇人和會麻麥幪幪黍稷穟穟室無怨曠之婦塗無稽滯之旅朝無不遇之嘆戍無屯謫之苦抄騎不出烽燧不舉則常情之所悲亦將以為樂也子何以所樂者重為悲乎於是介佐相與言曰吾等之昧固如所云吾子之樂可得而聞曰可哉麗金行秋赫輪不鑠大火西流盲沴不作有風颯然云胡不樂若夫洞庭波木葉脫陂潦盡山雲薄快萬里以長吹卷餘苴與纎惡泛六合以澄清展青空而高闊淨蒹葭之洲渚閙芙蓉之城郭留夕照于飛樓挂殘虹於高閣水落而江淨天澄林踈而煙橫霞抹天䀶虛而見歸鴻露華涼而聽鳴鶴金莖突兀霜仗光寒銀字聲凄翠綃香著泛新商於瑶瑟戛清音於珠箔際邁爽以昭曠莫不凌兢而曲躍是其所以清也紛拂於青蘋之上夷猶於銀漢之間激怒於土囊之口弄響於松篁之前散驚矗於洪濤發鏗輷於狂瀾摐生金於曲岫振鳴玉於空山虎嘯而萬竅裂龍吟而九淵翻是其所以雄也至於蜚霜激沙撇捩秋草白鷹蒼隼金眸玉瓜飄飄搏擊氣徑心老沙場欲雪代漠生雲驊騮紫燕渥窪龍文輕風入足赭沫追奔朝飲溟渤夕踏崑崙尾閭潮回天池浪激鯨鬛搘山鵬背閼日乘化起運扶搖發迹超逸絶塵杳不可及是皆憑威靈而神變化瑰奇壯浪有不可紀極者余於是時則將掇蘭搴蕙濯纓結佩翥非煙之冉冉御靈飊之沛沛相羊逍遙遊於萬物之表騖於八極之外聽萬籟之秋聲轉一元之和氣舒而為春融而為薰騭仁壽於吾民厝治安於吾君是余所以樂也子其束載秣馬易悲為樂鴻毛垂翅乘此以飛揚巨魚濡沫快一縱于林壑也仍作歌以訊之曰茂陵劉郎去不歸秋風起兮白雲飛余欲翔于帝鄉兮蹇豫行兮江之湄南山有荑兮北山有薇月皓皓兮風淒淒有美人兮天之涯搴桂子兮今其時執子之佩兮攬子之衣兮與子歸兮從風之吹兮子毋以為悲兮牡丹菊賦有序初入新館客將宋日新致朱砂紅牡丹菊一本秪三四花慘悴萎暗不以為奇遂植之穿廊西之隙地今歲忽茂達成叢髙六七尺及秋而放數百花所未見也適正甫書狀生朝而其花尤盛故作賦以寓感其辭曰西風悄兮幽扄木葉下兮空庭忽異卉之呈芳乃示豫以不情郁霞腴之春姿敷玉瀣之秋英蹙絳綃于青苞翦翠羅于緑莛拆緗桃與紫微訝鞓紅與鶴翎高層層以奕奕重梟裊以盈盈結膩黃以為心抹沉粉而含馨凝夜氣以夸晝姹斜陽而嚲晴仍牡丹之花王強將菊以為名嗚呼噫嘻時哉匪時造化則奪形色不移雖反常而似妖顧真宰豈豫欺寓國色於羈孤謝凡品之芬菲掞金氣於西陸吐霜葩於東籬鄙傾城之鄭袖期佩蘭之湘纍獨超出於羣倫不繫纍於等夷特以秋而為春乃奇花之出奇彼自為一時殆非後時也且持杯而浥露更嚼句以待月儘吳江之飛霜甚窮海之叨雪與後凋之姚魏共終全于晚節幽訴賦有序上即位之元年詔經更成于宋宋人逆之入置于儀真姦宄漏國相與構陷誣為欵兵不受書命且偽報異聞者再遂不令進退自庚申至于甲子凡五年冬十有一月宋人乃報其國喪而復無縱釋之命幽抑無紀極而莫適赴訴作幽訴賦以自釋其辭曰天明監觀弗蔽兮奠表著以誠陳各蹈道以執則兮于坦夷兮是循惟禮與信為通逵兮俾行李以問津顧率履之弗越兮何虎尾之嘻人棘豫裳而柅豫車兮竟蠖屈而莫信滑溟涬以造艱兮胡構台以愆辰習坎而入于坎窞兮遂蒙羃乎穹旻塊百折而僨于下兮墜沉拗而無極荐局側于眢井兮重覆盆而擠石鬱憒默而屯惛兮觸黝然其若漆蹐泥塗以墊隘兮薄湫壤而淫溼頓濡滯而壅底兮疾重膇音墜以侵賊混河魚與谷鮒兮麥麴藭兮焉所得顛連而無扳援兮仰千仞兮無涯涘責躬而反已兮抑不知其所自粵台宗之權輿兮兆玄鳥以降殷託帝乙之支屬兮分方祊音崩于太原蟬聨而蔓延兮委落族而紛綸羌台弱植之煢特兮乃繼序乎其季振迅而自亢兮欲託始以立世襲皇風之氤氲兮紉幽蘭以為繫冠章甫之巍峩兮錯瓊瑰以為佩握火齊于天衢兮挽扶桑以載燧造高朗以正大兮灼羣昧而用晦攄混沌之滓穢兮萃元精之純粹衣堯兮服舜仁為旗兮義為軔堅窮而石守兮望道囿而日進絶蹤兮追塵弗以為逺也探神區而挹道真軼乎無極之近也渴日而不得留兮乃以夜而為晝葺江蘺以為裳兮搴芙蓉以為袖扈辟芷以掞芳兮濯爛錦而縭繡步驥騄于康莊兮翥鴻鵠于雲霄越希有而出大荒兮乃度􅗥而絶遼泛洙泗以揚波兮扇之乎以清飈掇蕙茝而抔瀼露兮灑旭日而晞蘭苕遘靈修之際嘉兮下弓旌以為招謂黎元之無告兮久遇毒于荼苦方焦縻于鼎鑊兮又薦之于刀爼俾顛連之赤子兮化白骨而撑拄血肉膏于原野兮腐棲苴而橫宿莾閧貙兕而拏蛇虺兮翳三光而汚九土朕䀌音􅊒焉其傷心兮豈為民之父母汝其為吾藎臣兮敷余孚于吳楚轉一氣為陽春兮暴尫魃為靈雨包載干戈兮朕亦願為好生之主越拜手稽首兮迓續民命則在乎兹舉畀龍節而錫虎符兮繚霞旌而凛霜仗遺黎若崩厥角兮將慰乎雲霓之望引餘息而煦之以天吹兮鼓太和之泱泱變時雍而底定兮鰥孤廢疾者而有養攀三五以反斾兮輅成康而掉鞅姦宄遽為之閼塞兮憯不知其故也方血人于齒牙兮盜憎主人而惡也覂音捧余御而不使之行兮斷豫轡于路也衆梟不識夫鸞皇兮謂豫日之暮也啅噪而各為凶聲兮乃遷台以怒也懷照乘與夜光兮適暗擲而召疑為魚目與瓦礫兮乃翻誠以為欺棄神鼎與和氏兮以康瓠碔玞而為奇如射工之伺人兮故巧發其陰機弗為社稷之逺猷兮姑詭遇於一時好逆而寇來兮則豫焉所知會衣裳而衷甲兮執魯連為鍾儀荐棘而重圍兮隔天日兮江之湄遡洄而迍以邅兮設羅畢而為之縻錮陰谷而高且深兮入而不使之去也為嚇逼之千端兮覬豫改於步也奈豫心之不移兮屹乎不周之柱也倐歲月之屢遷兮春與秋其代謝交一臂而閲之兮身乃為之傳舍方氣數之締凶兮豫曷能與之爭天定亦能勝人兮而偽烏能易余之誠戴片天以兀處兮而豈能拘余之心欲天飛而道遊兮曾不知豫身之陸沉冥搜而坐馳兮迅祥飈而邁往激九萬之扶搖兮歘音忽上征而遐想將搴瑶芝于玄臺兮訴于帝而稱罔虎豹乃守天門兮列魑魅與魍魎犬詵詵而吠人兮闔帝閽而弗敞仰天而呼兮孰讎吾民而若是之阻修台聖非姬昌與玄王兮曷為亦在夫夏臺羑里之幽豺虎縱橫兮麟獲而為囚鯨鯤拉其鬐鬛兮乃突梯乎蜃鰌王瞗喑而不鳴兮蜩鳩肆其啁啾雜芳蓀于薋菉兮竟不别夫薰蕕日方中而見沫與斗兮蹇豫之行孰為此謀挾李順與苟純兮王歡入室而操矛漏國而倒制兮委而莫豫問也呼天而無與言兮撫豫膺而自恨也蹇豫業已如是兮苐不忘乎吾民翩然還歸顧自視兮面四壁而無聞余節弊而增塵兮眇隻影而無倫漫勞心而惙惙兮輒申旦而弗寐載命龜而虔卜兮復端策而訊筮吉弗食而數奇兮再三瀆而莫契鬼神亦台違兮豫焉得而請於帝登天而不可兮乃益入於地悠悠靡所薄兮曾不知其為計望燕雲而不見兮聽哀鴻之嗷嗷靈修不可以有為兮遽違逺而鬱陶懷猷而孰為矢兮屹魏闕而夢勞繄眇末有以召是兮秪怨艾而自責必操存之頗僻兮有搜惡與隱慝無乃不能制欲兮勝于理而不德亦其叨功而冒進兮任乎重而弗克則亦遂非而崇侈兮不能執中而過以不及或昧夫幾而暗以顓兮窒于物而強以塞孝不能盡親兮忠不能盡于君信不能及友兮誠不能格夫人是用底于疐跋兮則皆自夫豫身內咎而不敢誰尤兮中隱畏而酸辛第豫之所奉行兮禮人而篤夫動也縱或有以自取兮何為至此極也戢兵兮止殺則吾君之仁也輸平兮繼好非有惡於渠也止豫兮將焉求則亦荏禍于渠也前修與已事兮可以鏡視而新是圖親仁兮善鄰乃為國之訏謨合則所以福吾民兮阻則為咎之徒繄天誘吾衷兮吾民之禍庶有豸行人竟何辜兮乃馽羈而反害夫澶淵與靖康兮于得失之迹則固在和安而戰危兮前轍宜以為戒謂江南之文物兮可以繼夫三代釋子卿而俾之歸兮乃曾不如胸奴閼太和而徼幸兮反信用乎矯誣誤國而不自知兮曾漢唐之不如嗟台身之在天地兮眇太倉之一粒吾君之命不辱兮死生不足為得失和龍之赤氣兮釁固有所積也自昔怙私而召亂兮從顛隕而弗恤也蹇台焉所望兮乃援溺而入于羽淵時不可以驟合兮竟却走而不前苟非台之所召兮則壞運其自天顧台所懷之貞珉兮猶未至於玷缺故佩之杜蘅兮有芳荃以為結擷中庭之霜華兮斾之乎吾之節攬江雲而綴天星兮噫孤風而抱明月吸素霓與清氛兮雖暗室而益白潔已而莫豫汚兮挺節而莫豫折截玉而斷鐵兮冽氷而凜雪不欺天而負君兮庶無愧乎前哲從野馬與塵埃兮溷狐而蹀血已地坼而天傾兮猶不懲豫之説在我者亦既盡兮安得復為之喋喋亂曰與其惡蒙以求明兮曷若靜固以養正兮與其行險以徼利兮曷若安時而委命兮世固不余知兮謹獨聖之令也幽所以益吾之修兮屋漏則致豫之敬也非豫殄天民之澤兮殃民者固為之穽也陵川集卷一
