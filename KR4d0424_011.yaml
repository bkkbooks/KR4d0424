body:
  text: 陵川集卷十一元郝經撰歌詩西陵行漢鼎已移心未巳不肯分明作天子冕旒北面稱警蹕造僞萬般難免死臨終更不謀禪代竊國規模有丕在人間解著鬼欺人地下還將縳鬼賣漫言題作征西墓誰信西陵亦虛墓又說譙都九烏井臭腐掘埋秪幾處銅雀臺邊閙歌舞兩眼難看滿黃土何須析履更分香涕淚咿嚶效兒女君不見永安宫中漢昭烈重向孔明託後主付君一片討賊心嗣子不才君自取天下英雄只𤣥德操等區區真溷鼠書晝錦堂碑後兩朝定策推元勳君模楷法歐陽文豐碑突兀大字書目射猶有五色雲德並汾陽盡終始器如霍光學問美孔明才具汲黯直社稷大臣無與比西北無事中國安三十年來只一韓乾坤都著錦繡裏笑殺錢王衣錦山身安即是蒼生福書錦名堂公所辱君不見萊公眼孔似車輪美錦裁來便裹足朝歌行壯哉兹城冠河山老玉回抱青孱顔建邦立極古有制何乃獨在河朔間獨夫智力制天下瞰視中原强王霸誰知天與六州王八百諸侯已從化摘星樓頭醉未醒酒池一夜蜚血驚成湯髙宗遂不祀珠宫瑶臺為土平我來感歎重延佇驅車不入朝歌路隂風莽蒼吹短衣落日投文比干墓比干墓斫脛河南比干墓崔嵬尚是武王土一丘直欲壓太行一死能令重千古國亡突兀見真純龍逄與君冠夏殷無人語與魏鄭公良臣不幸為忠臣已醢九侯紂猶怒箕子佯狂微子去三仁一仁獨殺身剖心庶使王心悟王終不悟國遂亡朝歌無人至今荒行人只拜比干墓有殷賢臣獨不亡共山行吾生嗜竒能討幽足跡徑欲窮九州㑹稽未得探禹穴太行先作共山遊是時天地方閉塞固隂沍涸山靈愁誰知真宰為我起蟄窟喜氣奕奕山光浮雲容煙影變態出脈絡盡露峯巒稠宏富屹天造峭截窮雕鎪峩峩鼇脊一翠萬里壯綰出元氣直入東海頭中間膏腴甲天下櫝竒孕秀無與侔雲根漲玻璃寶藏劃不收玉鏡面寒瑩皪皪明珠流泓澄百丈底錦石埋黃虬老蟾噴彩忽蕩動萬山破碎翻神湫竹間老樹掛山骨緑玉葱錯風颼飀不見孫公和荒臺等陵丘萬籟喑不鳴邃古空悠悠何時無名公說破先天由一笑碧山下弄月凌虛舟舉手謝浮世醉卧三千秋卷藏神紐入化府從渠菌蠢還蜉蝣太行望半天遮斷連青城參差雉堞雲間橫當時十歲初渡河舟中錯崿來相迎今年恰得到蘇門百泉亭上更峥嶸千嵒萬壑入絶壁落日倒銜山盡赤玉立萬仞磔鯨牙金翠干層擁鼇脊天沈影重看不足雲淨煙虛晚尤碧西北兩峯寒云是雙石人不覺淚橫臆患難思二親一從戎馬三十年桑梓慘淡埋荆榛何時突兀過絶頂拜掃丘園見鄉井黃沙神頭聞有千尺松灑盡苦淚吟長風注目直向東海東三汊北城月榭玩月醉歌大河奔放千里一片黃鼇頭傑觀突起河中央露華漲冷濯桂窟氛霧洗盡豁四旁濤山隱映生金輪水天不辨渾金光杳然坐我月宫上星斗錯遌雲錦裳玉虹髙挂飲酒海黃流倒卷都淋浪兩行美人列嫦娥翠綃深夜氷肌涼悄然清唱多怨曲攪亂羈思為停觴輕飈忽來四座覺浮動吹落桂子颯颯生秋香急令撾鼓歌慷慨驪龍掀舞白鳯翔玉牀插天抱孤月醉卧萬里銀河長望京府賞紅梅汴梁宫中絳綃梅移向汴河堤上栽青條團掿音搦杏花顆瑣細向陽才半開張公小隊呼我飲風色偃髯寒氣凜玉銜徑踏黃河氷貂帽颯簷掀紫錦金鞍細馬歌舞人雪壓小橋不動塵入門下馬簇花宴紅蓮舊府花正新玉川金波碧香酒折花遍插分素手春透寒梢未全綻風流正要胭脂瘦賞梅不用歌落梅緩歌却著銀笙催愛香細擷生霞蘂浮動雲腴嚼一杯本是前村冷淡花不稱王侯將相家明朝㑹散更向明月底藉雪凍吟疏影裏黃山草聖歌一從蔡党闢文源復有黃山黃華相後先黃山古雅尤老成迫蔡埒党難重輕為避時名便把黃華放一頭聲價亦自雄周京淡薄翛然無宦情玉階寡鶴誤一鳴書法更比詩文精正筆子瞻變真卿擘窠大字嚴重極方停真行行草至顛草獨步一代真豪英昨嘗中酒觀此本清風颯颯吹我醒卷軸甚大總是學易詩如如縱筆自在綰墨繩正是莊生悟道書網破夢覺蝴蝶驚絲綸不收魚不食湛徹盡見江底星鉛華洗淨出玉骨無意偶與間雲行中間態度自關鎖剪裁不斷還相縈往往筆不盡㸃綴藏遒緊初疑不附著字字相掎角二王沒後無草書顛張醉素空模糊只除洛陽楊風子認得黃山趙蹇驢三峯山行朔方善為幹腹兵豈肯掠地還攻城北王戰罷馬首回十年大軍不南行西域既定殺李王疾雷破桂關中驚鷙鳥匿形深且蟠汴梁不悟空椎氷小關幸勝未足多舉朝刻日期中興都人盡喜識者懼俄聞繞出西南路突騎一夜過散關漢江便著皮船渡襄陽有兵隔岸看鄧州無人渾不顧縱入腹心將安歸彼騎豈足當吾步脫兔一去不可及却兵洛澗苻堅誤日日鏖戰深且艱我帥益忙敵亦閒短兵相擊數百里孤窮轉鬭甲盡殷直向虎穴探虎子既入重地寧肯還掃境盡至欲一賭前後百匝相回環就中真人有天命躍馬直上三峯山黑風吹沙河水竭六合乾坤一片雪萬里投㑹卷土來鐵水一池聲勢接丞相舉鞭摔䩞音帖言大事己去吾死節彥章雖難敵五王並命入敵身與決逆風生塹人自戰氷滿刀頭凍槍折一敗塗地真可哀鈞臺變作髑髏血二十萬人皆死國至今白骨生青苔壕塹己平不放箭城門著炮猶自開大臣壅蔽骨肉疏事急又送曹王來至了不去誤國賊向非汝南死社稷欲為靖康不可得青城行壞山壓城殺氣黑一夜京城忽流血弓刀合沓滿掖庭妃主喧呼總狼藉驅出宫門不敢哭血淚滿面無人色戴樓門外是青城匍匐赴死誰敢停百年涵育儘塗地死霧不散昏青冥英府親賢端可憐白首隨例亦就刑最苦愛王家兩族二十餘年不曾出朝朝㸃數到堂前每向官司求米肉男哥女妹自夫婦靦面相看寃更酷一旦開門見天日推入行間便誅戮當時築城為郊祀却與皇家作東市天興初年靖康末國破家亡酷相似君取他人既如此今朝亦是尋常事君不見二百萬家族盡赤八十里城皆瓦礫白骨更比青城多遺民獨向王孫泣禍本骨肉相殘賊大臣蔽君尤壅塞至今行人不歎承天門行人但嗟濠利宅城荒國滅猶有十仞牆牆頭密匝生鐵棘照碧堂行熒惑入斗終下殿哭廟背城為一戰怒龍飛去轟霹靂震碎乾坤掃孤電倉皇不乘破竹勢苟且只與姦臣便旌旗慘淡入宋州爭似全師秪守汴四郊皆壘彈丸城玩主潜生肘腋變官奴聞茸本駑下輒敢鴟張學韓建宫中梟獍有小錘密結凶渠欲為亂公卿誅徙威權去左右俄空侍衛換開門日日向敵言旦夕須將天子獻事急壯士能感激决計惟當下手先卿為其易朕為難傳呼便詔將軍見升堂進謁遽令前太阿倒持仍使看王敦但覺赤日壓全忠甚駭浹背汗倚門力士驚盼瞪面無肉色復肉膻同袒膽定徐徐素劍還徑斫逆賊肩膂斷照碧堂紅血滿壁手刃不覺御衣濺顧盼黨與皆就禽禁蹕忽清祅霧散此時便亡心亦足外敵雖强無內難臨危突兀翦强臣絶地求生未曾見古來惟有敬宗奮袂誅爾朱今朝天興拔劍斫官奴壯哉兩君萬古無嗚呼兩君萬古無汝南行將軍死綏君社稷炳烺義所不可惑青衣行酒豈能活肉袒牽羊秪辱國初從貞祐棄燕雲赤氣半天開斗極又絶西夏撤藩垣枝葉縱存無本實不問朔漠攻蘄黃敗盟要利增讐敵區區一道當數面賦稅重繁兵役急宫闈意忌疏骨肉陪二從諛専壅塞此時久已當破滅况復奔播何嗟及天興不是亡國主不幸遭逄真可惜十年嗣位稱小康若比先朝少遺失汴梁不守大事去黃陵潰散焉敢北險阻艱難氣益振照碧堂中親討賊孤軍轉戰入汝南作氣蟠鋒轉深壁日夜望有勤王師以廢為興賴忠力窺𨵦誰意叛武仙感慨從為歎仲德雙雞既盡麴屑空重圍益堅負户汲池戰水涸還登陴城墮斫樹埋巷柵空拳無皮短兵盡戰士嚼齒猶憤激譙門闢碎鬬尤甚肉薄似牆當劍㦸雖知力竭不可救氣數儘窮心未畢慨然傳位誓衆死音彩凜凜不動色一百餘年作天子與國俱亡在今日哀哉雉頸復自楚將相血視不敢泣互為拿髻相剚刀往往刎頸尸狼藉須臾衆踣若崩山汝水不流波盡赤黑風裂天灰燼飛紅雪亂攓深數尺島中自殺五百人義烈只數田橫客何如國君死國臣死君數萬同死死所得還聞露布到江南城南夾攻平汝南莫言解復九世讐三韓有靈應益慚金源十節士歌金源氏播遷以來至于國亡得節義之士王剛忠公等十人皆死事死國有古烈士之風可以興起末俗振作貪懦其名字官階始終行業自有良史其大節之嶽嶽磊磊在人耳目雖耕夫販婦牛童馬走共能稱道者作歌以歌之庶幾揄揚激烈由其音節見其風采云天興諸臣國亡無史不能具官故皆祗以當世所稱者如郭哈瑪爾仲德行院等書之俟國史之出當為釐正云王子明讀書便學張復之手刃姦髠血寫詩幾回投筆重咨嗟章句小儒安足為時危始作通州守賊臣遽獻居庸口千羣鐵騎繞燕都玉輦倉皇下殿走孤城彈丸當畿甸飲血登陴日酣戰進明逗遛南八回拊髀張拳面迎箭日暈忽破城無址失守何顔見天子朝服南嚮再拜畢意色不動握節死詔為立祠諡剛忠稱道更有閒閒公突兀義與巡逺同千載凜凜烈士風伊喇都金源大將重移刺義烈膽勇絶世無渥窪霜蹄誤一蹶長萬忽中金僕姑思歸不忍遁逃去立功報效同溫序雄猛已取左右忌姦凶叵測憂旦暮曹沫不免劫齊桓賢王慷慨許送還聯鑣南下三千里義如子反與華元負鑕梁園見天子猛士來師盡驚喜再賜節鉞還部曲光彩騰騰滿旗尾獨當一面帥南陽誰知鬼蜮不可防忽然羅織斬東市市人盡哭斛律光自壞長城撤棟梁翦殘羽翮速滅亡嗚呼伊喇都可惜烈丈夫擊殺麒麟跨蹇驢却相布色將官奴郭哈瑪爾不援西夏棄燕都本根顛蹶藩籬疏不都長安都汴梁為愛青屋能久長隴上豪士山西將憂國無言意惆悵中興不居用武地君臣苟且吾何望郭公堂堂性忠勇自拒洮河保秦鞏數年尚得建行臺金城堅牢華嶽聳誰知自報小關捷總倚潼關為守厄渾將梁宋作龜兹便視秦涼等吳越西州漸孤敵漸多四郊皆壘奈敵何將軍百戰氣尤壯頭顱擲血為洗戈野無戰地始乘城城傾堞圯接短兵先將妻子置草圍坐束萬矢著死爭鏃筈相銜如雨注敵人却走不敢顧彎弓入圍始自焚飛矢出圍渾燎羽灰飛城陷力始竭賢王立祠稱壯烈王師十萬下馬拜競摔馬鞭聲咄唶黃河都為苦淚流隴山自此無顔色峩峩大將節凜凜死國名英靈在天為列星祗應汝南破滅時却從煙熖見天興臣自焚各得死所古未聞哈達平章乘輿已播遷乾坤在孤注維時忠藎有哈達應敵東西無定住職兼將相為國楨身繫安危如尚父賊國布色深冒嫉小臣獻讒極諂附飛章誣陷罷兵柄幾把功臣薦刀鋸子儀召入奉朝請彥章不用大事去事急復起使迎敵即日上道無喜怒并命鏖戰來報捷每從中制肘屢掣嶢關透漏斡腹出大河絶流兩軍接天欲亡人不可為六合橫傾數丈雪人自為戰身伴僵空拳無皮凍槍折力竭慷慨赴敵死死恨不能存社稷至今三峯山白骨盡銜鐵老臣一片憂國心慘淡悲風與寒月禪華善禪侯膽勇絶世無也曾深入身陷敵一夕躍馬却南歸追騎畏威不敢及入朝復使為大將鈴閣蕭然見襟量征南素有春秋癖禮接士夫尤退讓深知敵情屢獻策常談不用心怏怏憂國密坐時拊髀揮淚無言重惆悵三峯失利還被執植立不拜尤憤激彼此皆帥敗則死椎碎兩脛終不屈臨終大呼邈吉烈豹死留皮在今日壯哉國士當代無一死又勝伊喇都烏克遜道原金源國士多國人與國俱死皆大臣百年涵育重名義况復舉是王室親中都失守有福興大梁當亡仲寧道原尤有聲道原氣比二相直立朝凜凜盡忠赤京師根本寄天下致力一死乃其職誰知崔立便反城豈能復作褚淵生都堂一夜血浸尸瞪視國賊目不瞑家中復有貞義女父死於君女死父踏户懸梁義不辱罵賊投繯有餘怒一門忠貞古未有名節俱全義不朽從今莫把等閒看試問幾人能自守仲德行院士窮見節義國亂出忠勇仲德帝室胄虎文將家種儼儼靜且深辨事不賴寵帝聞彭城有逆節詔公密取不敢泄臨行斬首挂馬鞍萬衆不歡皆妥帖仗鉞東南當一面冦去看書冦來戰中樞大府無人聲儒將威名滿淮甸甫臨秦鞏遮長安大軍失利三峯山徑穿敵壘數千里乘輿己出空淚澘過門不入急赴難犯圍直向黃河岸照碧堂空幸汝南賊臣新誅衛士散自古未有降天子君臣血視付一死夫人徒步自拔來命婦般炮自我始夫婦死國無與侔至今聞者涕泗流經錫奉御田橫得士大都從死五百人島中悲歌天下聞天興君臣數萬同日死自古得士誰得似至今汝水澀不流寃波苦浪漂髑髏髙官厚祿義當死禆將賤卒果誰使乃知義烈能感激致命竭力無彼此幽蘭軒中自焚日宦人乃有魏御直慨然正色責承御俱從煙焰火中入尚衣奉御有經錫殺馬毁玉如袁克撥灰向敵葬主骨敵人義之亦垂泣君不見漢唐閹豎徒紛紛劫制朝綱紊宫閫英風突兀惟此君千載凜然應不泯李豐亭士為有用學有志終有為先生乃不幸一第當時危腐儒苟且皆畏避奔走要門求內地趦趄冀得斗升祿靦面祗為妻子計先生守官聽銓選不避畏途羞自便一通誥命令城父即駕柴車出畿甸甫能到縣敵已至意色不動即視事排牆拔樹為守禦馬嘶動地人鼎沸團兵僅得二千人開門轉戰箭滿身見星鏖出據大林人蔽一樹氣益振弓折矢盡樹無枝重圍百匝何所依飲血復鼓更格鬭揮戈慷慨指落暉力竭衆斃付一死以死報國真烈士君不見汴梁諸生不出門手把遺經皆餓死李伯淵天王出居委社稷城門不開人相食內外音塵俱斷絶匝合長圍事尤急賊臣一夜忽為變舉城應敵遽傳箭政事堂中誅二相部曲歡呼上前殿京城提控便稱王鹵莽欲學張邦昌公然入宫辱妃嬪輒據御座著柘黃伯淵忠壯賊黨畏飲泣無言重歔欷烏合不久相屠并討賊誅讐在此際宫前古槐是獨栁馬上便梟崔立首剖心灑血哭向天義氣凜凜古未有主人已亡國難興讐恥既雪歸同盟不幸復遇襄陽潰一死兩朝全令名常聞汴梁父老說當時不受江南節便亡儘可作純臣金源義士第一人此是春秋責賢意但能殺賊都不計况復去就死生皆得所英聲自足垂千古題項王墓黃公廟西榖城北突兀一丘埋項籍誰知道傍幾抔土却解銷沈拔山力天下苦秦又一秦天資好殺不好仁古來鬭將皆莫及當時帝王自有真江東子弟亦良苦本自亡秦却去楚不渡烏江亦天意免使東南為漢虜時不利兮可奈何可憐壯士亦悲歌臨亡焉用幾行淚倉皇灑向漢山河魯人仗節付一死葬王故用魯公禮規模往往近三代天命宜歸赤帝子往年聞有沙丘士捶牛致祭重流涕墓前作文哀項籍不知所哀竟何事漢王入關無項王不王諸侯不殺降約法開關各罷兵一伐大定武與湯漢王才入項王來天下盡為狼與豺嗚呼遺民端可哀項王宜怨不宜哀靈泉行乙卯秋八月及行臺嚴公獵于東山遂㑹于鳯山之靈泉故賦二詩赤雲夾日騰清暉太隂殺氣纒海霓元戎小隊數百騎金鑣玉勒紅牙旗長鞭一㸃陳偃月稍騎兩合前山圍查牙折角獲鋌鹿模糊生血禽孤羆霜蹄剝落落澗石饑燕亂掠秋草飛應弦霹靂疊破碎掇拾挂馬皆纍纍一川錯莫半山赭空穴破冢妖孤悲將軍推仁亦中怛弛弓服矢收神威力士下馬各數獲從官解劍稱酒巵山河慘淡生壯觀乾坤突兀增雄竒溶溶喜色動歸路滿城樓觀重煙霏蕭蕭弓劍秋山行老玉破碎前相迎石蛇繞徑入煙樹一天忽在青山層三巖鼎峙勢欲墜元氣突兀强拄撑相君坐定從官列游子乘興窮其登穿雲石磴上方逺忽入洞窟行幽冥黑風吹衣出大隧泉源湛徹光泚清翛然濺弄胸次豁一掬流盡千年酲慿髙悠悠肆遐矚天宇曠濶秋毫明泰山西來忽中斷翳翳桑土西南平須臾撾鼓震虛谷樽酒坐嘯還同傾醉歌扣碎一明月欲入碧海騎長鯨陵川集卷十一
