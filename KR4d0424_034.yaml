body:
  text: 陵川集巻三十四元郝經撰碑文漢高士管幼安碑東漢中興二百有餘年處士之盛卓冠前古其整領清議激揚頺波振起末俗以衛宗社固自有力而其疾惡荏釁激怒召亂隆譽飈歘虚聲扇盪與宦戚相軋而卒成黨錮搏國共僨亦皆自夫處士獨建武之初㑹稽嚴子陵抗志絶俗逺引長往不為漢之三公激成一代風節建安之末北海管幼安離羣高蹈肥遯居貞不為魏之三公以全一代名義得處士之道者惟兹二人然而君子當出而處則失義當處而出則違道子陵之不事莽得其處矣有君如光武而亦不事當見而飛乃潛以遯高則高矣於義未盡也幼安生於桓靈之際出於黨錮之餘董吕袁曹閧起亡漢而社稷卒為操有欺遺孤殺母后賊義士動以詔㫖行事而終身不受禪代則其姦有甚於莽其共為簒竊委質而成事者皆患失無恥不顧名節之人當是之時處而不出可也不受其三公可也故東漢處士雖盛節高而道全者惟先生一人焉先生名寧姓管氏避亂適海外公孫氏亦僭擬王者又偏方一操故和順道徳玩味經術格之以誠卒免於禍魏既簒以大尉徵不就正始二年卒天下莫不高之迄今千有餘歲邦人慕其徳化代為祠宇歲時致享禮為先師乃叙其事書為漢高士作詩以歌詠遺風俾刻之石云其詩曰漢鼎破碎天地閉處士一網無噍類妖狐垂涎猛虎噬失身便為賊睥睨噎喝不敢伸大義少見圭芒即賈忌文舉徳祖競棄市荀令倉皇亦自斃中原殆無置足地惟有海外可避世先生振纓從此逝箕子之貞固當繼逺害全身最得計醫無閭高有餘翠鴨綠江深涵海際濯足歸來儘和氣紗帽無塵風滿袂東夷尚仁心簡易土俗厚敬篤無偽遷善從化日純粹華歆見金節自廢破壁殺后脅漢帝當時割席絶交契更著三公重相穢回視諸人等兒戲滿朝不識司馬懿吾敢與人家國事從渠九遷還四至禮樂詩書是吾志孤蹤遥遥謝權勢蠖屈龍潛當未濟民未忘徳猶世祀遼海千年漢高士漢義士田疇碑燕趙控帶朔漠土風雄質其服義尚氣借交報仇奮不顧死振古以然當漢之季得義士一人曰田疇方董卓廢立豪傑並起莫不欲盜漢以為已有獨賢宗子虞牧幽州不受山東尊號誓清國恥而天子䝉塵君臣道絶乃令疇奉章奔問官守比歸而虞為公孫瓚所殺疇乃哭墓而去糾合宗黨掃地而盟期於誅瓚無何瓚為袁紹所滅而紹亦終不勤王隂懷異志尋為曹操所并遂謀簒代於是袁曹等為一瓚故躬耕不出民夷義之漸成都邑以烏桓屢殺鄉州冠蓋故假操以誅蹋頓操欲以五百戸封為亭侯辭不受終身不仕魏世而卒邈乎高哉古之義士無以尚已嘗謂豫讓荆軻亦燕趙之豪其感慨許與固有烈士之風然中懷譎計并命于數寸匕首不免為一刺客如疇之卓犖數千里間闗寇敵不隕君命以未反報臣主在難竟不拜官斥責去瓚而瓚不敢害歸於無終撫和民夷約法立制其志不止誅瓚欲將率燕趙義士并討袁曹興復漢室不幸而遂為操有故終不臣操仕魏其義烈矯矯非豫讓諸人所能及也嗚呼漢室傾頺姦臣倚疊惟劉公虞以幽州死漢昭烈及闗羽張飛起義於涿郡以復漢管寧隠遼海田疇邑無終終身不仕魏以存漢志節高天下忠義動千古者惟兹六人皆自夫燕趙古今所稱殆不誣矣宜其沒而為神各食其土也歲戊午經及易州總管何侯世麟越易京登黄金臺瞰臨督亢慷慨懷古因論燕趙義士以疇為首侯謂君欲誅公孫瓚而未卒志此瓚死所也君之靈豈不烈烈于是乎吾欲祠而祭之以表君義可乎經曰可哉遂祠于易水之上經為碑其事題曰漢義士作歌以明君之志云歌曰君在難兮時多艱士有志兮事無難躍馬去兮踰闗山明月皎皎兮照刀環奉章遑遑兮入長安見天子兮覩天顔未報命兮不受官臣節達兮壯士還主君死逆兮血未乾苦淚徹泉兮骨已寒糾宗盟兮戮兇殘倒渤海兮摧燕山誰知復有數賊兮瓚已死而操尤姦天下已無漢兮吾何以立於世間復何面目以見燕趙之士兮當蹈海而尸狂瀾彼荆卿兮尚不負於燕丹吾寧負劉幽州兮俛首以事曹瞞死為漢士兮躬耕以盤桓嗚呼君之義烈兮髙薄乎雲之端應與傅説兮跨箕尾而凌高寒永為燕之神靈兮俾萬世其仰觀酒滿樽兮殽滿盤挹靈氛兮佩幽蘭我欲從君兮不可攀魂兮來歸兮天漫漫吁嗟不可得兮摧心肝殷烈祖廟碑大河之陽有廟曰湯王絶去老岸深入故道瞰臨中潭葢以王伐夏救民光有天下旱乾而無水溢故廟于是假其神靈以禦河伯懷襄悍猛之患不知其幾千百年稽天之浸漸入地中迆迆南却逺廟數里益出腴田貽我來麰歲則大穰於是邦人益知有相之道庇神之休咸來祈賽禮盛先稷焉歲戊午詔以懷河陽為今上湯沐邑於是經在藩府得賜第懷賜田河陽河陽吏以田籍進疆畛之中有店曰楊子楊子之東廟曰湯王即此廟也廟前有水曰浿音𣲖乃晉浿梁水也盡在賜田内郝氏之先系出有殷帝乙之支子今啟南陽之田而得烈祖成湯之廟焉衰門敝族而遇其祖豈將令繼緒不忘乎時河陽進士苟宗道從余學其家故為大姓在廟之側桑梓阡陌與賜田接乃命其弟宗禮規廟周之地廓其神宇令河陽守置戸衛䕶仍為崇飾象設增伊尹仲虺二相之像以一神徳按祭法能禦大菑則祀之能捍大患則祀之王拯民于水火之中可謂禦大菑矣廟于河而河不溢可謂能捍大患矣其世祀也宜哉夫上世帝王皆以名稱宓犧神農皆是也至堯舜之世始有祖宗之號曰文祖神宗至夏后之世則以禹為皇祖殷之世以湯為烈祖其後嗣王亦各有號曰中宗高宗然於簡䇿則皆以名稱於廟則特以號舉尊之也今既廟矣而以名稱非制也故更曰殷烈祖廟作頌以畀田畯俾歲時歌舞以燕神云惟帝降格先天啟土湯聖不違應天篤祜夏惡盈貫我伐是舉枿彼三蘖震厥皇武挈民請命脱之砧斧濟以寛仁瀹其瘡瘉建中立極道繼堯禹盛徳世享于何方所伊侐斯廟在河之滸民猶戴蘓萬世一雨慝厲不作重為呵禦河水洋洋莫余敢侮沃壤每每安流順去孰敢仇餉共饁南畝孰敢不祀競藝稷黍民以有年神不乏主麰麥如雲際神之戸菽粟如陵隠神之宇民飽而嬉燕厥父母奉盛以薦㓗登羃俎乃麗白牡乃酌清酟報本反始在昔自古黄髮婆娑望神屢舞奏鼓坎坎衎我烈祖𤣥鳥于飛集于河梁迎神語語曰湯是常小子作頌于以歌商載祀百千神其樂康於乎成湯不亡新野光武皇帝廟碑繼秦以楚而無高帝則中國不能復繼莽以操而無光武則漢統不能纂承三代天下後世不知用儒為學之有益治道而徳於斯民殘陋蕪穢荼毒宛轉不復見先王風化之美矣高帝平秦滅楚恢拓綱維帝有中國垂統二百年光武復汛掃偽妄振踣植僨以帝王之學潤色皇度賁若草木復垂統二百年粲然二帝三王之治郁郁乎文繼周而傳萬世髙帝平亂開建大業光武中興身致太平號稱二祖其有功於中國則一也自成康而下帝王始不務學陵夷至於東周漸不用儒而中國不復有先王之治至秦而彗滅除剷専習法律一以殺人為務漢興將相皆刀筆軍功文景之治本于黄老申韓孝武雖號稱隆儒相公孫𢎞而擯董仲舒轅固申生汲黯老死於下國相如枚皋侍從文賦畜以俳優宣帝厲精為治綜核名實不喜於儒謂漢家制度雜于霸王元帝好儒昧于識斷貢薛韋匡迭為宰相卒殺蕭望之而不悟故西漢制度陋于三代帝王不學瞢於大道卒為孔光張禹所誤而欺于王氏光武起自諸生以謹厚稱正大之學藴為真勇昆陽一戰破尋邑百萬直壯之師遂興漢室風雲感㑹鄧馮寇馬皆稱儒將左提右挈底寧方夏既即位則進卓茂登宋𢎞用孝廉為郎保全功臣不責以吏事講論經理夜分乃寐閉玉闗謝西域不勤逺畧推誠御物不尚狙詐躬幸太學修明禮樂優禮嚴光激成風節始充高帝祠孔子説詩書之規摹緝熙文武成康帝王之學繼以明章臨雍拜老横經問道期門羽林之士通經問學有濟濟洋洋之盛於是大儒輩出維持鼎命袁楊李杜屹然效節終我四百作成政治保佑民命風化之美同於先王則其功又有大於高帝者焉且自昔中興之主若夏少康周宣王特一時復國不失舊物其功烈未有盛于夏后文武者也而宣王之治又不克終光武之興條理文獻遂軼西京幾於三代篤實輝光基命以徳温純縝宻服天下以柔道雖則中興同夫創業傳序十二徳威惟畏使曹操終身染指垂涎而不敢革命昭烈父子﨑嶇艱阻猶天命人歸復漢討罪者終曹氏之世幾五十年又非少康宣王之得比也文徳軼於高帝中興功烈邃古所無於乎盛哉初帝與其兄齊武王起兵舂陵討莽乘牛而殺新野尉奪馬以戰其後廟于新野厯代祀之歲已未經奉命宣撫江淮乃登昆陽故城顧瞻舂陵鬱葱之氣浮動草木英靈髣髴猶可想像又不能自已推本論著繫之以頌畀鄧州道總管萬戸史公勒碑于廟垂示不朽足厭景聖之心焉頌曰於鑠漢業如火烈烈滅之水兮偽魁懷姦投隙抵間肆狐鬼兮髙廟有靈翦除棘荆豈遂圯兮白河赤龍羣飛天紅有孫子兮昆陽一戰長驅百萬天復啟兮羮梟磔魅糞汚抉穢瀹靈沚兮百秦幾莽撑裂天壤復閧起兮雷鼓彗鋒指靡羣雄盡寧敉兮帝有聖學沈幾先覺繼文軌兮投戈講藝夜兮乃寐究經理兮以熙帝載比隆三代風化美兮享國永久徳懷九有殆三紀兮身為武湯治復成康孰可比兮廟食世祀代無廢事賁帝里兮于高有光民猶不忘載揚頌章刻示茫茫漢徳無疆兮周子祠堂碑道之統一其傳有二焉尊而王其統在位則其位傳化而聖其統在心則以心傳位傳者人人得之故常有在不忘心傳者非其人則不可得是以或絶或續不得而常也三代而上聖王在位則道以位傳堯舜禹湯文武周公是已三代而下聖人無位則道以心傳孔子顔曾子思孟子是已周室東亡秦人西并祗一王位屹為争奪之具得之者非血戰之豪傑則推刃之子孫其心則蠱于佛老散于辭章弊于法律瞢于功利壞于智數聖人不作强有力者挈位而不置不復傳道而道統紊矣千有餘年之間學士大夫致志用力掇拾殘斷﨑嶇章句不為不勤其獨造自得力探特悟以道自任者如揚王韓歐絶無僅有雖競于一時而其學不復傳是以終不能永聖人之統續而復絶也剝食糜爛之餘僨踣撑裂之極獲聖人之心紉緝道緒傳諸其徒益久益彰者有宋舂陵周子而已其學不知其所自不事章句不工文辭不務決科沛然一致諸道蹭踴孔孟之後瞰視羲文之前掲振本根浚泐土苴範圍天地窮神知化盡性至命創為太極一圖申明大易先後天之幾著通書數十章指陳聖學之極致發前聖之藴奥先儒之所未言為道學宗傳心之統葢其欲慮静盡極于精一篤于純誠遂造高明乃能如是故太史黄庭堅稱其為人如光風霽月其瑩絶洞徹猶可想象一傳而得程顥程頤張載再傳而得楊時游酢率之集大成于朱熹泛瀾充滙洋溢旁薄君相服膺師儒鼓篋而學者遍天下六經語孟各為傳註性理象數各為論説正千載之訛復一貫之道既傳諸其徒又傳諸後世又傳諸外國迄今二百餘年莫不知義理之所在各為一太極反諸吾身各有一易使人人自致聖域而不以為難由漢以來未之有也祠祀之禮盛於江左而未至于河朔今領中書相國楊公始嗜其學乃建太極書院於燕都立祠于院以祀周子以二程張楊游朱六子配食歲時釋菜尊為先師燕自安史之亂睽隔王化者將四五百年至於孔孟之祀亦將廢墜一旦祠祀道學宗師而以其徒配禮秩文采警動幽朔尤近世所未有也嗚呼道統為不亡矣祠既成適經貳於公而徵銘焉遂序其事而為之銘周子諱敦頤字茂叔湖南道州人仕至虞部郎廣東提刑分司南京卒于江州嘗築堂濓溪以自名故門人號為濂溪先生銘曰析木之津上扶斗極周子有廟復一太極民不鄙夷㑹歸有則𣺌𣺌絶緒如絲伊緡聖逺弗續又從而棼祗揚其波不探其源縱尋斧斤自戕其本舍轍而車血手燥吻客氣賈勇莫不僨隕過高好竒誘于誕空看鳥應人自忘其躬不及與過皆失乎中聖心有端聖學有要無欲而一乃造其妙無極之真根柢兹道道有一極極盡無餘轉斡化府推激神樞天地人物埏埴貯儲心死不傳乃載于書六經一易道統之集梁折山頺千載寥閴無為升堂更孰入室日下有日五星聚奎發原湖南派流江西肩顔踵孟傳心仲尼伊洛湯湯㑹為一水復生晦翁又一程子坦坦一道昭昭一理太極有圖通書有章遂令燕雲亦如荆揚嗚呼盛哉吾道之光順天府孔子新廟碑天不言之孔子孔子能言之天天垂象萬物本焉孔子立徳萬世師焉故天極其神孔子極其聖郊祀天廟祀孔子禮冠百神宜矣按漢史高皇帝過魯以太牢祠孔子則孔子之廟祀於戰國先秦尚矣至高帝始以帝王親祠焉於是孔子之道尊與天同由漢以來載在祀典以及于今自京師郡國州縣皆為立廟自天子大臣方伯守令師長皆師而祀之封爵為王象設南面被衮冕服登龍禮秩一如天子諸弟子爵為公侯各以服章配享禮秩一如諸侯敷天之下祀事之盛無與侔也夫人之尊莫尊於帝神之尊莫尊于天帝王受命有天下郊祀之際則以其祖配天烝嘗禘則於廟然止一代一姓而已秦不祀周漢不祀秦魏不祀漢孔子無土不王未嘗受命以一儒者厯代祀之配天不已然後知道之尊有甚於位乃以萬世為土焉順天故清苑縣置於隋唐間為鄚州屬邑宋初置保塞軍以其趙氏之故家在焉故縣比豐沛升為州曰保國朝奄有中夏今萬戸張公柔自滿城建牙于保開斥土宇西盡常山東出瀛博南踰滹池北負涿易自為一道統城三十仍兼河南諸道詔錫名曰順天開大帥府焉初州之廟學在保塞故堙之北及公開府則夾兩闤闠囂塵坌閧殆非清廟居神之所且文廟宜在文明之地在辰為已遂於東南得爽塏地謀遷神居鳩工賦役殿廡一新講肄之舍庖藏之所游息之地以次具舉高廣其舊幾於倍蓰又為奎文樓于南鑿璧水于西歲戊午告成迎神于新廟仲春上丁釋奠以落之公之嗣子𢎞畧攝領帥府而被服如諸生尊禮先輩向學事師甚謹而文請于某以文其事某為之言曰觀於海者難為水游于聖人之門者難為言以孔子而稱堯猶曰大哉蕩蕩乎無能名矧於以衆人而稱聖人哉且得聖人之道者則有顔淵氏傳聖人之道者則有子思氏述聖人之道者則有孟軻氏尊聖人之道者則有韓愈氏贊聖人之道者則有邵雍氏某何人也敢置言於聖人之前哉姑推本聖人之道所以配天而廟食之所自以序其事然非經之私言聖人之所自道也曰天生徳於予桓魋其如予何曰天之未喪斯文也匡人其如予何每以天自處故生則代天為言沒則配天廟享堯仁如天孔子道如天昭布森列萬世一天洋洋乎其上吁可畏也為之詩以歌詠聖人之門云維天之命於穆不已有開必先是生夫子金口木舌代天為言六經垂世道同夫天皇帝王霸氣數是㑹集聖而成所以為大父父子子君君臣臣三綱五常所以為人祖述堯舜憲章文武以教為位以徳為土彼天吾人彼君吾師建極立心萬古是資天子北面廟食帝享泰山梁木萬世是仰燕趙之交保為之衝今同齊魯巋如新宫矯矯虎臣文武兼備顧視耽耽敢儒為戲小子作頌敬揚休風刻之廟門道在乎中豐縣漢祖廟碑惟天隂騭元命降監下土惟不嗜殺人能一天下聿志于仁者是與强有力者弗能奪弱且賤者弗能辭故秦楚之際大統卒集于漢太祖高皇帝在昔帝王受命若舜若禹皆以大徳大功相其君數十年天命人歸不得已而後授受弗與弗求弗征弗伐而天下泰定若湯若武皆積徳累功數十世千有餘年天命人歸不得己而後征伐一戎一戰不復更舉而天下亦泰定得之如是之難定之如是之易至於漢祖則不然初無大徳大功升聞丕顯亦未積徳累功世修長發崛起阡陌之間裂裳斬竿奮挺大呼滅秦踣楚誅鉏豪傑即受天命而有天下然而四五年間大小數百戰稱帝之後叛者四起夷傷呻吟始得粗定得之甚易而定之甚難者堯授舜舜授禹天下無難即以天下與人即受人之天下非有大徳大功則不能有大徳大功而有天下故不復有為恭已正南垂衣裳而天下治湯放桀武王伐紂夏有天下五百載而造難者一人殷有天下六百祀而造難者一人徳澤在人賢聖之君六七作一旦暴君虐民啟難毒世非積徳累功基圖鞏固仁義信於天下則不能遽起而革命既積徳累功應天順人以濟一時之難而拯民于水火故亦不復有為倒載干戈包以虎皮垂拱而天下治是以得之則難定之則易周自幽厲斬先王之澤滅絶宗國平王東遷僅守虚器號令不出京畿侯甸采衛撑裂王度霸者五起日以陵遲禮樂征伐専於諸侯僣以大夫竊於陪臣帝王大統無所歸屬故赧王無罪孽而西走秦人無功徳而東并八百餘年遂折入秦虞夏商周之世皆絶而焚燒詩書坑戮學士剷除先王事首級行刻薄一以殺人為事於是陳吳首難而復事殺人項羽殘暴而又事殺人秦人之殺未巳而楚人之殺尤甚獨漢祖寛大長者仁而愛人聖度豁如知人善任聽納無我見幾成務故雖至賤至弱跌宕里舍不事生産不以功徳稱無先世之積累而天命人歸有不得辭扶義而西五星聚井不殺秦降不居秦宫還軍灞上約法除苛固結人心即受天命是以得之如是之易然而六七百年殺戮之難積釁荏惡鍾為桀驁布滿天下不睥睨神器則仍欲分割河山故號令三嬗非大汎掃不能清夷遺黎之命無與迓續是以連戰劇鬬窮極智計始一海内而大先王之統故定之如是之難當是之時中國亡矣向無漢祖之寛仁收擥羣雄而帝之繼之以文景之恭儉孝武之恢拓孝宣之綜核光武之徳業明章之問學垂統四百年傳世二十有四公恕利澤簡厚敦樸愛養元元補完瘡痍則一秦未已一秦復生亂靡有底矣漢祖之廟食世祀宜哉帝姓劉氏唐堯之後自秦徙于魏秦滅魏遷魏于豐今徐州豐縣是也故帝為沛豐邑中陽里人既有天下以為湯沐邑其後即中陽里故居立廟厯代祀之廟之前後殿各一其前殿則髙皇帝居中南向為太祖以吕后薄后配于神室留文成侯張良為佐命配享于右東向其後殿則太上皇帝居中南向為始祖昭靈后配于神室其左則孝惠皇帝至孝平皇帝凡十有一帝以次西向其右則世祖光武皇帝至孝獻皇帝凡十有二帝以次東向皆衮冕黻珽登龍備章藻火尚赤仍有漢制代為崇飾居民世守恪恭寅畏尊尊親親如事父祖故其靈貺昭著草木有神亂兵劇寇不敢樵采海内莫不為墟而廟獨巋然國朝奄有區夏豐𨽻東平道大行臺嚴公忠濟置官監視給户灑掃有所廢缺輒為増賁故常煥若一新經嘗以為漢祖非惟二漢之祖乃三代以來吾中國之祖也而史臣妄引神怪侈大奇異逺探自出以為授受之符不足以鋪張耿光蹈厲大烈故序其所以受命而帝者畀行臺公使刻諸石昭示中國之民用揚漢休乃作頌焉詞曰漢承天統奄有四方生民有王中國不亡蠲除兇殘蘇完瘡瘍代虐以寛視民如傷虎氣龍文屬天有光為民請命師於咸陽釋縛受璽還軍灞上纔舉孽秦又突暴項推功弗有銷鑠倔彊曽不芥蔕宇宙在量蠖居梁漢潛構大象建壇授鉞有相有將縞素百萬討賊誅讐從天而下扼其襟喉遂宏三綱維繋九州人謀鬼謀轉圜如流躓强踦頑宛轉寛柔卒活斯民歸涼燠休海内既平猶不稱帝既得弗名襟度尤異視彼汲汲夸徒兒戲天命人歸始踐大位圍魯弗誅天下之義親祠聖人萬世之計大明賞罰讐封恩誅祖述湯武憲章唐虞制作禮樂稱説詩書興滅繼絶論功剖符盤石之宗匪秦之孤復見三代大哉規模傳世數十載祀數百七制之主鴻休龎澤至今稱漢炎炎赫赫廟食世祀中陽之宅小子作頌大書深刻民未忘漢式吿罔極留城留侯廟碑帝王受命以濟斯民天必授之元聖使與勠力謂之佐命故成湯革夏則舉伊尹武王伐紂則用太公至於漢髙帝奮起亡秦舉事之際與留侯遇于留留侯説以太公兵法則輒稱善謂為天授卒滅秦僨楚而有天下髙帝則比迹湯武留侯之功烈與伊吕並而後世莫及雖然留侯之事又有重且難者焉伊吕之佐湯武伐一桀誅一紂拯民一時之難底寧方夏而巳留侯之佐髙帝當王統綴旒七百餘年血流四海兵黷宇内既為宗國復韓之讐又為天下復生民之讐又為髙帝復君父之讐始則始皇為一桀而二世又生一桀既而陳呉六國項羽英彭又生數十桀皆乗機撫㑹顧盼嚬呻使之自鬬自斃卒以大義一天下不貪寵利納履而去非惟甚難而又獨髙且夏殷之季中國未亡而秦楚之際巳無中國者數百年矣一旦誅鋤滌盪舉二帝三王之綱大復讐之義以尊君父宏仁義接續中國之命脈使大漢為後世中國帝者之首嗚呼留侯之功大矣哉髙帝既定天下剖符封功臣使留侯自擇齊三萬戸留侯曰臣始起下邳與上㑹留此天以臣授陛下陛下用臣計幸時而中臣願封留足矣乃封留侯留故沛國屬邑今徐州沛縣留城是也由漢以來廟祀不絶中統元年夏五月經持節使宋由泗舟行而留城在泗汭遂頓於廟下殿廡圮沒荒基遺樹覆茅半椽香火蕭然有斷碑泐蝕駮不可讀是夕至徐徐邳道總管李侯某言先君嘗駐兵于留欲修文成侯廟而弗及今鳩工事材將卒先志而行府適至敢丐文以掲侯之靈故諾其請推本論著以徴其成而系之詩曰智貴乎幾用貴乎藏勇貴乎怯義貴乎彰天畀留侯握兹佐王功並伊吕中國不亡木運告衰僣侯蹠民折并屠割鍾惡于秦父肉未冷子血復新委積首級仇寃孰伸申韓鞅斯投稈下石起翦驁恬刳吭斧脊共為倀鬼不顧宗國盡反先王孰能討賊壯哉子房獨為復讐蹈揚義烈憲章春秋折節進履遂興炎劉窮神知化掲仁闡義範圍情狀縱横奇計不怒而笑徬徨辟易總在吾術卒令漢帝獻璧燒棧借箸躡足兎起鶻落乾旋坤覆雍容閒暇仇誅寃復紛紛幾秦坐使銷屈功成不居翛然而往髙風孤雲邈絶天壤偶來濟世不麗世網封邑有廟宜乎世享陵川集巻三十四
