body:
  text: 陵川集卷三十八元郝經撰使宋文移再與宋國丞相書經頓首載拜啓太師丞相國公閣下曩者南北定盟國有定命使有定辭禮有定數使來如歸往反之間不過三數旬無出疆之專無請覿之私無僭易之言周旋禮律加之以敏而巳矣故禮無不答行李不淹國家安其利生民被其澤而使人亦擅皇華之美振耀一世而以為榮也若夫盟好未定約言未成變故相仍梗塞猶在則大夫出疆有可以安國家利社稷者專之可也請覿不以為私多言不以為僭故張溫使蜀未見而先抗表鄧芝使吳見拒而即通書論者以為得而不以為失經等自到境上至於受館如無阻遏即得成禮自視區區兵亂之餘糠粃土苴之學將觀禮慕儀䊐音渾䊗未見瞻顧之不暇安敢輒自振暴露短於三百餘年文物禮樂之朝乎以為疆埸交兵幾三十年宿憾藴隆怒氣旁魄一旦欲使委餒銷鑠舒徐安緩而底之平非大為剖白則不能也於是弊弊纚纚忘其固陋不計辭之工拙時之忌諱而枵然傾盡苟能解鄉閭之鬭則雖被髮纓冠而亦往虎害可除則攘臂下車從為士者之笑果可濟人濡乘輿而不愧於無術也既朝廷不得造執事不得見制使不得接於是作為表書關移公牒而皆不見答經等如是之無所靳汲汲切切而誠且盡而貴朝乃鄙外不急置而不問如是之擯蔑也必議者之不察以為此輩不識時務大兵之後敢涉吾地而踵王楫談浩之故計必爾乎拘之雖執事髙明正大橫議之多不能無搖於中而亦有意乎督過之也不然何錮滯淹抑之如是經等亦頗受教於君子不畏義死不榮幸生夫豈一旦臨小利害遽有所惜苐恐傷貴朝積纍之仁失遺黎傒蘇之望啓豪傑覬覦之心種南北殺戮之禍中州遺士經營啓沃之勤無所濟主上兼愛好生屈已通好之美意無所成此所以重為之惜懇懇灌灌猶以為言也夫天下之安危幾而已矣一失猶可不可再也再失猶可不可復再也主上自在潛邸貴朝奉使王元善等至朔廷所持書幣實在貴朝皇帝主上以為國家用兵嵗久議和通好此其時矣雖前朝事今日猶可行也乃聘師儒魏璠王鶚以議之及先皇帝踐阼遂命送還貴朝奉使遣术速門等報聘以不使入見嵗月淹逺姦人藉以激怒於是有合州之役主上每為咄唶嗟惜當時主上方御西師南平大理不見處置使人之事向使主上在先帝左右必不至於是故生此厲階至今為梗是事幾一失也嵗戊午主上行營至真定之北牛鎮謂經曰今師之出皇帝所命也一日事定汝為吾使宋講信通好以安百姓經拜手曰經不佞不能奉承明命弭兵息民天地人神之福也其何敢辭主上曰一日便當行耳乃知主上通好弭兵之心有素也及其渡江得合州凶聞乃議班師令丞相趙公於鄂州東北隅萬人敵下與貴朝約言曰如辭順便可許和退師而言者忽略不一竟不得底要是事幾再失也雖然猶命緩攻退師喻䝉古漢軍諸師曰我今北定大事汝輩勿復攻擊總攝諸軍濵江駐劄無得侵掠以俟後命遂乘驛而北不意䝉古漢軍諸帥不遵約束攻城侵掠備極凶暴大傷和氣主上既至開平受諸王推戴即下詔於順天起經於病中畀之書命授以金虎符今奉使貴朝告登寶位布弭兵息民意命經略史公賫詔往江上諭旨言有信使仍還江上兵適䝉古漢軍諸帥棄師北歸而史公不得前主上即欲治諸帥方命擅回之罪而值即位大赦雖貸而未釋也時經等巳在路月餘既至東平而李行省連三致書言近遣人於淮安報信使之至仍先奉書要結好事為葉安撫所殺且聞毁都亭驛下詔告喻誓不與北和公等毋入不測也既而又令一幕官來邀令回經等以為主上美意有素今日甫行千載一時不可中止宋國禮義之邦專務德化事循典則寧有不測苟盡吾誠以奉吾君之仁迓續兩朝遺黎既絶之命其成與否繫之於天且仗節即路之日百姓無不遮馬快覩至有涕泣者曰不圖今日復見盛事人情如此天意必從吾輩豈可懷私偷安半途而廢乃移文告諭沿邊守將不得無故興師搖蕩疆埸西至雲南東傳於海鐫戒諄復重為約勒遂自蘄宿至於五河貴朝果遷延不納一行介佐三節人員莫不請回經等以為事至今日更為少忍露宿茇舍泥飲糲食蚊蚋之與居狐狸之與伍枕虺藉蛇暴冒氛霧嘔泄並作瘧癘交攻而不憚也如是者三月及朱制幹秦通判相邀登舟乃拜表闕廷移文邊鎮以為順流東下便當成行而復泝流而西置之沙洲者一月儀真授館以來雖恩禮加厚坐享饔牢而使人之事竟莫區處今復九月初謂本朝有故請回而不許及得蘄宿回文復無他故而又不放還如稽留我輩有益貴朝雖老死片天之下不以為憾如其無益徒役人衆耗縻禀餼箝口束臂塊處株守面四壁而不聞無一人而與問事勢淹逺人情憚煩多言而必謂之躁催請而必謂之急不言而必謂之怒喟嘆自艾而必謂之怨積日纍月必得罪於衆左右矣不能成事而反生事此焉是懼且术速門之事合州之役武昌之舉江上之師皆先朝之事非主上之所欲為主上之心經等所奉行者前嵗三月二十四日之事也迄今乃復周嵗其間事勢與國書所言詔命所授必皆不同貴朝難以處置經等何由入見惟執事加察曲為聞奏即賜區處如信及經等成禮遣使保於無虞兼以與蘄宿文字已言貴朝具禮遣使達之本朝矣如猶有疑必於難處放令歸國以為後圖不然則寖以生變進退不能李行省之言為驗經等獨受窒蔽迂闊之責事幾復再失之則南北永無好合之事天下後世無復有為生民橫身負任者主上必謂汝輩嘗謂此事宜行今乃如是責其僞妄則皆得罪中州遺士無復孑遺是最可痛也事勢如此關係重大雖有雷霆之怒斧鉞之威必復再千瀆而不顧也久在舍館從臾下風饜聞執事之議善處大事能弭大變出御藩方入總庶政始則有陶士行之敏而威名則過中則有謝安石之賢而德度則優將以導迎和氣𢎞大信於天下以成其終經等之事所以動天下之幾而莫有大焉者宜乎執事之謹處之也束裝荷擔拜書鶴立佇聆明命暑勇方盛萬望對時珍育膺受厚福不宣復與宋國丞相論本朝兵亂書經頓首再拜啓太師丞相國公閣下久在舍館纍塵清聽知以數瀆獲戾而國家利害民生休戚茹塞填梗不能自制故不復計其煩疊若貴朝疑而不處僕等默而不言則差池更端錯忤兩置日益背左暌離乖隔何時而已使人之事當變故非常之時則竭盡忠赤力為剖白開陳利害萬折不衄職分然也豈箝口從諛以常自處靡靡碌碌坐制於時甘為賤丈夫則非為僕等之辱亦執事之所惡也今日之事固知進退在於執事徙死在於執事使之榮使之辱皆在於執事固惟所處也抑其有誤於執事者可靳忍閉密從其誤而不變乎非惟誤於執事顧亦誤於僕等非惟誤於僕等顧亦誤於二國僕等之死徙進退之事小二國之治亂安危之事大雖不見信尤當論列也昔孟軻去齊三宿而後出畫韓文公三上書宰相豈去之不勇求之太切乎君子濟世之心天地生物之心也豈有一不見信則悻悻而去遂自棄絶哉僕等銜命造境嵗月淹逺言之不為不盡待之不為不久初以李行省之事相迓今則不復犯邊復以訛言變故相動今則萬安無事而猶不放還無乃說者以西王之梗指擬為辭將以僕等為藉手之具以之幸災觀變乎是所謂誤於執事者也夫貴朝億料之見豈若僕等之親見間探不根之說豈若僕等之親說說者必謂北方有故西王爭衡主上之立有可議西王之勢反可興如此而稽留如此而待變如此而誤執事如此而誤兩國豈可不為之辨遂使卒有誤乎夫主上之立固其所也太母有與賢之意先帝無立子之詔主上雖在潛邸久符人望而又以親則尊以德則厚以功則大以理則順愛養中國寬仁愛人樂賢下士甚得夷夏之心有漢唐英主之風加以地廣衆盛將猛兵强神斷威靈風蜚雷厲其為天下主無疑也故屬籍之尊而賢者合丹大王先帝之終率先推戴摩歌大王主上庶弟也在諸王中英賢亞於主上嘗處大事不動聲色先帝臨終畀以後事先歸推戴塔察國王士馬精强嘗代主上帥東諸侯亦先推戴倐烈大王總統西師奄征西海鎮壓西域三十餘國主上母弟也去中國三萬餘里亦遣使勸進言兄亡弟及祖宗法也長兄既歿次兄當立兄若不立吾誰與歸主上乃集大統應天人也即位之之初首發信使通好貴朝弭兵息民聘起諸儒更定制度則賢主也不意一二懼罪不逞之徒糾合奴𨽻間離骨肉劫立阿里不歌大王締起兵端拒命漠北以次則幼以事則逆以衆則寡以地則偏兵食不足素無人望一時跳踉終就㩉同摺音懾滅夫開平至和林四千餘里彼所據之地又去和林西北三千餘里在金鐵山外其極北則骨利幹等西南則火石林牙諸回鶻也乃漢西突厥北偏地窮荒徼隂寒少水草薄土瘠大抵皆沙石也其所從之人惟是西域近左小小部族為所脅制者如為必死之寇并命衝突不過乎闖浣海窺河湟搖蕩遐裔而波斯外五大食安息等皆西域强國與相犬牙亦足相制矧於倐烈大王統御西土其容大肆僭逼縱使劫制其子詎肯以兄臣弟且其兵勢足以自帝一方又詎肯以衆從寡以順從逆以强從弱則彼卒無所成無所疑也今主上既以正立一時豪傑雲從景附全制本國奄有中夏挾輔遼右白霫音習樂浪𤣥菟穢貊朝鮮面左燕雲常代控引西夏秦隴吐蕃雲南則玉燭金甌未為玷缺藩牆不穴根本强固倍半於金源五倍於契丹縱彼小有侵軼則塔察國王一旅足以平蕩其餘三十餘王猶卷甲牧馬從容營衛矧於中國諸侯如史如李如嚴如張如劉如汪等大者五六萬小者不下二三萬虓將徑卒荏習兵革騎射馳突視䝉古回鶻尤為猛鷙則前日北方之强轉而為中國其肯使蠧國害民之尤者復肆蛇豕彼雖死寇此亦死敵也彼之崛强祗足以自斃而不足以為害明矣說者豈可以便小本朝謂秦無人以先遣使便謂怯弱拘留待變夫三百餘年禮義之朝論議之多當如是乎且先帝即位此輩挑亂起釁各肆窺窬主上令發回王元善等因以修好此輩則故為沮壞以之激怒致令先帝有合州之役武昌之舉交廣之師南北生靈頓斃數百萬先帝既終意猶未已前嵗二月復令脫里赤等大起䝉古漢軍十丁內再起兩名以之西行部籍既定方行㸃數主上乘驛禽縛即罷其役向使此輩可量也初主上未立中國無備之時此輩乘之先人奪人或因可入今中國之備日修彼之力日憊宛轉頓斃寖以脧削何所從入苐恐窘急奪命穿捽西偏迆迆而南一日或為貴朝之愛則政當講信修睦通好合勢守衛中國計安元元貴朝備施黔以西交趾以南塞黎雅之險增嘉定之戍本朝備漠北河右瓜肅涼隴倐烈大王蟠亘西域扼其吭拊其背不能有為則中國之禍庶幾乎息何乃羈持信使坐以觀變貴朝之䇿果安在乎昔朝太祖陳吉思皇帝初并有諸部與汪罕連戰言者謂金源章宗曰彼之相攻中國之利他人之事不在已家不為之謀卒以失國本朝烈祖脫鸞皇帝自金房穿出貴朝襄陽守臣以為是將圖金何與於我不為之拒四川荆襄隨以陷沒凡守經事而不知權忽於近幾而無逺慮鮮有不敗者且天下之勢如一人之身使心廣體胖丰容無故則可共為安泰如一處受病則舉身不寧焉有斷一臂去半身從其潰腐不為砭焫同爇音屑謂未至腹心以為無疾可乎使主上萬安中國無事則貴朝可以安坐說者可以待變姑行讒慝以昧執事如天未悔禍萬一有梗南北牽連相與鴻洞貴朝豈能常如今日則說者之誤非為觀變是自待變也故契丹之滅禍延及於貴朝金源之滅禍復及於貴朝以及於今其可再令北方有故乎如其有故可以為懼而不可以為幸也故為貴朝計者急於北復保合太和亟謀唇齒葺護藩籬修理邊防奬率將士却浮搖之議定堅凝之盟逐生事之人必力行為無所藉惜南北兩朝庶底安定僕等此言擬於面進既無入見之理亦無交際之期故規規反復瀝血刳肝又至此極說者又必以為狂為愚一日或有驗則渠亦必復以為知言也竊惟執事髙明正大練達事幾慷慨服義必以為此惟說者之生事小智自私不與利害咸於頰舌恣為營惑指近利以為功引逺事以為證曲牽合以為辭知常而不知變見迹而不見理蔽俗而不知權或有誤於執事亦并誤於僕等惟加亮察幸甚幸甚過總管回降與賈丞相書自接納以來禮意隆茂以國事限越望崇地絶不能屢通音敬惶愧惶愧然再更冬嵗月深久纍為祈請不見區處未知何故之以而艱阻如是僕等奉承明命通好弭兵計安元元以入貴朝其進退可否則定於接納之初邀之以入不使之出竊惟貴朝必不其然貴朝三百餘年仁政是行禮義為治不為駮雜之事純務王化以崇明信豈於通好使人亦既接納無故而不使之見有故而不使之還固為羈留不與明降大為擯蔑終於不遣如夏人之拒命契丹之敗盟金源之仇敵使人之來貴朝處置逆則益推之以恩悖則益加之以禮不校尤分曲天下莫不稱貴朝之義至於本朝王楫之往反無成术速門等要以難行之事貴朝皆置度外不重怒復怨禮而歸之天下莫不稱貴朝之仁豈獨於僕等而特有以異乎哉顧僕等之事非有大難處者如事體之不定變故之不虞橫潰之衝隔藴蓄之蠧壞徒重恩禮而誤於接納别有牽制而疑於發遣事至今日亦宜通情相告諸所藏蓋一皆開剖撤去藩籬掃平畦畛豁堂奧之深邃敞宮府之洞達使僕等舌茹心服雖賜之鈇鉞亦含笑入地何用如是之重且難乎委如本朝有故至於分裂壞亂不能以國貴朝欲圖報復則下一明詔却還其使命將出師無施不可貴朝酌進退之禮僕等全所守而歸貴朝得義理之當僕等盡臣子之節則於事體兩無虧損貴朝建極垂統保衛宗社維持人心忠臣義士節節山立以至於今名教之力也豈忍使僕等束臂兀坐失守喪節隕辱君命背棄名教則亦貴朝之所惡夫復讎者不折莫干矢惟射者之發故交兵亦行其使使人通好必有何罪而拘留不遣至意貴朝有可乘之幾又焉用僕等而為疣贅以相梗礙必本朝可與又焉用僕等淹逺嵗月以稽好事至若貴朝長驅底定捷奏交馳版圖麏至則自貴朝事僕等亦當復命無遂留之理必本朝不幸果如貴朝所言復隍之變迄無所歸則僕等亦當壇帷致使三踊盡哭在我者盡而後事天待命必不偷生因仍苟且以自穢縱使貴朝不以為戮復何面目以見中州遺士僕等之事止於是而已而日益昧沒漭無津涯反復思惟蝟起百端潔天斟海都所未解而二年之間四壁之外一無聞知塊處株守如幕上之燕釜中之魚凡諸文移如石投水隻字片紙不與交關使之局脊無聊號呼宛轉而卒莫之問生平之所韙韙初心之所熖熖一朝磨滅晦蝕殆盡而竟無矜閔者則亦命焉耳國事遲稽而家不能恤志力衰塞而親不能養未知何以獲戾而至此極既言本朝兵亂再報異聞不接國書却言入見事體違左必不可行今又坐待數月復及回降引見之期亦無明降不能復自噤默故又一鳴激切之罪有所不避初望執事而來不請於執事則將焉往執事方隆相業遂底雍熙協贊中興巍然當國政爾駕馭英賢慰允人望豈獨使不幸使人沈頓於此以傷和氣望賜矜察斷為區處即此發還終貴朝曠蕩之恩全僕等區區之節幸甚幸甚惠風扇和萬望對時茂育膺受厚福光慰輿望不宣與賈丞相書經頓首再拜啓太師丞相國公閣下一自授館屢易星嵗竟不獲曕望輝光漫為傾佇爾者牒請亦無回音不免再為干瀆經等之事本自易處數年之間不克進退是用喋喋以重速戾蓋不敢欺貴朝亦不敢負本朝復不敢自欺亦不敢欺天下後世以誤生靈終不見報且屢為有司扞格必其陳說不合事體而徒致干聒是以嵗月益逺變故益深睽離孤隔置而不問夫主上之命使人而不忌經之奉命而不疑皆以素聞執事之議指擬而來以為好事必成不知孰為厲階至今為梗一室之內旁薄抑塞顛連宛轉天所賦豫巳所固有平昔之負任及今之所奉行者沮撓銷鑠漸欲澌盡而復遭遇貴朝大故墮甑解瓦復無所望是天靳福衽禍未欲天下平治阻遏之極又重以此非惟貴朝之不幸其於使人尤大不幸嚮者事勢乖張今復氣數翻覆則經等安用仍在舍館執事方處伊周之任佐重光之命百官以聽四海仰成大聲轟磤正氣崛阜興滯補弊革訛飭陋事有壅而必行釁有積而必彗理有暗而必燭勢有悖而必回蕩滌振厲烜赫一世咸與惟新經等之事既久且廢屯艱亦極亦望賜一區處如本朝可與不替好事經雖不佞亦足付畀如其有故終於無成亦望縱遣以閒館吏經等貪冒不識事幾以入貴朝同夫俘執固所甘心今既數年新朝肆眚亦兾昭雪昔魏武之於關侯梁髙祖之於賀拔勝孔明之於徐庶皆謀臣猛將反覆去就知其無留意猶不固止矧於通好使人斷無不歸之理而貴朝亦無終止之義區區一介留之不足以為益去之不足以為損焉用耗糜饔牢幽閉嘆嗟以傷和氣曩時無故弼成阿衡亦在執事只今有故轉斡剖决尤在執事執事為之接納執事為之區處保宥終全以禮進退則更生之賜皆執事之自出銘佩之意永永不朽太簇布氣惟兾惠綏鈞履膺受厚福不宣陵川集卷三十八
