body:
  text: 陵川集巻十五元郝經撰七言絶句滿城道中二首溪水隨城陡屈伸夕陽亂閃碧金鱗沙堤帶草烏啼健山色逼人詩句新十二西郎縹緲中顔行壁立挿晴空欲攜天地諸山去不遂秦鞭過海東抱陽寺孱顔蒼玉抱幽村突兀雙龍窟宅尊回首萬山東盡處冷煙平逺半乾坤郎山晚風吹散樹頭雲斜日燒開水外村十二西郎來馬上翠鋒蒼㦸倚天門九日郭外二首溪上蒼煙一道開誰家日夕採菱回片帆不舉波間過無限好山波底來萋萋宿草暗荒丘落日徘徊上上頭一曲悲歌天地窄怪人獨鳥入長楸讀張良傳顛嬴滅項復韓讐便與赤松方外游丞相蕭何功第一白頭不免漢家囚讀則天紀則天未了立韋后武惠纔薨冊太真誰使唐家多女禍晉陽宫裏舊宫人讀唐文粹琅琅玉振粲珠光一代雄文照李唐底事平淮碑一首文公不載載文昌醉後二首何須黑白太分明不必區區話獨醒四海蒼生皆醉飽我將荷鍤學劉伶誰將元氣釀春風解潑愁人磊磈胷只是忘憂不忘國徑當一飲竭千鍾張侯宅新竹四首斫盡凡材直幹生脱綳直欲與雲平珊珊戛戛風來去常有湘江夜雨聲孤根北地久難生全仗扶持長育成敢借他年數梢力掃除氛祲見澄清疎隂杳杳色霑衣恰似瀘溪月下時可恨一枝髙更秀背人偏被惡風吹四座清隂上綺羅交青雜翠嫰煙和閒花閒草遥相映更覺森森逸氣多讀晉武紀恰下曹丕受禪臺賊臣女寵競姦回夕陽亭上一杯酒又喚五胡諸夏來即事一簇花枝閙酒巵兩家佳婦與佳兒半生失意元多感更見男婚女嫁時獨酌歌罷長歌酒自傾休嗟屈子愛劉伶如今識破人間事獨醉從來勝獨醒蠶作繭纔成便棄捐可憐辛苦為誰寒不如蛛腹長絲滿連結朱簷與畫欄西園姚黄四圍國色鬬新妝一本當中淡淡黄三十六宫簾盡捲沉香亭下看明皇題明皇私語圖一旦妖姬屬亂兵當時私語竟何成秪應蜀道䝉塵日悔不終宵問賈生題芙蓉盆戊申秋道士李師於中山治所後堂故基得東坡先生雪堂圖書青玉潤瑩𨽻法鍔截四面各五分方停無紐葢先生帥定武時所遺也九月五日觀于芙蓉盆雪浪碑下因書一絶以寓感云辭却金鑾到雪堂中朝無復漢文章不須更論青苗户丈八盆邊醉一場羽扇天山雪鶻落霜翎更比氷紈分外輕五丈原頭兵十萬縱横竒計指麾成大風土囊都不辨雄雌直把乾坤怒一吹我欲乗時起鷼運北溟飛去到天池三臺懷古二首衰草遺臺尚幾層荒凉無復艷歌聲西陵儘有千年臭費盡衡漳洗不清涕泣吚嚶後事多髙臺空著繐帷歌一時姦偽雖難辨争奈天長地久何蘓門八詠百泉碧玉山前玉鏡明亂山倒影睡龍驚蹴翻貝闕光零亂萬斛明珠儘一傾湧金雲容天影與山光一片飛來浸夕陽萬古婆娑金世界海神擲向水中央梅溪竹外青山竹裏泉嫰寒風力妥輕煙誰將景與詩人㑹正是梅花欲雪天卓水竹梢低處見共山一水環流萬竹間饑鳯不來空閬苑晚風吹碎碧琅玕嘯臺肉薄羣狐尾血腥一天自作鳯凰鳴閬風吹斷無消息老樹遺臺萬古情仙人迹八表遨遊入太清世塵十萬盡縱横翛然物外誰曾見無跡無蹤是善行安樂窩不見先生二百年老雲石室鎖荒寒當時一理元無間何事都將四段看月臺飛仙挾月下崑丘擲向山頭更不收却被巨靈偷桂魄太行山色照神州陳橋門一片黄袍著帝躬六軍謀逆爾何功太平三百年基業都在當時涕泣中龍徳故宫懷古一十四首常怪韓王智數多不從太祖據山河黄流豈是天為塹青屋誰知是帝羅國是當時總是非强將商鞅作臯䕫莫言天變渾無畏不見雷轟黨籍碑蔡京姦計假荆公紹述雖同事豈同不向嶺南消禍本更從海上立竒功禁絶蘓文碑盡磨中原不使見東坡牛童馬走能傳誦若比燒時數更多覺察伊川不著書更將偽學重相誣至今江左傳伊洛依舊堂堂一大儒銅黨紛紛快老姦敗盟更欲復燕山當時若使無邊釁不在權臣即宦官人間未省有金國地底唯知幸鐵樓忽見城頭鷓鴣舞賣花聲斷不勝愁萬歲山來窮九州汴堤猶有萬人愁中原自古多亡國亡宋誰知是石頭復國誅讐事豈難背城借一據河山汴梁更不回頭望直送枉黄到浙間少康一旅便南奔畀付英雄國可存宗澤云亡李綱罷衣冠不復到中原却許邦昌為紀信渾將秦檜作程嬰甘心江左為東晉長使英雄氣不平金人不敢駐幽燕劉豫猶令帝八年若守汴梁和且戰闗河一半尚能全建炎新焰起江東寃血青城尚幾重閩越兩王還有後天教太祖繼髙宗帥府雄開不即真宋州躍馬趣曹門只將京國為根本百戰能令社稷存宫人斜椒壁摧頽隠野蒿妖狐篤簌噪空壕美人一夜為黄土郕國夫人甲第髙宿邯鄲青蔬白飯力加餐且慰行人行路難莫向夢中還説夢世間何處不邯鄲射雁驚鴻數㸃亂長空金鏃髙穿帶響雄部曲盡看鞭指處冷雲一字落秋風味真庵世間有味非真味味到無時却是真一食萬錢難下箸簞瓢陋巷是何人感興不得意事十八九可與言人百二三無慮無愁一樽酒短屏髙枕日東南帥正堂秋渚芙蓉澹澹香新亭爽氣釀新凉晚風吹斷溪南雨一片金煙掛夕陽曉渡沙河馬渡潺潺石子灘山頭曉月爛銀盤一天清興重回首霜露滿鞍風水寒長蘆舟中遇風四首海風栗栗刮鯨涎吹裂西南一半天暝色忽開隨酒散浪花和月上船舷鏗鏗急雨射狂瀾兩岸隂風蔓草寒雲脚半天拖海氣斷虹忽落著飛湍杯盤楚楚下中流風順帆輕暮靄收忽憶黄河轟斂日翠綃凉月轉船頭斥鹵誰知草木蕃桑連平野麥連村漁人遥指碧雲際碣石東邊是海門贈漁者二首一尺新魴綠栁穿漁人饋我不論錢斫開細雪銀膏瑩旋折黄蘆爇晚煙短短蘆芽小小蒲臨流舉網得嘉魚船頭撥剌猶然活試問前村有酒無曹南道中憇闗帝祠書事二首傳聞哨馬下江陵青草湖南已受兵闗帝祠前重回首荆州底事到今争白汗翻瓶馬不前緑隂還得解鞍眠塵容突兀祗何事六月長途又一年寓目錯莫坤靈慘不春搶攘戈㦸閙風塵可憐萬里中原土一段荆榛愁殺人秋夕心事悠悠逐去鴻夢魂𣺌渺入西風無邊木葉無窮恨一夜秋容滿鏡中宿黄陂縣南茅屋欹斜竹逕荒稻畦殘水入方塘營屯未定斜陽下雁㸃秋煙不著行稻糯今年分外成家家凖備樂昇平誰知未穫還抛却天著豐年待北兵賢王渡江魚入王舟動日華水天一片紫金霞渡江千古誰能得恰到中原第四家渡江中流贈楊宣撫䇿馬南來便渡江臨流舉酒望賢王舟中賴有婁師徳無浪無風到滸黄幽蘭軒手殺官奴志自强孤軍百折竟夭亡君臣義盡平日死絶勝迎降軹道傍太白入斗聞説長庚是使星近來偏向斗牛明天宫太史無多語玉帛交馳不用兵宿舊縣故盱眙也無風無浪片帆輕總道昇平在此行却向淮南望淮北斷鴻聲裏斷煙横勝游好處相逢是勝㳺兩年霜後到江頭盃盤狼籍西風老橙橘香中過一秋邵伯藕蛟人折向水晶宫却著金刀截玉筒齒頰氷漿流不盡灑然嚼碎雪玲瓏霜後芙蓉憔悴江頭秋牡丹南人棄擲北人看明妃出塞胭脂冷霜滿琵琶淚滿鞍燭花江城深夜作輕寒金粟堆盤蠟炬殘應是燈花憐久客故隨人意報平安聞歸鳥來時隨雁向南來雁北回時人未回至竟行藏豈由已且添温水浴疎梅正月三日見月小雪初晴卵色天虚庭揺曳動江煙忽聞歸雁驚回首新月梅梢又一年送江梅還伴使坐席凝塵晝掩門客懷牢落阻江濵春來不見花消息却著殘梅送主人凌晨凌晨聴鵲暮聴鴉夢裡闗河枕上家應是皇州春色滿膽瓶昨夜也開花感興鞍馬匆匆改館來芙蓉開罷海棠開梁間笑殺新來燕去了重來尚未回佛頂橙玉人解作軟金盃刳盡金犀氣未回滿酌瓊醅歌水調碧雲髙興一天來儀真館後園茙葵開徹茙葵夏景深半牆紅錦卧堂隂雨荒苔老無人跡傾盡區區向日心揚子揚子江邊不見江江聲隨雨入寒牕慿誰載酒尋蘓二赤壁磯頭白鳥雙館中春晚春去春來總不知楊花誰使入簾帷偶然得句還驚悟却是今宵夢裏詩花落深庭日正長蜂何撩亂燕何忙匡牀不下凝塵滿消盡年光一炷香八月十六日曉起見月冷雲收盡月當西過却秋宵已失期何事天公太相妬只教人看不圓時聞雁觸處闗心總可傷五年束手坐空堂江深月黑風雨急一雁飛鳴有底忙橄欖半青來子味難誇宜著山僧㸃蠟茶若是党家金帳底只將金橘送流霞江静江静天寒不啟闗梅華開却月丹殘擬將斗柄占星歲牕隙簷頭細細看梅欲吐檀心却倒垂梅花只看半開時折來細嚼還重嗅歌罷離騷更詠詩憶酒友三年獨酌楚江濵醉裏乾坤夢裏身周顗近來添一斗坐中不見洛陽人喜雨過時無雨已為災七月纔聞起怒雷但得山田稻畦滿不須霶霈入城來不寐夢境都非得意時覺來誰與論襟期蠨蛸竟夜不成網費盡千絲與萬絲十様小菊孤根如線耐霜侵浪蘂還開玉與金為問西風縁底事一枝同氣不同心館人餼雁持節江頭久食魚館人供雁意踟蹰呼兒細看雲間足恐有中原問訊書芙蓉小酌輕紗白紵不勝單繚亂江雲作小寒乘興更須傾一斗芙蓉宜向雨中看窞池半池泥水不曾清一撮魚針也自生好雨竟無風日惡門前空説大江横二月一日雨中看梅紫樹青條玉幾叢半開半落不禁風看梅何必前村雪二月江南煙雨中示馬徳璘當年駐馬石牀邊老父相逢已結縁須向桑田最佳處掛冠神武卜終焉乙夘秋食于廣平逆旅一老父挾方書數䇿與之語逹者也及使宋其子徳璘從行似不偶然故為示此示孔晉十五從戎已自竒更當磊落振襟期咸寧曾建中興業本是汾陽帳下兒丁夘歲元日青春白髮坐相催草草杯盤淺淺梅爆竹煙寒簫鼔噎隔牆飛過紙錢灰真州沙瘴侵曉煙煤半抹牆急燒煑酒嚼鹽薑真州城裏多沙瘴人道淮東小法場立秋夜有感月邊一夜火西流雲白天青萬里秋朔雁今朝離瀚海定從何日到江頭丁夘新館寒食無花四首折殘魏紫戴姚黄香盡河陽與洛陽剛向江頭覔春色幾年孤館對空牆四圍擊柝鎖重扉春去春來總不知腸斷東城中酒後春衫走馬拂花枝八年寒食總無家三月清明不見花屋角映陽看薺菜牆隂撥土覔蒿芽陽和渾不到空齊深院無人長緑苔為報監門暫開鎖少分春色入門來館内幽懷狂花野夢滿疎籬恨殺絲𤓰結子稀獨立無言解蛛網放他蝴蝶一雙飛伴使西計議送牛酪深凝碧椀玉脂香輕結酥皮蠟面黄斫雪徑調傾一椀大江忽在鐵林傍新館木犀欲將金粟插銀壺沉麝看來氣韻麤為問西風能記否好香曾到故鄉無觀哺乳燕黄口嗸嗸競食時一雙忙殺尚嫌遲遥憐待哺諸兒女更比烏衣分外飢觀牡丹菊有感黄花喚作牡丹菊又喚芙蓉秋牡丹幸自拒霜全晚節强為春色亦應難戊辰七夕只見星杓掛月鈎銀河依舊隔牽牛遙憐玉雪佳兒女淚滿西風乞巧樓戊午歲作一貫圖戊辰冬十月晦始成十載方成一貫圖恍然才見未生初仲尼沒後遺言絶且讀遺書莫著書讀堯典闗睢風雅三千首堯典文章第一篇從此聖人都不説且休便論伏羲前讀王旦傳禍本誰知自二王玉清未了又儲祥一瓶珠賣萬人命剃髮披緇未易償即事網羅蚊蚋一蠨蛸終日經營何太勞縱好未能包六合大鵬依舊九天髙蒸開栁眼中宵熱落盡桃花半曉霜五月綿衣休便送江頭天氣不尋常夢遊木香洞府月牕青錦麝塵寒夢遶煙條露蘂看但覺身輕似蝴蝶種香風物異槐安暮春二首揚子楊花雪打門運衙花樹緑藏人花開花落年年事看取人間不盡春重圍雨久塌蒼苔火鋪喧呼著棘栽唯有東風難禁約隔牆吹過落花來五言絶句同闞彦舉南湖晚步四首月出東南隅湖湧黄金波清風颯然至奈此良夜何太白吐金氣水樓清霽寒悠悠半滄海月出浮雲端荷花臨水殿綺月轉簾腰晚吹動銀管暮凉生翠綃清風凌八極虎豹天門開長虹忽中斷海窟明月來送闞彦舉長風吹短褐浪起魚龍腥萬里一樽酒送客東湖亭促織亂聒霜前夜忙催機上秋無衣汝何益重作旅人愁曉寒列列牕分曙霜雞噤不鳴只疑滄海凍還使日難生即事短衣歌永夜長劒倚髙秋近愛東家子無憂樂白頭大城南栁拂春煙白花融曉日紅蕭蕭玉銜馬沙上踏輕風陵川集巻十五
