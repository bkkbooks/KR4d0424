body:
  text: 陵川集巻十七元郝經撰論八首道道統夫形器形器所以載夫道即是物而是道存即是事而是道在近而易行明而易見也謂夫虚無惚恍而不可稽極者非道也謂夫艱深幽阻高逺而難行者非道也謂夫寂滅空濶而恣為誕妄者非道也道不離乎萬物不外乎天地而總萃於人焉天地至大萬物至衆而人至靈非是則道無以見也故動静相根道之幾也隂陽相乘道之氣也剛柔相錯道之形也消長相尋道之變也其包綿長貫上下統中外使天地萬物各受其成守其則而不可易者則謂之太極其迭生死互往來環始終使天地萬物各全其理新其氣續其形生生而不已者則謂之造化其湛静方一而不可易變動周流而不可測者則謂之鬼神其全太極之體乘造化之幾盡鬼神之情而與道為一者則謂之聖人故天地者道之區宇也萬物者道之郵傳也聖人者道之主宰也莫不出乎道莫能離乎道而人為甚焉故道之賦予則謂之命其得之理則謂之性其制宰之幾則謂之心其發見酬酢則謂之情其血氣之所嗜則謂之欲其義理之所得則謂之徳全心之徳則謂之仁盡心之徳則謂之忠推心之徳則謂之恕實心之徳則謂之誠徳之品節則謂之禮徳之中和則謂之樂敬者持夫此者也智者知夫此者也勇者行夫此者也修夫此者賢也盡夫此者聖也昧夫此者愚也推而行之則天地萬物各得其所悖而忽之則天地萬物各失其序致而極之則天地萬物各臻其極奈之何人之心甚易放而其徳甚易亡也聖人有憂之懼夫不克負荷而道因之以壞也於是觀其時而佐其極生人之初欽欽顒顒醇而又醇也天地自若也萬物亦自若也各載夫道而莫有失也聖人弗言焉見解出矣聰悟開矣於是宓犧氏始泄道之幾而畫夫卦猶未見夫辭也情欲生矣血氣勝矣流于偏而入于左也於是陶唐氏始曰中有虞氏曰道心曰人心偏既勝矣欲日張矣桀侈紂肆禍生人而毒天下也於是湯曰建中武曰皇極伊尹陳一徳周公制禮樂其革道之弊可謂至矣厥後陵夷于幽厲争奪于五伯徳不足而力禮不足而刑先王之制於是大壊人心放紛而道日敗也於是仲尼氏出作為六經建道之極而俾與天地並為之男女夫婦父子兄弟君臣朋友而人之大倫正為之禮樂刑政文物制度而人之大法立為之士農工賈服食居室而人之生理存根刮推致因仍損益各底其極道之用盡而其體具矣既而顔子以之言仁曽子以之言恕子思以之言中庸孟軻以之言浩然之氣皆所以羽翼夫道也道所以生形器人所以居形器大聖大賢所以修形器也道之所生聖賢之所修斯人居之而已矣彼昏無知棄而弗居放心亡徳昏蕩戕圯血氣肆而道心亡矣嗜慾張而天理滅矣静動相違則道之幾乖矣隂陽舛悖則道之氣紊矣剛柔失中則道之形繆矣不能運㑹則太極差不能始終則造化熄則道之原幾乎塞矣天原于道道原于天萬物原于天地人原于天地萬物人不蹈道則天地萬物壞天地萬物壞則道壞矣道具于形器亦壞于形器形器所以載道亦所以壞道也則天地萬物之中安用夫人乎曾鳥獸草木之不若也鳥獸草木雖不能純具乎道亦不能壞道孰謂人而反壞道乎於是高逺者欲遺形器而離人類遂入于虚無誕妄者欲滅形器而絶人類遂入于空寂遺者而卒莫能遺滅者而卒莫能滅所以為異端自以為是而不知其非也盍於吾形器之中求吾之所不壞乎吾之所固有者道之所不壞者也一形器壞則有一形器道固無恙也存而居之則道在於是故道一壞而在聖人再壞而在六經道雖屢壞而固在也天地萬物者道之形器也六經者聖人之形器也道為天地萬物以載人聖人著書以載道故易即道之理也書道之辭也詩道之情也春秋道之政也禮樂道之用也至中而不過至正而不偏愚夫愚婦可以與知可以能行非有太高逺以惑世者惟夫未有見夫此也故以為高逺以為幽深以為艱阻也莊周雄辨過于高荀卿著書求夫異後世百家衆流力探逺蹈欲出聖人之上卒在聖人之下曽不知至易者乾至簡者坤聖人所教六經所載者多人事而罕天道謂盡人之道則可以盡天地萬物之道能盡天地萬物之道則三才之藴一貫於我矣嗟夫天地萬物具在聖人之六經日星而昭昭也而由之者鮮潰亂于嗜欲撐裂於争奪誘瀆于富貴浮靡于文章沈溺于訓詁破碎于决科支離于穿鑿蕩于高逺惑于異端窮于詐昧于私而塞于不行悲夫聖人之形器將遂壞也歟命命者道之令居隂行陽主性立心而不易焉者也故有本然一定之理判然一定之分截然一定之數沛然一定之氣所以賦予授受窮天地亘萬世化化生生而不已也故其體則一定而賦予則不定其體則一本而賦予則萬本由其體而及于用自其殊而反于一則惟齊非齊參天兩地竒耦錯綜天地萬物皆受之而卒歸之莫不聴焉莫能易焉出乎道號召天地人物而使用乎道千變萬化不能離乎道而皆維繫焉是以謂之命也故其大本著於太極自其為動静為隂陽為剛柔則太極之賦予而天地受之也為二氣為五行為寒暑晝夜為生長收藏則天地之賦予而萬物受之也人受太極天地之全為心性為形體為男女夫婦為父子君臣為禮樂刑政為生殺與奪而萬事萬物聴焉故道造太極之命太極造天地之命天地造人物之命人造萬事萬物之命而且成太極天地之命者也始則受命次則聴命次則造命終則復命夫道徳仁義孝悌忠信則得之於天是受命也壽夭窮達貴賤得喪則定之於天是聴命也宰制施為成已成物則出之於已是造命也全而受之無所棄全而歸之無所違盡其在我與天為一是復命也受者修之而弗敢壞聴者順之而弗敢違造者操之而弗敢失復者終之而弗敢怠則太極天地能造我而我亦能造太極天地與太極為一與天地為三夫是之謂聖人仲尼曰窮理盡性以至於命人曰君子居易以俟命小人行險以徼倖夫窮理盡性學也至于命則知矣居易以俟則聴也行險徼倖則違矣故又曰不知命無以為君子嗟夫世之人不能為學以知命又不能修身以俟命動而棄擲終以違悖至於顛連跋㚄則曰是吾命也可乎哉凡棄父之命者則曰不孝反君之命者則曰不忠違師之命者則曰不敬矧於悖天之賦予而恣為戕伐不返躬責已而曰在天之人也可以謂之不仁故聖人安命賢人俟命而小人委命安命者道化俟命者徳全委命者自棄性凡物之生莫不有所本而為之性天地本太極則太極為之性萬物本天地則天地為之性人官天地府萬物得於賦予之初見於事物之間而復於真是之歸則其所性根於太極受於天地備於萬物而總萃於人所以為有生之本衆理之原也故無所不本之謂命無所不有之謂性無所不統之謂心無所不著之謂情則性也者命之地心之天而道徳之府也啟道之善體乾之元發陽之端與生俱生而能生生不與生俱壞而能不壞與天地周流不入於偽妄萬事萬變莫能外焉其體則静其用則動其位則中其理則善其氣則生其徳則仁其藴也充實其積也輝光混然而無間粹然而不雜所以復太極之本而得本然之全也然而有理而後有氣有氣而後有情情復于氣氣復於理則能仍全氣徇于情理昧于氣則用夫修道之教而資於學問之功也夫氣稟不能移知覺不能奪不待問學安然而化則聖之事也奪而知所以存移而知所以復盡夫問學以充夫性則賢者之事也溺於氣稟之偏誘於嗜欲之差不為問學亡而不復則小人之事也雖然天之賦予者一受其成而不壞聖自聖賢自賢小人而自小人本然而固有者無加損焉所以與太極為一為命之地心之天也大聖大賢立極垂訓必本於是仲尼曰一隂一陽之謂道繼之者善成之者性又曰成性存存道義之門又曰利貞者性情則推本然而言也曰性相近習相逺上智下愚不移則兼生質而言也葢有本然之性則有生質之氣性統氣氣載性相須而一也故劉康公謂人受天地之中以生而言其位樂記謂人生而静而言其體子思子則謂天命之謂性而言其所受孟軻氏道性善而言其理之本然則無不盡也無不備也其言之差自告子始告子曰生之謂性生固可謂性矣而所以生之理則不言也是以差也至荀卿則斷然而謂之惡惡豈性也哉生質之情則有之其本則非惡也揚雄則為淆亂之言曰善惡混性之理無不善其惡則情之流也源泉而滑汨同之以泥其清潔之本在焉而遂謂之濁日月而蔽之以雲其昭徹之本在焉而遂謂之昏清濁不相入也昏明不相易也而可混乎哉本然之善蔽而為惡修而復之則性自在焉源泉清而日月明也烏可謂之混也至韓愈氏則以五性七情并義理氣質合而為言則過夫荀揚逺矣苐謂性與情之品三則太拘而有未盡焉者葢自其同者而言則萬殊一本自其異者而言則一本萬殊非三品所能限也至乎蘓軾則曰言性之差自孟子之定名為善也曾不知孟子之言本諸孔子孔子曰元者善之長繼之者善則性善者孔子言之也向無定名則人亦無定性哉是亦一偏之言也葢孔孟之言性也本夫理諸子之言性也本夫氣是以至於謬戾而不知其非也夫通天下一理㑹萬物一氣無非本然之全也堯舜幽厲之性同而其生質則異稷契顔曾則謂之人商均丹朱楊食我子越椒可不謂之人乎堯舜由之而幽厲不由彼能安全此則恣而不返也語其本然則人與草木鳥獸異語其生質則人與草木鳥獸同雖曰人也而不能存則亦草木鳥獸也雖曰草木鳥獸也如虎狼之父子蜂蟻之君臣豺獺之報本苟能存焉則亦人也故孟子曰人之異於禽獸也者幾希庶民去之君子存之嗚呼物欲肆而天理亡能存之者鮮矣自言性者不一而善惡之説差又非惟不能存而為惑世蠧道者竊之誘人以善而導人以利懼人以害而驅人以惡以偽亂真譸張誕妄入於人也深仁義道徳之説不行使天下之人皆忘其本然之説無復人道子焉而不父其父臣焉而不君其君遂底于亂而淪于血肉悲夫心命之賦予則謂之性性之發見則謂之情性情之幾則謂之心命者性之本原情者性之功用心者性之樞紐性與情為體段充周而無不具命與心為主宰發微而無不在帝出乎震而成乎艮神則妙萬物而為言人稟於命而終於情心則妙衆理而為用自動静而為隂陽自隂陽而為天地其所以然者太極也自命而為性自性而為情其所以然者心也故太極者天地之心心者人之太極也其幾則神妙其本則静虚其才則施為其用則不測而惟正是生惟變是適動以道而裁以時雖終日動而未嘗動也動以欲而滑以私雖終日存而莫能存也専而制之則入於錮滯委而任之則入於流放巧而用之則入於機械悖而行之則入於欺罔思欲静之乃所以動之也思欲安之乃所以危之也思欲養之乃所以害之也故以思為用復以思為害不思則妄過思則妄不應物則妄逐物則妄以意為才復以意為害踰越則妄虧欠則妄當舉而不舉則妄不當廢而廢則妄以知為導亦以知為害蔽昧則妄穿鑿則妄當知而不知則妄不當知而知則妄妄則非心也故命可事也性可存也情可制也惟心也則難幾微而易昧知覺而易動出入而易放圓轉而易流光明閃鑠容理必入不疾而速不行而至無所不體而莫能執其體是以難也惟仁可以全其徳惟義可以盡其用惟智可以充其才惟勇可以𢎞其力惟畏敬可以閑其邪惟克治可以去其害不然則無不傷也無不忘也夫性非氣質無以見則氣質之害至于惡心非思慮無以見而思慮之差至于亡所以有學問之道而聖人相與為傳而謹之也堯傳之舜曰允執厥中中者何心之全體也允執則不放矣舜傳之禹曰道心曰人心道心則其理人心則其欲也禹傳之湯曰無間此心則混然而一也湯傳之文武周公曰建中以吾心之中建於吾民也文武周公傳之孔子曰純純則一而不二其心無物欲之雜也曰皇極自太極而為君極皆心之用也曰禮樂心之品節則謂之禮心之中和則謂之樂也孔子傳之曾顔曰仁言本心之全徳也曰一貫一心而貫萬事也曾子傳之子思曰忠恕忠所以盡夫心恕所以行夫心也子思傳之孟子曰中庸中者心之體庸者心之用也至孟子而著其所傳曰浩然氣言心之廣大無限量也曰不動心言動而得其理則本然之静也前聖後聖一心相傳若合符節所以為道徳為六經為萬世立教為生民立極至于今而人之類不至為草木鳥獸至於今而知有父子君臣長幼上下是非邪正善可為惡不可為直可行枉不可行是為霸是為王是為中國是為夷貊是為君子是為小人昭昭然不可欺則萬世一心也故不為今之虚無而自棄不為今之誕幻而自誣不為今之差謬而殺天下後世則吾之心明白正大如白日之正中猶夫昔日帝堯之所傳則吾亦一太極有亘萬世而不死者苟溺於虚無惑於誕幻心術之差流毒締禍雖幸而生吾見其為行尸矣情情也者性之所發本然之實理也其所以至於流而不返者非情之罪欲勝之也葢有性則有氣有情則有欲氣勝性則惡欲勝情則偽上智下愚所以不移賢不肖所以别也故情之生也發於本然之實而去夫人為之偽惻隠羞惡是非辭讓其理則根於性為仁為義為禮為智其端則著於心喜怒哀樂好惡其發見則具于情可喜而喜可怒而怒可哀而哀可樂而樂至於好惡皆當其可而發則動而不括無非其實得時中之道惻隠羞惡是非辭讓之端不妄仁義禮智之徳全則能制夫欲而復于性統夫氣而安於心如喜而溢美怒而遷怒哀之也而至於傷樂之也而至於滛善者惡之惡者好之忿懥恐懼憂患好樂皆不得其正忍而至於不仁悖而至於不義傲狠而至於無禮昧沒而至於無智則不能制夫欲失則踰閑放僻邪侈一入于偽亡本心之徳昩本然之實則不能復夫性為下愚為凶人與草木鳥獸並而絶夫人道所以必加修治斷絶之功而用夫省責推致之力也修致既切功力既至則欲節而後情定情定而後心存心存而後性復性復則人之道盡人而盡夫人之道則可以謂之人矣故曰情也者性之所發其至於流而不返者非情之罪欲勝之也仲尼曰形而上謂之道形而下謂之器又曰下學而上達夫性形而上者也情形而下者也性為命之地情為心之地故學問之道始於下而終於上始於近而終於逺始於無所知而終於無所不知所以盡夫心盡夫心所以盡夫性也是以君子用力於日用之間慥慥於躬行之地非禮勿視非禮勿聴非禮勿言非禮勿動即灑掃應對進退以盡夫性與天道則一偽不容無非實理也後世虚空誕妄之學行務乎上而不務乎下務乎偽而不務乎實談天説道見性識心斬然而絶念塊然而無為而不及情其所謂性與心者則安在哉可謂不情之學也造化之情著于天地天地之情著于萬物人之情則參造化而通萬物能盡人之情則能盡物之情能盡物之情則可以見天地之情矣是下學上達之道自流徂源之事名教有用之學也氣道統天地萬物之理氣統天地萬物之形道入于氣則理入于形氣也者所以用道造形成變化而行鬼神者也故天地萬物在於屈信消長之間流峙融結之内為寒暑為晝夜為死生為覆載翕闢為壯穉榮瘁為晦明剛柔精聚而為物㳺散而為變貫四時閲千歲振古而不弊焉者也人稟是氣以生而理無不具混涵於性而斡旋於心發揮於情而著見於事業體於仁用於義撙節於禮昭徹於智充塞於誠其力則為勇其才則為斷其油然莫之能雜則為善浩然莫之能禦則為大當於理則融然而喜悖於義則勃然而怒惻焉而内悲則為哀懽然而暢豫則為樂委曲於幾微之間而圓轉於變通之際覆冒於公普之地而挺特於正大之域其為體也則動容周旋而無不至其為聲也則合比律吕而無不和其為容也則莊厲温恭而無不正其為色也則睟然見於面盎於背故能與天地同流而貫萬物為一是氣也自聖人而至於下愚其稟之也一也自赤子而至於耄期其用之也一也自生而至於死自死而至於生其本之也一也然其所以為聖所以為賢所以為君子為小人者存養之功至與不至也安然而運化不待存養而莫或傷之者聖也養而存之而莫使傷之則賢也暴而傷之至於消沮悖逆則下愚而小人也存養之道積於義理止於分位出處以時動容以中齊莊中正而有立寛裕温柔而有容發彊剛毅而有執振於餒散之中收於流蕩之際重警省以作志氣去虚驕以除客氣㫁嗜慾以安血氣暢冲和以宣滯氣致恬淡以充道氣去絶人欲之私一以天理之公則雖小人而可以為君子雖下愚而可以為聖自局脊索盡之中可以至於剛大矣嗚呼天之賦予者甚大而人往往自為小之氣所以載道而人往往自為壊之天地兩間無有限量則孰不當高視濶步而浩然莫之違也或者乃至於無所容俯仰慚怍手足莫措皇恐戰汗雖或為鴟張誕妄猖狂恣肆其中則枵然而莫之有一旦臨小利害則屈喪俱盡皆人也而獨若是獨不知其所自耶仁理之統體則謂之道道之功用則謂之徳徳之充全則謂之仁故仁也者道徳之要所以盡性存心焉者也其大原則出於天天之體曰乾而乾之徳有四曰元曰亨曰利曰貞元者萬物之所資始而各一其性其中則亨利貞具焉而各一其元故為善之長生物之本其於氣也則為春其於徳也則為仁人稟是徳以生其理則具于性其用則藴于心其端則為惻隠其情則為愛利其體則為公普其所宜曰義其品節之分曰禮其真是之知曰智其充實不妄曰信無非本然之全也在夫充之而已運㑹變化萬物紛錯天地之間莫不得其所者天之所充也動容周旋中禮合道天下之人莫不得其所者人之所充也天而充之則人與萬物皆得其仁人而充之則亦天之仁也其或不能而至於不充者有害之者也天之仁而莫大也而或害之則本然之差不齊之氣也日月之晦食寒暑之舛謬風霆雨雹之陵暴草木鳥獸之夭折則於天之仁有未既盡焉然非天之罪也天之仁而猶或未既盡况於人乎人之不仁也嗜欲之私生質之氣其害之也有甚焉其至於不充咸其自取也夫理者天之公也欲者人之私也一理之不當一事之不仁也夫婦之道不盡則夫婦為不仁父子之道不盡則父子為不仁君臣之道不盡則君臣為不仁至於酬酢萬變經理萬事宰制萬物私欲一萌則於其理莫能盡惛惑欺妄放僻邪侈忍鷙殘賊作於其心則戕性毁已見諸事業則病人害物至於窮極則毒天下禍四海滋蔓於後世而傷天地之仁噫天之有戾氣而害於仁也小人之有欲而害仁也若是之酷也是之謂人勝於天惟克巳制欲庶幾乎復而充之也仲尼賛易曰立人之道曰仁與義又曰顯諸仁藏諸用則仁也者配三極而為用如是之至也於其授七十子之徒則各因其材而篤之與孝與忠與智與勇與仁之一事而不與仁之全於顔子則僅與其三月不違於堯舜則曰博施濟衆其猶病諸何若是其重且難也葢人之與仁其受之也無不全充其所受則雖天地聖人有時而不能是以難也其傳諸顔氏子也曰克已復禮為仁則教之以學問之道曰一日克已復禮天下歸仁則勉之以功用之歸而猶未既盡與不一而足嗚呼以仲尼之為教顔子之為學而猶若是又矧其下乎如是則仁不可為也仁者人所固有也一念之合理一念之仁也一事之中節一事之仁也一物之得所一物之仁也若是其易也豈不可為哉苟惟欲之從而不復於理則雖賢也而為之難苟克其私而反之也雖衆人也而為之易故極其所充則天地聖人有不能盡語其固有則愚夫愚婦可以能行則非難能也不為也嗟夫去欲則如拔山為惡則如走壙古通曠反躬則如倒海克巳則如登天語之曰有仁焉則亦難焉耳矣教天地生物本之者道也載以氣而流以形使之各正性命而不失其本焉者教也故播之以四時推之以六氣交之以五行照之以日月之明鼓之以風霆之力潤之以雨露之澤肅之以雪霜之威發揮其精神變化其氣質無非所以為教以成夫道也人配天地以生其所以為道為教者莫不備而其所以行道立教者則又有甚焉故自太極而下教在天地宓犧而下教在聖人仲尼而下教在六經教之始生也則道之弊也聖人因而修之人之性始漓而欲漸長也於是有書契以代結繩人之欲漸長而漸踰分也於是有法度以為刑政人之争端日興而漸以禍人也於是有師旅以為征伐世變日下人俗日偷於是過為之防曲為之制因其情而導之使不塞因其情而遏之使不流於是因其本然之倫而為夫婦父子兄弟使之親親而不離因其本然之序而為君臣師友上下使之尊尊而不犯因其本然之禮而為冠婚喪祭朝聘㑹盟使之節節而各盡其分因其本然之義而為孝弟忠信睦婣任恤使之沛然而各蹈其道因其本然之則而為廉恥羞辱好惡使之厭然而各盡其情而後不愆不忒信如四時升降舒數和如六氣涵浸浹洽澤如雨露靡然從化速如風霆截焉法令凜如霜雪五音純八風調兆民樂其生萬物得其所無疵厲夭殈而共躋仁壽教立道行而天下平天人相通上下為一神人允協幽顯㒺間而人道始盡矣故教始於宓犧成於堯舜備於周公定於仲尼易曰黄帝堯舜垂衣裳而天下治葢取諸乾坤葢宓犧而下至於堯舜聖聖相承興滯補弊教立而後道備道備而後無為天尊地卑而乾坤定卑高以陳而貴賤位黄帝堯舜則中天下而立與乾坤並而為三也黄帝堯舜氏沒繼以夏商之衰教幾大壞而周公制禮作樂備六代之典使天下之人遵而行之以為教教復立而周室大治厥後周衰皇一降而帝帝一降而王王一降而霸所謂道與教者莫不壞亂之極而仲尼氏出則無黄帝堯舜周公之位無創法立制之權不能修道立教轍環天下而莫能用於是制作六經天人之理則寓諸易天人之辭則寓諸書天人之情則寓諸詩天人之政則寓諸春秋天人之則則寓諸禮天人之和則寓諸樂性與天道之要立身行已之實則寓諸七十子問難之間三綱五常大法大典而無不備先聖人之道具在沛然與天地同流中天下而立亦與乾坤並而為三也邵子曰春夏秋冬者昊天之四時也易詩書春秋者聖人之四經也昊天以時授人聖人以經法天天人之事備矣故曰太極而下教在天地天地而下教在聖人仲尼而下教在六經則太極為教之始而仲尼為教之終終而復始則仲尼亦一太極也立經陳紀建極垂世亭毒甄育範圍裁成其為教也無窮天地在而六經在也天地不壞而此教不壞也故自仲尼氏沒雖分裂於戰國火於秦黄老於漢佛於晉宋魏隋之間而雜于唐宜乎大壊一無所有而天地自若人之性不易也本然而固有者皆不亡而六經猶夫日月之昭昭也百姓日用而先王之遺澤猶在也彼所謂老與佛與凡異端者亦皆假之而奸其間也向無六經為教則人之類滅而天地或幾乎熄天地熄而人之類滅則彼所謂老與佛與凡異端者將安所厝哉大哉乎仲尼之道六經之教君君臣臣父父子子夫夫婦婦兄兄弟弟其與太極並始終乎彼異端者又焉足為重輕也哉陵川集巻十七
