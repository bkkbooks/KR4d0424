body:
  text: 陵川集巻十九元郝經撰論辨微論異端儒之名立而異端作儒之實亡而異端盛實既亡矣虚名之儒何益乎是以不競于異端是以天下之人蚩蚩擾擾復以儒為異而不知異端之為異也夫道行于一喪于二天下治于一亂于二矧異端之多乎哉昔三代無儒者而天下皆儒也後世有儒者而天下無儒也三代之盛莫盛于周周之盛莫盛于禮樂自黄帝至于文武六代於是乎備有異服異言之典有反常惑衆之誅居有服章動有儀則出有權衡入有規矩沈涵仁義優游禮讓咀咏徳澤方此之時人人皆儒而天下無儒之名也是以成康四十餘年徳著刑措可謂盛矣及周之衰禮樂廢缺王政下移侯度不謹孔子有天縱之聖而不位君師六代之典於是大壞吾民日趨於異孔子沒諸弟子各以其説遊於諸侯而儒之名始立孔子之時己有過不及之差愚魯喭辟之不一既本掲原分榦摧枝折異端於是乎作是以子夏之後流而為莊周李斯出于荀卿之門而周亂其理斯削其跡墮先王之制滅先王之道萬億之不能一存撤天下之藩籬破天下之畦町則孰不得鼓舞猖猘于其間哉是以申韓以刑名孫吳以兵儀秦以辯楊朱為我墨翟兼愛雜然鋒出燦然星布至于漢氏賈誼以王佐才當孝文致理之時而猶惑于申韓史遷學名兼綜先黄老而后六經何者儒之實亡而異端盛莫知所從也遂致後世夷貊肆而老佛横敗人之國亡人之家傾人之天下塗吾民之耳目亂吾民之心術斵吾民之天性而不可救藥也悲夫孟軻氏辨之于微而時人弗知仲舒欲罷黜百家而孝武不用韓愈氏力為之争而竄逐南海三人者非不為大儒也而不能遂滅異端措天下于三代之隆躋吾民于康衢遂吾民於仁壽者衆皆異而已獨儒而欲以一己之儒一天下之異是猶致寇於室而坐甲于户也力而禦之死而敵之其為勝也不亦難乎然則天下遂為異也亦有時而出也邪道與時不可必天欲生斯民也育斯民也必有大聖人者舉三代之隆以勝之矣不然則其亦已矣雖有孟軻仲舒韓愈者亦無如之何矣孟軻仲舒韓愈者猶無如之何觀今日之文章斷今日之事業吾為無望爾也夫禮樂天下之事有幾有時興喪成敗繫焉爾事有不舉而無幾與時則巳矣其不舉天也非人也見其幾忽易而不乘遇其時苟且而不進而遂至於不舉者人也非天也夫可乘之時可為之事千載一㑹邈乎其難哉故三代之後禮樂不興非不興也失其幾而違其時也失其幾而違其時雖有知者亦無如之何矣文中子曰使諸葛而無死禮樂其可興乎諸葛而無死天假之年誅魏復漢則有之矣禮樂之興喪何諸葛之足繋哉天下襲訛踵陋蹈枉興偽五百有餘年矣禮樂之興喪留侯叔孫通孝文不任其責尚何諸葛之足責哉昔周公攝政逺焉而管蔡誚邇焉而公奭疑上焉而王不知戎商始革未洽周化千載之下聞者猶危公公乃雍雍皡皡曾不芥蔕七年之間収六代之典制禮作樂須之於明堂竊嘗計之管蔡公奭之禍大而公不懼禮樂之事甚迂而緩也公汲汲而為之何哉葢幾不可失而時不可違也苟計一巳之私廢萬世之典公不知也使天下淪于非類公不仁也故公之不計一已之危而必為萬世之典此周公之所以聖也留侯佐高帝誅暴秦蹶彊楚平定天下灞上一言直作伊周借箸之籌便同湯武天下既平納履而去其邁倫之節亦髙矣保身之知亦明矣而漢制皆因秦敝不為之革蕭何之圖書皆秦人奮私智破古法吞噬天下之汙跡也而遂用之使漢之禮樂不興不能比隆三代雜而不純者留侯誤之也豈留侯言之而高帝不聴邪詩書之綿邈陸賈稱之使為之著書矣仁義之迂濶三老言之即為之縞素矣遷都之重婁敬陳之即日而西駕矣矧留侯腹心之臣禮樂天下之大事創業垂統子孫之所儀刑也帝有從諫如流之美豈言之而不聴哉禮樂之興適其幾而㑹其時留侯者外無管蔡之誚内無公奭之疑上無成王之不知而乃忽易而不為苟且而不進何哉此留侯之所以能為漢世佐命之大賢而不能如周公之聖也與葢留侯才知有餘而學術未備故不足獨任禮樂之責誤之者又有叔孫通也叔孫通上及遺周之緒仕於秦臣於漢周之完典嘗見之矣秦漢之事盡知之矣當漢室創制而不舉三代之懿顧乃剽掠秦餘俯仰隨世使禮樂曀光沈耀葬于九京冺然無聞於後帝乃謂朕今日知為皇帝之貴使帝而有知通之罪其容誅乎雖然通以腐儒之姿乘時徼利觀其徇二世者可知矣當紛紛征伐之衝士未息肩强梗之將搖蕩疆場謀畫大臣不為之啟禮樂之事通又何足獨任之故留侯任其責于上通任其責于下孝文任其責於終而巳矣漢承秦敝至于孝文天下屬安治賈誼言宜改正朔興禮樂而孝文乃謙讓未遑遂因常蹈故亡秦之制訖為盛典後王後帝繼繼承承恬然處之而不以為非也或欲革之而反以為異也是以後世知者而不能行行者而無其時禮樂終于無興矣嗚呼漢初之幾一失禮樂之治遂百千祀而不能復彼二臣一君不得不任其責學智一而不鑿者故學純而不駮一而不鑿則得者精而成者大純而不駮則守者固而行者正是以建大節處大變斷大惑紛然而至而不紊儵爾而起而不動以一身而鎮天下天下與之以一言而率天下天下從之此大人君子之為學所以安天下也小人之學異乎此所以亂天下也天下之安危繋夫學而已矣大人君子之為學也用智之公也公則一故其學純外物不能間入以相擾也故能御物而不屈夫學純故有器有器故有節有節故不為私奪所以天下恃之以安也小人非不學也用智之私也私則有欲有欲則屈于物一心也而萬物屈之是以中無主而外無正天下因之以亂也學而因以亂天下曷若不學之愈乎不學則樸魯重厚而無欲猶足以鎮天下而不至于亂天下也夫人而有智而資之以學不至于大聖而必至于大姦故周公王莽皆學也而周公以之安周王莽以之簒漢周勃霍光無學也而勃能誅諸吕而立太宗光能廢昌邑而立宣帝臨大節而不奪故學之以亂天下不若不學之為愈也嗚呼後世之學又異於此矣既不能至于大聖又不能至于大姦又惡其名而不能為之不學或徇時為骫靡之文或為人為纎巧之利或射利而為瑣末之業既不能安天下而亦能亂天下孳孳矻矻學之而無用為之而無益智分而不一業駁而不純器促而淺無以容節錯而卑無以立使先聖人正大之道墜而不舉民俗日偽以偷而曰吾學矣果何學也噫天下其無學者耶則執筆綴辭者多矣峩大冠襜大裾堯都而舜俞者多矣其有學者耶未聞有以正大之學安天下者也故道之不行天下之不治非時君衆人之罪余學者之罪也學天下之無全才也學使之然也古之學者一而要今之學者雜而偽一而要也故能為巳而其才所以全也雜而偽也故不能為巳而其才所以不全也嗟夫學而不能為已不能全其才尚何學之貴也哉葢人之為學所以致吾之知也一則其智不分而見者博也要則用力不匱而蓄者厚也雜則其智分而見者寡也偽則用力勞而蓄者鮮也見者博而蓄者厚此才之所以全也見者寡而蓄者鮮此才之所以不全也今夫日一而已故能光臨天下照耀萬物物不能欺星非不衆也的焉而自照之不暇矧能及於他乎哉何者日一而星雜也雖然後世之不能古也抑亦有由焉古之為學也道一而已矣後之為學也異端之多也故古之為學也易今之為學也難古之為學也幼而灑掃應對長而性與天道比年三十而必有立焉如此而已後世之為學也何多乎哉有科舉之學有文章之學有典故之學有經史之學有星數卜筮之學有地理之學其至者有性理之學有象數之學其誕者則有老莊之學浮屠之學申韓孫吳之學至於百家衆流又有不可勝數者其書萬億巻有終身不能徧觀者是以各以其所習者鳴或以徼名或以射利或以欺世誤天下或以干仕祿或以全身自樂是以智不能一而才不能全擾擾紛紛日趨于亂而卒不能及古也悲夫昔仲舒嘗言之武帝欲罷黜百家表章六經使道術歸于一而武帝不能用也以漢之懿仲舒之純賢武帝之雄材大畧而猶不能一道術使天下遂無全才學者無所歸不入於彼而必入於此後世其亦巳矣學學者學夫舜而已矣學焉而不至達不失為伊吕窮不失為顔孟所謂刻鵠不成猶類鶩也下此而何學焉噫後世功利之説行學顔孟者鮮矣矧於舜乎其以舜為無功利歟任禹而水土平任稷而烝民粒任契而五品遜去四凶而天下安則有大功大利及於萬世者矣其以舜大而難學歟舜人也我亦人也舜性也我亦性也舜心也我亦心也苟篤力行而有所至則亦不難矣其以舜非豪傑歟匹夫而為天子則亦豪傑矣何遽而不為哉夫舜之為舜而所以如是非直有赫赫大過人而人不可跂及者亦修其本然之徳積而化之也何難之有顧苐弗學耳彼世之人見小利而忘大利見小功而忘大功邇者迂之而鶩于逺細者忽之而謀于著悖仁義中正而直以取富貴聞堯舜之事莫不羣聚笑之而以為愚且誕自謂翹楚豪邁過之也及計之於終其所成與其所至乃不能晞伊吕顔孟之末光矧於舜乎故曰後世如有作者虞舜不可及已嗚呼功利之誤世也深矣自其説一行而三代之學遂廢聖人亦從而不作以及于今泯泯也葢天下之人有血氣之性故有利欲之心有利欲之心故有功名之志有利欲之心必争奪以充其心有功名之志必争奪以充其志莫有自反而以本然之分制之者此亂之所由生也是以秦漢而下詐醉戰酣灑人之血以為池積人之骸以為壘磨牙而争之力相軋而計相勝以千萬人之命易尺寸之功以千萬人之生易毫末之利籍籍紛紛魚腐肉胾竭天下倒四海不足以充利欲之心塞功名之志也又惡知天下之有舜哉經史古無經史之分孔子定六經而經之名始立未始有史之分也六經自有史耳故易即史之理也書史之辭也詩史之政也春秋史之斷也禮樂經緯於其間矣何有於異哉至馬遷父子為史記而經史始分矣其後遂有經學有史學學者始二矣經者萬世常行之典非聖人莫能作史即記人君言動之一書耳經惡可並雖然經史而既分矣聖人不作不可復合也苐以昔之經而律今之史可也以今之史而正于經可也若乃治經而不治史則知理而不知跡治史而不治經則知跡而不知理苟能一之則無害于分也故學經者不溺于訓詁不流于穿鑿不惑于議論不泥于高逺而知聖人之常道則善學者也訓詁之學始于漢而備于唐議論之學始于唐而備于宋然亦不能無少過焉而訓詁者或至于穿鑿議論者或至于高逺學者不可不辨也學史者不昧于邪正不謬于是非不失于予奪不眩于忠佞而知所以廢興之由不為矯詐欺不為權利誘不為私嗜蔽不以記問談説為心則善學者也古無史之完書三變而訖于今左氏始以傳春秋錯諸國而合之馬遷作史記離厯代而分之温公作通鑑復錯厯代而合之三變而史之法盡矣古不釋經亦三變而訖于今訓詁于漢疏釋于唐議論于宋三變而經之法盡矣後世無以加也但學之而不遺辨之而不誤要約而不繁得其指歸而不異而終之以力行而已矣嗚呼後世學經者復務于進取科名徇時之所尚破碎分裂經之法復變矣學史者務于博記注滋談辯釣聲譽以愛憎好尚為意混淆蕪偽而史之法復變矣其將變而無窮耶其亦變而止於是耶其由變而經史之道遂亡也邪九師興而易道微三傳作而春秋散昔人之議猶若是矧於今之變乎變而不巳其亦必亡矣厲志與時而奮者衆人也無時而奮者豪傑也士結髮立志挺身天地間稟天地之正性屬天地之正氣備五行之秀孕萬物之靈豈偶然也哉彼一草木一花實一鳥獸魚鼈得五行二氣之一偏而已猶且無無用者或以藉或以構或以茹以餌而皆有用矧於人乎故天下無無用之物亦無無用之人人之于世治亦有用亂亦有用天生斯人豈欲其治而安于享利亂而安于避禍治亦無用亂亦無用徒樂其生全其身而已乎必有用也巳必有用故亦必有為必有為故天下無不可為之世亦無不可為之時雖然嗜常而厭變安逸而惡勞徇苟且而偷生者衆人之性也與時而進退逐世而俯仰者衆人之情也知己之有用與己之有為者百千人一焉而已矣知己之有用與已之有為而必于用必于為者又萬億人一焉而已矣至治之不興天下之恒于亂也此故之以夫故士之聰明睿智而達乎此者必以天自處以生民為己任而不偷也是以禹稷當平世三過其門而不入伊尹五就湯五就桀一夫不獲若撻于市文王不遑康寧自朝至于日中昃不遑暇食周公仰而思之夜以繼日幸而得之坐以待旦孔子去魯奔衛不用于齊譖于楚畏于匡逼于宋餓于陳蔡之郊而窮于天下孟子不果於梁不遇于魯臣於齊諄諄於滕薛是數聖賢者豈不知安逸之為樂哉知己之有用與己之有為俛焉日以孳孳而不敢自棄而私焉耳或遇或不遇或窒或亨有所成無所成繫之天而已矣顔子所以安於陋巷而不動者有仲尼任天下之責而無與于己也嗚呼季世孰知有此哉公道不立而人人自私也山林之士往而不返槁其形灰其心以絶兹人自同于麋鹿安視天民之斃而莫之恤也市朝之士溺而不回狃于利徇于欲既得而患失自同于孤鬼安視天民之斃而莫之顧也文章之士華而不實工麗縟衒辭令以沽名而賈利自同于絺繡安視天民之斃而莫之濟也由是而言道不喪天下不亂可得乎孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興今而天下既若此矣文王其有乎爾亦無有乎爾誦書學道之士將安坐而待之乎將亦有為乎必有其時而後有為乎時務堯舜邈矣而不可繼也三代曠矣而不可及也二漢寂矣而不可見也堂堂中夏幅員萬里吾民將安所之乎堯舜三代二漢之世亦吾民也今而天下亦吾民也吾民不變則道亦不變道既不變則天下亦不變何遽而不可繼不可及而不可見也哉抑亦無由焉爾乎亦有由焉爾乎生民之制至于堯舜古有不平有不備及此而平矣備矣有不至而有不盡及此而至矣盡矣此二聖者生民之極也故孔子曰堯舜垂衣裳而天下治葢取諸乾坤謂生民以來至于堯舜始並乾坤而為三也三代之君即堯舜之成功而行之以義不激擾不矯造生民樂生千有餘歲以及于秦秦不蹈道墮功而悖義堯舜三代之制始大壞使秦多厯年所肆其凶毒吾民不殱于斧鉞則愚瞽無知昧其天性無異于草木鳥獸而人之類滅矣天矜吾民二世而斃有漢氏興追蹤前世結絶理斷補漏塞罅雖王道未純而有三代之遺風文中子曰二帝三王不得而見舍兩漢將安之乎四百年天下無二志終之以禮樂三王之舉也故堯舜而下三代而巳矣三代而下二漢而巳矣後世不可及也二漢之亡天地無正氣天下無全才及于晉氏狙詐取而無君臣讒間行而無父子賊妒騁而夫婦廢骨肉逆而兄弟絶致夷狄兵争而漢之遺澤盡矣中國遂亡也故禮樂滅于秦而中國亡于晉已矣乎吾民遂不霑三代二漢之澤矣乎雖然天無必與惟善是與民無必從惟徳之從中國而既亡矣豈必中國之人而後善治哉聖人有云夷而進于中國則中國之苟有善者與之可也從之可也何有于中國于夷故苻秦三十年而天下稱治元魏數世而四海幾平晉能取吳而不能遂守隋能混一而不能再世以是知天之所與不在于地而在于人不在于人而在于道不在于道而在于必行力為之而巳矣嗚呼後世有三代二漢之地有三代二漢之民而不能為元魏苻秦之治者悲夫傳國璽論上世帝王所以立政傳信考文議禮則有端玉服章符節左契各為一代之法制别等衰辨上下列貴賤定尊卑以為名器而不以為傳故唐虞夏殷周之制代各不同其受命也莫不革故而易新其先代之寳世所共珍而不忍毁之者如大玉夷玉天球河圖璋判白弓繡質龜青純等或以為藏或以為分以為寳器而亦不以為傳故或在王朝或在侯國宗沈社僨則轉而之他爾而其所以為傳而守之而莫或敢以置者在夫道而己矣初自道傳而極極傳而天天傳而地地傳而人與萬物聖主受命為天地人物立主乃復以道為統而以為傳故堯傳之舜舜傳之禹禹傳之湯湯傳之文武本于天命根于皇極原于心性仁義謹于存養畏敬明于夫婦父子君臣上下察于綱紀禮樂文物政事是以為二帝三王而道高萬世生民之治古今莫及未聞有後世帝王所謂傳國璽者也及秦始皇并天下奮私智盡滅上世帝王之制自謂徳高三皇功過五帝乃兼皇帝之號而為皇帝璽綬以滅趙所得楚和氏璧制詔丞相斯篆其文刻為傳國其文謂受天之命既壽永昌於是除諡法謂已為始皇帝其餘以世為號傳之萬世乃二世而亡子嬰降而漢得之漢之佐命如有意於三代陋秦而從周以為是物既亡楚又亡趙復亡秦乃滅國所得與斬白虵劒並藏之武庫傳示無窮如夏后氏之璜封父之繁弱并為一代寳器取藍田渾璞刻為大漢受命之璽以示維新可也乃自比秦之子孫遂以為傳國璽如是重為神器偷國之盜莫不睥睨揶揄欲以為己有綰于周勃問于霍光而奪于王莽挈于王憲専于更始上于盆子復歸于光武至使肘後之石誤張豐于死東漢之亡刼于董卓獲于孫堅拘于袁術卒入曹丕之手魏傳之晉懷愍之難入于劉石復歸于金陵天下之人遂以為帝王之統不在于道而在于璽以璽之得失為天命之絶續或以之紀年或假之建號區區數寸之玉而為萬世亂階矣厥後晉傳之宋宋傳之齊梁陳陳傳之隋隋傳之唐而五季更相争奪以得者為正統遂入于宋靖康之亂為金所有由漢以來始有傳國璽十餘代千有餘年竟不能復二帝三王之治所謂天命心性仁義禮樂綱紀法度治世之具而皆不傳始則雜乎王霸終則盡為苟且其簒弑奪攘蹂躪血肉汚穢皇極者不可勝言嗚呼傳者而弗傳也弗傳者而傳其治亂相反也宜哉彼嘗有是而亡其國矣吾今得之其誠為吉祥也哉昔湯伐桀于三朡俘厥寳玉誼伯仲伯以為非而作典寳言帝王自有常寳不可以亡國之物為寳也當新莽奪璽之日元后罵曰若自以為金匱符命為新皇帝當自更作璽何用此亡國不祥璽為雖一時忿激之言最為得理者也孰謂後世帝王無是二臣一婦人之言哉不明堯舜禹湯文武之道竟寳吕政亡國之器襲訛踵陋莫以為非可為嘆惋也且其制名以為傳國謂以國傳之人與子孫也如堯傳之舜舜傳之禹可以謂之傳矣武王傳之成王成王傳之康王可以謂之傳矣凡不以禮授受者皆不可謂之傳征伐而得則謂之取簒弑而得則謂之奪攘竊而得則謂之盜仍謂其璽為傳國何哉或曰然則無璽可乎曰信以傳信既以為典矣可遂廢而不用乎一代受命自可為一代之璽更其文為一代之文國亡則藏之秦不傳漢漢不傳魏可也光武傳之明帝明帝傳之章帝至于建安禪代之際更為魏璽可也獨以秦璽為厯代傳國之璽不可也近世金亡而獲秦璽以為亡國不祥之物委而置之不以為寳一帝一王各為之寳不以為傳雖曰變古乃所以復古也故著論以推本云陵川集巻十九
