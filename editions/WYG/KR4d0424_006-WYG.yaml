body:
  text: 陵川集巻六元郝經撰古詩和陶和陶詩序􅆳載以來倡和尚矣然而魏晉迄唐和意而不和韻自宋迄今和韻而不和意皆一時朋儔相與酬答未有追和古人者也獨東坡先生遷謫嶺海盡和淵明詩既和其意復和其韻追和之作自此始余自庚申年使宋館留儀真至辛未十二年矣毎讀陶詩以自釋是歲因復和之得百餘首三百篇之後至漢蘓李始為古詩逮建安諸子辭氣相髙潘陸顔謝鼓吹格力復加藻澤而古意衰矣陶淵明當晉宋革命之際退歸田里浮沈杯酒而天資髙邁思致清逸任真委命與物無競故其詩跌宕於性情之表直與造物者遊超然屬韻莊周一篇野而不俗澹而不枯華而不飾放而不誕優游而不迫切委順而不怨懟忠厚豈弟直出屈宋之上庶幾顔氏子之樂曾㸃之適無意於詩而獨得古詩之正而古今莫及也顧予頑鈍鄙隘躑躅世網豈能追還髙風激揚清音亦出於無聊而為之去國幾年見似之者而喜况誦其詩讀其書寧無動於中乎前者唱喁而後者和訛風非有異也皆自然爾又不知其孰倡孰和也屬和既畢復書此於其端云停雲思歸也停雲蔽日翳翳弗雨伊余懷傷自詒伊阻展轉拘幽莫或念撫瞻望中原徙倚凝佇停雲悠悠蒸氛濛濛衝風入室汹彼大江崩心震魄慨嘆北窻孰因孰極惟道是從服仁佩義完節為榮之死靡它實余之情寤嘆弗寐攬衣宵征載思子卿千載如生無媒取妻匪斧伐柯樂禍深仇焉能為和生民無辜遘凶既多銷兵無期將奈之何時運安命也時運代遷既夕復朝我來幽都尼于江郊側佇風飈載翔雲霄天澤弗流原田槁苗熱中熬熬孰沃孰濯宻室隂隂孰眷孰矚仰視俯察無愧則足知命何憂事天乃樂在昔過魯風雩浴沂爰登岱宗曠然忘歸五夜觀日神光發輝乃今坐井高蹤曷追太行之巔先人舊廬貞松鬱林中堂巋如安得燕喜美酒滿壺否弗終傾壊運屬予榮木觀物也榮木青青英華若兹氣至而滋人亦如之變陽化隂物各有時無莫無適夫道一而翳翳榮木云云歸根多華早落幾何生存大冶通逵乾坤為門深固有方封植倍敦升聚退散載美載陋生基死涯信新屈舊大業弗藏萬有自富造物忘物於焉有疚脩身事天莫敢失墜造次九思局脊三畏學聖造聖希驥則驥純誠粹精遂入獨至贈長沙公族祖述東軒老人也經之六世祖受學於明道先生至曾叔大父東軒老人道益大傳之先大父思而有作世遠學傳道親族踈起宗大家罔不在初淵源益深歲月聿徂慨我寤嘆載思躊躇於昭東軒棣華新堂心授口説繡弓白璋習習和風冽冽清霜吾道有宗吾家有光一世師儒雲從志同洪河北南太行西東潴為湖湘流為淮江六經百氏包羅旁通邈予小子亦聞格言激揚餘波瞻仰故山宿草荒阡抱書澘然惠我後世伊余之先酬丁柴桑自警也孰使而行孰尼而止排難兩朝奔命千里終豈能必爰契厥始稽山濤江覬為一遊墮甑半途十年隠憂豈作咄咄祗賦休休來之坎坎天命悠悠答龎㕘軍始予年十六讀書於保塞鐵佛寺南堂不解衣帶坐徹明者五年感而思之為賦是詩也孤燈長明終夜誦書躋深凌髙中心自娛載汲載薪不遑寧居惟梗伊蓬託處聚廬以道為富以徳為􅈿勤以脩身孝以事親師心造聖不資於人静境神㑹伊顔孔隣窮年掲掲日夕孜孜力探自得何樂如之作為文章暢為歌詩聲滿天地無為無思渾沌復鑿太極再分警覺不寐怡然懽忻軼起逺蹈馭風騎雲萬動皆寂博我以文一席五載黙以道鳴弓旌下招遂成飄零逺奉信函使于吳京故業委地朔南失寧焰焰古佛依依北風深窻短檠時見夢中孰令一人乃異初終秪繄其逢載飭厥躬勸農閔農也兵亂以來四民失業農病為甚因讀淵明勸農之作感而賦此植天務本實惟農民力田效勤含淳守真代食惟賢勸恤相因耒耜之益始活斯人每每原田奕奕黍稷雨暘若時具來播植惟是穮蓘惟是稼穡倉庾惟盈斯人足食爰自兵興魚涸處陸汙萊菑畬澆散純穆浚肌刮骨䝟音軋貐音與塵逐婦役弗蠶夫征弗宿苛政蝟起紛更弗久饑腸曷充獨耕無耦既空杼軸孰事畎畝流亡異土隕涕博手食衆農寡安得不匱有年無種豐穫安冀盜賊羣起餒死並至曾是司牧曾是無愧井地荒空甿俗頑鄙逐末逞偽無復率履農為匪民犯繩越軌本既凋傷政何由美命子感子也余生三十有五年舉四子而三夭焉季曰阿壽生四年矣而余使宋十二年弗克撫育感而有作余家冀方遺風帝唐詩書是傳奕葉有光厥初受氏爰自殷商由漢迄今載僨載昌金源之亡屯盈禍周百口九族竟不首丘父獨抱子脱死横流敢望子孫復始公侯嶽嶽樹立自别猪龍治經立學生人之功鬼抉神搜天緘地封坦坦正道明明髙蹤瀹苗起宗暢根逹柯乃嗣乃續庭充府羅天不憗遺未阜而窳宛宛三穉遽委蟲沙曷敢尤天秪自咎徳阿壽始孩弗子去國川途阻脩變故揆忒教之誨之於焉可得不成乎終何誕乎始徒耀松楸漫驚閭里有子無子命數定止未能無情與物悲喜既已奪去摻衫上聲之弗及亦既生存寧必成立不孝之罪聖人所急大禹荒度亦憫呱泣物生不齊亦各有時天弗私爾勿勞爾思魚腹子滿孰繁若兹蜾蠃類我孰其使而林回棄壁厲衣求火不知其天秪解私我失惡乎否得惡乎可坼裂啄食屬離是假孤館四隣擾擾嬰孩一死一生朝去暮來胡肖不肖胡才不才敬恭脩身曷云悲哉歸鳥寓感也歸鳥翩翩集于深林飛雲遥遥反彼髙岑瞻望弗及實勞我心重門擊柝閟于幽隂歸鳥翩翩深林于飛飛雲遙遙髙岑是依嗟我征夫曷云還歸瞻彼北辰翰音弗遺翼翼歸鳥鷱翔徘徊曳曳飛雲巖谷是棲鼓瑟鼓琴云胡不諧孰為知音伊余孔懷翼翼歸鳥棲于故條曳曳飛雲鬱其髙標伊余南征輸平内交滔滔弗歸故山夢勞形贈影萬象生道區受形各有時運㑹迭往來寢揚成壞之妙合我初凝爾亦即在兹隠見隂陽中幻化無了期寤寐一死生寂然匪為思我勞為有此爾苦勿涕洏請看聲與嚮相隨復何疑大都本無有相贈徒費辭影答形静隂乃道影範圍無巧拙大車轉通逵轍迹豈能絶妍醜君固有隨君非慕悦日月相代明豈能與君别思君不如我君沒我不滅生死無加損得失豈内熱因物不遂物原原靡衰竭君終復隨我兹時見優劣神釋出入生死間妙物不自著物物弗為物超然變新故二子一醯雞羊負相􅇢附成壞不在已安用相告語元陽初化時静一是存處在在靡方所悠悠無定住陶老信逹者得失委命數全神乃遺形種秫脩釀具一醉樂有餘陶然忘毁譽醉夢曾弗辨町畦都削去既不將不迎亦何憂何懼能逃世上名豈有身後慮九日閒居憶九日登隗臺髙秋登隗臺悵然思樂生君臣灑落契千載稱榮名西風菊花期日照黄金明青山遶故國白雁遺燕聲佳時動幽懷晏景催短齡浩歌正激烈樽酒時自傾故鼎反磨室六雄競光榮督亢一寒蕪酒酣重傷情丈夫遇主知唾手成功名歸園田居六首憶登封盧溪幽居唐盧鴻故居在焉童穉遊鹿豕野逸便深山幽居逺世塵顥顥羲皇年盧溪鬱巖阿繚壁涵清淵徵君始真隠種玉開石田幽人競卜隣聯落﨑阻間竹木茅舍邊桑麻橘籬前三春牡丹雨十月梅花煙盧溪故居有徵君祠祠前牡丹甚盛背坐竹木間多古梅故云孤雲出遥岑頺日下層巔性與萬化寂身同天地閒一從入馽羈趨蹶寧復然區中戰羣倫兩馬復掉鞅樂哉山中人身世無妄想避世如避仇納履遂長往耕鉏足衣食生聚羅穉長含淳遂天真體胖心亦廣底事綺里季出山真鹵莽雨餘山色浄霜降木葉稀南澗拾梨栗帶月吟風歸青青路邊蘭細細侵裳衣飯飽晦亦足物我兩無違好山無俗人林泉有真娛種秫足自釀髙下開荒墟清溪侵古屋况有髙賢居緑竹掃山色竒木近千株隣舍幾父老話言皆純如相見即痛飲甕盎傾無餘酒酣藉月卧清興欲凌虚云誰知此樂此樂世間無攜酒招野人共飲清溪曲蔬䔩總狼藉一醉萬事足苔痕入窪樽林影上棊局月出盃更深不須更秉燭歸去静柴扉酣卧日已旭中天太少室青滿洛陽陌三十六芙蓉舍此將安適嵐光上晨曦秀色宜日夕攀躋景無窮養生地有隙不聞車馬喧豈憚耕鋤役奔騰三十年樂事都敗績面目祗自憎俗死竟何益問來使同前朝拾澗底松空翠冷潑目暮歸東籬下自種今秋菊清泉洗碎月襟裾有清馥髙卧幽夢長不覺黄粱熟遊斜川憶西郎江壖坐白頭自分如歸休十年不出户夢憶西郎遊看花當雷溪水合青山流泓澄潭洞豁容與浮輕鷗回抱道明莊魏道明也玉翅開林丘西郎十二峯如列鳥翅見水經依依避秦人桃源闢田疇遺我山中酒殷勤更獻酬花飛好鳥歌塵世有此不醉踏石上水灑然濯百憂何年結茅屋歸去便可求示周掾祖謝同前勞生役世物萬戚無一欣且拂冠上塵暫作山中人尋春洞林深賞晤元有因逺嶺絶水登鳴泉隔花聞幽趣方顧接轉側志劬勤醉歸語山家今年當卜隣便送買山錢結茅東澗濵諸人共遊周家墓柏下淵明柏下飲相與樂吹彈何異燔間乞安足以為懽總為付任適得酒即開顔自同墓中人未死心已殫怨詩楚調示龎主簿鄧治中萬化一大路去來皆茫然孰能不由行踵武億千年委順出脩阻煩憂尼﨑偏淵明苦避俗中歲歸田園門前桞生肘更不入市㕓自謂羲皇人翛然北窻眠日月自運㑹寒暑從代遷逹道久已化宛在伯玉前作詩本無怨髙興浮雲煙樽酒且逍遥銜盃稱世賢答龎參軍釋魏斌念母嗟嗟勿念思諄諄聴吾言孰不欲事親燕安樂鄉園王事有去留載讀陟岵篇大孝五十慕義止從古然白地内罟擭賦予有厄緣悠悠無了期鬱鬱安得宣精衛豈填海愚叟難移山天定自勝人還歸㑹有年五月五日作和載主簿重午書懐贈書狀官苟正甫壞運窘天步行人當厄窮兀坐數年華大火復當中盛陽正發育一氣方盈豐草木各暢茂郊園融凱風我獨少生意束臂待一終燒醁㸃昌葅强飲心尤冲江静重門深兵嚴四壁隆何日河陽縣濶步登平嵩正甫孟州人州治後有平嵩閣余賜田亦在是故云連雨獨飲新館久雨悠悠孰主張尼此真偶然早歲喜學道自致雲霄間意欲凌八表縹緲追飛仙折翼墮江國閉門悲漏天宛在厄㑹中不自我後先乾坤漬塗泥霑溼何時還異域歲月速轉首十二年形神與化馳欲辨復無言移居二首吾道即吾廬仁義是安宅苟能庇風雨便可度朝夕雞川十一遷歲有缾缶役僦屋復分庭處處置牀席往年始定居生聚絶勝昔哭墓遽南來昆親忽崩析城南初定遷髙架插書詩基構計久常中表塗塈之幽窻置棐几道妙儼若思訪問復安身作休日四時束帛賁門閭推挽忽在兹進退已不詳天命豈吾欺和劉柴桑釋宋琚念母骯髒宋仲儀倚楹獨躊躇念母望北雲悵然憶家居湯湯伊祁水想見先人廬為言我與子南來墮幽墟鄉園入𣺌茫草木荒菑畬母氏倚門望無為執勤劬生男不若女有子還如無王事靡私盬義别無親疎嶽嶽守一節乾乾斷百須道在母即存志當金石如酬劉柴桑長風動江色俛仰星一周蕭然步空庭葉落凄其秋復命不事操燕山一田疇我亦慕髙節終能同此不憂心重鬱陶安得駕言遊和郭主簿二首勉馬徳璘孔進周公待昧旦大禹惜寸隂聖學如弗及神道開靈襟嗟爾氣質成變化更張琴力奪造化幾炳烺異昔今尊徳始好問卓出衆所欽去就審且精取予酌與斟繫風捕幽景扣寂求至音講習説麗澤琢磨朋盍簮踐形當自得好高勿臨深誠身乃事親行義貴全節清心不滯物月江夜澄徹味腴須嚌深窮理必詣絶天人一理貫胸次總羅列苟能一徳全即為萬世傑二子久事余旦旦提耳訣慎勿自棄捐舍此無歲月於王撫軍坐送客秋夕遣懷以下並同雁啼霜江清人與卉木腓舍館極羈留感秋尤思歸包胥客咸陽孰為賦無衣美人期好合願言遂相違宛轉萬民命怵惕終夜悲坐起對孤影斜月流寒輝悽風合酸辛逌然嘆稽遲天道本好生伊何獨予遺與殷晉安别昔游翰墨場渇日志尤勤逺探羲農髙近詣周孔親屬天耿長焰豈惟照四隣尸坐正冠裳暮夜逹旦晨擬從太極初再使乾坤分經世啟帝運立徳開王春偶别燕山月忽落吳江雲悵然負初心計拙良有因妄動希時榮何如安賤貧撫膺秪自責安敢復尤人贈羊長史寥廓安得翔沮澤多羅虞蛩吟苦闗心雁足無來書憶昔少年場結佩遊通都北嶺既再登楚山亦常踰樽酒生風雲鞍馬走臺輿䲔轉復虎躍一世英豪俱投穽誰使然竒蹤日踟蹰户外皆告絶跬歩無所如幽明澹窻星夜氣深庭蕪心折萬緒繁遘閔思舊娛紙上認堯舜自笑幾何疎起來月中行滯鬱方一舒歲暮和張常侍渇中夜尤劇扣闗汲新泉快飲沃肺肝四顧無與言白髮照寒月素影亦何繁幽窻挽衣坐反責思尤愆胡不蹈東海胡不餓西山靦然食不義忍辱待生還露氣凄且清别恨相縈纒殷憂有時窮今夕是何年歲月肯我與精魄隨化遷嗟哉胡不晨天乎其偶然和胡西曹示顧賊曹月出蔓草寒江聲動清颸窻户漸槭槭凄其飄我衣孤鴻悲遥天寥落片影微蟋蟀不在堂苦傍傷根葵運數方厄窮氣序亦頺衰羇懷感尤深中宵涕重揮黄虞不可攀周道何委遲嘯歌和淵明慨嘆有餘悲悲從弟仲徳銀沙滿玉河界天清露零孤心正耿耿秋夜何㝠㝠念我當屯凶不如初無生乃同不周折遽向東南傾猘毒方弄兵好㑹其能成蕭蕭變齒髮冉冉頺年齡潮生夜江髙簷間動松聲心魄忽蕩揺攬衣步中庭幽蹤獨往來慘淡闗山情未信天為人更著影問形我本不欺人萬折氣益盈始作鎮軍參軍經曲阿青苔入室深蝸涎縈素書坐席凝隂塵形骸久塊如臀困磔株木㝠升躓天衢投膠止河濁自笑真迂疎羈魂重凌競枯腸漫縈紆一榻不復移轉首十年餘空期汗漫遊慨想山澤居兀兀几上肉喁喁釡中魚有物皆恣睢而我獨囚拘安得天地風吹上太行廬庚子歲五月中從都還阻風於規林二首逼窄片天月照我江濵居闇然六用絶孤影獨于于屋漏重反觀面壁復向隅幽明無二道得喪歸一塗康莊馭軒車豈能適江湖挟山以超海過計元自疎憂違付順適樂地儘有餘天運誰能逃忿懥將何如南北信命絶欲行將安之家人歌扊扅遊子無還期門前大江横潮來不違時日月相代遷我獨何在兹細和淵明詩載歌歸來辭知命不必憂樂天復何疑辛丑歲七月赴假還江陵夜行途中兹心乃活物探頤還搜㝠遂知天地幾洞見古今情樂禍多下石復故誰班荆嗟嗟何不辰瞢闇誤此生老樹棲驚烏江静秋月明顧影無匹儔徙倚恨不平空庭步數周肅肅成宵征河陽有賜田何日得歸耕自顧灑落姿而乃重纒縈當處不可出誤我祗世名癸卯歲始春懷古田舍二首禍隆殺戮運民命殱蹂踐赤手與天争跋㚄其能免更深不成眠反側懷念緬世路劇翻倒喜惡還病善擾擾人為多邈邈天道逺寒暑迭代遷潰亂胡不返自與鄉隣鬭嗟我識慮淺先君貽詩書繕性安賤貧每戒躁與速重朂敬以勤尤惡名太早不許交時人守道業惟舊充誠徳自新粟盡義不渝闔門亦懽欣伊顔遽學步鄒魯頻問津友愛撫弟昆仁賢是親隣宛若故山家陶唐有遺民乙巳歲三月為建威㕘軍使都經錢溪至日雪夜窻宻有聲庭阿遽深積誰知大江頭却似窮海昔鶡鳥喑不鳴羈鴻歛雲翮乾坤一模糊玉氣皓無隔嗟余雪國來十年一行役體髮久已變兹心獨難易真宰豈仇予運數㑹崩折途窮歲亦窮真標見松柏還舊居庭草客居久為家十載猶未歸蔓草上階除委碧生恨悲相看辨時節夢寐荒是非昔時車馬多薙去一無遺今來㫁行跡愛玩常相依榮瘁雨暘中凋腐寒暑推露緑感春芳霜黄怨秋衰藉步柔且佳闗心涕長揮戊申歲六月中遇火萱南風青鳯尾擁翳當庭軒金觜碧玉莛呀折如焚燔深叢駐長夏次第開後前北堂昔養母家人欣聚圓對花舞斑衣暫出轍遽還懽顔每為開太和回一天一從哭墓後去國十二年年年見新花永日相對閒忘憂却生憂所賴志義堅夕步拾落英丹蕤滿芳田感創復卧思蒼茫不成眠故叢誰翦移祗應滿西園已酉歲九月九日黄葵清標倚西風零亂七月交天宇始霽肅卉木方瘁凋停停展嬌黄獨爾風度髙金盌困側露緑莛嫩干霄翛然對仙花頓覺忘憂勞開樽坐疎影渇飲劇沃焦折來插愁鬢兀醉從陶陶日上復盛開更須醉明朝庚戍歲九月中於西田穫早稻芙蓉久客未還反殷憂徒多端對花復舉盃暫得心田安芙蓉如美人盛容耐闚觀愁紅漬粉深醉臉傷春還上日嬌暈滋依風翠綃寒含涕有深思欲言還羞難露重膏沐新低重淚闌干無情似傷情使我凋朱顔載歌更獻酬物我何相闗起來拂花舞不復為嗟嘆丙辰歲八月中於下潠田舍穫菊霜菊有正色堆積深庭隈綠蘂粲金屑清香動幽懷願言窮節士氣韻相與諧亦有玉華鳯豈無紫冠雞俗死委蔓草繞叢日百迴屈子餐落英至今辭賦哀淵明折滿把嘯傲東籬開余今手自種坐俟星火頺依風日吟哦天道孰違乖最憐抱露蛩寒夜同幽棲陵川集巻六
