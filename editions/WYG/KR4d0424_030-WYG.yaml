body:
  text: 陵川集巻三十元郝經撰序送常山劉道濟序歲癸夘秋八月道濟兄南歸經為之言曰道之不行也非謂佛老小人之相害也由君子之自不行耳道之不競也非止謂君子之不自行也由反倡佛老小人之為禍耳蟲生於木而蠧其木則木萎而蟲死焉有挫其本而能振其末者哉已為之已得之已不為之已何得哉苟君子能審其道而篤行之佛老小人雖盛也殆將何所至乎苟不能也不反倡之而為禍以竢天之定猶可也可倡之而為禍拂天理而絶吾道乎則彼將肆行而莫敢誰何也昔也自宓犧至於舜道傳而天天傳而人而人自道矣自湯至於文王人傳而天天傳而道而人亦道矣自周公至於孔子道傳而書書傳而人而人猶道矣孔氏而下人失其道孟軻猶能道其道天其天人其人書其書使人不入於楊墨而為非類矣後雖佛老更興異端並作揚王韓歐之徒衡而争之猶能扼其吭而斷其舌使人知有此道矣今之君子非不能争之又特倡之倡佛老而為禍虚無寂滅乃曰此可以致精微而保吾生也鼓小人而囘天衷蟊賊生靈為鬼而為蜮乃曰此可以致富貴而充吾欲也侮聖人非聖言繪句雕章謡東風而咏楊栁乃曰此可以大吾聲名而廣吾業也故其身愈張而心愈亡欲日彌而道日微此道之所以不行也於戱吾道也天道也地道也人道也夫如是將壞天地而絶人類歟誠欲壞天地而絶人類則吾徒何生也天既使吾徒生則道之將行也歟唐宋近體詩選序事有至大物有至多者萬言之文不足以盡其理詩四句何以畢之所謂至簡而至精粹者也故必平帖精當切至清新理不晦而語不滯庶幾其至矣五言難於七言四句難於八句何者言愈簡而義愈精也譬如觀山諸山掩映中有竒峯一二則諸山皆美矣若一二竒峯平地而立便有峭拔秀潤氣非樓石劒門少華則不能此絶句全篇詩人所尤重也今集唐宋諸賢絶句全篇之可為矜式者與夫傑辭麗句之可以警動精神者條例而次第之為訂愚發䝉之具雖末學亦窮理之一事也學者其無忽歲甲辰八月二十五日陵川郝經題再送常山劉道濟序中國之勢不振正大之道不明禮樂之治不興天地一元之氣湮淪茫昧杳然廓然者豈無所自而然乎必有以也世無昌掲之士故亦無明盛之功而庸鄙樸􅈪乘漏抵罅私小惠立小道衒規規之文信淺淺之議擅孑孑之學以愚吾民以誤天下以基禍亂而自謂經綸大手古莫我若舉世而不能辨比行而不能改此故之以也是以如是其危且亂久且逺而莫之或止矣噫其猶是而遂陷吾民為禽犢乎抑亦將遂崩陵而浸以勦絶乎其亦鬱之久悖之極亂之至將大有以昭晰也否之上九曰先否後喜剝之上九曰君子得輿小人剝廬盖為否極而必泰亂極而必治也今而危亂既極矣天亦將興明盛之功也欲興明盛之功則所謂庸鄙樸􅈪者必大殄也而儲靈孕秀必芬芬郁郁巍巍昻昻而降昌掲之士也必學崇髙廣大有用之學必恢宏逺博達有為之器必施聰明睿知神武不殺之材而使敝者振闇者明廢者興除百世之害富百世之用享百世之譽任百世之責奮乎百世之上俾百世之下必仰之如日星重之如山嶽矣豈堂堂天地幹制萬化欲興明盛之功而寂寥索莫乃無此人哉必有之矣其興於此時也余亦必得而見之矣由是則余輩之所以誦書學道修身立志者乃有所試也天期不愆屬運而㑹則結余髮斂余衽高山仰止景行行止其無空老矣天而不欲已亂也則之人也之功也與余輩之所學及余輩之所期者庸可冀乎其斃而已也必矣若道濟者其誼高學之正器之逺以大又非余輩之可企也所謂昌掲之士也其興明盛之功也必矣於其行序而勉之十有一月五日也送太原史子桓序霜風呼沙隂霾帨天拉苴而號枯昏曀曀驚虺虺道殣裂膚而羸卒墮指者相望也宜乎墐户攣處以充天地之閉塞贊𤣥㝠之化育史夫子胡為來哉其有驛傳之急而郵檄之遽歟則宜有貂貉之重狐纊之温而夫子累乎其單也其有貴俠之游校獵之樂而衝風冒寒而出也歟則宜夫腰金而戛轡鳴弦而挾矢而夫子氷髯局脊扶蹇而癯也其欲徒步千里扣閶闔而振長策乎其欲揺吻於諸侯之上奔厯於權勢之路締從連衡合鬭而弭兵乎其為龍斷之利而戰寒暑於道路乎其欲苟富貴務僥倖而以驕妻妾恣嗜欲乎是數者皆世人之所奔競知愚之所共趨雖外寒暑而必為者也夫子寧有於是乎夫子之操之志以父之故而越險阻犯霜雪跋涉山川餓體凍膚而不顧箝口槁腸而不恤窮天地之所覆載際日月之所照臨汲汲遑遑斃而後巳庶乎其一遇也嗚呼篤孝哉史夫子乎犯霜雪之志則亦古人寢氷之志也唯天福善應誠其亦必有遇也巳觀夫霜雪之塗冒寒而往來者或以勢或以利或以智出於一塗而志趣之異也如此則夫觀路人者不宜一以路人觀之也丁未冬太原史子桓索父不獲過保下適燕都書此以贈送漢上趙先生序窮先生者此行也達先生者亦此行也漢淮亡纍俘北首仵異俗而荏異聲茹腥衣毳而不獲安土敦化振書閶闔矢謨廊廟致君乎三五赫耀文明之光賁冒草木樹正大之業宏徽衍之號則此行也窮先生者也雖然窮乎此而達乎彼果窮也耶先生嘗蹈夫常矣而未蹈乎變也嘗行夫一國矣而未行乎天下也天其或者欲由常以達變由一國以達天下歟昔之所覩者江漢荆衡而己今也仰嵩高瞻太華涉大河之驚流視中原之雄浸太行恒碣脊横天下昔之所逰者荆吳閩越而已今也厯汴洛睨闗陜越晉衛觀華夏之故墟覩山川之形勢見唐虞三代建邦立極之制齊魯聖人禮義之風接恒岱之曠直激燕趙之雄勁昔之所學者富一身而巳今也傳正脈於異俗衍正學於異域指吾民心術之迂開吾民耳目之蔽削蕪漫斷邪枉破昏塞俾六經之義聖人之道煥如日星沛如河海巍如泰華充溢旁魄大放於北方如是則先生之道非窮也達也士居中守正執徳不回明通人物宻格鬼神而大參天地恒達而不窮素患難達於患難素夷狄達於夷狄時有時而窮事有時而窮理則達矣噫仲尼窮於行而達於聖孟軻窮於行而達於賢史遷窮於行而達於史杜甫窮於行而達於詩韓愈窮於行而達於文果窮也邪此行也人視先生以為大窮經則以為大達先生可縱軌揚轡沛胷中之浩浩騖通逵之坦坦勁行而無慮矣鄙辭滋蔓不足以為贐姑以為繞朝之鞭送鄉先生宋君還燕序觀君子之所養不于常于其變變于外而不變于内者養焉者也變于外而内亦變焉者無所養者也天命我以徳執之不回守之不易養之無害而巳矣我何加損焉又何榮落得喪之足變於其間哉故君子無變非無變也變在物而不在我也大浸稽天而我不溺熯火灰山而我不熱疾雷破柱而我不動彼則變矣奚事於我哉此君子之所以有所養而無所變也觀所養則觀所變而巳矣小有所得侈焉爾小有所失蹙焉爾區區於銖兩汲汲於毫末倀焉如俑者則其所養可知己鄉先生宋君經自垂髫識於保下而氣若是言若是行與文若是己而北歸紛拂而不救窘散而不支厄遷顛躓而不振殆一紀焉戊申秋復一拜于保下而氣若是言若是行與文若是不少變焉由此觀之先生之所養亦可知己於其還也而為之序以識先生之養與余觀變之所得云送王之才南遊序君子之動無苟焉爾矣動為一身則有一身之義也動為一家則有一家之義也動為天下則有天下之義也内焉而有所定外焉而有所止動而必中中而必可法於時人昭於來世而必無所苟焉如是可動矣故伊尹一動而成殷太公一動而興周子房一動而起漢孔明一動而王蜀不然則食蔬而衣敝處僻而居陋安時而守順存心而養性不動而可也彼躍馬揮鞭横金匝玉被貂厭毳不避燥濕寒暑弊弊焉跌蕩唐突於浩浩之塗者謂之為身動也則心溺而形枯奔蕩蹶趨不能固筋骸之束矣謂之為家動也則尊卑倒置疏戚逆處父子無以親夫婦無以别長幼無以序矣謂之為天下動也則治亂安危之道戡定寧一之理彼惡足以知之不過夫苟富貴後趨走奔競夫勢利之間耳是以目途中觀道左未嘗不為三嘆也友弟之才積精蘊志儲秀孕靈静而養之有日矣而未見夫動也諺有之三年不蜚蜚將衝天三年不鳴鳴將驚人今膏車秣馬將有所動也果為一身歟為一家歟而為天下歟必一夫此以正大之學著高明之業振起衰俗使天下知余後學之有人矣而不一夫趨走富貴奔競勢利也余方恬處静以自存吾子其着鞭前路不失其馳而後有忻慕者矣括囊圖説序人肖天地以生者也故有心中之天地有掌中之天地有書中之天地蓋天地之理在人心而其文在指掌其象其畫則在乎書是三者人之固有而所當知者也而俯仰之間舉世而漫不加省與草木共朽而不悟可乎哉夫知天之所以然則知日月星辰之所以然知地之所以然則知山河草木之所以然知其然不知其所以然又舉世之漫不加省與草木共朽而不悟者夫知其然者知其法也見其象也形而下者也知其所以然者知其理也見其心也形而上者也故邵子曰今之學者知厯法而不知厯理能布算者落下閎也能推步者甘公也二人者知其法而不知其理者也唯揚子雲知厯法又知厯理故自三代而下以理合數知所以然者揚子雲一人而已子雲而下以理制形知所以然張平子一人而已天之高星辰之逺宜乎無有能知者之人也而知之是根於人心之固有而所當知者也嗚呼仰而觀俯而察天地自若豈難知哉顧苐弗學爾少陵杜君叔通博綜問學精於厯數有太史公家傳之秘懼學者之以為難知而弗學也欲人之即法而知理也於是分裂天地運行日月森羅星辰鳩為一書曰天地括囊圖説使人開巻即悟灼然心見上章閹茂之冬與經㑹于保下命題其端經方憒憒罔無聞知俯仰之間漫不加省敢妄為滋蔓乎雖然契義之重有不克讓者故疣贅而書之十月一日既生魄陵川郝經題送柴梓材序歲庚戍冬十有二月柴君梓材來先余於王内翰座識其兄賢之而交未定也及梓材來氣爽而色潤容裕而禮下與之年年甚富與之語語甚和而節也乃嘆曰不有其中外其如是乎是必縉紳先生淵源之涵育賢父兄朝夕之訓誨不移於流俗而有守於中者也將告歸為之言曰今而天地自若也山川草木亦自若也何獨至于人而有變也哉人之性自若也其氣其形亦自若也何獨至於今而有變也哉學校之不興流俗之所移留而不反仆而不振潰亂而不救顛覆而不支疾日彌留無有為藥而起之者卒至於元氣死而人道喪也雖然苟不顧流俗挺然特立誦書以益其智寡欲以全其仁力行以振其勇明王興而道行矣則可以革弊俗去弊政苴漏補罅張皇仁義致君乎三五躋民于壽樂掞鴻譽于無窮建碩業于不朽明王不興而道不行也則耕于荒閒之野釣于寂寞之濱抱明月而長歌吸孤風而髙蹈亦可以養天倪而樂天命豈流俗之足移也孟子曰待文王而後興者凡民也若夫豪傑之士雖無文王猶興夫若是是無文王而興者也真豪傑之士也嗚呼彼徇流俗合汙世黄金横帶馳騖於天下者自以為豪傑也由是觀之果真豪傑也哉今昆仲既志於道卓然樹立終不為流俗所移則古之豪傑之士何逺之有於其行書以贈之送道士申正之序天地有剛大挺特之氣隨物而賦用宛轉旁薄豐湧曼羡囊括六合之外充塞六合之内明白輝光引而上也則為日星巍嶪峻極萃而下也則為山嶽溶而流則江河鬱而茂則草木翼焉飛雲蹄焉走陸則鳥獸也皆是氣之用也其在於人則精淑純備溥博淵深剛而不撓大而不局挺特而不流卓犖而不倚紐而不睽結而不離宜夫養之而不害振之而不挫擴而充之而不弊瀹而疏之而不滯以盡其用也而乃冒沒而使之不明委靡而使之不立狹其大而自小削其剛而自弱峩大冠襜大裾駢風雲偶月露執筆綴辭而巳未聞有以剛大之氣正大之學振末俗而障頺波者一有長材偉人出於其間則蝟起而疾視譁而攻之黙而穽之必使之顛踣壞亂而后巳悲夫剛大挺特之氣不能自用而卒自弊道之所以不明士氣之所以昧沒而不振也辛亥春鄉叔申君正之馳驛至自燕余見其羽衣雲集環列拱捧曄乎其光鬱乎其氣退而嘆曰盛矣哉是其所以主盟其道而大行於世歟能全其氣而用之者也衆一而氣集氣集而用大故離者可合而弱者可强是以犯霜雪厯夷險而不阻振聲名宏教化而不侈去琳宫度沙磧吟笑自若御使車奉王命恬然自得宜其光事三師卓然樹立而不私屹若扶持而不墜也嗚呼彼方自振如此吾徒自弊如此可若何正月六日陵川郝經序儒行序世之所謂儒者文章而已矣父師以之垂訓學者以之為務有司以之進退多士是以翕然相尚炳然相輝而儒之為儒不復古矣蓋文章者儒之末而徳行者儒之本也務其本而末自從有諸内則必形諸外韓之所謂根之茂者其實盛膏之沃者其光曄仁義之人其言藹如也則謂之儒者可工於文章而已矣乎文章工矣行如之何秦君道隆志乎古者也欲學之知所先務乃取儒行一篇并其傳注鋟木而版行之庶幾天下不獨以文章為儒以徳行者為儒也人之去浮華植本根革澆訛尚忠信雍雍皡皥復古之治其張本於兹乎歲辛亥夏五月甲戍陵川郝經序刪注刑統賦序宋真尚書徳秀云金國有天下典章法度文物聲名在元魏右經嘗以是為不刋之論蓋金有天下席遼宋之盛監於二代擁八州而征南海威既外振政亦内修立國安强徙都定鼎至大定間南北盟誓既定好聘往來甲兵不試四鄙不警天下晏然大禮盛典於是具舉泰和中律書始成凡在官者一以新法從事國無弊政亦無寃民粲粲一代之典與唐漢比隆詎元魏高齊之得厠其列也是時太原李祐之精専新律試吏者皆出其門臺省寺監藩邸郡國名卿能吏郁然炳然癸丑春其外孫劉君敬之出祐之刪注刑統賦一篇精約博綜首尾原委有宗有趣酌人情而歸之中不峭刻不慘激本之仁恕真蒞政之銓衡也熟之復之然後知真尚書之言尤信國家今地過于金而民物繁夥龍飛鳯舞殆四十年改正朔易服色修制度之事謙讓未遑雖然必欲致治創法立制其先務也昔漢高帝百戰之餘食未下噎而命蕭何造律令張蒼定章程韓信申軍法叔孫通制禮儀陸賈著新書史臣以為日不暇給而規模宏逺今有漢氏之地而加廣有漢氏之民而加多豈不為金源氏拓跋氏之治乎創法立制此其時矣發源張本必自是賦始敬之甚秀而文與余游者有年請題其端余謂之曰文中子居家不暫舍周禮門人問焉曰先師以王道極是也如有用我則執此以往通也宗周之介子敢忘其禮乎敬之其執此以往豈不為李氏之介孫乎年月日郝經序朱文公詩傳序古之為詩也誦歌絃舞斷章為賦而已矣傳其義者則口授傳注之學未有也秦焚詩書以愚黔首三代之學幾於墜沒漢興諸儒掇拾灰燼墾荒闢原續六經之絶緒於是傳注之學興焉秦焚詩書尤重故傳之者鮮書則僅有濟南伏生詩之所見所聞所傳聞者頗為加多有齊魯毛韓四家而巳而源逺末分師異學異更相矛盾如闗雎一篇齊魯韓氏以為康王政衰之詩毛氏則謂后妃之徳風之始蓋毛氏之學規模正大有三代儒者之風非三家所及也卒之三家之説不行毛詩之詁訓傳獨行於世惜其濶畧簡古不竟其説使後人得以紛更之也故滋蔓於鄭氏之箋雖則云勤而義猶未備總萃於孔氏之疏雖則云備而理猶未明嗚呼詩者聖人所以泰天下之書也其義大矣性情之正義理之萃巳發之中中節之和也文武周召之遺烈治亂之本原王政之大綱中聲之所止也天人相與之際物欲相錯之間欣應翕合純而無間先王以之審情偽在治忽事鬼神贊化育奠天位而全天徳者也觀民設教閑邪存誠聖之功也所過者化所存者神聖之用也正適於變變適於正易之象也美而稱誦刺而譏貶春秋之義也故詩之為義根於天道著於人心膏於肌膚藏於骨髓龎澤渥浸浹於萬世雖火於秦而在人心者未嘗火之也顧豈﨑嶇訓辭鳥獸蟲魚草木之名拘拘屑屑而得盡之哉而有司設規父師垂訓莫敢誰何以及于宋歐陽子始為圖説出二氏之區域蘓氏王氏父子繼踵馳説河南程氏横渠張氏西都邵氏逺探力窮而張皇之逮夫東萊吕伯恭父集諸家之説為讀詩記未成而卒時晦庵先生方收伊洛之横瀾折聖學而歸衷集傳注之大成乃為詩作傳近出已意逺規漢唐復風雅之正端刺美之本釐訓詁之弊定章句音韻之短長差舛辨大小序之重復而三百篇之微意思無邪一言煥乎白日之正中也其自序則自孔孟及宋諸公格言具載之毛鄭以下不論其㫖微矣是書行於江漢之間久矣而北方之學者未之聞也大行臺尚書田侯得善本命工板行以傳永久書走保下屬經為序經喜於文公之傳之行與學者之幸且嘉侯用心之仁故推本論著以冠諸端率義㑹序古者井天下之田制鄉飲之禮俾從居綦布守望相助患難相救疾病相扶持起揖讓於閭閻生友義於里巷使之睦婣任恤豈弟和侃鑠其倔强悖誕兇悍不馴之氣銷天下之争端而莫肯為亂後世先王之禮廢而人道解散無情義以維其心骨肉睽為仇讐肝膽濶為楚越於是戍卒役徒黔髠盜販敢為亂首厲階而天下被其禍嗚呼聖人制禮之義其於維世不亦深矣乎順天當燕趙之衝自昔號多豪傑兵亂以來三十餘年生聚教育將復治平之舊俊茂輩出往往露頭角以氣相許而合為君子之朋一日相率過余曰我輩十餘人欲以古井田鄉飲之義歲時羣聚凡吉凶賓嘉相侑而不相悖不尚華靡不為驕奢義則相勉而過則相告其有不如約者則㑹義而合攻是可行乎余應之曰是相率而為義者其誰曰不可乃名之曰率義㑹而為之叙其意又為之載其載書曰凡我同盟以義相合毋以利睽過則靣質母退後言險阻艱厄共為引手始終一心以崇大義各啟悃臆無或有慝有渝此盟明神殛之俾絀其禄無以逺到心庵先生隂符經集解序大庭軒轅降及叔世道書穰疊往往備言曲論如數山石如觀海波故大者至數十萬言小者亦不下數千言至於隂符獨三百餘言而已於是厯為究竟意然後知至言必簡聖人之意有所靳也夫道幾而巳矣非幾無以見也天地幾而已矣非幾無以用也故幾之所在不可周測通圓而神惟妙是用潛於動静之理發於翕闢之氣見於消長之象伏於存亡之形造起萬變樞泄運化使天地萬物由之而不窮而天下莫能知莫能窮遂為天下之至微隂符一書聖人所以發其幾攄其微示人知而藏之宻者也端緒則見引而不發天地萬物之幾在我沈沈黙黙如執左契如持權衡無往而不合無往而不中無往而不應無往而不時其體則静其用則無窮雖三百言而天下之理無不備故言道術者得之則可以窮神知化握道之要言治體者得之則可以致君堯舜隆平天下志士得之則可以籠罩宇宙揮斥風雲處士得之則可以藏舟于壑遯世無悶養生者得之則可以精神健羡騎氣御風數家得之則可以竒偶變化逆知來物兵家得之則可戡定禍亂從横無窮萃而合之則一言散而推之則萬變其支流餘裔各底於成有不可勝言者嗚呼禍莫大於發人之幾聖人立經陳極則發道之幾故其情深其文切其㫖秘以斥其辭約以要觸造物之忌訐造物之藴不敢備言曲論聖人之意其深矣乎是書之有傳注尚矣三代而下不啻數十百家各據其所見而各著其所傳莫有為貫而一之者丙辰冬余外叔司馬可道來以心庵先生集註三十巻見示天真皇人而下㑹義三十餘家末以已意為之結斷汪洋炳烺周悉備至上下數千載始為完書且命經叙其意先是常識先生於常山皇極道院而為之記今其可辭於是推本論著而書其端先生姓趙氏名素字才卿嘗被徵賜號虚白處士云丁巳元日陵川郝經序送張漢臣序丁巳夏四月不雨枯風吹塵赤野立塊穡人焦勞額地祈穀子張子奉其母以行既南轅陵川郝經告之曰之時也之士也行安用也擢禮闈之桂探驪龍之珠振書閶闔魁岸炳烺吾子之事也從臾義列紆餘籌策撼搖王公大人嶷嶷以樹立吾子之材也擴充王澤兼善致治旱火不光而雨天下吾子之志也是三者吾子之所固有而所素志也而乃問舍求田下元龍之樓而甘心許汜與夫初心不既背矣乎張子曰噫吾以子為知已而莫吾知也孔席不暖墨突不黔而懷土者小人之事也得其時則駕不得其時則龍虵行使止尼固非我之得専也紆朱紫步巖廊身名俱榮焜耀一世非吾所惡也負耒耜溷塵梗窮巷束臂蓬累而行非吾所欲也氣數使然固非我之得専也在我者盡窮達非我也在我者盡貴賤非我也可行矣雖無是行其無是行乎不行矣雖有是行其有是行乎故拔樹接淅微服絶糧聖人所不免矧其下乎經聞其言以為向者知張子之淺而見其面乃今知張子之深而見其心也若張子者可謂速於行而以理自適焉者也於是書其言以贊其行陵川集卷三十
