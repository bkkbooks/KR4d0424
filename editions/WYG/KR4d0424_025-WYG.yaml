body:
  text: 陵川集巻二十五元郝經撰記萬巻樓記萬巻樓順天賈侯藏書之所也曰萬巻殆不啻萬焉不啻萬而曰萬者舉成數也金源氏末天造草昧豪傑鬨起於是擁兵者萬焉建侯者萬焉甲者戈者騎者徒者各萬焉鳩民者保家者聚而為盗賊者又各萬焉積粟帛金具子女以為已有者斷阡陌占屋宅跨連州郡以為已業者又各萬焉侯則獨不然息民保境禮賢聚書勸學事師而巳於是取衆人之所棄以為已有河朔之書盡往歸之故侯之萬者獨書焉河南亡衆人之所取者如金帛子女復各萬侯之書又得萬焉淮南亡衆人之所取者如初亦復各萬侯之書又得萬焉故南北之書皆入侯府不啻數萬巻焉始貯于室室則盈貯于堂堂則溢乃作樓藏之樓既成盡以巻帙置其上而為之第别而為九六經則居上上尊經也傳注則居上中後傳也諸子則居上下經之餘也歴代史居中上亞六經也雜傳記居中中次史也諸儒史論居中下史之餘也先正文集及諸著述居下上經史之餘也百家衆流隂陽圖籍山經地志方伎術數則居下中皆書之支流餘裔也其法書名畫則居下下藝成而下也櫛比鱗次髙切星漢人之文與天文際私家之藏㡬踰祕監故賈侯之書甲天下方干戈壊亂經籍委地侯獨力為捆拾吾道頼以不亡雖孔氏之壁河間之府不是過也彼富貴者之樓管絃樽爼肴核几席登覽燕集之具充焉侯之樓則古聖今賢大經格言修身治世之典積焉時順天之治嘗最諸道推為鉅公偉人而又樂賢下士切切於收覽遺書為志故天下之人益以此賢侯侯既貯書于樓謂其将佐曰昔蔡中郎書籍畀之王粲而粲卒名世今吾之書若是不有所畀適足以為蠧魚之食不免墮檐之譏矣吾聞郝氏子經嗜書力學吾将畀之鞅掌之隙亦得竊聽焉時經寓居鐵佛寺之南堂坐徹明者五年矣以書幣邀致其府於樓之側築堂曰中和盡以樓之書見付使肆其觀覽侯則時令講解一編輙曰吾之書有歸矣吾不為書肆矣向吾之書貯於樓中今則貯子之腹中向者大聖人之道布于方䇿今則布諸子之心矣子其摛光掲耀俾吾之書用于世以濟斯民則子之腹乃萬世之府也不然則亦蠧魚之穴墮檐之樓爾子其勉之經再拜謝其不克負荷每為流涕感刻曰經舉家之盎缶不能購一經故每區區晨夜叩人之門藉書以為學今侯以數十年之勤數萬巻之多盡以見畀雖侯之盛意豈非天邪如怠忽自棄以多書而不能如無書之初心業不能勤而卒無有成則非負侯是負天也復何以立於世哉故書侯聚書起樓及畀經為學之義以為記以明侯之徳且以自警庻㡬終不負侯云樓成於丙申之秋經之處侯之門則癸卯之冬文成之日則甲辰之春也三月二十日門下士陵川郝經謹記趙簡子廟記滿城故𨽻易州金源氏以保州為燕都畿内節鎮升為順天軍故復為順天屬邑縣北有古城故縣也城之東闉獨髙其上有廟廟有像其下大聚落曰城東居民以廟為簡子廟亦不知簡子為何神歳時祈賽雩告雨澤昭靈響荅以古廟圮侈易而新之請某辨其故而掲神之名按易州古燕南之境也古保州趙之北境也當七國時趙為長城以限燕在易水之南今自遂城安肅亘出雄鄚之間長城猶呀侈緜絡而滿城在西山之阿長城之内則為趙地無疑而簡子則晉趙鞅也保州西北十里許曰亷梁有趙将亷頗廟去滿城三十里而近俱為趙臣廟于趙邊為有徵矣然而賢若文子雄若武靈王而不祀千六七百年獨簡子世祀于趙人何哉葢趙鞅首并邯鄲逐范中行氏遂成三晉則開國之主也故趙人特祀于邊以旌其功居民因之遂為世祀至宋有國趙之自出而宣祖則保州人其上世陵寝皆在州城之東其族緒則布于涿易之間及與契丹疆白溝而保州宿重兵楊延朗諸将控扼西山而滿城為襟喉且鷄距一畝二泉泛為溏濼以限突騎又為宋之重邊要害簡子之廟必崇為明祀載祀典矣故至于今而不廢也夫用物精多則䰟魄強積千年之誠敬于其故土則其神必靈宜乎呵禁一方沛澤而禦厲况其常為霸國之政以為諸侯盟主長吳伐齊誅君側之惡乎其世祀也宜哉居民父老請書之壁以告後之人使知神之為晉大夫趙簡子也故書年月日陵川郝經記醉經記譎誣詭幻邪辟醉乎異端而不自知者也快殘賊忍殺戮醉夫凶𡨕而不自知者也役趨走飾壬佞醉夫勢利而不自知者也汨聲色溺朝市醉乎物欲而不自知者也噫人知夫酒之醉人也又惡知其醉於此者哉葢義理之不明性之不率而淪於嗜慾有所不知也人以血氣而生豈無嗜慾特所嗜者之有差耳是以蔽于是而不知也欲知嗜慾之差免夫四者之患必先明義理以率性欲明義理以率性莫先乎經經也者聖人之所盡心醇乎義理而為言者也知義理之所醇嗜而醉之夫豈有差哉人受天地之中得至善之性其心之所同然者義理也苟蔽於物而惑於私則性之善者心之所同者皆亡也聖人先得人心之所同乃立教以修道布之方䇿使人人得以自新其哀我人也亦至矣則人可以自暴自棄乎必當明聖人之經以踐其跡以求其心由仁義中正之道極純粹至善之理則知吾性之盡焉者止夫是理是理之盡焉者止夫是經惡得而不嗜哉亦猶嗜酒者之得酒也是以寤夜而思之篤信而守之造次而行之卒以脱嗜慾之私造正大髙明之域見於用者則可致於民而格於天徵於色者則已晬於面而盎於背川魚雲鳥純純其天而浩浩其淵有不知其然而然者則又似夫嗜酒者之醉也雖然嗜酒而醉者愈醉而愈迷嗜經而醉者愈醉而愈明與其醉酒而迷曷若醉經而明也然醉酒而迷者猶愈夫醉嗜慾之差者也嗜酒而醉夕醉而旦則醒矣醉夫嗜慾之差者雖老死而不能止又将害天下與來世也嗚呼自伏犧而下道在聖人自孔子而下道在六經今之人既不得聖人而親炙之幸得遺經於千載之後力求而深索巳之本然之質至善之性猶懼其亡也又可陷於異端而恣於㓙𡨕溺於勢利而惑於物欲乎故取文中子心若醉六經之言作醉經記庻使自暴自棄者聞吾風聲收其放心全其良心亦有志乎堯舜其君民也乙巳秋八月記鄰野堂記野之處有二焉有窮於野而道於心者有野於名而市於心者何以言之討幽而山阻深而泉翦茨而嶠以林繚垣而阿與磐而笑傲焉偃息焉鬱焉嬉焉而飲食焉進而獲覆行而獲尼抱道懐材而不遇藴徳匵竒而肥遯者如是而可也是窮於野而道於心矣故詩曰潛雖伏矣亦孔之昭又曰生芻一束其人如玉無業以滋於身無徳以光于行無材以用于世而據名山挾大川擅髙腴之地鬼蜮其志而麋鹿其形徜徉磐薄以異於時以髙於天下以動於王公大人由是而言得非為野於名而市於心者乎安在其為野處也故傳曰素隠行怪後世有述焉吾弗為之矣余常以是自訟處野之道乙巳秋魯伯自燕來以孝純張君之書示余云近卜居于故宫基構一室迥絶塵閧糞甓而開途剗草而植卉雖在燕城實有野處之趣故名其室曰鄰野言非野而鄰於野也吾子其志之余嘉其既不在野亦不在市既得其道而又得其趣也故附自訟之説以為記又為歌曰堂乎堂乎古則朝而今則野是孰為之必有致之者有顒張君器則青雲籍荃而佩蘭詩秋而酒春彼人翕翕兮朝埃而暮塵此堂寂兮而與野鄰又胡為乎生麟而死麕冬十有一月陵川郝經記種徳園記伊人之生耨地耕天何種之多也而小焉者不能以之大惡焉者不能以之善偏汙弊窒者而不能以之備種乎此而遺乎彼種乎彼而遺乎此種焉者而不種不種焉者而種是以擾擾紛紛皆有所種而不知所以種也堂堂天地命吾民以懿徳含𢎞光大無所不在有公明純愛之仁有制宰施為之義有别嫌疑辨上下之禮有照耀昭晰之智實而守之之信如是之大而如是之善也固宜於闇而屋漏之中顯而廟堂之上紛拂焉而淪潰之日烜赫焉而權勢之時傾焉掲焉而顛沛流離之際雖一言一動一政一事皆灌溉封植而有以種之全天之所畀不芟刈藴崇忽而自暴也故或以之聖或以之賢或以之有國或以之有天下而昧者惑者則不知也方種卉木以取材種貨寶以取贏種黍稷以取食而不知有大者焉種掊克以取利種機穽以取獲種阿諛謟偽以取容姦宄回邪以取位甚焉者種嗜欲以喪身種驕滛以喪家種侈肆以喪國種崩析以喪天下而不知有善焉者俾固有之徳湮没茫昧漠乎𦵏于九泉泯焉而不間也噫小而惡者已甚矣或者又翹私智尚徳之名而無其實詭言飾行倖獲而僥利坐而堯都起而舜俞居之似忠信行之似亷潔惟人是悅而惟獲是務不能種之而反害焉其愈於小而惡者乎趙氏燕膴仕之家也汲古先生置園别第繚園而卉木發闢館而泉石列不務嬉游而不嗇宴樂有意乎推本之而種夫徳也故名之曰種徳将由名以致實張本乎是園必推而放之四海而凖而後已搢紳先生皆有詩文以誦之丁未夏敬君鼎臣自燕致命于僕以為記僕亦冀夫種徳之慶繁衍之盛集乎趙氏之門而有以徵之為天下倡使天下之人皆有以知夫種德之目故蔓衍而為是言夏至日陵川郝經謹記臨漪亭記鷄水控常山而東穴保而入激為流疏為渠潴為陂浸而為溪析而為塘䑓樓亭觀雄列傑峙者巋如也别流泝布由千户喬侯之第園而出出而東則亭亭則侯之别第也面水者三右池而左洄屋重而廡列鱗渌漪然牓曰臨漪茂樹葱鬱異卉芬蒨庚伏冠衣清風戞然迥不知暑澄瀾蕩漾簾户疏越魚泳而鳥翔城市囂囂而得三湘七澤之樂可謂勝地矣歳丁未六月朔侯之仲子徳玉者請余為記余曰火雲燎天山灰海沸而是亭之上觴豆濟濟李沉𤓰浮琴間而奕危曵絺麾麈隠語談笑粲然而四列也樂乎哉有敵日横槊被甲而趨者矣有負耒耜庤錢鎛揮汗而喘者矣翠波漪風緑隂鏁日蔗漿沉水玉榼金甖枕壓緗文侍兒發扇樂乎哉有負戴永途肩髙足裂蚊蚋嘬肌者矣有窮閻局脊槁腸而枯腹者矣如是而可樂哉葢樂乎此不忘乎彼樂乎身不忘乎人政成而訟理事治而日暇燕兄弟以篤親親交朋友以講道業親賢下士以崇徳譽已樂矣思吾民有未樂者已安矣思吾民有未安者其不負于此亭矣不然則其有負於此亭矣侯既没諸子堂堂皆有超卓之望特立之姿盛大之業将張本于是亭故不辭而為之記含元殿瓦硯記器有定名有定象而亦有定用鼐鼎不可以濟瀰舟楫不可以代烹矢欲傷而函欲完定故也雲漢先生至自晉篋古硯以視形圓而理宻氣阜而色瑩黝而光鬱而揚金聲而玉徳雲腴凝如月魄黯如星芒突如露泣濡如非端非歙含元之廢瓦也廢瓦而為硯夫豈定哉瓦之為名則定名也偃而枵窪而隆則定象也鱗夏屋甃凌雨兜風胄露烜日溶月庇覆其人則定用也棟折榱崩物化人去墁坼而壊與朽穢汙冗俱則定理也而友文章朋典籍役𤣥頴巍乎几案間豈陶氏之所期與居人之所望哉蓋質堅而工樸雖廢而不廢其用有不可量者金錫之固其理熯火之煉其精日月之益其堅雨露之養其潤愈逺而愈固如隂鑑之液如玉肥之秘泓湛真緻而造夫神焉昔為之瓦今為之硯昔暴露而今藉襲之昔塵埋而礫並今麟獲而鳯見則似夫器化燼南山之松瘸孤竹之管盡天下之變而終身墨墨焉則又似夫尚𤣥也将淋漓元氣含𢎞四海寓先生之天趣亘千古而不滅豈瓦之為用而已哉苟麤弊苦窳缺裂浸漏而反害于室瓦之為用而不足其能用於後乎嗚呼器形而下者一定而必壊質堅而工樸則猶若是矧人之官天地府萬物一受其成而無壊哉苟堅其質全其樸如金錫之錬而精如日月之並行而不息也不折于逆蹂于亂歴夷險迭患難而不挫處富貴享榮映而不侈其得志其反古又非瓦之為硯區區於文字之間而巳也如殘其質散其樸飾壬佞而衒巧偽以徇于時以毒于世又豈瓦之得比哉姑書之以志夫觀硯之所激云丁未冬十月陵川郝經謹記庸齋記昔者聖人之言道也曰中而已兼體用貫本末一理氣而為言也後世聖人之言道也而益之以庸庸也者平常之用也豈中之未盡而復益之以庸乎不然也後世聖人之意謂天下無無用之道亦無非常之用蓋道以用而見用以常而久所以窮天地亘萬世翕闢而不尼盪錯而不窮化化生生而不已非虛怪惚恍誕異之所能也故觀覆載之常而不輟也則知天地之用與天地之道矣觀飛走動植之不易屈信消長之不忒夀焉而恤榮焉而悴而各得其常也則知萬物之用與萬物之道矣觀父子之親君臣之義夫婦之别長㓜之序立身行已之方處物治人之道亦各有其常也則知人之用與人之道矣至於日月之照臨寒暑之往來晝夜之明晦水流而山峙風撓而雨潤亦各有其用而有其常也則亦各知其所以為道矣一物一道也故道外無物一道一用也則用外無道一日之常也亦千萬世之常也千萬世之常亦一日之常也故常外無用嗚呼兹其所以為道而庸之所以為平常之用後世聖人必益之於中也歟惟此義不明故有非常道之説有反經合道之説有異端之説道之所以不行也玉田楊君春卿庸名其齋可謂知所務矣其欲庸於心庸於言庸於行不然豈庸於名而已乎必不翹翹以嗜異不囁囁以徇俗不倀倀以惑衆不為太髙不為太卑不務誕幻以遺實不索隠行怪以驚世不朝行而夕變俛順而仰違一謦咳亦庸也一舉武亦庸也一怒一恚一喜一怖亦庸也如是則一於庸而可以參天地贊化育不負於此齋矣中庸之徳三代之末民巳鮮乆矧今喪亂百折之餘凋弊之俗狃於外利欲之誘驅於内喜怒變於須臾而愛憎移於顧指非卓然特立獨行不倚之士其孰能與於此君今如是其有所望矣戊申春三月十五日陵川郝經記皇極道院記具乎形器之間者莫大乎天地莫衆乎萬物莫靈乎人渾淪龎錯並行而不悖豈偶然也各有其極為之主而制之者如户之有樞如衣之有紐如符節之有左契如薪槱之有要開闔變化根柢徧布無不在焉夫運日月而不息播四時而不忒生長收藏而不墜主而制之者天極也載泰華振河海殖庶類登百榖主而制之者地極也𦕈天地為一物貫萬物為一理面目恍惚之象脗合支離之數主而制之者太極也輔相太極之體裁成太極之用奉天極而不違因地極而不逆五行五事俾之敘八政五紀俾之修敷五福而去六極置吾民于逸樂躋吾民於仁夀洋洋乎發育萬物主而制之者皇極也故天地萬物非太極不立太極非皇極不行由道以入形器則太極為至由形器以復道則皇極為至焉生人之初皇極建而格之天再格之地又再格而得伏犧八卦以之畫又再格而得禹九疇以之敘殷周之際又再格而易洪範之書成是以萬世之極立而不朽也其法在乎書其理則根於人心之固有至于今而不少變也顧建而用之者何如耳趙君才卿以隠徳見徵以隆儒興學進言以事親奉身求退朝廷推重賜號虚白處士名所居曰皇極道院嗚呼皇極之不建也久矣天地失其位萬物失其所生人之被害也甚矣今以是而名其居其必有其實乎必将推心之極以為身之極推身之極以為居之極推居于鄉推鄉于國推國于天下使天地得其位萬物得其所皇極之道建于世如是而後巳國家之無黨無偏王道平平兆端於兹乎庚戌秋請余為記處士之事業築院之始末皇極之藴奥有遺山之銘在故不書姑贅數語為之推本以為天下建極者之倡云八月日陵川郝經記休復亭記孟子謂人皆可以為堯舜其言斬絶髙壮似大而誇其意則懇切哀矜甚易而明也夫人之性無不善而萬物之理無不備並天地而為三貫太極而為一初無聖人賢人下愚之間也唯其氣禀之差嗜欲之誘或存或放或昧或復等而下之則有焉爾故性焉安焉不思不勉不待復而自全者則聖修焉習焉反躬克巳而能復者則賢自暴自棄蕩焉忽焉不能復者則下愚也所以有堯舜有顔曾有桀跖天淵之懸隔陵谷之髙下邈乎其不相及也雖然苟能復之循序以進不為威惕不為利疚省察收斂自下愚而可以至於賢自賢而可以至於聖逺者可邇而下者可髙也唯其弗為是以卒為下愚而不能聖也夫道復而巳矣動極則静静極則動動静相根卒歸于静而道不窮焉理之復也一隂一陽為寒為暑寒暑相推無過不及卒歸于中而歳成焉氣之復也榮茂壮穉老瘁衰死骨肉隂于土魂氣登于天卒復于本萬物生生而變化無窮焉形之復也故其始也理入于氣氣入于形而其終也形復于氣氣復于理天地萬物如環之無端惟人亦然生而静性之本也動而常静性之復也其動之㡬心之體也動而不括心之復也與物相接情之用也應而不流情之復也故其始也性入于心心入于情而其終也情復于心心復于性宰制萬事收藏萬變亦如環之無端聖人謂生生之謂易而於復之一畫曰見天地之心其語顔氏子也則謂一日克已復禮天下歸仁易也心也合而言之復也其義廣矣大矣之人也可自暴自棄忽而不復而使天下被其不仁矣乎嘗觀夫易乾坤二卦自誠明謂之性聖之事也不假修為而自復者也復無妄二卦自明誠謂之教聖之學賢者之事也修為而後能復者也不能復性當事於教欲事於教必假修為修身復之本也身修則性復雖不至於聖亦可至於賢而不為下愚也雖不能超軼至於堯舜顔曾亦不至陷入於桀跖也是至易而至明也世莫有為之舉而行之者當復而不復可以為堯舜而不為悲夫賈君仲明先正左丞襄獻公之孫也今參行䑓幕以仁存心介然有守聲聞四馳藹如也癸丑春作亭于新居乃取復之六二休復名亭将於退食之暇思所以復者休復者復之休美者也欲盡復之休美夫豈易矣乎必好善而惡惡如惡惡臭如好好色誠而不妄則惡去而善復矣以仁易暴煦枯為榮以天地生物為心以坤藏震生為法誠而不妄則殺去而仁行矣遏人欲之私存天理之公剷窒塞而造於髙明廓疏通而無使闇蔽誠而不妄則可弭亂而致治矣親君子逺小人則小往大來斥柔佞信鯁直則嘉猷日至剛不屈于物自强而不息則巳可克而禮可復矣今既名之正特立獨行用力之秋也一日休復之功成充實光輝仰視俯察無所愧怍不負於此亭矣經雖愚尚能為君賦之恒齋記道有常體亦有常用體常則久而不變用常則雖變而久是以振萬古而無弊也夫道常而巳矣天地萬物皆一受其常而不變髙者覆厚者載溶者流結者峙甲者拆而蕃鉤者達而茂爪利者搏齒壮者齧翼勁者飛足輕者躩有定理而有定氣有定形而有定用雖更相錯蹂而互為磨盪生榮死悴弱斃强食總總林林變動紛拂而各復其常常故久久故變而不變故天地雖崩震而未嘗崩震也日月雖虧食而未嘗虧食也山川雖騫湧而未嘗騫湧也草木鳥獸雖萎殈而未嘗萎殈也風雖振而不終朝雨雖凌而不終日雖有於變卒不能變雖失其常卒復於常愈變而愈不變愈異而愈常所以振萬古而無弊也之人也備常理以成性萃常氣以成形官天地府萬物可變而失常乎有父子之親雖變而不可廢有上下之分雖變而不可踰有夫婦之别雖變而不可紊有交際之信雖變而不可棄有守身之節雖變而不可失有處物之義與待物之敬雖變而不可悖顛沛造次之際分崩離析之時寵辱交亂之會正斯人用力之地也故浚井焚廪至於納大麓總百揆受堯之天下變而不變所以為舜囚夏䑓征葛伯至于戰鳴條而有天下變而不變所以為湯拘羑里勝崇侯至於三分天下有其二變而不變所以為文王被流言誅管蔡至於制禮作樂朝諸侯於明堂變而不變所以為周公去魯奔衛削迹于宋畏于匡餓於陳蔡至於誅卯墮都修經垂世變而不變所以為孔子彼雖大變而吾有常者存彼雖急遽横逆如決如驟蕩忽而至吾有久者存挺挺而不撓自強而不息所以振萬古而無弊也嗚呼叔世而下世道交喪孰知夫此哉任私而好異既不知夫常又不知夫變一慮未巳萬慮憤興一欲未厭衆欲蝟起喜怒變於須臾而愛憎移於顧指與接為構日以心鬬搶壤突蕩為鬼為蜮變詐百出詭譎萬状曾草木鳥獸之不若亂日益起天下日益病卒至於血肉訌潰而莫之止極也悲夫昔者聖人懼天下後世之如是也於是命雷風之象曰恒恒者常久之義也天下之變而不可測者莫如雷風也剛柔皆應相與而得常者亦莫如雷風也變而不測乃道之用應而得常乃道之體聖經具載體用備存道妙昭著天地鬼神隂布明列不可誣也何斯人之不恒如是之極也哉葢聖人没而天下無恒教異端起而天下無恒理王迹熄而天下無恒政風俗壊而天下無恒心井田廢而天下無恒産典籍滅而天下無恒法庠序毁而天下無恒學四民易而天下無恒業斯人之不恒如是之極也亦宜哉癸丑夏經入于燕激水王君良臣一見如故交軒豁開朗内外粹白自其總角已卓犖超軼登神童第再舉進士連與春官薦書方聳壑昂霄而汴已亡棲遲偃蹇静以觀化名其齋曰恒孔子曰善人吾不得而見之矣得見有恒者斯可矣當周之世已云如是矧其下乎今君掲以為名其欲使天下恒心恒徳復上世之治與道之常乎世人方務於彼而君乃務於此是可尚已於是蔓衍其説而為之記萬竹堂記長清杜氏世蓺竹子孫因材而篤焉踣者植栽者培槁者沃逺以益茂初金盛時有堂曰萬竹蔽冒庭廡冠于汶篁當世碩士詠歌之富殆與竹等城復于隍俱用蕪滅善甫先生其仍孫也河南亡走于故居淚堂而悲焉曰時不與道命不與志此君又可無嗣乎乃刋落塵蔓聴萬物之春一宅而寓於竹糞甓剷穢身自爬櫛揠穉抉根蘙青祝翠綰蟄元氣若保赤子蘖與志信萌與誠達鯨牙犢角隂磔潛露戢戢巋巋奮絶地絡掀掲鰲甲神毛鬼鬚唐突振迅茁不可遏春雷一擊驚風一吹而巳數百竿矣歳一再期而復其初又再期而榮軼其初矣乃構乃堂乃塈乃茨述先志也其風停雨霽乾坤清夷視其初植也色既蒼然而節則髙矣嶷嶷挺挺邁倫蓋世掃煙霞於八表之外棲飛鸞而食雛鳯有不與衆竹等者則其王父之起家浚源張本髙厥閈閎雖巳仙去遺烈猶在也其中植也蕭然森然枝葉疏布璆琳葱錯緑玉肥瑩劍㧞㦸列凛不可犯端慤真固不跛不撓而鏘然有聲斐然有文猗猗簀簀郁乎髙而沛乎下拱於前而控於後翕焉相扶曄焉相輝則其先子之賁宗承家立庭垂訓指視此君而勿令翦拜者猶在也昔也枯荄腐䟦破節蠧葉没于棘荆慘無生意蛇腹馬耳削裂殘缺淚之而弗斑倚之而弗䕃也今也煙梢彗雲露葉滴月如𤣥如仍比次相望薈乎林而黝乎藂也則先生中興此君復萬竹之竟土而益拓大之者在焉樂哉先生詩秋酒春太古一天也偃息其下静以觀化萬古一朝也不溺于世不滓于湼夷清惠和千古一符也夫達者必有所寓也我寓形于天地天地寓理于我我復寓心于物故康之鍛伯倫之酒竒章公之石今杜氏之竹委其天趣惟適而已迹雖不同千古一寓也嗚呼彼弊焉於世不能寓物及役于物汨聲色溺朝市飾壬佞分趨走脅肩謟笑以役為樂者其視此則寞乎聲而澹乎味天淵海山未必不以為迂而誚之也安得君家穆如清風埽是而為之廓清也哉歳甲寅春經客于杞而先生至自汴為滄浪之歌歌萬竹以見示故引而伸之為之記杜氏子孫後來繼今登斯堂視斯竹誦斯文其敬而植之勿替時中齋記王子惇甫既考室名之時中經之入燕而請曰室雖鄙而名之大君其辭而訓諸經曰之名也天之所以為天聖之所以為聖萬世之所以悠久萬物之所以生生而不已焉者在可謂大也而經也何敢言也雖然聞之師曰古之人几杖盤盂鼎鍾敦鬲無不銘以戒居室之於彛器不既大矣乎敢援銘戒與善禱之例申而為之辭夫天地一時也邃古一中也聖人繼天立極建極垂世亦無外於此焉者一二竒耦數之明乎此也動静消長理之明乎此也隂陽寒暑氣之明乎此也穉壮衰槁形之明乎此也死生存亡變之明乎此也唯得乎此所以造物者振古而無弊也之人也數理氣變無不具性情形體無不備天地萬物之美奄而有焉無甚異而不可行者無太逺而難行者惟其學問之不力窮理之不盡故智不足知有其時而弗見所以不能中也血氣勝而欲肆中無主而揺其天其仁不足以守雖見其時而物有以移之所以不能中也信道不篤而刓其剛始勇而終懦勇則或過而懦則不及執則固而遲則撓是以時不能應而中不能處天地之美不能具萬物交錯於前而莫適所定倀倀如偶人至其極則戕天地而禍萬物其流殃遺毒慘於後世有不可勝言者而實則甚易行也苟理明義精而智足以知天宇泰定而仁足以守制宰萬物而勇足以行事至而吾有以處物交而吾有以應可以進則進可以退則退可以久則久可以速則速可以語則語可以黙則黙輕重並立而中持衡取與相奪而中見義變動相雜而中有定大變大故而吾裕如也細節末故而吾肅如也始有意焉而終則忘焉無往而非時無處而非中也何難之有故堯之授舜曰允執厥中而初不言時孟軻述仲尼曰孔子聖之時者也而復不言中葢中則時矣而時則中矣隨時處中而道盡矣故子思子居其間合而言之曰君子而時中嗚呼上下數千載歴數聖賢互為發揮黙執左契立教之意其深矣乎今既掲而名之矣其必有以充之吾子其識焉乙卯春二月日陵川郝經記陵川集巻二十五
