body:
  text: 陵川集巻二十元郝經撰雜著内遊昔人謂漢太史遷之文所以竒所以深所以雄雅健絶超麗疏越者非區區於文字之間而巳也遷生龍門耕牧河山之陽南浮江淮上會稽探禹穴窺九嶷浮于沅湘北渉汶泗講業齊魯之都過梁楚西使巴蜀略邛笮昆明還于河洛能盡天下之大觀以助其氣然後吐而為辭筆而為書故爾欲學遷之文先學其遊可也余謂不然果如是則遷之為遷亦下矣勤於足跡之餘會於觀覽之末激其志而益其氣僅發於文辭而不能成事業則其遊也外而所得者小也其遊也外故其得也小其得也小故其失也大是以史記一書甚多疏略或有牴牾論大道則先黄老而後六經序游俠則退處士而進姦雄述貨殖則崇軌利而羞賤貧其於書法也則記繁而志寡項籍一夫也而述本紀與堯舜並陳涉役徒也作世家與孔子同其失豈淺淺哉故欲學遷之遊而求助於外者曷亦内遊乎身不離於衽席之上而遊於六合之外生乎千古之下而遊於千古之上豈區區於足跡之餘觀覽之末者所能也持心御氣明正精一遊於内而不滯於内應於外而不逐於外常止而行常動而靜常誠而不妄常和而不悖如止水衆止不能易如明鏡衆形不能逃如平衡之權輕重在我無偏無倚無汙無滯無撓無蕩每寓於物而遊焉於經也則河圖洛書剸劃太古掣天地之幾發天地之藴盡天地之變見鬼神之跡太極出形面目於世萬化萬象張皇其中而瀰茫洞豁﨑嶇充溢因吾之心見天地鬼神之心因吾之遊見天地鬼神之遊周誥商盤禹謨舜典諄􅘱忠致貫日月開金石都俞吁咈咢咢灝灝唐虞三代之治懓然而見風雅變正諷賛刺美洋洋乎中聲鼓動至化元經筆削蹂邪直正齊桓晉文霸心方侈而束之以道縛之以義亂臣賊子禁其欲而不敢肆藩垣屏翰旣周流而歴覽之乃升正大之堂入髙明之域堯舜禹湯文武周孔拱宓犧而坐臯䕫伊呂亞風牧而侍孟軻氏辨乎其間而顔曾導焉荀揚奉焉熙熙乎育物之仁翕翕乎制物之義位尊卑辨上下治神人之禮和而不流之樂别嫌疑明是非照燿昭晰之智閑而存之之敬實而守之之信化而極之之聖死生之說神應之妙大發其閫而詭言詖行放闢斥除聖路廓清而天宇泰定至矣哉君君臣臣父父子子夫夫婦婦兄兄弟弟何盛爾也而後易志賾精而遊乎史廢興之迹邪正之由大君大臣之所以盛小惠小道之所以蔽禮樂之所以興政刑之所以紊國勢之所以張國本之所以强姦佞驁孽之所以逞禍亂崩析之所以致紀綱之所以明風俗之所以壞教化之所以行見其記註繁而正義鮮也思得仲尼者而筆削之見其典故廢而法制剝也思得周公者而振起之既遊矣既得矣而後洗心齊戒退藏於宻視當其可者時時而出之可以動則動可以止則止可以乆則乆可以速則速藴而為徳行行而為事業固不以文辭而已也如是則吾之卓爾之道浩然之氣嶡乎與天地一固不待於山川之助也彼嶞山喬嶽髙則髙矣於吾道何有長江大河盛則盛矣於吾氣何有故曰欲遊乎外者必遊乎内噫以史遷之才果未遊於内邪葢亦稱之者過矣敘書中統元年使宋宋人館留儀真三節人馬徳璘孔晉初不知書資穎異可教積六七年皆能通書傳作字便有楷法及被刼殺至新館惟二子事余甚謹乃論定學書筆法次第使知正筆之所自古之大匠遺跡在而不亡者古文黄帝命蒼頡制字模寫萬象又號科斗書三代秦漢以來鍾鼎款識皆是也欲知其所以然則有許愼說文耳篆周宣王時史籕變古文科斗為大篆今存者秪有石鼔文數十字至秦李斯刪大篆為小篆今之篆書是也李斯則有泰山及嶧山碑漢碑中或有之皆可學也唐以來李陽氷尤精絶今存者庶乎泉銘及新驛記耳金党懷英陽氷之後號稱獨步世多有之法度尤備所當學也𨽻秦程邈變古文大小篆漸生楷法以其佐𨽻謂之𨽻書猶有古篆法八分故又謂之八分書凡諸漢碑皆是也如蔡邕石經梁鵠鍾繇孔子廟受禪碑諸石刻唐以來蔡有鄰金党懷英皆當學也凡學書須學篆𨽻識其筆意然後為楷則字畫自髙古不凡矣楷東漢王次仲復變𨽻八分為楷書言皆書之楷則也以其法度謹嚴精盡故又謂之真書其小者謂之小楷魏晉以來凡為書皆先小楷故為書法之本能小楷則能真行草擘窠大字扁牓皆自是擴而充之耳魏鍾繇賀平襄樊表等晉王羲之黄庭經樂毅論東方朔畫賛王獻之洛神賦智永禪師千文歐陽詢温彦博姚思亷墓誌九成宮銘化度寺碑虞世南孔子廟碑張旭郎官石記顔真卿杜濟墓誌皆規矩大匠技極而意無窮者褚遂良薛稷徐浩柳公權李邕皆唐代名家凡墨蹟硬黄臨二王書及諸石刻皆當以為程式其次楊凝式千文蘇軾烏絲闌孝經黄庭堅南康郡太君状米芾金剛經雖少變楷亦各出竒也其擘窠大字王羲之瘞鶴銘顔真卿中興頌離堆記東方朔畫贊糺宗碑宋文貞公碑塔銘井樁碑蔡襄晝錦堂記蘇軾潛珍閣銘黄庭堅楊震傳趙秉文御史箴皆備極法度窮盡筆力扁牓大字至丈餘者金王無競燕都諸宮殿寺廟及汴都諸宮殿門牓古今第一所當學也行魏晉以來又變楷法自圓熟而趨簡易楷如立行如行故謂之行得真謂之真行帶草謂之行草晉以來諸公書帖王羲之蘭亭敘智永禪師千文顔真卿座位帖送劉太沖敘楊凝式千文蘇黄諸書帖皆是也草漢魏以來盡變真行張芝二王造微入妙號稱草書晉宋六朝諸書帖唐以來張旭僧懷素楊凝式宋以來蔡襄蘇軾黄庭堅米芾金源氏趙渢趙秉文皆稱草聖今見諸石刻者潭帖絳帖閣帖汝帖百一帖皆當學也以草為楷則又謂之章草或謂漢章帝制因以為名或謂漢之章奏用此魏晉以來諸書多有之獨索靖月儀帖為妙絶今有唐貞觀間硬黄臨本可學也故古文則簡婉存其太樸如面目太極初解繩約之結者篆𨽻則遏截勁利停穩妥帖中有飛動勢而意態不窮要之高古遒深而巳小楷則精緻蕭散秀逸而存風骨傾欹而見正大出竒示變於規矩凖繩之中太嚴則傷意太放則傷法工而不巧拙而不惡重而不滯輕而不浮筆死則癡筆緩則弱筆疾則淺筆側則偏心正則氣定氣定則腕活腕活則筆端筆端則墨注墨注則神凝神凝則象滋無意而皆意不法而皆法凡行草之理皆在其中而其鋒不可犯又在夫熟之而巳功夫到則自造微入妙窮神知化矣擘窠大字莊重雄崛峻拔秀麗沉著痛快極盡小楷之法而崇深停穩耳行則行雲流水而遂變楷之草草則縱意所如變態百出紆餘鉤鎻騰擲翻翥而萬象生焉心手相忘從容中道長江之波也太虚之雲也輪扁之手也運斤之風也九方臯之馬也㸃綴批抹莫非自然而不知所以然然後超凡入聖要之自楷與行又加熟焉則自至是矣非模寫鬬飣之所能也葢楷則孟子七篇草則莊周十萬言耳楷則子美之詩草則太白之詩也然既知法又貴知變也非變法而自為法則不能名家在人足迹之下矣鍾王變篆𨽻者也顔變鍾王用篆也蘇變顔柳用𨽻也故古今書學不能踰是四家鍾王則筆意俱盡顔則意盡筆不盡蘇則筆盡意不盡大抵皆藏鋒隠骨含蓄態度謂之屋漏雨錐畫沙皆此意也故古文則學先秦篆則學李斯𨽻則學鍾繇楷則鍾王顔蘇行與草則張芝索靖二王張旭耳是皆先君子指授生平臨寫以為師則者汝輩以吾言求之循序而進不躐等妄為庶幾終能有成熟而自得雖亦名家可也然讀書多造道深老練世故遺落塵累降去凡俗翛然物外下筆自髙人一等矣此又以道進技書法之原也其惟勉旃學難學之無難也尚矣人而有智而俾之學國家之所以作成之者厚師友之所以訓誨之者篤苐成之有小大覺之有先後耳夫何難哉故辟廱于京師庠序于國校于鄉而塾于家立公議于士夫振綱紀于君相廩祿給而亷恥厲束縛而涵育之鼔舞而􅀈激之作其氣而振其弊網羅剔抉匡直輔翼使卑高巨細各遂其所成各盡其所用則何學而不遂何材而不全哉是以朝稱多士而野無遺賢矣政治隆平而風俗純粹學之無難也審矣而謂之難何哉學之無難也前代之無難也學之難也今日之難也非唯其難也而又無學也曷難乎辟廱亡而鄉校毁矣公議廢而綱紀墜矣廩祿絶而亷恥缺矣所餘者天理人心之固有也而又誕幻以拂其性偏駮以惑其心勢利以脅其志嗜欲以汨其情學王道而霸術入矣守正理而異端奪矣務實徳而偽妄騁矣一身之微或誘于其前或驅于其後不入于彼而必陷于此雖有特立獨行不倚之士不待文王而興捐饑餒戰寒暑不由師傅不顧流俗不狥虚文卓乎其不撓確乎其不拔輕勢利斷嗜慾斥誕幻而横騖棄偏駮而高蹈欲存其所餘而保其固有者猶戛戛乎其難也而又指訐以為異謗讟以為非排之固而擠之力巧為之機而毒為之中莫有一煦溼濡沬為接綆引手者下石而溺灰者皆是也又孰為之作成孰為之訓誨哉必使其顛踣潰亂箝其口而不言桎其足而不動如是而後已則所存者幾何其亦必亡矣故為之難也一有學者而琢喪之如是故謂之無學也嗚呼牛山之木甞美矣而令濯濯也是豈山之性哉詩曰瞻彼阪田有菀其特天之扤我如不我克學者之謂矣作學難瑞麥頌嵗壬辰王師濟河河南亡釁孽餘猘狡狡蝟興兵鋒遺黎䖍劉殆盡而又壤地聨宋師出其間突蹂汴洛披轢亳宋至于徐揚馳亘上下千有餘里姦宄抵隙嘯跨兩境依險首鼠血人于牙二十餘年矣今上即位宵旰求瘼詔太弟都督諸軍謂将有事于宋必先事于河南河南既治本根既固藩牆不穴資糧鎧馬屝屨足而漢淮可圖也於是詔分陜東河南諸道有金故地置經畧司于汴命萬户史公行臺趙公及中貴莅焉公等既至乃議事典約法制鉏桀驁去蟊賊撫單弱出滯淹布屯戍均賦輸抉索利本搯揠弊萌進用老誠設施比次井井以進朞年報政帑有餘資庾有餘粟四鄙不警民狎于野風雨時順嵗乃大穰甲寅夏五月甸人進麥八穗一莖馳驛上聞洞洞屬屬歡聲四布夫黄龍白麟赤芝朱草鳥獸草木之異無異於時者猶以為休徵豈若食民之天有如是之盛乎桑無附枝麥有兩岐猶㷭美於漢炳耀千古矧如是之多乎哉經越在草莽不能瞻望清光拜首稱慶歌頌布衣職也乃作瑞麥頌以為四野謳歌之倡其辭曰河流湯湯金源故墟朔龍乾飛千麾萬旟蹈厲靡前飲河長驅河流不洋曾不馬濡汴覆蔡傾遂伐荆呉千里搶攘鞠為蓁蕪白骨撑拄枯血模糊宛宛赤子鋒鏑之餘裹創匿影巢狸窟狐殆二十年僨而不蘇皇帝踐阼丙丙當宁同仁一視廓清天步乃眷曰咨咨汝南方神州王畿可為寇塲乃命太弟俾長戎行曰史曰趙建爾旂常爾為朕行藥彼夷傷分陜建臺固吾圉疆汝修汝戈汝峙汝粻乃拜稽首天子之休不克負任天子之羞帝曰汝嘉汝違朕憂玉節煌煌奉命南下有澤其車有濯其馬鉏夷棘荆枝柱壞厦顛强躓嚚崩麕解瓦山通藪開漸出單寡髫童耉叟傴僂罷亞失喜驚呀悲集淚寫載申王度載宣王化民具萃止麌麌茂舍乃斧其桑乃樹其檟乃聚乃育乃室乃嫁務嗇勸分墾荒闢野惟是帖妥莫敢侈哆惟是信義莫敢狙詐清以益燕簡以益暇緩帶輕裘投壺歌雅元氣油油眷我中夏我庾既億我倉既盈雲霓濡來呻吟不聲山河改色乾坤夷清徳威惟畏徳明惟明皇澤灝灝汪洋濛溟惠風不鳴震雷不驚雨暘燠寒弗凌弗乗人和天和年穀屢登靈浸邃達瑞麥乃生岐岐嶷嶷八穗一莖甸人進只幕府嘉只何以致茲臣當歸美乃藉乃襲獻諸天子以益鴻休以曄信史經也作頌以告休功匪惟頌功惟以勸終文弊解事虚文而棄實用弊亦乆矣自為巳之學不明天下之人狃於習而啗於利是以背而馳之力衒而為之譟援筆為辭綴辭為書藉藉紛紛不過夫記誦辭章之末卒無用於世而謂之文人果何文耶俾佛老二氏蠧於其間文武之道墜于地而天下淪于非類也宜矣其不幸而不觀於大庭氏之先而不見夫文之質也不幸而不遊於孔氏之門而不見夫文之用也不幸而不窮夫六經之理而不見夫文之實也仰而觀俯而察天地之間衆形之刻鏤衆色之光絢衆聲之咿喔衆變之錯蹂爛乎其文而若此也不知孰為之而孰綴之乃規規以為工切切以為巧斐斐以為麗角勝而相尚為文而無用何哉三代之先聖君賢臣唯實是務至於誥誓勅戒之辭賡和之歌皆核於實而曄於華和順積中而英華發外故史臣賛曰聰明文思孔子稱之曰煥乎其有文章自其發見者而言不以文為本也天人之道以實為用有實則有文未有文而無其實者也易之文實理也書之文實辭也詩之文實情也春秋之文實政也禮文實法而樂文實音也故六經無虚文三代無文人夫惟無文人故所以為三代無虛文所以為六經後世莫能及也余嘗熟讀語孟二書意味無窮感化不巳師弟對問之間而文若是豈有意於文而後言邪聖賢之膏腴道徳之精華發而自然耳故所以為孔子所以為孟軻後世亦莫能及也孔氏之門游夏以文學稱未聞其執筆命題而作文也則所謂文學者亦異矣後世文士工於文而拙於實衒於辭章而忘於道義故班馬不免於刑范曄陸機謝靈運不免於誅陳叔寳楊廣不免於覆宗社而柳柳州不免於小人文何益耶苟有其實矣何患無文三代則亦已矣至於後世漢高帝奮起亡秦王有天下功並湯武未嘗為文也如大風之歌聲震海嶽而光犯日月諸葛孔明仗義興漢委身事蜀道合伊呂而他文未見也如出師之表與商周命訓相上下則有實者有文也必矣方今道喪時弊正氣湮塞生民墜溺志士振起之秋也可拘於虚文溺於淺淺哉宜嘬六經之實盡躬行之道精百代之典革虚文之弊斷作為之工存心養性磨厲以須天下之清其行也其達也必不與草木並朽而無聞矣龍首辨保之野有耕夫抱數節之骨以為龍首者駭於郊鄙郵傳於道路譟於里巷聲於州庭千里之民釋耒耜休蠶織輟業吐哺翹翹焉而觀者四合也耕夫遂益以為異神而珍之複為之襲而固為之秘雖家人莫得而見或者以百金易之拒而不酬也一日有司懼其惑衆召致而廷辨之乃鷙食之獐餘跨之隆者以為角髖音寛之凹者以為目脅下之缺夾脊而脩曲者以為頸穴而涸圜而寛者以為頂審為偽乃命揭之通逵以定民志而耕夫猶慟哭于下額地呼曰世無識龍者噫其真無識龍者邪其真非龍也邪聖人不作豢龍氏殁龍之不常于世乆矣何據而知之不介鬛不爪不角數節之骨而以為龍而執之以惑世至于慟哭而不悟何哉葢世之人非聰明睿智卓而不囘之器苟徇于偽而膠於私則真知正識蕩然一廢也故燕噲欲以遜子之漢哀欲以與董賢徳宗以盧杞為忠明皇以祿山為孝衆皆惡之而獨好之衆皆以為非而獨以為是人之於人猶若是矧於希世不常之龍乎龍之不常斷首而見亦不足以為異矧偽妄之枯骨乎嗟夫趙高指鹿為馬以亂秦耕夫以獐為龍欲何所為乎二履辨嵗丙辰王府以城開平之故遍告山川至于濟瀆瀆出二履以荅之陵川郝經為之辨曰濟瀆之淵應尚矣其秘物幽其納物悉其出物異瑰詭昭著在人耳目者甚衆雖巨細不倫而皆與誠合或奨大或戒諭莫不有義焉葢其神靈槖籥乎其間正真而一幹天地之藏為神藪理窟為化樞為變通之源無有逺近幽深遂知來物今二履之見豈無義乎夫履所以行也二帝三王之道在夫行而已矣天下之大萬民之衆行王道立王政始而終之而後可始於為而後可以無為故去四凶平水土而後垂衣裳伐暴亂救焚溺而後包干戈豈有不行不為而天下自治者乎夫行莫如禮禮所以履也故仲尼於天澤之象而深明之上天下澤上下定位所以為禮天行徤而履之以柔行而惠澤建于下下悦而應乎乾乃為履故剛中正者禮之理也辨上下者禮之分也和而正者禮之用也履虎尾而不咥人者有禮則危可以安也故别嫌疑辨猶豫明是非正剛紀立法制厚人倫美教化定民志屹爾而立而不易道爾而行而必至炳炳為一王法厝天下於泰山之安而四維之者舍是將安之乎故禮者國之幹也有國君人者必行行力為而已矣是以高皇帝食未下噎而命叔孫制禮儀章蒼定章程陸賈著新書韓信申軍法史臣以為規模宏逺光武投戈講藝息馬論道而紹開中興太宗親平禍亂用魏徵房杜化民以禮而文致太平是皆知所光務雖立國未乆而必於行以創業垂統而使子孫儀刑故漢祚四百而唐亦幾三百年基圖鞏固有以結民之心其祖宗所貽之者厚也國家光有天下以土則廣以兵則强以民則衆以力則大以開國則乆以世傳則逺服聲教之所不被臣漢唐之所未臣惜乎綱紀未盡立法制未盡定教化未盡行也今是履之出其亦勉其行歟夫行者天徳也王者體天治人則自强不息不息則乆乆則悠逺悠逺則博厚博厚則高明博厚配地高明配天悠乆無疆夫是之謂皇極嗚呼國家强阜天子神聖諸王賢明天與之人與之天下莫不與也則皇極之道将建于世不然何告之明而示之揭也詩曰如匪行邁謀是用不得於道又曰髙山仰止景行行止行之而不至焉者有矣未見不行而至者也行歟否歟坐視天民而莫之恤歟瘞鶴銘辨右焦山瘞鶴銘磨崖元本如此大小凡五段共一百十三字自左方書起而斜正不相屬云瘞鶴銘正書中大字古今推為第一葢自正書中出竒古意中有韻勝脱去規格超出畦町而沉著峻麗雄拔莊重有陵厲八極之氣雖殘闕斷蝕而筆意具在如乾坤破碎元氣自存雲霧斑駮日月無與争光者所謂一洗萬古凡馬空超凡入聖筆也其凖繩意匠後世唯顔魯公書中興頌宋文貞公碑為近之張嘉貞北嶽碑雖極形似特掇拾土苴耳嘗觀東坡書惠州潛珍閣銘得其氣山谷大字楊震傳得其骨楊凝式米元章推其變而得其竒者也則是書也書家之命脉筆勢之宗題也山谷謂瘞鶴銘乃大字之祖為不誣矣論者徃徃必其名氏苟其書工雖無名氏庸何傷如其不工雖有名氏江中斷石耳山谷先生識慮詣極與為右軍書謂其盛處不可名貌反覆題評稱道不巳而滄浪翁詩直以對黄庭經蓋必有所據依且潤州圖經以為羲之書廬山陳氏本又有逸少書字則真是之歸為逸少書無疑近因装背拈綴帖嵌顧盻囘復意見筆外每相領會甚多蘭亭筆法以書法論人則其人可知矣而東觀餘論西清詩話斷以為陶𢎞景書雖曲為左契而書家未嘗題品夫書出一手如印印泥雖妍醜不同各如其面而一受成形必不可掩相去萬里相後百年落紙入手知為某人況羲之𢎞景皆一代偉人其書跡存者固不待辨驪黄分牝牡自可得天機於滅没之間羲之書甚多皆可考據而𢎞景書殆未見也若以此銘為𢎞景書必得𢎞景他書會其筆意必如此銘然後可信巳東觀餘論又謂逸少以晉惠帝大安二年癸亥嵗生年五十九穆帝升平五年辛酉嵗卒成帝咸和九年甲午嵗方年三十二永和七年辛亥嵗年四十八始去會稽閒居不應年三十二已自稱貞逸以為必非右軍書是大不然其銘之年月作文之年月也非書之年月也鶴瘞文成之嵗則甲午嵗也書之之嵗焉知非永和之末升平之初乎不徵于書法而徵于嵗年殆刻舟求劔之説也矧于銘中書華陽貞逸撰不書其并書也其次即書上皇山樵則書之人也故陳氏本於上皇山樵下又有人逸少書四字雖𢎞景嘗號華陽隠居豈可妄為附會縱使隠居之號與銘中同則撰文之人也非書之之人也銘中又有仙家仙侣等語則瘞鶴作文者必道家者流而書之者右軍也不知勒石之嵗復在何年則瘞鶴作文書字必不能皆出一人之手共為一時之事又豈可以晉永和而為梁天監必皆出𢎞景之手乎不徵於銘而徵于號殆亦參母投杼之感也夫善書者而後能知書作文者而後能論文彼論者敢為斷然不移豈皆知隠居右軍者邪必有子房而後知漢高帝必有徐庶而後知諸葛孔明必有劉𢎞而後知陶士行山谷先生道高一世名冠當時而書法之善自成一家亦隠居逸少流也其於此銘與為右軍書而不及隠居則不易之論也聽盤為日姑宜置之中統元年持節使宋館留儀真伴使潘居之以焦山磨崖瘞鶴銘見貽而昏剝湮漬漫不可别既而提舉路鈴王順送焦山寺僧所寄一本及辨證一巻即此本也方之他本最為完具嚮在河朔時所見數本皆摹榻失真近嵗鄧州石刻傳布雖多而枯硬剸截絶無韻勝及見此本氣韻具足矯矯飛動乃知書家亦自有真耳故既論其書法又辨其名氏又賦詩以答諸伴使云文手植檜復萌文丁未春魯客過余言闕里祖庭手植檜復萌為之言曰木之植也樹藝者之事也聖人曷為為之植生民植道徳植教化聖人之事也木也曷為為之昔生民嘗厄道徳嘗廢而教化不施矣窮竒饕餮肆乎上䕫龍熊虎鬱乎下原圯而堙隰窒而墊獸横而奔天也有聖人曰舜禹者起而植之疏鬱為通散氛為清剔險為易汔魚為氓棟處而榖食教行而化靡未聞其植木也厥後道漓徳涼驁暴蠭作曰桀曰紂網藪為惡炙民為爐沉民為淵飈煽而石擠焉有聖人曰湯武者起而植之蘇其昏蹙藥其創夷丘崇其徳川湧其澤未聞其植木也昔人謂孔子之聖逺於堯舜今而周道絶生民厄而弗之植檜散木也而手植之庭何若是恢恢者置而屑屑為也豈不知閲禮之樹見拔於宋而手植之檜能存於魯耶蓋聖人之意有所在也明王不興巳不用而道不行也不得如舜禹湯武之親植之也天縱之聖亦不可泯泯而自棄也故雖不能植之于時庶植之于後不能植之一世庶植之萬世是以制大訓奠辭命示諄􅘱敷悃赤則植之書矣明風俗正雅樂述王政表廢興則植之詩矣發天機結聖統闡幽賾究通變則植之易矣明王道立王政治亂臣討賊子則植之春秋矣位尊卑辨上下節天地治神人則植之禮矣宣湮鬱諧政治賛隂陽協教化則植之樂矣植之之道已具而植之之意未見也乃檜于名而植于實以道徳為元氣以仁義為株跋以堯舜禹湯為植幹以文武周召為枝葉以行業崇藴之以恩澤濡漑之其樹本也堅確乎其不可拔其禀質也固鬱乎其不可摭其樛布也芘䕃天下其材構也棟宇六合薈蔚葱鬱而森參膏曄則其植也卓矣有大於舜禹湯武之親植之者也雖然聖不代興道亦屢喪孔子没正道微異端作有墨晏莊楊蠧食者矣有申韓蘇張剽議者矣孟軻氏辨而植之灌以仁義扶以神聖煦枯為滎蹂邪為正又有鞅斯屠剝者矣有呂政焚灼者矣高皇帝滅而植之潤以文景晞以武宣牙揭蘖振甫訖其全自是而下或仆或植根披兩漢枝别三國莽卓操懿互為蟊賊振落六朝勁霜赤立剜刻夷貊刲殘老釋梯生于唐韓愈氏立投荒萬里檜也再植嗚呼韓愈氏已矣後人孰能植之哉朽于塵而燼于兵矣梁木其壞余無所望也豈意其復萌哉不漑不封茁而自植沐雨蘇風穎出而激屹乎其庭魯邦周室葢本之大植之固道徳充而聖功溢也雖廢于人而必植於天矣噫雷霆鬱而必震卉木寒而必春日月食而必明聖道塞而必行今檜也自萌既為之兆矣必有其人植之也聖人之道必行矣經也小子敢不矻矻而進於學歟邀窮文館于儀真既歴三年淵獻孟陬又逢嵗元時始五鼔賔主禮畢坐而假寢窗户嘖嘖忽焉有物若嘯若泣風動幕開闖然而入橶手呀肩歔歈為言自子之生與子後先子坐我立子行我前子初為學日鑿混沌我窒其竅使汝好問子初飭身百務紛紜我乃拂亂使汝多聞汝初著述造物充斥懼或有傷則閣子筆子初論説天地決裂懼或泄漏則捫汝舌人方事近我推汝逺適越面燕迂塗宛轉人方事巧我推汝拙抱甕澆畦匍匐出穴人方事易我推汝難囘天止日測海移山人或相窘懼汝不忍我則抑遏使汝憤藴人或汝傲懼汝與校我益以徳使汝不報譊譊惡言􅣭蝟蜚蜂使汝多敵繕治于中咄咄怪事撲頭衝面使汝駭懼視所未見險阻備嘗猶以為未鉏汝客氣斷汝驕志勞汝筋骨亂汝心思搜抉無有極道之至利汝紛華固汝本根絶汝聲色富汝詩文增邑不能廓道之門七年徹明不解衣帯我膏汝燭夜半常在一嵗十徙不蔽風雨我張汝室莫或敢侮惟子是時與我相隨起居飲食跬步不離今子一旦賁于丘園安車束帛平地青雲一為執政再授宣撫便欲相疎憙樂讎苦虎符龍節附翼攀鱗建斾南來棄予于貧糟糠之妻猶不下堂貧賤之交猶不可忘矧予與子肝膽肺腸逺涉江淮故來訪汝爆竹書桃儘自呵禦煙昏霧慘依約門墻棘栅重圍鐵鎻銅簧左闚神荼右望鬱壘擊柝聲中森羅可畏始吾謂子得志堂堂今乃楚囚索莫荒涼始吾恨子今為子悲風馬雲旗薄言旋歸余乃惻然如夢如覺致辭相邀與敘契闊余非棄子子自棄余世不余知惟子知余生亦由子死亦由子余止爾尼余行爾使豈惟余哉天地亦然惟子五人翻黄倒𤣥太極鴻荒爾其為主六合八極爾其居處二氣三才爾其鼓舞徵為五色發為五聲萃為五味列為五行惟子五人始得而名惟爾某甲勾芒畢達為棟為梁儘其戕伐惟爾某丙赫赫炳炳化生為熟鑠鈍為穎惟爾某戊坤厚載道發生甄陶有物是造惟爾某庚物以西成鑪錘白鍊利用惟貞惟爾某壬潤物為霖積為淵泉益乆益深四時代謝萬物化育非子五人則誰自出物窮則變既變則通非子五人孰能不窮天有五賊見之蕃昌人有五性修之賢良隨爾不得豈敢遯藏仲尼嘗窮不窮其聖顔淵嘗窮不窮其行原思嘗窮不窮其性范丹嘗窮不窮其政一時之窮千載之幸是數聖賢可為龜鏡求爾不得敢不承命昔者子雲作賦逐汝竟自投閣漫為章句後來文公作文送汝延之上坐送而不去余學非揚余徳非韓固窮守道素行憂患安子不得其敢棄捐余非阮籍又非子路不為慟哭不為愠怒太山四維安於所遇家徒四壁常為晏然家無儋石其心愈堅雖屯之遘與蹇之連不㚄不跋與物變遷子嘗許我可以為賢頃者赴召為時而起失之不懼得之不喜三十年來赤子創痏鋒鏑之餘化為倀鬼戈甲相尋莫知其已兩國顛連實如倒懸解而休之兩君一天誰知姦宄又欲下石從渠捃致我心不忒不作盧昶食豆辱國不作苟純輸情為賊終合千古照耀簡䇿盡其在我窮非所恤子其以為失以為得邪於是五人閧然而應曰若然者吾其與子終其身而周旋者也當箝口縮舌復不敢為譏評之言倐焉驚悟爇香酌酒欲相勞苦顧盼莫有有聲無跡觸坐動牖起而觀天赤氣滿斗哀辭胡先生哀辭嵗癸夘秋八月二十七日安肅胡先生卒陵川郝經緝辭以寓哀曰噫天柱折一石何能補天缺國步蹶一士何能支杌隉况俗弊風頽山移海竭鳯麟梟獍之不分瑾瑜珷玞之不别俾尼父涕洏楚和泣血離婁視之而矇公輸造之而拙正道之巳絶孰可結邪而先生獨立斯世特秉真節不以含垢者為國君納汙者為川澤抵詖蹴跌信屈扭折挽斡天之斗而揚清流呼立石之風而巻妖孽熾爾而不滅卓爾而不屑沮之而不縮震之而不懾善必旌而惡必罰柔則吐而剛則齧世人奔濤而蕩波先生遡泗而鼓枻世人藉麴以餔糟先生冽氷而凛雪若治底雍熈堯基舜攝有饕餮死有窮竒裂則先生之道亦可白也赤何方人衆勝天屈子逐而賈生責文舉赤而比干厄是先生欲效尤也然於此世保此業亦可謂堅而不磨白而不湼者也僕嘗謂國猶有楨而民猶有哲自先生不祿亂益張邪益揭則瞻烏爰止於誰之屋邪嗚呼人雖云亡道或不滅有子而賢榖或未闋白楊摩天挺長風而掃秋月聽咿咿之聲猶有烈烈之色彼姦譎者誦吾辭寧不扼吭而斷舌渾源劉先生哀辭幷引先生諱祁字京叔號神川遯士南山公曽孫蓬門御史之子也其弟郁字文季嵗庚子經甫踰童獲拜先生于館舍而遽南軔闊越八九載已酉春先生徃來燕趙間始得奉杖屨格言義訓雖屢得聞而頑鈍椎魯之資桿棘而不入是以塵心槁思渴而未沃也庚戌春方負笈南邁以遂摳衣之問而凶訃掩至繼而其弟文季來以先生易簀時所付一書四十篇曰處言見示經再拜雪泣讀之其辭汪洋煥爛高壮廣厚約而不缺肆而不繁其理則詣乎極而窮乎性命於死生禍福之際尤為明析非世之所謂文章古所謂立言者也於是感愚志之不卒傷先生之不天憫吾道之不競恨憤惋激吐辭以哀之嗚唈扼吭不復條貫其辭曰濁河絶流大梁亡日入地底隂燐光百年秀孕隳大荒文源湮汨甚濫觴三五在北輝其芒姑為維持為主張砭􅀈沉痼開膏肓䕶籍僨踣扶顛殭碧雲雙鳯方翺翔忽弱一箇危乎姜當年振羽來朝陽竹花蹴落桐花香岐山山頭喚文王一鳴燕雀驚且狂總角獨步髙昂昂旁魄瓌竒古錦囊飈然聲價騰且驤飛䝉茸兮走陸梁挺特温潤直以方有虞圭璋夏琮璜波瀾老成肆汪洋洞庭萬頃澄秋霜上稽韓栁下蘓黄探道索古追羲皇一編處言含天章立意造語攀荀揚嗚呼天道其何量既與之徳不與昌既與之年不與長渾源之山空蒼蒼相臺臺下天荒涼元氣索莫真宰藏南山家世兩𣺌茫有弟有弟涕隕裳有識有淚如清漳奠桂酒兮陳椒漿魂兮來歸摧肝腸魂兮不來空所望嗚呼天道其何量陵川集巻二十
