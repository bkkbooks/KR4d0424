body:
  text: 陵川集巻九元郝經撰歌詩讀党承㫖集一代必有名世人瑰偉特逹為儒宗接續元氣大命脈主張吾道追軻雄金源文物纂遼宋國初尚有宣政風世宗大定三十年師干不試信命通藻飾皇度議事典培植教養王化隆勝殘去殺於乎仁繼以泰和尤昭融中間承㫖掌絲綸一變至道尤沈雄巋然度越追李唐誠盡簡質辭雍容斵雕剝爛故為新暢逹明粹理必窮漢火百煉金源金周制一用中華中混然更比坡仙純突兀又一文章公自此始為金國文崑崙發源大河東伊昔避亂洙泗間太平頂隠東䝉峯學書遍寫竹溪葉琢句逈倚徂徠松古文𨽻篆妙入神風雅韻勝超樊籠邈然欲作魯兩生放浪海上尋髙蹤中原有主始出仕白頭射策開天聰進退不苟尤老成蓬累偶爾為蛇龍先皇實錄似貞觀往往筆補造化功鎬王一詔説帝心懇惻義與大誥同告歸復擁仙巖節君臣道合全始終文孺子端拜道左請更指授祛矇聾為言但當多讀書不求於工應自工嗚呼後學安得知客氣趁俗塗青紅承㫖有集當重讀官様妥貼腴且豐秋風蕭諷黄金臺紫氣正遶燕山宫果如公言讀盡世間書必如真龍出九重一洗萬古凡馬空書蔡正甫集後哀哉蕭閒蔡丞相崔浩幸免門房誅文采風流今尚存筆力矯矯鍾遺孤中朝尚文屬安治儒雅柄用敦詩書揚厲偉蹟加潤色鋪張鴻休尊典謨共推小蔡燕許手金石瑰竒近世無森森凡例本六經貫穿百代恢規模追琢山嶽礱琬琰郊廟祠宇神鬼墟斷鰲立極走四夷銘功頌徳流八區煎膠續弦復一韓髙古勁欲磨歐蘓幾回細看聖安碑區别二代張吾儒車輪眼孔斗大膽突兀正論揺天樞滔滔更辯燕王墓證據古今攄慆誣瑣屑芥蔕一無遺有似爾雅編蟲魚不肯蹈襲抵自作建瓴一𣲖雄燕都昨從張公借書讀文府武庫渾不殊堆山疊岸亂策中煙煤一書纒網蛛為讀忽見文正宗歸來撫巻為嗟吁規矩凖繩有大匠自視所作何麤疎乃今政須日一通深探海底尋驪珠更書巻尾記年月龍集己酉八月初登龍興閣觀銅像轉空岌嶪金碧鱗平地突起三百年我來一登秋雨霽壯氣奕奕排霜天初疑榱桷欲飛動復恐棟宇將騰騫峩峩鰲頭昂出六合外地軸欲斷還相連鈎心詰屈牛斗度光景煥爛日月躔髙標樞極森户牖囚鎖造化蟠風煙上窮九霄下九泉中有十丈植立之金仙焜煌照曜手眼千提挈萬象歸斡旋把握心印持化權蕩揺幻海開福田吾徒問學一見亦瞻仰彼伊紛紛無所守宜乎奔走狂蹶顛天地萬物同一身手眼億兆元無邊各因私智自閼塞所以一目無所視一手還拘攣周旋慿欄肆遐矚太行滹水吾山川孤鴻𣺌𣺌入天末逺引幽思參茫然何當乘化恣所往日馭叱起先著鞭掃除塵翳快一濣眼界廓廓開坤乾趙邈齪伏虎圖行南山射虎曾得名壁上忽見令我驚何物敢爾來户庭屢叱不動仍生獰畫師前身是山靈胷中有虎無丹青老槲數筆平掃成殺氣慘淡猛氣横頭顱半妥蹲孤城怒尾倒插蟠霜旌鐵鬚張磔疑有聲赤吻瀝血猶帶腥抱石欲卧復欲騰爪入石角瞠不瞑寒電夾鏡騫兩晴四座凜凜隂風生威稜神采出典刑邈齪乃是金天精伊昔詩家杜少陵酷愛賦馬并賦鷹為憐神俊故屢稱我今賦虎亦有徵要得猛士建太平坐令四海皆澄清吁嗟擲筆還撫膺世間道路多棘荆倀鬼磨牙不可行跋展子䖍畫齊後主幸晉陽宫圖盲人歌殺斛律光無愁天子幸晉陽步揺髙翹翥鸞皇錦韀玉勒羅妃嬙馬後獵豹金琅璫最前海青側翅望龍旗參差不成行旄頭大纛懸天狼四方雜服異前王况乃更比文宣狂眼中不覺鄴城荒行樂未足游幸忙君不見宇文寢苦戈滿霜黄河不氷便著一葦航癡兒正看新㸃妝浪走更號無上皇狂童之狂真可傷展生貌此示國亡圖邊好著普六茹并寄江南陳後主門前便有韓擒虎山陽橙歌贈緱子玉太行之陽大河之曲鬱洞庭之秋色結江南之尤物西風萬里吹吳霜黄入新橙變寒綠河山孕秀渾不異風味矯矯清亦足緱君遺我秋滿座瘴雨蠻煙遶茅屋黄龍飛去失新卵壯士熟視不敢觸急呼西施南威一雙婢便擘輕金染纎玉崆峒酒海入盃盤快作鯨吞香滿腹齒頰戛戛秋風生浮動霜天穿月窟慿凌喚李白共酹劉伶骨從渠人間世擾擾還碌碌淋漓傾倒發天藏傾盡明珠三萬斛䑕毫筆行贈劉遠輕風吹衣硯滴乾胷中有思如湧泉此時正賴毛錐子束縛贈我森戈鋋遼東黄貂徤且圓得法自遠源也傳巫閭山色來幽燕鴨綠巨浸涵中邊貯雲停霧遵且堅雞距一米雄於椽宣城必須試誠懸山谷枉道能三錢雖云好手必利器心手器要三者全近聞清秋十萬騎長槍濶劍凌霜天如何明窻净几執此對聖賢撼揺風雨一萬字瑰劘日月三千篇元氣萬象歸斡旋贈楊伯通天機奪得探天幽七襄掌上如泉流飄然聲名半九州倒騎箕尾燕市遊河山壯觀在眉宇總萃萬化摩髙秋世人擾擾入揮斥公為布衣輕王侯即今鸞鳯與蛟虬垂翅枳棘蟠囂湫何時風雲各變化白日矯矯登鰲頭緯亢行歲臨鶉火斗插子穉陽欲復老隂死朱靈南極元龜首望舒北至明堂裏乾坤翻覆變已窮氣數朝元將有啟旄頭日沒正當中五緯將且躔蒼龍羣隂已伏衆星沒𤣥天變白生清風兩角在南大角北龍頭半妥朝上宫誰知總向亢中聚同舍參差不同度歲鎮熒惑共光明金水煌煌俱不怒東西絡繹似連珠色正芒寒共昭布往年長星掃金源前年孛入紫微垣欃槍妖客不時出天狗枉矢還驚傳今朝太平有此象不久再見成康年昔時曾聞入房駟兆啟金商六百祀同來東井漢元年四百年中稱帝制後來丁卯煥文章二百餘年方季世曾逢丙午當百六今日重逢又重六五星忽來㑹辰前不知誰禍誰為福綱紀梁棟兩攝提招揺𤣥弋動光輝馬祖直欲飲亢池星翁厯史休相欺正是君臣㑹合時丙午冬十有一月越十有五日辛未五星㑹于亢太陽躔斗十九度太隂經心五度木星躔亢二度八十三分十抄在辰前逆行六日行一度土星躔亢宿一度三分在辰前順疾十日半行一度金星躔亢一度六十四分四十六抄在辰前順疾一日行一度火星在亢東五度六十二分半在辰前順疾二日行一度水星躔亢三度三十二分三十抄在辰前順疾一日行一度以其五緯皆躔于亢故謂之緯亢云答李淑玉古稱燕趙多竒士乃今於君還見之襟懷落落絶㸃滓雲夢湛徹涵天池玉虹千丈青羅天赤驥萬里黄金羈文章翰墨特餘事宇量藴蓄乾坤竒昔年贈我以長句靡旌摩壘來致師吾方堅壁養吾鋭十年不戰空相持昨朝燕王古臺下慷慨懷古傾酒巵一鼔作氣森辭鋒再鼓建斾開襟期須臾合㳫閧談藪錦囊亂瀉明玉璣上稽唐虞下周孔推索究竟餘無遺嗚呼吾道甚綴旒絶無僅有真可悲何當扶義帥衆軍鼓吹六經張四維縱横闢去異端異突兀振起衰世衰廓清摧陷騖正路剗除荆棘驅狐狸景星㑹入奎壁府祅祲倒巻蚩尤旗吾民仁壽吾道行聞望萬古江河馳唐十臣像歌魏徵李白郭子儀渾瑊顔真卿韓愈白居易牛僧孺崔慎由司空圖鄭公山立面粟黄袖中隠隠露諫章致君堯舜肩禹湯太宗一鏡今不亡謫仙翩然來帝鄉淋漓龍巾倚御牀斗酒百篇錦繡腸光焰至今萬丈長汾陽沈雄異姓王中興功業冠有唐人臣始終壽且昌深山大澤龍蛇藏咸寧氣貌慘不揚殺氣凜凜横天狼回天冄造忠且强功名端不讓汾陽太師魯公日角方挺特不撓百鍊鋼端笏正朝貌堂堂盧杞藍面不敢望昌黎髙冠何昂昂泰山北斗元氣傍天衢揺曳雲錦裳斥去老佛擅文章樂天翛然世相忘江水蕩漾江花香不作房杜庸何傷歌詩直與日月光竒章重厚國棟梁亂來粗能立紀綱太平無象稱小康不計黨禍深膏肓崔相憂國眉兩龎區别流品何太忙天子閉目猶自防曹節侯覽不可量司空表聖宜賢良清癯不欲游巖廊詩外有味誰肯嘗寡鶴飛去髙翺翔樓子白蓮玉樓一尺千蘂攅綠雲髙擁白玉盤真出清波絶㸃塵水仙解種水牡丹秋渚亭亭倚妍素氷肌不受煙脂汙都將金粉抺蘭膏香盡西風一天露洛神漢女回清顧脈脈溶溶縱微步我將一葉卧為舟載向水晶宫裏住誰意無心復無子褪雪堆霜委波底空餘潔白漫清高古來薄命皆如此宣和内人圖牡丹横壓搔頭玉眼尾秋江翦寒綠金翠冠梳抹且肩正是宣和舊妝束腰肢一搦不勝衣當時宜瘦不宜肥三千想見無顔色偏有親題御製詩蔡攸恢復燕山府曾索君王不曾許蕭條萬里去中原偶見花枝淚如雨却將換米向三韓遂令流落在人間道君一顧曾傾國今人休作等閒看薛稷舞鶴圖丹砂入頂開雪翎雙膝半屈𤣥裳輕一天清露月滿庭浮煙弄影來玉京當時華表曾留形只見翻翥還無聲畫工姓薛不姓丁前身亦是胎禽精素練忽展江邊亭長風翛翛筆下生洪流蕩潏排重扄抖擻寒玉凌赤城我欲援琴鼓湘靈低昂曲折仍有情壁間至今不肯停灑落一見胷次清請君休讀瘞鶴銘為君更寫舞鶴行索靖月儀帖草書初工漢晉末超凡入聖張與索伯英冠軍名貫索數行一筆鈎鎖活索靖變體作章草草法如真楷為草出筆似𨽻簡且婉態度益多縈結少一畫大抵皆三變却把張芝墨帬練包藏飛動為妥貼功夫總向中邊見昨從中秘得月儀古意逺過王羲之世人草法宗㑹稽章草自此識者稀二十六幅兼閏餘玉盤亂走明月珠辭尤簡嚴勢深秀字字出竒世所無如印印泥筆不差短長肥瘦無損加鈎心鬭角方且停半妥逺山飛小雅古人下筆不輕易一世功夫成幾字由來絶藝屬髙人鹵莽焉能作能事當時瓘死岳亦亡一妙不可在洛陽秋風揮淚指銅駝此生不用尚書郎風度超然如靖􅀢灑落孤風與明月須知萬古氷雪姿就中自有蛟龍畫君看顛張醉素雨秃翁半盆墨酒澆心胷世人不識盡稱工乾坤模糊眼正黑豈知更有月儀帖跋党承㫖篆字太白琴讃右軍學書世界黑扶桑蠒盡西海竭竹谿學書無片紙寫遍千山萬山葉太白琴讃二尺餘丞相小篆承㫖書端勁妥貼肆雄竒展盡筆力世所無綠綺徽聲絶絃久嶧陽孤桐至今有知音賴得謫仙詞揮灑又逢天下手問説琴臺在魯山磨崖深刻亦何難青天二絶一萬古絶勝區區坐上看書黄華涿郡先主廟碑隂稱道孔明獨有杜少陵論著昭烈復見王黄華君臣一體始無愧蜀相祠望樓桑家昨因應詔過燕南青林一簇啼鳶鴉簫鼓寂寞村社散廊廡慘淡昏龍蛇西南一碑刻蒼玉每讀輙止驚咨嗟磊落一片恢復心始終於仁無少差當陽之言永安命三代聖王何以加仲謀雄畧秪僣偽阿瞞詭譎空姦邪論議到此真不欺文采絢縟森芳葩書法二王作真行得意韻勝如時花歌謡慷慨燕趙義士風但恨不能完漢軍敗崩三巴百匝細讀立復坐不覺午日傾簷牙徬徨欲去不忍去饑馬更繋枯荆楂東夷何以得此人日出之圖王氣韜朝霞滅遼服宋帝諸夏禮樂制度無疵瑕家世章廟布衣臣貴胄鼎族來幽遐春深徑渡鴨綠江太行山巔髙挂浮海槎風流儒雅冠當代碧雲玉樹峩烏紗漢魏以來無此作作詩為向諸生誇入燕行南風綠盡燕南草一桁青山翠如掃驪珠晝擘滄海門王氣夜塞居庸道魚龍萬里入都㑹澒洞合㳫何擾擾黄金臺邊布衣客拊髀激歎肝胆裂塵埃滿面人不識骯髒偃蹇虹蜺結九原喚起燕太子一樽快與澆明月英雄豈以成敗論千古志士推竒節荆卿雖云事不就氣壓咸陽與俱滅何如石晉割燕雲呼人作父為人臣偷生一時快一已遂使王氣南北分天王幾度作降虜禍亂衮衮開其源誰能倒挽析津水與洗當時晉人恥崑崙直上尋田疇漠漠丹霄跨箕尾跋魯公送劉太冲序帖魯公筆法皆正筆出竒獨有劉太冲初從真草入行草削去畦町尤清雄懸針數筆皆側鋒往往矯矯如飛龍輪囷權竒恣揮灑瑰偉乃見烈士風觀此好向書家道末有能真不能草荆公配享小像碑本天津月明聞杜鵑愁殺洛下無名公未幾南人果為相汴梁化作單于宫老泉初作辯姦論舉世盼瞠俱未信王衍盧杞合一人熙豐末年禍始釁小遷累讓謙萬端一知制誥不辭官臯䕫稷契髙自稱敢把官家輙面謾富彊豈是吾儒事王道何嘗利為利却將孔孟作申韓刻剝生靈壞元氣顛倒乾坤事事新規模偽莽與孤秦底事當時不便亡祖宗恩澤猶在人西窻更勸殺韓富所幸不從天且祐恵卿遽已發私書佞人不逺將誰咎獻可即日彈新參罪狀十事猶叵堪朝臣縮手疑太早後來君實亦為慙至今宗廟無片瓦學術終然殺天下燕山竟不得寸土𤓰步江寒飲戎馬當時三黨皆竒才共成國禍真可哀可能陳竇勝牛李未能朋亡皆禍胎仲尼日月萬古一顔孟大賢纔入室首惡要伏春秋誅更可巍峩聖人側倀鬼諛讐死不休更期不朽鑴頑石世間萬事難盡曉三韓分米買日厯定武蘭亭帖㑹稽蘭亭修禊草一世真行此尤好當時信手叙興感心手兩忘都壓倒法度備具都有神一篇秋水逍遥身不知孰為鍾太傅何處復有衛夫人有時姿媚似花朶却向莊嚴生婀娜蕭然自有林下風野逸行間亂塗抹字字不同數十之清流激湍黜黜竒管絃豈計絲與竹九方相馬誤黄驪遂使書家推第一昭陵玉匣藏真跡歐虞褚薛臨硬黄價重兼金與連璧温韜刼墓出人間縑墨生塵氷水寒中秘緘封貴人手翰林待詔時得看西蜀初傳刻棗板㸃畫傷硬亦蕭散後來定武刋翠琰山隂春風還在眼君謨坡谷始盛稱韻勝逺過換鵞經宋金以來三百年永和規模存典刑昨向燕都得善本重為摹勒憂墜損雲龕細鑿黄金臺永與諸人作繩凖當時無意不欲傳只今視昔似偶然君不見浙江變作黑水源越山筆冡髙摩天運斤斵輪熟乃精從横十萬方無言初從有意到無意始知前賢道為技試看魯公座位帖數幅書藁為二絶望漢樓漸臺斗折新莽死天下還歸赤帝子漢民恰見漢官儀又值王郎與更始河北忠貞有耿純舉族徑欲隨官軍孤城頓爾音信絶誓死不肯為賊臣築臺望漢賊滿目蒼茫不見劉文叔饒陽一縷燎鬚煙正向蕪蔞食豆粥滹沱氷合赤幟來犇麕解瓦驅風雷漢家一氣從此迴域門不閉乾坤開誰知當時望漢臺即是畫像登雲臺沙丘行林胡遂出榆林塞滿國騎射衣冠改西游直入咸陽宫趙王使者秦王駭玉鞭擊斷過函谷夜飲叢臺翻酒海生前傳位稱主父一切都非三代故座中誰意有潘崇宫甲盡起商臣怒熊蹯不來事益急雀鷇雖探能幾日一生英氣頓消散胡服掩面空垂泣祖龍亦向沙丘死詐殺扶蘓書一紙武皇父子戰京師釁端也是開邊起古來好殺多子禍浮山堰壞臺城餓至今金陵罵侯景誰知亂本由臨賀君不見殷湯六百載周武八百年以殺止殺救民命用兵雖人元自天孝子慈孫相繼傳陵川集巻九
