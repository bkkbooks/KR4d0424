body:
  text: 陵川集卷二十九元郝經撰序甲子集序中統五年歲舍甲子秋七月有星孛於東方經時猶在宋之儀真館仰而嘆曰我生之初是星沒焉金源氏滅而為本朝今四十有二年矣星復出焉而越在他國其能久於此乎遂束載警備於行槖中得弟彛庸軍史趙文享書狀官苟宗道等所録雜藁數帙惕焉有感於中因自誦曰何兹生不辰之甚乎夫學所以為道非志於文而已也德業積於內行實加於人而文章以為華爾如景星慶雲日芒月采瑞太平光天下黼黻一世者也今乃梗踣跋㚄自南而北自北而南蹂藉穢亂纒結氛祲鬚髮野變形體道敝無一日之晏功業不建道德日愧而徒區區於文字之末混淆於血肉之極輾轉於彗孛之變入於罟擭陷穽而莫之出可為哀已豈天嗇於彼祇令就於此乎遂畀宗道令整頓綴緝其詩傳春秋集傳外傳原古録通鑑書法三國條例等各自為一書其諸史文雜著則類别為編為詩賦論說辨解書傳志針銘贊頌序記碑志行狀哀辭祭文雜著録宏辭表奏使宋文移等類總為一集以其集於是年故以其年數命之曰甲子集云夫甲者造物之始數之所由生也故黃帝迎日推䇿而使太撓造焉以之統運㑹記歲月書日時起消息正氣候定律厯故凡言年數者皆本焉絳縣老人之對晉大夫是已余之生也在甲戌元末癸未之季數往者順至於甲申又至於甲午又至於甲辰又至於甲寅今又至於甲子幾一周焉蠱之繇曰先甲三日後甲三日其彖曰終則有始天行也先夫甲者三焉所以原其始也後夫甲者亦三焉所以要其終也天之道如是况於人乎余之事業先夫甲以為始者則具夫是矣其後夫甲以為終者則將本夫是以為始焉知來者逆引而伸之則自甲戌之元復至甲子互為始終殆無窮焉余得俯焉日以孳孳而已矣故自是集之外隨年增入者皆繫之甲子云且甲者甲坼也物生之始也子者滋也氣生之始也余今處於絶地天窮而人厄焉窮則變變則通將如天地解而雷雨作百果草木皆甲坼回一氣於地中鼓萬物於天下雖明夷之暗不失箕子之貞撲滅彗孛搯長庚之光焰以光旭日庶幾終至於萬丈云六年夏五月陵川郝經序原古録序中統七年春王正月猶在宋之儀真館十五日已未原古録成叙曰昊天有至文聖人有大經所以昭示道奧發揮神藴經緯天地潤色皇度立我人極者也故自書契以來載籍所著莫不以文稱天曰天文人曰人文堯曰文思舜曰文明禹曰文命西伯曰文王周公曰文公仲尼之以道自任也曰文王既沒文不在兹乎皆言文而不及道則道即文也觀夫揭日月運寒暑翳雲霓幹星漢組布綦列煥乎有文覆冒磨蕩庶物出焉則天之道可知矣載太華振河海敷原隰固溪壑涵負崛音倔岉音物穆若有章發育蕃衍庶物生焉則地之道可知矣家焉而生聚教肓國焉而經理安定耕鑿疆畛之有限宫室車服之有數貴賤親疏之有叙爵祿上下之有分典則采物粲然有法庶事治焉則人之道可知矣非是則三極之道莫得而見也則文即道也道非文不著文非道不生自有天地即有斯文所以為道之用而經因之以立也故文之大端本於太極而經之法制成於聖人天之文本然而固有矣其推步厯象始於黃帝而成於堯於是乎履端舉正敬授人時而天之經立矣地之文亦本然而固有矣其荒度疏治始於后土而成於禹於是乎地平天成蒸民乃粒而地之經立矣人之文麗乎兩間畀賦藴畜尤所固有也其裁成制作始於伏羲之畫卦見於唐虞之傳心備於周公之制禮成於仲尼之修經於是乎推本四象貫三為一盡兼天地之文元亨利貞乾有四德直方大利坤有四體仁義禮智性有四端易書詩春秋而人有四經萬世有統萬物有紀萬事有制太極之統體昭著而道之大用無窮是以仲尼氏沒大經與天地並為至文嶷為名教至於今而不可易也雖駮雜於戰國火於秦黃老於漢佛於晉宋齊梁魏周隋唐而大儒傑士相繼而出孟軻韓愈則浚源張本雄辨力抵廓清禦侮接續正傳荀况董仲舒劉向揚雄王通則著書立言尊王賤霸修仁明義表章儒學陳摶周敦頤邵雍程灝程頤張載朱熹則根極致命盡性窮理比象衍數直造聖地孔安國毛萇鄭𤣥何休王弼杜預范寧孔穎達則掇拾補綴緯韋撥燼反復訓詁申明經㫖司馬遷班固荀悅陳壽干寶范曄沈約李延壽宋祁則罔羅遺文抽閲祕記藻飾言動完具國典以為信史樂毅張良賈誼汲黯蕭望之丙吉魏相袁安楊震李固陳蕃孔融諸葛亮羊祜王導劉琨謝安王猛高允房𤣥齡魏徵禇遂良狄仁傑姚崇宋璟張九齡顔真卿陸贄權德輿裴度李德裕王朴竇儼趙普王旦寇凖吕夷簡范仲淹韓琦文彥博富弼歐陽修司馬光則挺特瑰偉神明博達剛大諒直閎肆尊顯佐王經世撥亂反正以為事業戰國之莊周屈原宋玉商鞅韓非李斯漢之鄒陽枚臯東方朔司馬相如王褒劉歆張衡崔瑗蔡雍魏之曹植王粲陳琳阮籍嵇康晉之張華左思潘嶽陸機孫綽袁宏陶潛南北之謝靈運顔延之任昉鮑昭江淹謝朓溫子升徐陵庾信薛道衡唐之陳子昂張說蘇頲李白杜甫元結李華賈至楊炎常衮李翺皇甫湜劉禹錫栁宗元白居易元孺牛僧稹皮日休杜牧陸龜䝉司空圖宋之楊億王禹稱夏竦蘇洵曾鞏王安石蘇軾蘇轍吕惠卿李清臣黃庭堅張耒秦觀朝無咎金源之韓昉蔡圭党世傑趙渢王庭筠趙秉文李純甫雷淵麻九疇則鼓吹風雅鋪張篇什藻飾綸綍列上書疏敷陳利害詰竟論議雕繪華采􅀈琢章句搯抉造化窮極筆力精核義理照耀竹帛剸刻金石撼搖天地陵轢河山剴切星斗推蕩風雲震疊一世作為文章皆有書有集有簡有策名家傳後於是大經之枝葉蔽䕃六合其稚萌孫根籠絡八表源委波瀾放乎四海堯舜禹湯文武周孔之緒闡焉而不墜道德仁義大中至正之理皭焉而不昧男女夫婦父子君臣之倫截然而不亂禮樂刑政文物聲明之典粲然而不亡中國四方剛柔燥濕之俗判然而不雜彼異端邪說干時妨政喪心惑志者焉能行胸臆於其間哉故斯文之大成大經之垂世名教之立極仲尼之力也斯文之益大名教之不亡異端之不害衆賢之功也自源徂流以求斯文之本必自大經始遡流求源以徵斯文之迹衆賢之書不可廢也嗚呼近世以來夸毗者不務實學骫骳蕪穢纎艷浮侈枵然恣肆以古為野徼幸者干祿詭獲祇務速售破碎綴緝無復統紀以正為左穿鑿者窮竒索隱嗜新歆異臨深為高自以為得以訓傳為膚淺僞妄者談天說命立聖遺世動關鬼神言涉造化以文章為末技誕幻者朋扇異教剽飾虛僞欺世罔利詭譎深阻以吾道為土苴俾大經淪棄斯文委地此原古之所以作也原古所以正今也於是斷自先秦以及於今六經之本真子史之幾衡諸家之要刪衆賢之傑作原於道德傳於義理合於典則可以為法於後世者則並録之其所作則各附於其人其人則各附於其代其叙則各以其代為先後其體則各附於其類以其皆本於經故各附於經如原序論評辨說解問對難讀言語命十有四類皆義理之文易之餘也故為易部國書詔赦冊文哀諡冊告南郊昊天上帝封禪册制制策令教下記檄書疏表封事奏奏議箋啓狀奏記彈章露布牒二十有三類皆辭命之文書之餘也故為書部騷賦詩聯句樂府樂章歌行吟謡篇引詞曲長句雜言律詩絶句十有五類皆篇什之文詩之餘也故為詩部碑銘符命頌針贊記紀傳志録墓表墓銘墓碣墓志墳版墓版權厝志志文壙銘殯志歸祔志遷祔志蓋石文墓磚記墳記葬志誄述行狀哀辭雜文雜著二十類皆紀事之文春秋之餘也故為春秋部凡四部七十有二類若干篇若干卷部為統論類為序論目為斷論凡立說之異同命意之得失造道之淺深致理之醇疵遣辭之工拙用字之當否制作之規模祖述之宗趣機杼之疏密關鍵之開閣音韻之疾徐氣格之高下章句之聲病粗鑿巨細逺近鄙雅皆為論次本之大經以求其原邃古無上之面目太極造始之樞紐鴻荒冲漠之兆朕渾淪灝渺之津涯死生終始之槖籥隂陽鬼神之情狀穹象厚垠之端倪倫類事物之條貫命性心跡之位置政典維綱之軌度治亂安危之運世山嶽丘陵根柢之所繫江河湖海之所托雷霆風雨變化之所起蟲魚草木生植之所因雲煙花鳥月露態度之所極金璧珠貝錦綺光采之所發琴瑟鐘鼓磬管音節之所契天球河圖大玉琬琰之祕藏布帛菽粟果菜水火之日用衆人之所未睹天下之所共見搜抉振暴羅列而進盡在目前非特以正今亦所以正昔庶幾先賢之用心不為後世所誣仲尼之道家至日見牛童馬走皆與斯文邪說無自而入大經業萬世名教垂百王彼僞妄誕幻之徒不復敢以區區藝能視之而忽蔑也或曰昔王通續經論者以為僭而自聖子是之作得無似之乎曰夫經不刋之典也易本三皇書本五帝詩本三王春秋本五伯故皇帝王伯為易之體虞夏商周為書之體文武周召為詩之體齊楚秦晉為春秋之體前乎犧炎則不足徵後乎桓文則不足法數千百年離為四經混然天成不可加損不相參涉而無間斷後世雖復有仲尼亦不能復為也况王通乎當偏駮之極壞亂之餘而以私意效聖人贊易道續詩書修元經直以繼夫經自以為仲尼復出是以謂之僭也今之所録推廣聖經之餘裔以為斯文之命脈爾古今文章皆經之所出萬言千論不能有以外而莫能及焉為之羣分類聚論定區别以稽其變益見經之大聖人不敢覬覦則尊經也夫豈僭乎哉江淮荆湖南北等路宣撫使入宋國國信使翰林侍讀學士郝經序太極演總叙天下之理一隱一顯而巳矣故其間有開閣之機總萃之體變動之用布散之迹焉其始焉皆自夫隱而出也其終也皆自夫顯而反也於是天下之理無滯無弊道之大用全體旁行而不流確乎其不可拔而不易而易行乎其間妙萬物而為神翕然而藏天地萬物無不隱闢焉而生天地萬物無不顯一翕一闢一生一藏一隱一顯所以為道所以為易所以為神天地萬物至今而不窮至今而冥冥也至今而昭昭也是以聖人作易推其隱者而為賾為密為幽為深為幾為微窮原築底而無上反而為顯於是為太極推其顯者而為圖為畫為卦為爻為象為數為辭為說亦窮原築底而無上復反而為隱而止於太極故易之為書本末一隱顯太極則其開闔之機也總萃之體也變動之用也布散之迹也故道易神之藴奧皆具於太極而伏犧發之伏犧之圖文王之卦周公之爻孔子之象皆自太極推出而孔子獨為言之故易有太極而太極易之本也學易者必先求其本本得而易道可求矣攝網者必提其綱衣裘者必挈其領入室者必由其户也由孔子而來言易者衆矣開卷而便及乾坤直造犧文莫不忽恍茫漠以為高深幽逺至簡至易者而以為至煩至難夫易成於四聖人之手莫不先後相因伏犧演河圖文王演伏犧周公演文王孔子演三聖後世之言易也則在夫孔子之後矣故當由孔子之易以求三聖之易自流徂源由末及本也孔子之易其彖象文言說卦序卦雜卦皆所以承三聖人擴而充之也其繫辭上下探索犧文之前包舉萬世之業其抉示道本挈舉易鈕轉幹神機推出兩儀四象造起天地萬物則在夫易有太極之一言固當即此以為學也知孔子之易則知三聖之易矣嘗聞之師讀易者當先讀繫辭其次說卦序卦雜卦其次讀乾坤二卦既精且熟然後讀屯䝉諸卦此學易之序也蓋意言象數之本皆在於是矣故取太極一章以為學易之標凖類繫辭文言說卦彖象之名義探諸太極之前而演其隱徵諸太極之後而演其顯問津洙泗以及河洛遍參諸儒庶幾數年之後可以學易觀道易神之髣佛不失吾身之極焉故取道易神等二十三條為一類合為一圖以示其序而各為之說謂為易道藴極演諸太極之前者也其次取太極等六條為一類合為一圖以示其序而各為之說謂為易有太極所以演太極也其次取易書詩春秋論語大學中庸孟子名義人輿皇極等凡二十四條為一類合為一圖以示其序而各為之說謂為人道建極合隱顯而立極成易也其次分易為四為伏犧易文王易周公易孔子易合為四聖易圖以示其序而各為之說為之圖演太極之後所以成易者也其次為孔門言易諸儒擬易傳注疏釋等類以為易之支流餘裔見太極為易之用極盡而無極神而明之存乎其人焉爾矣凡十類六十篇總謂之太極演云年月日陵川郝經書於儀真新館周易外傳序孔子承三聖之易為之作傳凡道德之要性命之理幽明之故死生之說天地人物之在夫意言象數之間者莫不充周表著推致其極易於是乎集大成聖人大經大法之原而不可加損焉蓋數聖人之制作孔子復以聖述聖故也後之人德未至於聖欲以一已之見求夫數大人之意雖敝精極神不免於猜揣料量之私不能造夫真是或有見焉而不能純備斷然自作則違戾逺甚是以紛紛藉藉至於今而不已也夫易聖人所以用道之書也伏犧氏按圖畫卦以述道造書契以開斯文之統厯數千百年至於黃帝堯舜氏而法制始備又厯夏商千有餘年而文王受命作周重伏犧氏之卦繫之辭而命之為易聖子周公心傳口授分其文而繫之辭以斷其吉凶復六百有餘年而孔子出焉晚年讀易而韋編三絶以求三聖之意於是退而修經推皇帝王伯之世而本乎伏犧終於五霸列為四經而為易作傳尊之為經以冠夫詩書春秋使天下萬世共用一道舉畫前之固有重後之逆數造無窮之形器壞無窮之形器而一易之用不可勝窮矣則伏犧氏述道文王述伏犧周公述文王孔子述三聖世代相去若此其甚逺也聖人之作若此其鮮也以聖述聖若此其恭也至孔子而僅為成書猶以為書不盡言言不盡意加我數年五十以學易可以無大過則易之大不能一聖人當一世而為之必數聖人數十百世而僅成以孔子之聖不敢自作曲為之述而猶以為未既盡而懼或有過後之人乃欲以一已之私遽述數千載之德業四聖人之能事又輒自作為不亦難矣哉且自孔子沒曾子子思孟子得其傳而著之書雖皆易道而不及易中一言繼而火於秦雖幸而以卜筮之故易之書獨存天下之人祇以卜筮視之而其道不明也漢興言易自田何本其所自謂孔子授之商瞿子木而授受及何何為傳數篇而不傳自是學各専門原逺而末益分矣揚雄之學最為深到凖易作𤣥而不述易道東觀學者雖盛而祇為傳注之學亦各専門自私而明夫易道者亦鮮魏正始間王弼以二漢之學為之注唐世以為至當而孔穎達為之疏學者至今宗之殆亦専門之學也寥寥千載竟無聖人而述聖人家異傳人異義易道不可復聞矣故王通謂九師興而易道微三傳作而春秋散惡其私而専専而分分而異卒使聖人之意不可得而見也宋興大儒輩出莫不以闡明易道為巳任於是華山陳摶肇開宗統而濂溪周敦頤西都邵雍逺探羲文周孔之業推演意言象數之本至侍講程頤大變傳注為易作傳直造先秦布武聖門其諸師友更唱迭和易道幾明今二百有餘年矣學者復各擅其師傳立論馳說求新角竒誕夸而自聖言義理者不及象數象數者不及義理又往往雜入偏駮小數異端曲學周邵程氏之學復昧沒而不明其誚王弼蔑正義厚誣妄訾悖理傷道者不可勝紀又甚於専門之弊矣反復壞爛遂至此極世代如是之逺聖人不作如是之久蠧食穿鑿如是之衆且多也又豈一人之専見臆戾所能蔽之哉則聖人之意終不可得而見矣竊嘗以為後世雖無大聖人兼綜諸聖以述夫聖如孔子之集大成苟不以一人自私曲學自蔽専門自聖削去畦町沒夷滋蔓排斥一我開示公道合漢魏唐宋諸儒之學順考其往逆徵其來積數千百年之學問數十百人之能事契其所見㑹其所得合天下以一心通天下以一理貫古今以一易聖一而後世百之聖十而後世千之遡流求原問津以濟乎道則亦庶乎其可也故不自揆嘗欲論次孔子以來述易而有合於聖人者纂為一書而未能也中統元年詔經持節使宋宋人館於儀真留而不遣五六年間頗得肆意經傳及被劫殺出居别室益曠寂無事乃據所有書及故所記憶者自孔子以來迄於今凡訓詁論說諸所注釋核其至精去其重復義理象數兼采並載巨細不遺不徵其人惟是是與各以世代第其先後凡諸經傳子史百氏易之自出而不謬聖人必當關涉引用者亦各依世次編入其流入老佛異端曲說非聖人意者則盡刋黜夫漢魏傳注之學則至於魏王氏唐宋論議之學則至於宋程氏故備録二氏以為諸家折衷經有所見聞者則彌縫其闕而要終之且徵之厯代之得失以為易之事業窮源極委致諸道易神之本然以為一經之綱領疑而不可固必者則存而弗論以俟能者積成八十卷旁搜逺蹈創圖立說為太極演二十卷申明列聖及諸儒餘意共為一百卷易之成俶落周世謂之周易近世或單稱易及大易等以為題而不言周有未當言者故仍稱周易孔子為經作傳既謂之傳矣後之人復為傳注則皆傳外之傳也故曰為外傳且示不敢自同於聖人之作也然亦未敢自為成書後來繼今或别有所得當復增入云九年春正月立春日郝經序續後漢書序漢建安末曹氏廢漢自立稱魏孫氏據江左僭號稱吳昭烈以宗子繼漢即位於蜀討賊恢復卒莫能相一而折入於晉晉平陽侯相陳壽故漢吏也漢亡仕晉作三國志以曹氏繼漢而不與昭烈稱之曰蜀鄙為偏霸僭僞於是統體不正大義不明紊其綱維故稱號論議皆失其正哀帝時滎陽太守習鑿齒著漢晉春秋謂三國蜀以宗室為正魏雖受漢禪晉尚為纂逆蜀平而漢始亡上疏請越魏繼漢以正統體不用宋元嘉中文帝詔中書侍郎裴松之采三國異同凡數十家以注壽書補其闕漏辨其舛錯績力雖勤而亦不能更正統體厯南北隋唐五季七百有餘歲列諸三史之後不復議為也宋丞相司馬光作通鑑始更蜀曰漢仍以魏紀事而昭烈為僭僞至晦庵先生朱熹為通鑑作綱目黜魏而以昭烈章武之元繼漢統體始正矣然而本史正文猶用壽書經嘗聞縉紳先生餘論謂壽書必當改作竊有志焉及先人臨終復者遺命斷欲為之事梗不能中統元年詔經持節使宋告登寶位通好弭兵宋人館留儀真不令進退束臂抱節無所營為乃破藁發凡起漢終晉立限斷條目以更壽書乃作表記傳録諸序議贊十二年夏五月令伴使西圭借書於兩淮制使印應雷得二漢三國晉書遂作正史以裴注之異同通鑑之去取綱目之義例參較刋定歸於詳實以昭烈纂承漢統魏吳為僭僞十三年冬十月書成年表一卷帝紀二卷列傳七十九卷録八卷共九十卷别為一百三十卷號曰續後漢書奮昭烈之幽光揭孔明之盛心祛曹丕之鬼蜮破懿昭之城府明道術闢異端辨姦邪表風節甄義烈核正僞曲折隱奧傳之義理徵之典則而原於道德推本六經之初苴補三史之後千載之蔽一旦廓然矣古之為書大抵聖賢道否發憤而作屈平離騷馬遷史記皆是也然皆曀昧一時流光百世故韓愈謂以彼較此孰得孰失今拘幽之極而集是蓋亦失中之得古人之志也嗚呼安得復於先君而告卒事乎十有五日庚子具位陵川郝經序玉衡真觀序人並天地為三極其為道則一凡義理象數皆所固有學必周知然後為至已是以聖人仰觀俯察範圍曲成推步占候以為大法著之詩書六藝謂夫人而所當知也故自天子至於列國各有官守以世其業其法家至日見猶夫土田疆理州閭井邑人能道之於是一世之人莫不知天祇畏奉事恐懼修省通三極為一敬貫萬變為一誠天命不違人心人事合於天道天與人一純而無間所以為二帝三王之世也及周之衰如螮蝀巷伯大東定之方中漸漸之石等作皆細民宦寺役徒之辭亦能言天以為風其列國名卿賢大夫于變異之際道其所以然言君而迪畏乎天如禆竈梓慎萇𢎞晏嬰往往有之仲尼之門顔閔而下七十子三千之徒問學之際一不及曾子子思孟子著書難疑答問而亦弗及皆知其法以為常事置而弗論文武之道在人而先王之澤未斬也至戰國縱橫異端並起道厖術雜莫不以人勝天天人始二視天夢夢于巳無與放辟邪侈無所顧忌怪異疊出不知警懼益殺人以逞卒皆大亂亡滅其遺書古法或有知者如子韋唐昧尹臯甘公石申吕不韋各専門名家無復大聖大賢之能事一世之通學為隂陽數術之流矣然賴數子傳其緒業漢興學者得以尋繹於是張蒼司馬談及子遷鄧平唐都落下閎董仲舒劉向揚雄班固馬續張衡鄭𤣥劉洪譙周皆著書推衍而翼奉李尋谷永蘇竟郎顗襄楷蔡雍于昏君亂朝橫身論列壓之以天懼之以禍使聞者奪氣流汗謂之天諫大有功于漢室于是四百年間復知畏天有三代之風焉南北七代其太史多能占測以言休咎儒者則猶有崔浩髙允漢氏之遺烈也隋唐以來學者以為異端謏音小道而恥言之其星翁厯史列于有司備員而已復設私習天文之禁使天子至於庶民皆戴天而不知所以為天至有謂天變不足畏者于是三代二漢之學絶矣經自知讀書即嗜天官學常欲纂古遺法以合天人求其所以然畏法律禁忌而不敢為今上即位之元年詔經持節使宋告登寶位通好弭兵宋人館留儀真積年不遣曠寂無聊乃改修陳承祚三國志至為八録推本六經三傳諸子史自漢魏晉隋唐諸天官書志及所齎宋金源氏與本朝燕都臺司祕書為厯象録具述厯代星厯傳之以理既成書狀官苟宗道為之音注請别為一書乃更論次復加損益益之以圖象細行厯變異事應等類凡十二卷名曰玉衡真觀天地之道真觀者在璿璣玉衡所以觀之也拘幽之中仰視片天十餘年間凡天地日星之變徵之於書若合符節嗚呼安得弛習天之禁以是進讀於人君傳之學者使天下後世復盡知畏天哉中統十四年癸酉六月十五日丙申具位陵川郝經序變異事應序孔子作春秋書日食地震星變議而不辨故不言其事應至左氏作傳始具載占侯之辭與其事應于是史記漢書厯代諸志皆宗其法事與變符而象占有徵矣夫人之善惡兆乎思慮必動乎四體而其憂喜必徵於聲色見於氣貌藴於內則必發於外而不能掩况事變之大者乎將有大故隂幾沈潛而鬼神已知其氣焰朕兆必見於天不能恐懼修省以圖消弭則事必效而無及矣嚴哉懍懍乎天人之際甚可畏也君子所以懲忿窒欲慎獨而戒於屋漏絶惡於未萌弭變於幾先也邵康節曰思慮未發鬼神莫知不由乎我更由乎誰思慮之先藏密之地間邪存誠可不務乎故修省於無變之時者上也遭變而修省者次也事變尋至而不悟者刑戮之民也紀變異徵事應布列簡牘以詔以告其扶助道教至班固漢志曰古厯五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫厯者正行也古者天下太平五星循度亡有逆順日不食朔月不食望自周室衰亂臣賊子師旅數起刑罰失中雖其亡亂臣賊子師旅之變內臣猶不治四夷猶不服兵革猶不寢刑罰猶不錯故二星與月為之失度三變常見及有亂臣賊子伏尸流血之兵大變乃出甘石氏見其常然因以為紀皆非正行也劉向亦言日月食及五星逆行非太平之常自周以來人事亂故天文應之遂變耳是殆不然夫有人事即有天變雖聖王在位極治之世不免於疾病憂戚死喪誅罰更革廢置豫奪征討而天地日星亦不無崩震鳴裂薄食移徙飛流逆順伏見犯守苐治世鮮而小亂世多而大耳以黃帝堯舜禹湯文武周公之治亦有征伐戰鬭流放誅殛拘幽誣誚叛逆崩殂之事其九年之水七年之旱桑穀共生大風拔木等亦書于策豈天地無變二星不逆行乎且仰觀俯察推測占稽皆聖賢之能事其書之必備苐以秦人焚滅典籍二帝三王之簡策暨西周之行事皆沒而不得聞故其變于事不可徵也賴孔子作春秋左氏為春秋作內外傳東都以來才見一二變應可得而述固向據之遂為周衰日月始食五星始逆行甘石所紀非正豈通識哉今據春秋左氏傳國語託始於周幽王據史記二漢書三國志晉書終於晉恭帝宋高祖之篡上記其變下列其事各别為章凡一千一百六十九年君臣父子之間中國外域之際兵戎之起誅殺之行崩薨之象篡弒之端僭叛之由割裂之勢専擅之故亂亡之本自王而霸自霸而雜日流日下兆變於上應之於下者亦巳備極姑為占候之案其占法已各具經星緯曜諸星氣本宫下故皆略而不書陵川集卷二十九
