body:
  text: 陵川集巻三十二元郝經撰奏議東師議右臣經自乙夘十一月被㫖北上丙辰正月見於沙陀不以鄙末問以時事且令便宜條奏於是奏立國規模治安急務各數十條佩筆束載從扞牧圉遂筦軍國機務同諸執政奏事凡出師利害未嘗不反復備言及令論定植齋奏議乃為七道議七八千言愚瞽知識亦已罄竭近奉命宣撫江淮以先啟行又令有軍旅利害具文字遣使來上竊惟大軍已出不能中止向所論奏皆為無用從驛騎而逾逺望君門而日切汲黯不難於淮陽而眷眷於李息葢激於中而有不能已焉者彼有重於此也故國家此舉所繋重甚存亡安危於是乎在既不能善其始必當為全其終故不敢謹黙復為東師議一篇俾權府官武濟乘驛上進俾諸執政番譯聞奏議曰經聞圖天下之事於未然則易救天下之事於已然則難於巳然之中復有未然者使往者不失而來者得以遂則尤難也國家以一旅之衆奮起朔漠斡斗極以圖天下馬首所向無不摧破滅金源并西夏蹂荆襄克成都平大理躪轢諸夷奄征西海有天下十分之八盡元魏金源故地而加多廓然莫與侔大也惟宋不下未能混一連兵構禍踰二十年何曩時掇取之易而今日圖惟之難也夫取天下有可以力并有可以術圖并之以力則不可久久則頓弊而不可振圖之以術則不可急急則徼倖而難成故自漢唐以來樹立攻取或五六年未有踰十年者是以其力不弊而卒能保大定功晉之取吳隋之取陳宋之取唐皆經營比佽十有餘年是以其術得成而卒能混一或久或近要之成功各當其可不妄為而巳國家建極開統垂五十年而一之以兵遺黎殘姓游氣驚魂䖍劉劘盪殆欲殱盡自古用兵未有如是之久且多也其力安得不弊乎且括兵率賦朝下令而夕出師躬擐甲胄跋履山川闔國大舉以之伐宋而圖混一以志則鋭以力則强以土則大而其術則末盡也苟於諸國既平之後息師撫民致治成化創法立制敷布綱條上下井井不撓不紊任老成為輔相起英特為將帥選賢能為任使鳩智計為機衡平賦以足用屯農以足食内治既舉外禦亦備如其不服姑以文誥拒而不從而後伺隙觀釁以正天伐自東海至於襄鄧重兵數道聯幟接武以為正兵自漢中至於大理輕兵㨗出批吭抵脅以為竒兵帥臣得人師出以律高拱九重之内而海外有截矣是而不為乃於間歲遽為大舉上下震動兵連禍結底安於危是巳然而莫可止者也東師未出大王仁明則猶有未然者可不議乎國家用兵一以國俗為制而不師古不計師之衆寡地之險易敵之强弱必合圍把稍獵取之若禽獸然聚如丘山散如風雨迅如雷電捷如鷹鶻鞭弭所屬指期約日萬里不忒得兵家之詭道而長於用竒自㑹河之戰乗勝下燕雲遂遺兵而去似無意於取者既破回鶻滅西夏乃下兵闗陜以敗金師然後知所以深取之是長於用竒也既而為斡腹之舉由金房繞出潼闗之背以攻汴為擣虚之計自西和逕入石泉威茂以取蜀為示逺之謀自臨洮吐番穿徹西南以平大理皆用竒也夫攻其無備出其不意而後可以用竒豈有連萬乗之衆首尾萬餘里六飛雷動乘輿親出竭天下倒四海騰擲宇宙軒豁天地大極于遐徼之土細窮于委巷之民撞其鐘而掩其耳齧其臍而蔽其目如是而用竒乎是執千金之璧以投瓦石也可不惜哉其初以竒勝也闗隴江淮之北平原曠野之多而吾長於騎故所向不能禦兵鋒新鋭民物稠夥擁而擠之郡邑自潰而吾長于攻故所擊無不破是以用其竒而驟勝今限以大山深谷阨以重險薦阻迂以危途繚逕我之乗險以用竒則難彼之因險以制竒則易况于客主勢懸藴蓄情露無虜掠以為資無俘獲以備役以有限之力冒無限之險雖有竒謀秘畧無所用之力無所用與無力同勇無所施與不勇同計不能行與無計同泰山壓卵之勢河海濯熱之舉擁遏頓滯盤桓而不得進所謂强弩之末不能射魯縞者也為今之計則宜救巳然之失防未然之變而巳兩師既搆猝不可解如兩虎相捽入於巖阻見之者辟易不暇又焉能以理相喻使之逡巡自退彼知其危竭國以并命我必其取無由以自悔兵連禍結何時而已大王殿下宜遣人稟明於行在所大軍壓境遣使喻宋示以大信令降名進幣割地納質彼必受命姑為之和偃兵息民以全吾力而圖後舉天地人神之福也稟命而不從殿下之義盡而後盡吾東師重慎詳審不為躁輕飄忽為前定之謀而一之以正大假西師以為竒而用吾正北師南轅先示恩信申其文移喻以禍福使知殿下仁而不殺非好攻戰闢土地不得巳而用兵之意誠意昭著恩信流行然後閲實精勇别為一軍為帳下之卒舉老成知兵者俾為將帥更直宿衛以備不虞其餘師衆各畀侯伯使吾府大官元臣分師總統為戰攻之卒其新入部曲瞢不知兵雖名為兵其實役徒者使㳂邊進敵郡邑犬牙相制為屯戍之卒推擇單弱究竟逃匿編葺部伍使聞望重臣為之撫育總押近裏故屯為鎮守之卒使掣肘之計不行妄意之徒屏息内外備禦無有缺綻則制節以進既入其境敦陳固列緩為之行彼善于守而吾不攻彼恃城壁以不戰老吾吾合長圍以不攻困彼吾用吾之所長彼不能用其長選出入便利之地為久駐之基示必取之勢毋焚廬舍毋傷人民開其生路以攜其心亟肄以疲多方以誤以弊其力兵勢既振藴蓄既見則以輕兵掠兩淮杜其樵採而遏其糧路使血脈斷絶各守孤城示不足取即進大兵直抵于江松江上下列屯萬竈號令明肅部曲嚴整首尾締構各具舟楫聲言徑渡彼必震疊自起變故葢彼之精鋭盡在兩淮江面濶越恃其巖阻兵皆柔脆用兵以來未嘗一戰焉能當我百戰之鋭一處崩壞則望風皆潰肱髀不續外内限絶勇者不能用而怯者不能敵背者不能返而面者不能禦水陸相擠必為我乗是兵家所謂辟堅攻瑕辟實擊虛者也如欲存養兵力漸次以進以圖萬全則先荆後淮先淮後江彼之素論謂有荆襄則可以保淮甸有淮甸則可以保江南先是我嘗有荆襄有淮甸有上流皆自失之今當從彼所保以為吾攻命一軍出襄鄧直渡漢水造舟為梁水陸濟師以輕兵掇襄陽絶其糧路重兵皆趨漢陽出其不意以伺江隙不然則重兵臨襄陽輕兵捷出穿徹均房逺叩歸峽以應西師如交廣施黔選鋒透出䕫門不守大勢順流即并兵大出摧拉荆郢横潰潭湘以成犄角一軍出壽春乗其鋭氣并成取荆山駕淮為梁以通南北輕兵抄壽春而重兵支布于鍾離合肥之間掇拾湖濼奪取闗隘據濡須塞皖口南入於舒和西及於蘄黄徜徉恣肆以覘江口烏江采石廣布戍邏偵江渡之險易測備禦之疎宻徐為之謀而後進師所謂潰兩淮之腹心抉長江之襟要也一軍出維揚連楚蟠亘蹈跨長淮隣我强對通泰海門揚子江面宻彼京畿必皆備禦堅厚若遽攻擊則必老師費財當以重兵臨維揚合為長圍示以必取而以輕兵出通泰直塞海門𤓰步金山柴墟河口游騎上下吞江吸海並著威信遲以月時以觀其變是所謂圖緩持久之勢也三道並出東西連衡殿下或處一軍為之節度使我兵力常有餘裕如是則未來之變或可弭已然之失一日或可救也議者必曰三道並進則兵分勢弱不若併力一向則莫我當也曾不知取國之術與争地之術異併敵一向争地之術也諸道並進取國之勢也昔之混一者皆若是矣晉取吳則六道進隋取陳則九道進宋之於南唐則三面皆進未聞以一旅之衆而能克國者或者有之徼倖之舉也豈有堂堂大國師徒百萬而為徼倖之舉乎况彼渡江立國百有餘年紀綱修明風俗完厚君臣輯睦内無禍釁東西南北輸廣萬里亦未可小自敗盟以來無日不討軍實而申警之彷徨百折當我强對未嘗大敗不可謂弱豈可蔑視謂秦無人直欲一軍倖而取勝乎昔秦王問王翦以代荆翦曰非六十萬不可秦王曰將軍老矣命李信將二十萬往不克卒畀翦以六十萬而後舉楚葢衆有所必用事勢有不可懸料而倖取者故王者之舉必萬全其倖舉者無賴崛起之人也嗚呼西師之出已及𤓰戍而猶未即功國家盛全之力在於東左若亦直前振迅鋭而圖功一舉而下金陵舉臨安則可也如兵力耗弊役戍遷延進退不可及為敵人所乘悔可及乎固宜重慎詳審圖之以術若前所陳以全吾力是所謂坐勝也雖然猶有可憂者國家掇取諸國飄忽凌厲本以力勝今乃無故而為大舉若又措置失宜無以挫英雄之氣服天下之心則荏惡懐姦之流得以窺其隙而投其間國内空虚易為搖蕩臣愚所以諄諄於東師反復致論謂不在于已然而在于未然者此也易曰豐其屋蔀其家闚其戸閴其無人方今之勢也挽回元氣收其放心守約實内以建皇極實惟殿下之事區區瞽言妄為干冒無任戰懼之至謹議班師議右臣經奉命與諸執政㑹議聴書記帳中所有陳説巳令身毒和者斯譯奏退而復恐未盡欲更陳説疫癘大作不能登山以為今日速當退師歸定大事故作班師議以覼縷前後陳説議曰易文言傳謂亢之為言也知進而不知退知存而不知亡知得而不知喪知進退存亡而不失其正者其惟聖人乎葢乾之龍徳體天行徤六位時成時乘六龍以御天時者何當其可之謂也故可以潛則潛可以見則見可以惕則惕可以躍則躍可以飛則飛五位者皆當其可聖王之徳也至於上九則惟知進與存不知退與亡不當其可而違其時是以至此極而有悔弗逮乎五位者而猶謂之亢龍徳于是乎衰不足以為聖王矣故古之聖王莫不以時進退握乾知幾舜自耕稼陶漁以至為帝知進也以天下與人不私其子而以與禹知退也文王三分天下有其二以服事殷知退也武王遂伐殷而有天下知進也漢高帝不與項羽校蠖屈漢中知退也還定三秦以討羽知進也光武為更始殺其兄齊武王而不校展轉河朔知退也一旦自立中興漢室知進也故上世稱聖王者以舜為首其次則稱文武後世之稱聖王者以高帝為首其次則稱光武皆知進退存亡之理時乗御天卒以龍徳而位天位者也至於魏孝文雖不逮于文武高光遷都洛陽總干問罪辭順而返齊人侵軼報之以兵聞喪而還進退以禮不隕師徒卒全龍徳為右文復古之賢主亦其次也彼慿威恃力以逞無疆之欲皆亢龍之師也秦苻堅金海陵亢而不悔者也漢武帝唐太宗亢而有悔者也雖皆亢龍悔而知退又其次也大舜不可及已文武高光魏孝文漢武帝唐太宗後王進退有餘師矣共惟大王殿下聰明睿智足以有臨發强剛毅足以有斷進退存亡之正知之久矣嚮在沙陀命經曰時未可也又曰時之一字最當整理又曰可行之時爾自知之大哉王言時乘六龍之道知之久矣自出師以來進而不退經有所未解者故言于真定于曹濮于唐鄧亟言不己未賜開允乃今事急故復進狂言國家自平金以來皆亢龍之師也惟務進取不遵養時晦老師費財卒無成功三十年矣䝉哥罕立政當安静以圖寧謐忽無故大舉進而不退畀王東師則不當亦進也而遽進以為有命不敢自逸至于汝南既聞凶訃即當遣使遍告諸師各以次還修好于宋歸定大事不當復進也而遽進以有師期㑹於江濱遣使喻宋息兵安民振旅而歸不當復進也而又進既不宜渡淮又豈宜渡江既不宜妄進又豈宜攻城若以幾不可失敵不可縱亦既渡江不能中止便當乗虚取鄂分兵四出直造臨安疾雷不及掩耳則宋亦可圖如其不可知難而退不失為金兀术也師不當進而進江不當渡而渡城不當攻而攻當速退而不退當速進而不進役戍遷延盤桓江渚情見勢屈舉天下兵力不能取一城則我竭彼盈又何俟乎且諸軍疾疫已十四五又延引日月冬春之交疫必大作恐欲遷不能彼既上流無虞吕文徳已并兵拒守知我國疵鬬氣自倍兩淮之兵盡集白露江西之兵盡集龍興嶺廣之兵盡集長沙閩越沿海巨舶大艦比次而至伺隙而進如遏截于江黄津渡邀遮于大城闗口塞漢東之石門限郢復之湖濼則我將安歸無已則突入江浙擣其心腹聞臨安海門已具龍舟則亦徒往還抵金山并命求出豈無韓世忠之儔乎且鄂與漢陽分據大别中挾巨浸號為活城肉薄骨并而拔之則彼委破壁空城而去泝流而上則入洞庭保荆襄順流而下精兵徤櫓突過滸黄未易遏也則亦徒費人命我安所得哉區區一城勝之不武不勝則大損威望復何俟乎雖然以王本心不欲渡江既渡不欲攻城既攻城不欲并命不焚廬舍不傷人民不易其衣冠不毁其墳墓三百里外不使侵掠或勸徑趨臨安曰其民人稠夥若往雖不殺戮亦被踐蹂吾所不忍若天與我不必殺人若天弗與殺人何益而竟不往諸將歸罪士人謂不可用以不殺人故不得城曰彼守城者祇一士人賈制置汝十萬衆不能勝殺人數月不能拔汝輩之罪也豈士人之罪乎益禁殺人巋然一仁上通于天久有歸志不能遂行爾然今日事急不可不斷也宋人方懼大敵自救之師雖則畢集未暇謀我苐吾國内空虛塔察國王與李行省肱脾相依在于背脅西域諸胡窺覘闗隴隔絶旭列大王病民諸姦各持兩端觀望所立莫不覬覦神器染指垂涎一有狡焉或啟戎心先人舉事腹背受敵大事去矣且阿里不哥已行赦令令脱里赤為斷事官行尚書省據燕都按圖籍號令諸道行皇帝事矣雖大王素有人望且握重兵獨不見金世宗海陵之事乎若彼果决稱受遺詔便正位號下詔中原行赦江上欲歸得乎昨奉命與張仲一觀新月城自西南隅抵東北隅萬人敵上可並行大車排槎丳樓締構重複必不可攻祇有許和而歸爾復何俟乎願大王殿下以祖宗為念以社稷為念以天下生靈為念奮發乾剛不為需下斷然班師亟定大計銷禍於未然先命勁兵把截江面與宋議和許割淮南漢上梓䕫兩路定疆界歲幣置輜重以輕騎歸渡淮乘驛直造都則從天而下彼之姦謀僭志氷釋瓦解遣一軍逆䝉哥罕靈舁收皇帝璽遣使召旭烈阿里不哥摩哥及諸王駙馬㑹喪和林差官于汴京京兆成都西凉東平西京北京撫慰安輯召真金太子鎮燕都示以形勢則大寳有歸而社稷安失之東隅收之桑榆以退為進以亡為存飛龍在天利見大人無亢龍之悔矣十一月二日臣經昧死上進立政議臣經言前歲從扞牧圉至于武昌聞先皇帝上僊以為天命厯數在于陛下至治可期于是欲有所言而遽旋斾臣經亦以負薪之憂道路匍匐今年三月始達順天而陛下應天飛龍詔令使宋倉卒入對陛辭而出和者斯傳聖旨令條奏當今宜行事理倚馬起草便宜新政畀仲謙和者斯等使譯奏所欲言者猶有未盡今既渡淮入宋引領北望顧瞻魏闕每為自誦有君如此可遂無言乎于是作立政議雖尸祝代庖極為僭越有所不計臣聞所貴乎有天下者謂其能作新樹立列為明聖徳澤加于人令聞施于後也非謂其志得意滿苟且而巳也志得意滿苟且一時與草木並朽而無聞是為身者也于天下何有有志于天下者不貴也為人之所不能為立人之所不能立變人之所不能變卓然與天地並沛然與造化同雷厲風飛日星明而江河流天下莫不貴之而巳不以為貴以為巳所當為之職分也古之有天下者莫不然後之有天下者亦莫不當然天下一大器也用之久則必敝窳殘缺甚則至于破碎分裂置而不修則委而去之耳生民萬物者器之所中者也器敝而委則其中者亦必壊爛而不收有志于天下者則為之倡率其羣而修之追琢而俾之完扶持而置之安藻飾而新之滌蕩而潔之使其中者可以食可以藏可以積而豐可以饜而飫為器之主而天下王之安富尊榮而享夫天下彼志得意滿苟且一時者見器之所有而不見器之殘缺染指垂涎放飯流歠始則枵然終則哆然既飫而足并其器與其餘舉而棄之不知餒之復至也至于神器之主中藏盡亡而天下餒者衆於是羣起而争其餘天下亂矣夫紀綱禮義者天下之元氣也文物典章者天下之命脈也非是則天下之器不能安小廢則小壞大廢則大壞小為之修完則小康大為之修完則太平故有志於天下者必為之修而不棄也以致治自期以天下自任孳孳汲汲持扶安全必至于成功而後巳使天下後世稱之曰天下之禍至某君而除天下之亂至某君而治天下之亡者至某君而存天下之未作者至某君而作配天立極繼統作帝熙鴻號于無窮若是則可謂有志于天下矣由漢以來尚志之君六七作于漢則曰高帝曰文帝曰武帝曰昭帝曰宣帝曰世祖曰明帝曰章帝凡八帝于三國則曰昭烈一帝于晉則曰孝武一帝于元魏則曰孝文一帝于宇文周則曰武帝一帝于唐則曰高祖曰文皇曰𤣥宗曰憲宗曰武宗曰宣宗凡六帝于後周則曰世宗一帝于宋則曰太祖曰太宗曰仁宗曰高宗曰孝宗凡五帝于金源則曰世宗曰章宗凡二帝是皆光大炳烺不辱于君人之名有功于天下甚大有徳于生民甚厚人之類不至于盡亡天下不至于皆為草木鳥獸天下之人猶知有君臣父子夫婦昆弟人倫不至于大亂綱紀禮義典章文物不至于大壊數君之力也嗚呼上下數千載有志之君僅是數者何苟且一時者多而致治之君鮮也雖然是數君者獨能樹立功成治定揄揚于千載之下豈不為英主也哉其視壊法亂紀斁彛倫毒海内覆宗社碌碌以偷生孑孑以自蔽甘為庸懦者可為憫笑也國家光有天下綿厯四紀恢拓疆宇古莫與京惜乎攻取之計甚切而修完之功弗逮天下之器日益弊而生民日益憊也葢其幾一失而其弊遂成初下燕雲奄有河朔便當創法立制而不為既并西域滅金源蹂荆襄國勢大張兵力崛阜民物稠夥大有為之時也苟于是時正紀綱立法度改元建號比隆前代使天下一新漢唐之舉也而不為于是法度廢則綱紀亡官制廢則政事亡都邑廢則宫室亡學校廢則人材亡廉恥廢則風俗亡紀律廢則軍政亡守令廢則民政亡材賦廢則國用亡天下之器雖存而其實則無有賴社稷之靈祖宗之福兵鋒所向無不摧破穿徹海嶽之鋭跨凌宇宙之氣騰擲天地之力隆隆殷殷天下莫不慴服當太宗皇帝臨御之時耶律楚材為相定税賦立造作𣙜宣課分郡縣籍戸口理獄訟别軍民設科舉推恩肆赦方有志於天下而一二不逞之人投隙抵罅相與排擯百計攻訐乗宫闈違豫之際恣為矯誣卒使楚材憤悒以死既而牽連黨與倚疊締構援進宵人畀之以政相與割剝天下而天下被其禍荼毒宛轉十有餘年生民顒顒莫不引領望明君之出先皇帝初踐寳位皆以為致治之主不世出也既而下令鳩括符璽督察郵傳遣使四出究核徭賦以求民瘼汚吏濫官黜責殆遍其願治之心亦切也惜其授任皆前日害民之尤者舊弊未去新弊復生其為煩擾又益劇甚而致治之幾又失也今皇帝陛下統承先王聖謨英畧恢廓正大有一天下之勢自金源以來綱紀禮義文物典章皆已墜沒其緒餘土苴萬億之能一存若不大為振澡與天下更始以國朝之成法援唐宋之故典參遼金之遺制設官分職立政安民成一王法是亦因仍苟且終於不可為使天下後世以為無志於天下歴代綱紀典制至今而盡前無以貽謀後無以取法壞天地之元氣愚生民之耳目後世之人因以竊笑而非之痛惜而歎惋也昔元魏始有代地便參用漢法至孝文遷都洛陽一以漢法為政典章文物燦然與前代比隆天下至今稱為賢君王通修元經即與為正統是可以為鑒也金源氏起東北小夷部曲數百人渡鴨綠取黄龍便建位號一用遼宋制度取二國名士置之近要使藻飾王化號十學士至世宗與宋定盟内外無事天下晏然法制修明風俗完厚真徳秀謂金源氏典章法度在元魏右天下亦至今稱為賢君燕都故老語及先皇者必為流涕其徳澤在人之深如此是又可以為鑒也今有漢唐之地而加大有漢唐之民而加多雖不能便如漢唐為元魏金源之治亦可也恭惟皇帝陛下睿稟仁慈天錫智勇喜衣冠崇禮讓愛養中國有志於為治而為豪傑所歸生民所望久矣但斷然有為存典章立綱紀以安天下之器不為苟且一時之計奮揚乾綱應天革命進退黜陟使各厭伏天下不勞而治也今自踐阼以來下明詔蠲苛煩立新政去舊汙登進茂異舉用老成緣飾以文附㑹漢法斂江上之兵先輸平之使一視以仁兼愛兩國天下顒顒莫不思見徳化之盛至治之美也但恐害民餘蘖扳附姦邪更相援引比次以進若不辨之于早猶夫前日也以有為之姿據有為之位乗有為之勢而不為有為之事與前代英主比隆陛下亦必愧怍而不為書曰罔不在厥初易曰履霜堅氷至詩曰如彼雨雪先集惟霰春秋書元年春王正月皆謹之於初辨之於早也有有為之志而不辨姦邪于早而卻之則鑠剛以柔蔽明以晦終不能以有為葢彼姦人易合難去誘之以甘言承之以怡色賂之以重寳便辟迎合無所不至不辨之于早而拒之皆墮其器授之以柄而隨之耳昔王安石拜㕘政吕獻可即以十罪章之温公謂之太早獻可曰去天下之害不可不速異日諸君必受其禍安石得政宋果以亡温公曰吕獻可之先見范景仁之勇决吾不及也夫月暈而風礎潤而雨理有所必然雖天地亦可先見况于人乎方今之勢在于卓然有為斷之而已去舊汙立新政創法制辨人材綰結皇綱藻飾王化偃戈郤馬文致太平陛下今日之事也毋以為難而不為毋以為易而不足為投幾絜㑹比隆前王政在此時毋累于宵人不惑于羣言兼聴俯納賁若一代號為英主臣之願也臣草茅愚昧既被知遇而又逺離軒陛日以隔越迫於事幾故不辟斧鉞冒觸神威庶姦黨少卻綱紀粗立雖萬死無恨中統元年八月附報入宋奏目上進河東罪言竊聞天所畀與而能奉承是謂應天畀與而弗之應是謂棄天天可棄乎故凡有天下國家者雖一民尺土莫敢忽而不治非惟應天亦所以奉天也國家光有天下五十餘年包括綿長亘數萬里尺箠所及莫不臣服惜乎綱紀未盡立法度未盡舉治道未盡行天之所與者未盡應人之所望者未盡允也比年以來闗右河南北之河朔少見治具而河朔之不治者河東河陽為尤甚近歲河陽三城亦在湔濯分裂頓滯者獨河東而已夫河東表裏山河形勝之區控引夷夏瞰臨中原古稱冀州天府南面以涖天下而上黨號稱天下之脊故堯舜禹三聖更帝迭王互為都邑以固鼎命以臨諸侯為至治之極降及叔世五伯迭興晉獨為諸侯盟主百有餘年漢晉以來自劉元海而下李唐後唐石晉劉漢皆由此以立國金源氏亦以平陽一道甲天下故河東者九州之冠也可使分裂頓滯極于困弊反居九州之下乎竊惟國家封建制度不獨私强本榦與親賢共享示以大公既分本國使諸王世享如殷周諸侯漢地諸道各使侯伯専制本道如唐藩鎮又使諸侯分食漢地諸道侯伯各有所屬則又如漢之郡國焉尊卑相維强弱相制與衆共有進退比次不敢相踰條貫井井如農夫之畔分撥公賦使為私食則亦一代之新制未為失也平陽一道𨽻拔都大王又兼真定河間道内鼓城等五處以屬籍最尊故分土獨大戸數特多使如諸道祇納十戸四斤絲一戸包銀二兩亦自不困近歲公賦仍舊而王賦皆使貢金不用銀絹雜色是以獨困于諸道河東土産菜多于桑而地宜麻専紡績織布故有大布巻布板布等自衣被外折損價直貿易白銀以供官賦民淳吏質而一道課銀獨高天下造為器皿萬里輸獻則亦不負王府也又必使貢黄金始白銀十折再則十五折復再至二十三十折至白銀二兩得黄金一錢自賣布至于得白銀又至于得黄金十倍其費空筐篚之紡績盡妻女之釵釧猶未充數榜掠械繋不勝苦楚不敢逃命則已極矣今王府又將一道細分使諸妃王子各征其民一道州郡至分為五七十頭項有得一城或數村者各差官臨督雖又如漢之分王王子諸侯各衣食官吏而不足况自貢金之外又誅求無藝乎於是轉徙逃散帝王之都邑豪傑之淵藪禮樂之風土富豪之人民荒空蕪沒盡為窮山餓水而人自相食始則視諸道為獨尊乃今困弊之最也國家血戰數十年以有此土何獨加意于陜右河南及河陽置河東而不問坐視其顛連宛轉而不恤獨非國家之赤子乎是天畀此中土之冠而裂去不受也可乎哉願下一明詔約束王府罷其貢金止其細分使如諸道選明幹通直者為之總統俾持其綱維一其號令輕斂薄賦以養民力簡静不繁以安民心省官吏以去冗食清刑罰以布愛利明賞罰以奠黜陟設學校以勵風俗敦節義以立廉恥則分裂者一頓滯者舉九州之冠可正致治之樞可以風四方而動天下克受天之所畀天復萬萬無窮而畀之也經本澤人旅食他方二十餘年不得一拜松楸守先世之敝廬故願治之心比之他人為尤急天庭遼邈漫為瞻臆太行山色黯然凋瘁引領翹首望之而已居位操勢有以仁天下者可無意乎此非布衣所當言故援引杜牧之例名曰罪言干冒鈇鉞謹附使者以聞布衣陵川郝經言便宜新政臣經言臣昨承和者思得聖㫖令臣條奏當今急務付執政聞奏者臣謹裁新政便宜十六事上進不勝惶恐戰越之至條例如左一大有為以定基統自古帝王之興莫不以有為而後可以無為故舜去四凶格有苗成王伐三監誅管蔡而後致無為埀衣之治刑措頌聲之美宋太祖初即位未有以厭人心趙普曰陛下新登寳位必光耀神武有以挫英雄之氣服天下之心於是親平三叛海内以寧今日之勢不可謂無事政大有為之時也當大起師徒以討不庭明其逆順使天下知所嚮如因仍苟且為人所先則釁亂一生不可猝定矣二嚴備禦以防不虞國家以雄武自勝故厯朝疎于備禦今日之事尤非前日當宻㑹軍旅嚴為之備以待不虞且即位之初兵衛不徹警也昔周康王即位當無事之時齊侯以虎賁逆子釗于南門之外先皇帝有備昔刺木無備故掩而取之至于他日無虞京師宿衛之兵亦當留數萬况非平日之勢乎三定都邑以示形勢今日於此建都固勝前日猶不若都燕之愈也燕都東控遼碣西連三晉背負闗嶺瞰臨河朔南面以涖天下和林置一司分鎮禦根本北京豐靖各置一司分以為二輔京兆南京各置一司分以為藩屏夫燕雲王者之都一日緩急便可得萬衆雖有不虞不敢越闗嶺踰諸司而出也形勢既定本根既固則太平可期四置省部以一紀綱今之執政各各奏事莫相統一皆令陛下親决雖聖明有餘亦不能處置皆當故姦人得以營惑自私若省部既立名分既定大總其綱小持其要天下事雖衆猶無事也五建監司以治諸侯諸鎮諸侯各握兵民不可猝罷當置監司以收其權制其所為則兵民息肩而政可立矣六誅兇渠以示勸懲從來亂政害民之人須誅其尤者不然則懼死逃去必為國生事七親諸王以庇本根諸王既共推戴當加之以恩而勸之以義使尊榮過於前日則可八行寛政以結人心從來宿弊可為盪滌至於今歲絲線包銀宜分數減免一切逋負皆蠲除之九赦罪戾以去舊汙自來新君即位必赦天下且今西北疑阻人情反側諸路打算重為紛擾宜行大赦并罷打算以慰安元元十罷冗官以寛民力諸州縣管民官員數可為限定小處可合并如樂人打捕鷹房諸科目名色官吏皆合罷歸分付管民官諸色匠人頭目尤多有管三五戸者亦稱總管帶金牌皆合罷去只一路立一頭目總領造作天下百姓及匠人只養官吏亦不能也此最為急務如罷去此等好家門戸計補添軍民氣力為益甚大十一總錢穀以濟國用天下差發宣課交鈔諸色糧可置一大司分以總之無入諸路手不令買撲則所得皆可為國家用罷諸路宣課鹽鐵官冗員罷常平倉雖曰常平倉實未嘗有益於民但養無用官吏數千百人十二减吏員以哀良民諸路及州縣吏員不限數目把持官府結為黨與苦刻良民縱横為害合明降一詔旨大小州縣限員數必令保舉尤汚暴者重罪而黜之十三堅凝果斷以成中興王者初政莫不鋭意往往不能自堅鮮克有終必凝天衷奮乾剛羣議不能移斷然必行而莫之沮故能保大定功漢元帝以優游不斷卒亡漢祚唐憲宗以果斷破蔡中興此其效也十四擴充誠明以絶猜狙夫逆詐億不信聖人所譏推誠待物王者之明也一切小數以干聖聴者皆宜罷絶十五明賞罰以定功過有功不賞有罪不誅雖堯舜不能以善治天子無他職事只分别君子小人定其功過而賞罰之此其職也十六定儲貳以塞亂階國家數朝代立之際皆仰推戴故近世以來幾致於亂不早定儲貳之失也若儲貳早定上下無所覬覦則一日莫敢争者且使朝夕視膳或出而撫軍守而監國練達政事此盛事也庚申年四月十七日臣經上進備禦奏目臣經言臣初離闕廷未知朝廷用兵次第雖條奏新政不敢遽言但舉備預大畧一條而巳今聞西北阻命朝廷處置自遼東至於豐靖以及河西其闗隘備禦必無缺綻未知西域回鶻諸國及土波大理繞出西南嘗為備禦否其土地廣逺兵力豪勁且其酋長多變詐懼乗虛作變與西北連衡遏截旭烈大王在所蟻聚轉相營惑使有反顧之憂又西蜀兩川新集或為搖蕩便有意外之變宜遣一大官知兵者選集回鶻諸國土波大理一帶軍馬於好水草險要處駐劄與闗西宣撫司肱脾相應是斷西北右臂且張聲勢以接應旭烈大王軍馬則國勢日張西北日沮諸國不敢覬覦兩川得以倚重如不為備或有透漏則數千騎可以突出闗西河南無結草之拒中原震動矣臣又竊見江上退師以來宋人頗有輕中國之心葢彼瘡痍未完不敢窺伺然國家不可不為之備四川河南京東山東當置四總帥四川自成都至興元接上均州置一帥河南自唐鄧至陳潁置一帥京東自睢亳至宿泗置一帥山東自邳徐沂海并東北海口置一帥於陜西河南酌中處置一大行臺總統東西以壯國家藩垣便使宋人請和邊備亦當如此臣愚微爝火之見不敢自蔽且即入宋不勝戀闕故又及此伏取聖裁中統元年六月七日上進陵川集巻三十二
