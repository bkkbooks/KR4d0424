body:
  text: 陵川集卷三元郝經撰古詩曲阜懷古孔林泰山元不頺永作聖人墓嶽麓南面馳崛岉勢蟠踞一從仁瑞亡梁木忽生蠧遂成覆夏屋三千各封樹脩竹與文楷灌聳擁煙霧森森十里林鬱鬱九原路燕人逺來觀子貢獨不去秦火卷土焚漢雨横天注本根萬丈深枝葉四海布斯民賴餘䕃顛沛来比附凡鳥寧敢巢儀鳳見乃屢緬懷掩袂時重念絶筆句摩挲石麒麟可惜死不遇杏壇天地一生意孔門儘春風喜聞夫子道歌詠各雍容當時説春王元化開無窮杏壇仁義香不見花白紅庭中手植檜霜幹參青空幾囘比歳寒亦指徂徠松有席不暇暖木鐸揺西東桓魋怒拔樹仗劒邀其窮囘車殺鳴犢擇木視飛鴻燕居都幾年一世如斷蓬誰知千萬世遂為吾道宗枝葉今尤多春來花更濃昨朝上丁罷醉殺守祠翁顔巷顔巷無顔徒荒煙亂榛梗奚復辨崇陋淒然想幽屏應卜原思鄰不與端木並曲股儘餘樂閉户祗退省自有正大域直造高明境不違獨得仁無欲乃能靜瓢飲忘萬鍾簞食同五鼎乃令子慟哭天喪不敢請顔夭未為短跖壽豈為永不貳乃云命枉生特徼倖黄桑千年道尚有門前井誰来洗心齋無人照止影西風散禽鳥老雨溷蛙黽周廟中城繚危基公宫盡禾黍惟餘文憲廟青松䕃寒礎塼壇冷香火誰復薦籩爼厥初蒼姬王世德繼湯禹一再幾遂微管蔡惎祿父公旦述聖事攝政輔幼主皇皇赫東征焰焰顯西土下能開成康上能並文武禮崇七年制樂備六代舞更比夏商文不替羲軒古公薨葬畢郢廟食乃在魯宛與大成鄰氣色成龍虎誰知曲阜城即是文章府子思墓王陵象尼山窒皇擬天闕白石六十四方正相倚疊卿雲繞龍隧脩竹生馬鬛前却三代祖宛與聖人列乃是子思子道貫祖孫一顔夭曾始傳心授相世及大學宏綱舉中庸性理切浩氣有孟軻六經復為七向微三大賢聖統幾廢絶爾來一千年晦没無人説韓李端緒開伊洛本根揭萬古唐虞心日月光目睫不必揮金鎚拜墓即親炙奎文閣新宮拜小寢旋上奎文閣欄蠧紫苔深簷傾青瓦落佇立思聖人音容儼如昨臨深敢為高犇逸不可學闕里泰山前洙泗墳林脚道德並流峙鳶魚各飛躍靈光秋草没泮水清霜涸返照入顔巷無人有餘樂舉手捫天星絡繹光閃爍何時五曜入晃朗璧府廓歸馬掃欃槍勝殘沉貫索忽聞金石聲殷殷地中作青天有太陽莫漫螢火爝遊靈巖寺乙卯秋九月十九日登泰山二十二日下太平頂遂遊靈巖寺岱宗西北馳倒卷碧玉環嶽靈秘雄麗勢欲藏三山初從谷口入兩崦爭孱顔漸疑下地底細路深屈盤仰視覺天窄石井攢峯巒陸海沙刼開突兀仁主壇桐鯨吼西風棟宇横高寒石龍噴清泉灑落几案間脩竹掃山色瑩綠穿雲根丹鳯饑不來寂寞青琅玕上方在天上下視無塵寰空霏鎻霜樹翠錦䝉朱殷西日囘清輝輕金滿煙鬟何時脱世網掛席高盤桓靜境求初心滯慮驅萬端向晩蒼煙合更欲窮躋攀路斷不得前矯首重一看贈青社諸公北風吹海氛雄鯨偃修鰭音奇皇皇擇木鳥落日將安之清霜摧豐林枯沙没卑枝况復天地閉豈汝飛騰時嗷嗷復嗷嗷途窮愈多岐寸心增鬱陶拊髀潜生悲蒼茫欲問津謾使行人嗤賴有魯連子亦在東海湄舉手謝浮世共欲尋安期扶揺三山巔笑傲雲濤低半夜開扶桑弄日騰清輝伊昔孔尼父亦欲居九夷世網儻可逃去去夫何疑青州山行薄遊東諸侯致敬多擁篲訖無安巢木歳晏復反鞁飲馬南洋橋摩玩米芾記蛟龍郁蟠拏劒㦸磔芒刺酌別表海亭㶑灧吸空翠霜風吹鴻鵠草野簇車騎日斜過雲門凌跨方半醉垠崿亂葉滑蹭蹬幾欲墜懸嵒半遏面絶澗黑無地入險難遽止眩運不敢視層崖宿山家坐乆猶膽悸居民畏馬嘶游子喜犬吠汲逺終夜喧月斜人未睡紫闗見星稀枕石餘蘚膩酒散身逾困飢透食有味忽聞炒椒巔虎去失羸㹀隂森木石怪慘冽霜露氣黎明轉重崦呀互急幽閟繚繞天一線陷日孤光細嵌隙深且蒼白晝悲魍魅過午纔得水飲潄解鞍憇却是城西河山間更清駛彎環折䲔腸詰曲亂之字跋步重踆音逡涉深淺頻揭厲林開見石田數頃牛角鋭淳俗乆深居見人但驚避農婦帛纒頭應門聳高髻破屋有村翁無言但流涕舉鞭為撫摩俾説山中事都因七十堌鹵莽各稱帝實户三百萬食盡猶未弃白骨與山齊查牙誰與瘞幸得脱齒頰瘡殘餘一臂年來立海州遺噍更疲弊邊郡増仇敵深山無子弟聞此不忍聞愴怳復􅀈􅐵海岱稱東秦山河號十二峽口吞穆陵渤澥卷無棣初從霸國後往往逞兇猘虢公死巖邑恃制殆非計祗為殘民區每啟姦雄志窟宅多龍蛇桃源難避世數日出脩阻川途漸平易雲梢見萊蕪孤城隱霾曀囘視青萬疊乾坤屹軒輊穿出過徂徠背轉逾汶泗泰山正面看益見崇髙勢目中好全齊蒯生莫兒戲為告慕容超勿謂燕得歳界墻雪不用體物字昌州北金人所築界墻也陰風簸長嶺坤倪忽軒豁嶙蠢生鐵雲黯淡死灰發初來雜沙石硬顆傾碎雹旋轉迸玉屑一噴勢愈惡勁發萬弩齊激去掣箭鑿委積皆重搭背左著㸃剟遒𦂳不暇飛滚滚互團掿蟠空凍相粘連締渾欲閣漫天都一片奚計席與箔何處覔界墻人間無海嶽顧盼已數尺氣偃驚駭愕慄慄寒作威稜稜痛如斫模糊半垂面酸楚欲拆脚我馬不得前我僕指已落重繭頓覺輕透骨江紙薄挾纊殆兒戲豐貂亦纎弱向晩耦陡黑陰雲肆饕虐横空怒潮頭壓地塌天角平拉老䑕山倒卷鴛鴦濼刀槊走柔然金鼓鏖衛霍竟夜遽呼號乾坤碎磨錯車從谷口没人在氷底罨黎明遞相尋堆阜各挑撥還聞頓足歌彎弧盡欣躍正好射黄羊何須待消鑠長嘯蹴踏去天沙蕩寥廓聲繞霹靂絃查牙競禽縛平地深虎穽更不用矰繳瀝血嚼紫肝流凘飲紅酪雪盛馬尤肥皇天助幽朔資賦不畏寒自得生處樂可笑嬴秦初更嘆金源末直将一抔土欲把萬里遏隱墻日避冷手弄不龜藥救死恐未能奚暇更守捉况乃天道北斗極重旋斡黑雪是長安飛灑過汴洛突兀無與强萬古入陰壑為告党家兒惟當守盟約君看銷金帳豈是疆戎索獲鹿新居哭元遺山殘山遶荒城慘淡帶餘雪我来問新居欲語還哽噎揺揺識風旌掩掩淚隠睫額地升中堂痛激肝膽裂鼻若閶闔風幽㝠忽穿徹空牀一束書不見文章伯愁馬喑不鳴老僕頓欲絶嬌兒背面啼高弟展轉説有書未絶筆有傳未卒業靈輀已西州壯心空北闕緬思從公遊灝汗飛玉屑振筆青雲開炳烺寒電掣鯨吹濤山囘隼厲霜鋒撆藴情入軟語婉藹幽更切鶯啼柳陰深百囀春不歇方張大庭樂誰意成永別徙倚扳庭柯窓户轉寥寂乾坤入凋喪衣冠少顔色魂来暮山青魂去暮山黑城頭老畢逋底事悲破月中腸元易感使我心欲折登昊天寺寶嚴塔旭日燒銅輪赤氣繞車轂平步登青天陸海一龍窟寶藏沙刼開突兀翻地軸瑰奇入霄漢締構窮土木高穿翡翠籠直到蓮心出錯落金鯨鱗蹭蹬木虵腹致身知幾層但覺重錦束巧碎雕鎪心力盡撐拄骨合㳫三天神倚疊萬國佛丹青雜珠琲新若手未觸盤盤老風煙天門鎻寒玉乾坤一柱旁日月互生没六年五入燕空為眼中物于今始一登頓覺超凡俗曠宇凌高寒飄飄肆遐矚海卷碣石囘天壓陰山覆瀘溝一衣帶居庸險何足蒼蒼金臺雲青青薊丘竹昔賢今不見悵望空注目下視極羽淵黄熊尚盤屈窟宅幾千祀潜姦富凶毒魑魅不能禦何人與驅逐燕雲割山河神州疆理蹙稱臣又呼父萬古天王辱一登還百憂慘淡意囘復安得脱世網對此傾􅌬醁慷慨澆心胷醉向天邊宿贈劉茂之昔歳余先子避兵淇衛間乆雨壞垣壓其腰股懣絶不知人者數日醫者以良劑飲之而愈甲寅夏故疾復作號呼晝夜殆不能堪全真者劉茂之飲之以藥便血數斗而愈丙辰夏得風疾而小便結塞十餘日臍周左如覆盃狀醫者殫技莫之能瀹茂之視之曰是針不能達藥不能及有一術可愈乃以手按摩自章門至于氣海頃之血溺并出出數斗乃愈先子生平疾病者三而愈於茂之者二是先子數年之命茂之延之也茂之滿城人名至臨嘗遇異人授之方技而不自售遇有疾者哀其苦而閔其窮即為治之無不愈顛連無告者日塞其門而不憚也雖為全真道而喜交遊灑落通敏不滯於物胷次洞豁廓無梗礙而其藴蓄有非凡夫所能見者余嘻先子之事且嘉茂之之為人乃為賦詩道進物我化技進心手忘飄飄子劉子道技皆所長委世欲長往顧瞻仍彷徨吾民吾同胞顛頓真可傷以道引汝年以術藥汝瘍生死且肉骨丁手開膏肓譬如庖丁牛游刃不折芒舉目皆全人仁壽涵八荒惟天畀先子兩厄皆再康晏景囘桑榆庭户生輝光我欲借君術醫國還虞唐彷徨張四維突兀宏三綱緬思何可得謾自摧肝腸山林有高䠱注目煙霏蒼何當把臂遊深探先天囊隨州山南楚甸拆漢東隨為大盡日涉艱阻極力出險隘川途落木杪忽覩天宇快長林偃秋色百雉露茫昧疑向逺水曲隠映脩竹外㨗去不得前横亘斷崖礙煙深梅欲春石亂水相帶飛鳥不知人投樹聲甚怪探騎隔岸言轉出西城背火壕削紫土斬絶黑欲墜當時不受攻例與安陸潰居人盡室去涵養儘一敗荒空二十年繁夥日蕪穢白堊餘屋壁狐狸窟庭内穿窓棗枝曲倚柱巖桂壞誰種當道棘亂長侵階菜奥室没蒿萊何處覔粉黛溼氣雜土腥當晝半暝晦相國來秉鉞下令急翦拜佇馬開天荒欲復太平代勿謂少師侈今有季良在石門霜風赭諸山重崦黄槲映東南漢川盡萬疊複嶺亘甲士斫前路呀轉崗坂競登天忽落井急注繚一徑翻身伏馬鬛植立上石磴覆地露葉滑摔面樹枝迸斷木餘高盤蹶步復拉脛楂竹磔青耳剟刺蹄血凝石梁僅尺許絶澗陡色暝萬衆急相擠失脚如墮甑前抵雙石門扼塞兩窟􅑊不虞為申驚傳呼空谷應大洪宿重兵栲栳相盻􅀈木蘭與白兆左控復前迎漢淮此要害敵人必來偵部伍各整頓介胄聽将令遇敵毋妄動涉險更安靜如律以次發不鼓氣益盛崎嶇得隙地稻塍土脊硬匍匐扳劒刃澒洞下泥穽囘看半天乾却欲上危嶺日斜布營壘煙起衆已定反思中原好桑麻展平鏡沃衍少巖邑生民樂王政鬻熊文王師南服始數乗後来為霸國春秋每譏評一州七千里蓋亦賴形勝六朝據上流踵武反朝廷吾欲問楚人于今更幾姓白兆山旗尾拖澗雲鼓行斷横谷敵人隔林望坐甲不敢出白兆有居民煙蘿蔽喬木負擔来迎降馬首爭蒲伏為聞不殺令又復治安陸萬死乞餘生焦土覔舊屋老人翻白鬛南望吞聲哭松楸却成林到此死亦足載説桃花嵒醉墨苔蘚綠每於秋月下似有飛僊讀遽令巾其巔重為賜米肉偏裨好䕶送縱歸不令宿喜氣動江山迢遥肆遐矚安得與李白雲牕對脩竹雲夢羣山避鄢郢霜淨楚天逺秋色浮鴈背風水蘆花滿陂澤通江湖田岸藏町疃横匯淵藪大散漫稻畦淺積煙晩翠重老浪虚白卷乾坤入涵混魚龍深宛轉殘嶺土崖斷餘浸黑壤輭平崗繚中洲濶甸負長坂勁竹密如簀綠粉封紫笴忽向青楓末半出黄槲峴北人有圖畫却向此間展選鋒一萬騎掣電鐵滿眼更不顧虜獲直向腹心翦昨去今飲江埽道草盡偃何處仍三戸踐蹂殆不免荒莊自池臺寒蔓相挂罥鵝鸛不知家悠悠忘還返注目浩無際馳想首重俛何時結茅屋老吟寄殘喘濯纓謝漁父瞑卧汀沙晩青山磯市渡江不殺降百姓皆按堵羊羅到武昌相望兩舍許井邑聨亘長横斜纒水滸青山一聚落中道勢幽阻通衢萬家市巴商雜越旅背面千檣洲漢陽對鄂渚絶岸斷鰲立崩濤高觜吐竹樹深且密石頂還戴土傑觀復傑出層楹瞰全楚薄暮重登臨道者貌甚古開軒具盃酒江氣滿樽爼萬里西風來飄然若輕舉壓雲亭重嶺繚郭峻高亭下臨鄂艨艟斷江流甲騎蹙城脚拒命始進攻鐵匝長圍合顧已無頭陀徑欲椎黄鶴謁王登巉巖再拜瞻日角王氣壓江山曠朗天宇豁十月汗沾裳敷奏初不覺詔賜金叵羅禮酒焉敢嚼絲綸重開喻滿面春風著撫膺還自頌不負生平學須臾動金鉞猛士徹虎幄龍起皆雲從青山萬馬落黄鶴樓江漢天西傾斷岸蹙寒雪石城踴高樓瞰臨勢縣絶雲夢吞八九沅湘在眉睫層軒掩石鏡更欲壓大別千帆落山巔萬檣擁舟楫中天巻晴嵐不與人世接縹緲多飛僊超揺有遺跡前缶黄鶴來重與添顔色丹梯插青空萬丈生金碧聞説呂洞賓題詩滿新壁至今起香霧怪字人不識仙語龍蛇亂醉墨江山溼有時横長笛吹落漢陽月洞庭與彭蠡一聲勿穿徹我方溷戎馬對面兵塵隔焉能載酒上雲間覔僊客當年秃髪翁幾囘喚李白不見狂處士亦為重嗟惜高賢共長往矯矯不可得落日聽江聲西風冷蕭索渡江書所見巳未秋奉命宣撫江淮自鄧南入新野蹈宋北鄙渡泌河及湖陽入于舂陵陂塘聨絡畎澮縈屬村墟蓊翳荒空不可行佳木脩竹奇花異卉櫛比林莽間怵然有感於中而取野蓮荒竹秋桐野菊四者姑以寓感焉野蓮陂塘𣺌煙蕪秋波淡浮空蒹葭雜芙蕖依稀見愁紅輕銷露華涼亭亭倚西風金粉亦自香霞腴為誰容無言恨最深失偶情更濃揺揺似相招為喜詩人逢翻思彼桃李反在羅綺中復憶巖下蘭綠葉翳荒叢西子出苧羅原思老蒿蓬萬物在生處莫漫仇天公荒竹荒竹遶廢宅髙下隨女蘿新梢入林莽迸葉揚條柯玉骨清且癯埋没還奄阿病綠煙慘悽枯黄雨滂沱劒斷㦸復折壯士空悲歌伊昔主家安森森氣相摩籜龍起雲雷平地煙霄過幽香澹庭除靜陰延綺羅一自兵塵生人去斤斧多寂寞秋不實飢鳳将奈何秋桐高秋江漢波卉木入揺落荒林擁孤桐蔓草重繞縛凄迷氣日喪憔悴葉自脱黄凋晩風吹青裂饑鳥啄無時亦無儔幢幢老陰薄儀鳳安所棲宮樹空寂寞謂汝無自傷植根亦嬌弱豈能持風寒况乃失所託何時此焉居揚鋤翦荒惡攜幼攀庭柯遂我生聚樂野菊乾坤入消數萬物呈晩節秋晏菊始華荒叢翳林樾野逈幽姿清岡斷寒艷接絲蟲罥青苞啼螿抱枯葉瀼露積玉華層層擁金屑我欲摘以杯飲之濯中熱霜栽郁髙標胡與荒穢列嗟爾夷惠儔玉質難變滅不謂無人看便使幽香歇安得老瓦盆坐對澆古月陵川集卷三
