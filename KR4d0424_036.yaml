body:
  text: 陵川集巻三十六元郝經撰墓誌銘先曾叔大父東軒老人墓銘金有天下百餘年澤潞號為多士蓋其形勢表裏山河而土風敦質氣稟渾厚厯五季而屢基王業而嘗雄視天下故其為學廣壯高厚質而不華敦本業務實學重内輕外宋儒程顥嘗令晉城以經㫖授諸士子故澤州之晉城陵川高平往往以經學名家雖事科舉而六經傳注皆能成誦耕夫販婦亦恥謠諑而道文理遂與齊魯共為禮義之俗而加厚焉陵川學者以郝氏為稱首郝氏之學浚源起本而托大之者自東軒君始君諱震字子陽系出有殷帝乙封支子太原郝鄉因以為氏始祖儀自太原遷潞州高祖祚又遷澤州陵川曾祖善祖從義父璋七子君其季也君資茂異自知讀書不為章句謏學宦學入京師太學游公卿間久之乃還葢厭棄凡近不屑就之也既歸徜徉山谷從而學者甚衆講劘道藝淵滙日邃益有高世意而無復世味以經㫖授學者折之以天理人情而不専於傳注尤長於理學賦詩多警句晚年益趨平實淡如也彈琴得古遺音每呻吟俯仰趨節紆韻超然若有所得逢山水佳處輒為數日留賦詩彈琴自樂也一日過一道院松竹茂蔽坐於其下彈琴而歌睡鶴十餘驚起鳴舞珊珊戛戛終曲乃去從者咸以為異事諸兄甚謹篤于友愛諸兄以族大稱長兄之命異居君乃涕泣三日不食曰吾業儒而為是何以為訓不義而生不如死諸兄得欲而生我將服義而死諸兄懼復聚廬同食以終年四十九配侍某氏子男三人天祐天祺天貞皆治經為學而天祐尤知名君初名旦後更今名自號東軒老人銘曰太行峩峩天地之脊吾家其顛千載寥閴箝以益固噤以益黙惟君亢亢矯首迅出揮斥鴻荒面目太極搴𤣥圃之玉芝剷荒除之天棘秋蘭兮青青秋香兮滿庭君翩翩兮下征掇其實而餐其英乃曳長裾乃抱玉琴明月清風翛然此心葱葱兮桂隂慕其徳音人累益輕天趣益深夫復何為付之長吟君其往矣後來繼今先伯大父墓銘郝氏世業儒以治經力行為本而篤於齊家之道自曾伯祖以嫡長涖家已有法制使子孫世守至伯大父復以嫡長涖家而昆季十餘族長穉百餘口既總家事乃㑹諸宗戚而告之曰夫衣食足而知廉恥倉廩實而知禮節士所以忘義失守至於沮氣墮節者殆多逼於饑凍耳故孟子以農桑為王政之本而其書數及之今某以次為家督欲諸宗親子弟治生為學二者兼進始則仰事俯畜終焉立身行道進而得則各大而家退而失則必有所歸不至於落魄無賴亦足以為善士夫少有大志不事家人生産雖或成就有過人者而為書傳所稱亦非教育之良法泛駕破車雖一日千里曷若馴服以進於道乃相其宗親子弟材器曰畀汝田若干頃畝汝率田夫而治之桑若干本汝率諸婦而治之錢若干緡汝率商人而治之書若干帙汝從某師友某人而治之余則均其有無而治其勤惰於是數年之後貲食豐餘而學業日進先祖及諸父文譽大振而門下學者日盛矣其在家也則雞鳴而冠衣杖而立於庭諸房子弟婦姒皆闢門秉燭盥潄笄總黎明以次省於舅姑父兄退而各執所業或少有稽緩則旦而問之故責之庭少廢禮者則加鞭抶焉至于再則㑹宗親中表列其狀而加之罰飲酒醉者有罰冠衣不正者有罰取友不端者有罰事師不謹者有罰惰于學者有罰相惎間者有罰譁于庭者有罰中堂曰棣華歲時燕集上下肅然又以孝友睦婣任恤等數條書于榜曰有違此者非郝氏子孫至於鄉隣不法者畏其聞知輒自戢曰勿令大翁知有訟者則相率而質其曲直行於里巷望者趨而避不及則揖而拱以待其為人敬畏如此縣令丞每至縣則輒就門禮謁其諸弟姪必一人教授縣學故門第家法無不推重君諱源字清卿曾大父昺之長子也卒年六十四伯祖母王氏二子輿輦輿字正之博學能文三赴廷試有聲場屋歲壬辰沒于兵士林惜之銘曰郝宗重承兩世嫡方玉千仞斷鼇立之綱之紀撫其室支本蔓衍蕃宗戚李廣簡易誠無敵刁斗未若程不識有身有家衣且食晝吟夜誦簡與筆原田每每日墾闢繭絲爛爛充以殖孝弟忠信修行實言笑顧步皆紀律家道既正無敢逸富貴在天吾豈必凛焉高風誰可及雲白天青太行脊擬將傳聞作家極再拜揮涕書貞石子孫世守其勿失先大父墓銘歲丙辰春經至自沙沱家君得風痺疾遂在牀簀卧以畀命曰吾齒已過吾父十年矣雖疾病夫何憾惟吾父之事先有子元子之表在而壙中之文未具且大節之灼灼者而猶未既載焉吾語汝汝其論次乃再拜受命叙其事而為之銘惟郝氏繫出有殷世于太原一再遷于澤之陵川遂為陵川人高曾而下皆學不為仕先大父諱天挺字晉卿幼開朗卓卓不羣舉進士兩赴廷試以太學生頡翥縉紳間崇慶之變束載而去曰時事如此可區區冒進乎遂歸逺近俊茂多從之學其教人以治經行已為本涖官治人次之决科詩文則末也故經其指授者往往有成資河東元好問從之最久而得其傳卒為文章伯震耀一世其餘鉅公碩士出其門者甚衆則其所學可知巳時有金既棄燕雲河朔隨亦不守遂往來淇衛間貞祐初人争南渡而阨于河河陽三城至于淮泗上下千餘里積流民數百萬饑疫薦至死者十七八先大父曰坐視天民之斃仁者不為乃貽書機察使范元直使聞諸朝曰昔昭烈當陽之役既窘甚猶徐其行以俟荆襄遺民曰成大事者必資於衆人歸而棄之不祥君子謂漢統四百年此一言可以續之今國家比之昭烈不至於窘河朔之民獨非國家赤子乎夫人心之去就即天命之絶續也乞詔沿河諸津聚公私船寛其限約晝夜放渡以渡人多寡第其功過以救遺民結人心固天命中興之期庶幾可望書奏即日中使告諭令疾速放渡河朔之民全活者衆於是亦挈家南渡興定元年冬十一月八日遘疾考終命于北舞寓舍春秋五十有七臨終浩歌一不及他先祖妣張氏前卒繼祖妣司馬氏一子即家君也男孫三經彛庸女孫一歸清苑陳氏初既遘疾謂家君曰郝氏儒業自吾叔父東軒老人始我死葬其墓側庶得奉杖屨于地下既祥家君將歸葬諸父兄以河朔兵亂不許家君乃夜啟殯負其櫬以遯而英靈屢見于其所往輒為警覺以導其行雖徒步千里渡大河登太行展轉寇穴卒達于陵川興定四年春二月二十四日葬于先塋東軒老人之墓側從其志也先大父美風儀冠衣甚偉閑於辭令翛然物外人而談王道議國政商處吏事甚得體要嶷然公輔之器而適叔世束背塵閈竟莫能用卒於流寓人憐其志云銘曰郝世不競枿其株根赤立擎霜藴華于春一世于邁天葩吐芬晦以奕世其氣益振氤氲渾淪其屈益信萃于我祖瀹蘭天津簉其羽翰嶷于青雲巖巖盤盤穹乾厚坤玉山高寒瑩徹無塵雖事業不少見而道義是存繼其志有千里負葬之子述其事有萬古遺山之文滄海遺珠長鯨怒吞匵輝翳光以耀其諸孫嗟余諸孫可汨其流而湮其源志惟益堅氣惟益完以復九原以慰乎下泉先叔祖墓銘先叔祖諱天祐字賢卿先曾叔大父東軒老人之子先大父之從昆弟也宇貌瑰托器識高邁日記數千百言而下筆不能自休初為學即不作决科文務窮性理經術而汎入佛老者數年以為過高無畔岸復取六經語孟讀之於是際天人之學瑩如也大安末知世有復隍之變愈益遯黙貞祐初南渡隠居魯山往來箕潁超然欲以追巢許也作古文歌詩往往散落世間故雖隠而名愈顯尤玩意書法嘗以為正書當以篆𨽻意為本而鍾王書之經也顔坡書之傳也其餘則諸子百家耳故其筆勢莊重秀勁能作文餘楷草嘗言大字雖大而小小字雖小而大正書須有草意草書須有正筆其論書如此趙内翰周臣見君蘓墳詩及書蹟遂遺書欲致之京師即挈家去於山林幽阻人迹不及者而居然無幾何雖京都人亦知其處後聞有欲薦諸朝者曰大厦將傾吾不能為破家人又挈家去元内翰裕之既受學于先大父又嘗與君周旋文場故特敬畏聞其又遯去乃以詩相招君復詩絶之而竟不出壬辰之變年四十九沒于兵先叔祖母宋氏一子思直字繼先亦博學能文亦皆歿于兵嗚呼郝氏之學大于東軒老而終于君其嗣𦙍遂不復見而諸父昆季亦皆泯泯焉獨遺家君及經天乎何於吾郝氏若是之刻也先君既命經論次先世故書此以列諸東軒老人墓側以示不朽銘曰文葉班班賁于衆枝道氣顛實于君匱竒初則亡羊幾惑多岐瑰詭譎怪投瀾抵巇番然而回真是之歸明白開朗冲融希夷弄月吟風獨樂良知徳充乎身命違于時收藏天光滑于塵泥每登琴臺望元紫芝千山雲沉知音者誰濯足于潁振纓于箕庖不治厨何與祝尸棟折榱崩夫誰可榰我其長往山鹿野麋君無我招亦莫我追我非絶世不可有為大河絶流商於雪飛天狗墮地蚩尤出旗嗟嗟乎君既往莫違獨不愍遺諸孫孔悲伐石鑽辭東軒之西魂其一來與不死期子阿寳附殯誌歲壬寅余始醮于滿城徐氏甲辰春正月子阿寳生廣顙方頤眉目若畫氣阜而聲宏家君以為類先大父日夕抱弄甚以為慰丙午春先妣委化權厝于府南侯河之北原術者黙言君家喪氛未殄余在衰絰重以為憂夏五月三日童稚聚嬉以氷屑置于阿寳之腹觀其溶滴以咍其騃頃之寒氣入腹暴下數升入夜背弓搐搦而氣竭生三年矣明日附殯于先妣墓之西側哭而納銘于壙云屬余毛離余裏狀乃爾嫡有子而遽死兮吾母之土未乾而復竁于此兮祗重余之戚豈余之子兮子阿長附殯誌歲戊午冬先君告終權厝于府西吳爺灣之北原庚申春余宣撫江淮至自武昌哭墓而入墓之東足小丘附焉不知其為誰也銜涕而去及門冡婦哭于室乳媪之懷空矣乃知向之邱吾子之所也因慟幾絶既而嘆曰天乎何天虐吾郝氏之酷也母氏之終再踰月而吾子阿寳卒附殯于墓側吾父之終亦再踰月而阿長復附焉豈母氏之愛阿寳而攜持之去耶吾父之愛阿長而抱弄之不忍舍耶故各于其終之後而卒卒而附于其墓抑吾之不徳不孝致吾子之弗克昌耶秪吾之不徳而禍吾子耳可無殤乎乃叙而誌之初徐氏不婦歸于家再娶淇澳張氏是生此子五年而卒生于乙夘春三月五日卒于己未春三月十二日尤慧而秀發言如成人以癖疹疾殆將卒謂其母言我死則己奈我母憂何或問其父則閉目擺手曰我不得見矣聞者皆為泣下銘曰不子其父孫于其祖各附于墓共為寃土欲問無所于嗟天兮行狀先父行狀郝氏本貫澤州陵川縣曾祖章祖昇父天挺先父諱思温字和之資剛潔迥迥不倚不為蘧篨戚施疾故與世不偶然而人亦不敢以非義屈横逆加儀幹不及中材而凜凜莫敢犯以亮直自處不億不信中心充實無所虧欠初成童與河東元好問從先大父學俶落六年洞達邃滙其所得者有所自其所作者有所徵天端理倪首尾貫究晦而蓄之靳靳不妄發年二十許奉先大父下太行往來淇衛間時河朔已受兵有金疆理日蹙慨然有志於功名居無何得腰股疾志鬱抑不信遂不就舉貞祐初南渡館而師之者甚衆誠法理意籍籍馳播所至席不煖先大父卒于舞陽既免音問喪謂諸父兄曰先君子卒於流寓不克歸葬安用子為子而委父何面目天下諸父兄以河朔兵亂不許乃與先妣夜啟殯而負之去渡河至長垣資用皆為盜敓從行者因是亦散去獨與先妣扶杖負骸步登太行中路賊二人呵止之曰背負與我不然則死乃啟之賊愕異問故曰是先君之靈將歸葬鄉里賊慘然曰擾擾如此而欲辦是是癡子不足道置火餅數枚而去遂葬先大父於陵川之先塋興定四年也元光元年復渡河河南亡攜經北渡居于保聚俊秀而教之者十餘年經年十有六命治六經先傳注疏釋而後唐宋諸儒論議必一經通然後易業焉壬子館于萬戸張公府教授諸子丙辰經被徵北上及還議歸鄉里拜謁松楸夏四月十有七日得風疾不起在牀簀者三年戊午冬十有一月二十六日增劇二十七日夜忽命經等曰天地之道恒久而不己人惟恒久乃有前程天下事何嘗不因不恒壊了整衣冠强為之起咄唶曰發志氣遂瞑不復語二十八日終于寢年六十有八門生苟宗道趙泰尚文等相與謀曰先生不苟禄仕困而不撓臨終而猶以志氣為言不亦卓乎可諡曰静直其未嘗禄仕可稱處士十有二月一日與先妣神宫同權厝于保城之西呉爺灣之北原三男經彛庸一女適清苑陳咨男孫二女孫二皆幼先父生平喜為歌詩徜徉跌宕以自樂而多散逸得遺藁一百二十篇晚年尤邃性理學手書西銘畀經曰是入徳之幾造道之階也教人以小學為本以為灑掃應對進退即性與天道之端致身行道樹立事業性與天道之功用充實而大大而能化性與天道之成終者人之始生其醇未醨其樸未散其見解未出其物欲未雜先入者而為之主終身由之而不能去古之人至於胎教况髫齔之間乎語言啞咤肝臆緘固神出入而未舍識靄昩而未明容妥娜而未莊氣閃爍而未定謹其所習政在於是乃為言坐行立揖拜俯仰之節誦記熟復執筆為書之制聲音笑貌疏數疾徐之儀一之以敬而不使之惰少長則為解説義理綴緝章句簡直切律力少而功倍之成童則以性理經學為本决科詩文為末而寖致之大學嘗語人曰人見吾之規規孑孑必以為是區區致力於小者而小之也吾不病也夫事有小大理無小大也本末先後吾不敢躐而欺之也彼所見者以為小吾所見者以為大是吾所以積徳而遺吾子孫者世之人好高慕逺以欺世盜名未能灑掃應對而便説性與天道紊理踰分枉探速成戕本根壞倫類示不以常而重為之誑敗徳孰甚焉吾不為也孟子曰大人者不失其赤子之心赤子之心良心也其為大人保是心而已棄赤子之心即為大人可乎哉歐陽子謂顔狀未離於嬰孩高談已及於性命者殆亦為是耶其設心如此故所到輒見稱學者往往終為成人方卧疾也一日語經曰汝祖父有言士不能忍窮一事不能立汝曹毋以淺功近利有速售之心也慕利則敗義欲速則不達汝能勤則功自至汝能儉則利自來故立身行已在夫堅忍而已能堅忍則能忍事厯大患難處大富貴决若長河而不回屹若泰山而不移然後可謂大丈夫凡為亂畧姦宄不終其身者皆不能忍耳染指垂涎之氣不除負鼎滔天之心常在一旦肆欲憤不顧義殞身喪元而及其宗盜侈一時遺臭千載汝曹可戒也過庭之訓類如此嗚呼先父身無一命之爵史無一字之書其於改葬先塋壙無一辭之文是大泯泯也立言君子苟為稱述銘佩之意死且不朽孤子經等謹狀先妣行狀先妣姓許氏澤州陵川人與郝氏同里閈世為姻好故既笄而適家君逮事先大父甫廟見北鄙已用兵遂從家君奉先大父逃威山谷間推夷就險羞精食疏采薇蕨汲谿澗樵薪蒸以養備極艱苦而不憚也興定元年先大父卒既禫家君曰養生不足以當大事惟送死可以當大事父死而不克葬安用子為遂與先妣决䇿歸葬諸父兄以河朔兵亂不許乃夜啟殯竊骸以遁時金國棄河朔限河為守諸津要皆禁自北而南者則渡有王事于北者則渡非是則不渡也久於河上資糧懸罄適有受業先大父者為機察使俾偕賜上黨公茶果船以濟遂至于衛之長垣賊衆單重等行剽掩至人皆入窟室先妣獨不去守骸以坐曰寧死可棄我翁之靈而求生乎賊至將兵之不為一動賊厲聲曰若何人獨此不去若所守者是何寳貨曰此我翁之靈將歸葬先塋者今幸得濟河有死而已其可去乎賊感愴兇鋒少沮詰姓居曰陵川許氏也昔舅氏彪嘗為澤掾賊中有澤逮而得舅氏保宥者因驚悟曰若許某之妺也且語舅氏之恩且壯其節遺白金數兩而去遂登太行時隆冬雪盛天地晦㝠官兵盜賊搶攘旁午從行者因長垣之役皆散去獨家君先妣二人而已而家君復目赤暴發道滴水場太行之至險也盛雪冒之蹊徑不辨指峯巒為的攀縁嵌隙循蹭崖磴負骸導家君而進纔半途已入夜矣黎明始出山再日達于陵川乃克襄事元光元年復渡河冬十有一月生經於許州臨潁之城皋鎮天興元年河南亡攜經北渡居于保繼舉彛庸二弟經年十有六欲以幹蠱自任先妣謂家君曰郝氏儒業四世矣名士如元遺山者我之自出故家淵源當益浚之可自我而涸乎今宗族之在河南者皆盡矣惟吾獨在有三子焉豈非天也使是子也而有成不隊墜同家聲吾儕凍餒無憾其或不成亦云命矣於吾責何有若以利責之子而不教是廢先世也先世之靈照之在上質之在傍將於誰而責也故家君感泣為之賦詩有日月儻隨天地在詩書終療子孫貧之句於是命經就學欲其先經也乃命之曰經經亦感奮以夜繼日或冠衣不釋如是者有年一日雞初鳴經猶凭几伏誦書帙紛紜殘燈無焰先妣竊視之慨嘆良久呼經語之曰能若是吾有望矣勿始勤終怠喜而自足半塗而廢吾見進鋭退速者多矣力學而卒成者鮮也汝自暴棄一身小矣先世之責之重於汝大也經遂日益激勵蟠錯刮磨肆意經傳砥礱抉剔鈎昧蹈逺塊乎其若癡茫乎其若迷爝焉猶未光也而天遽降割歲乙巳冬十月十日遘疾丙午春三月九日考終命于私室春秋四十有九寓神宫于保之南原先妣資稟淳懿婉淑有守識慮詣極經所與游一見之輒曰某當交某當絶經或不如訓輒為小人所累所居既去隣里思之稱道不容口待人以信不疑人欺己事家君敬慎不違每勸以義賓客至盡力供具資用闕必假貸以給經逮事十餘年雖屋漏獨處未嘗見其惰容束諸子以義嘗語經曰吾忍窮使汝就學非為利也欲汝知道義負荷祖宗不汙之而已今世子弟以一時之利敗終身之義者皆是也是豈子弟之罪其父母不處以義而責以利使之然爾以貨財殺子孫吾不為也汝其勉之先妣雖終言猶在耳嗚呼旻天弗弔經未底于成不副母氏之意母氏亦無一日之燕終身艱厄下壽而卒孰為之司而使之然也一女未笄二弟尚幼宛然失怙家君戴白坎然而憂何剢吾郝氏之虐也惟母氏之節之徳固宜昭之金石著之竹帛不可昩沒也矧昊天罔極之報萬萬無一乎於是録經之所聞所見者立言君子苟賜矜允為之譔述使遺美不墜光慰下泉雪終天之痛報罔極之徳銘佩之意死且不朽謹狀喬千戸行狀高祖諱曽祖諱祖諱父諱順公諱惟忠字孝先涿州定興東王里人世業農為大家母李氏腹公七月而寡公幼聚嬉異於他兒及長有志畧捷勇善射衛紹王遇弑北鄙用兵四海有改卜之兆公慨然輟耕長嘆曰時事如此大丈夫樹立之秋也何區區爾為遂落魄不事生理俠遊燕趙間貞祐初宣宗南渡河朔大擾公以義軍從今萬戸張公起於定興保西山之東流堝樹義旗招叛亡跨山連海威聲大振北兵扼吭盤桓而不得進行臺聞之便宜授公定逺大將軍恒州刺史受經畧苗道潤節制從張公鎮撫西山諸保砦張公勇而有謀膽决善戰燕趙之豪附之者衆毎以方畧授公使戰輒中機㑹嘗以少擊衆由是威名冠張公之軍國朝悉兵南下萬戸張公逆戰于狼牙嶺馬跌被執時公居守東流堝北兵以張公至堝下招諭使降公拒之諸軍既登公猶拒守自若進攻拔之張公以腹心之舊爪牙之用能全節守義義而釋之公荷更生之庇以死力自效遂從下雄易安保諸州宋人乘金之亂使彭義斌將兵襲河朔至澶魏建斾而北公以一軍蹂其鋒諸軍壯之真定武仙叛並山諸州縣保砦皆拒守萬戸張公㑹諸軍擊之令公攝帥將騎兵數百步兵三千人鼓行而西時敵兵將聚保於狼山砦公召諸軍吏曰彼將歸其巢穴我遏之必殊死戰歸師勿遏軍志之戒也不若覆諸山下啟其歸路彼既得歸莫有鬭志是獲獸于穴也衆從之適兵既過公鼓譟奮擊大破之時有别部將陷敵者公横戈突陣而入力戰救之乃獲免於是諸叛望風降附遂入鎮州武仙奔公㑹諸軍追之馘虜甚衆遂㑹攻彰徳轉戰至齊魯駐軍滕州牙山中夜敵出不意襲壘而入公獨騎追戰奮戈大呼横衝逆擊諸軍始覺譟以繼之敵衆駭散填山堙谷而奔於是公名震河朔矣其圍益都也援兵數萬幾及城公掩擊敗之獲衣糧戰具甚多遂閉其門㑹内兵闢門突出公嬰其鋒短兵接戰敵敗走主帥旌公勇以勵諸軍先是萬戸張公開都元帥府于滿城以公為元帥都監遷副元帥至是帥還仍行二安州元帥事未幾出鎮唐縣行元帥事復從張公鎮新衛州辛夘冬渡河㑹戰于鈞州遂㑹諸軍圍汴金義宗北渡丞相白撒圍衛州力戰郤之追奔至黄龍崗復㑹諸軍圍蔡河南平張公入覲以公將行營征淮南歲甲午朝廷論功張公陛奏曰臣馮藉國家威靈所向克捷臣何力之有亦臣有一二爪牙熊虎之助臣之副將喬惟忠戰功甚多乞加寵異於是朝廷以璽書金符錫公仍以千戸世其封自是連年大舉伐宋公感戴恩遇益自奮勵其破棗陽攻光黄等州功尤多丙午夏寢疾五月二十七日薨于第春秋五十有五寓殯于順天府城之東原公美鬚髯沈勇善戰遇大克捷恬無自得之色其攻黄州也敵兵夜襲諸柵公率鋭卒戰主帥舉火視之見青甲而黄馬者戰甚力翌日主帥懸賞求之公竟不自陳其不矜如此雖奮起畎畝藹然有閥閲簮笏之風事母孝每酣戰而歸必頓整冠服拜而問安及居喪過於毁瘠遂感疾不起治家有法束諸子以義節於自奉為千戸候而服食不過于華夫人毛氏子男五人孫三人女孫一人歲庚戍將改葬先塋文碑墓隧故次第始終昭灼者于右鴻儒碩筆其諒于兹孤子珪等狀陵川集巻三十六
